<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAXATION — INCOME TAX & HOW IT FUNDS INDIA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1A0A2E;--parchment:#F5ECD7;--parchment2:#EDD9A3;--gold:#C9A84C;--gold2:#F0C040;
  --deep-purple:#2D1B69;--mid-purple:#4A2C8A;--accent-purple:#7B4FBE;--light-purple:#B39DDB;
  --emerald:#1B5E20;--teal:#006064;--crimson:#8B0000;--amber:#E65100;
  --spell-blue:#64B5F6;--spell-green:#69F0AE;--spell-gold:#FFD740;--spell-pink:#F48FB1;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Crimson Text',serif}

#canvas{width:100vw;height:100vh;position:relative;overflow:hidden;background:linear-gradient(180deg,#0D0721 0%,#1A0A3E 30%,#2D1B69 60%,#1B0A3A 100%)}

/* STARS */
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* NEBULA */
.nebula{position:absolute;border-radius:50%;filter:blur(60px);animation:nebulaPulse 8s ease-in-out infinite alternate;pointer-events:none}
@keyframes nebulaPulse{0%{opacity:0.15;transform:scale(1)}100%{opacity:0.3;transform:scale(1.1)}}

/* FLOATING BOOKS */
.fbook{position:absolute;z-index:3;animation:floatBook ease-in-out infinite;pointer-events:none}
@keyframes floatBook{0%,100%{transform:translateY(0) rotate(var(--br,0deg))}50%{transform:translateY(-18px) rotate(calc(var(--br,0deg) + 3deg))}}

/* WAND SPARKS */
.spark{position:absolute;width:4px;height:4px;border-radius:50%;animation:sparkDrift ease-in-out infinite;pointer-events:none}
@keyframes sparkDrift{0%{opacity:0;transform:translate(0,0) scale(1)}50%{opacity:1;transform:translate(var(--sx,20px),var(--sy,-30px)) scale(1.4)}100%{opacity:0;transform:translate(calc(var(--sx,20px)*2),calc(var(--sy,-30px)*1.5)) scale(0)}}

/* POTION BUBBLES */
.bubble{position:absolute;border-radius:50%;border:1.5px solid var(--spell-blue);background:rgba(100,181,246,0.08);animation:bubbleRise linear infinite;pointer-events:none}
@keyframes bubbleRise{0%{bottom:-20px;opacity:0}20%{opacity:0.7}80%{opacity:0.4}100%{bottom:100vh;opacity:0;transform:translateX(var(--bx,0px))}}

/* OWL */
.owl{position:absolute;z-index:4;animation:owlBob ease-in-out infinite}
@keyframes owlBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* MAIN UI */
#main-ui{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;pointer-events:none}

/* HEADER */
#header{pointer-events:auto;text-align:center;padding:1vh 2vw 0.7vh;background:linear-gradient(180deg,rgba(13,7,33,0.97) 0%,rgba(29,14,70,0.95) 100%);border-bottom:2px solid var(--gold);position:relative}
#header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
#header h1{font-family:'Cinzel',serif;font-size:clamp(0.75rem,1.6vw,1.3rem);font-weight:900;color:var(--gold2);letter-spacing:3px;text-shadow:0 0 20px rgba(240,192,64,0.6),0 2px 4px rgba(0,0,0,0.8);line-height:1.15}
#header p{font-family:'Cinzel',serif;font-size:clamp(0.45rem,0.75vw,0.6rem);color:var(--light-purple);letter-spacing:2px;margin-top:2px}

/* PROGRESS */
#progress-bar{pointer-events:auto;display:flex;align-items:center;justify-content:center;gap:6px;padding:5px 10px;background:rgba(13,7,33,0.9);border-bottom:1px solid rgba(201,168,76,0.3)}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:0.65rem;transition:all 0.4s;border:1.5px solid rgba(201,168,76,0.4);color:var(--light-purple);background:rgba(42,27,100,0.6);cursor:default}
.step-dot.active{background:radial-gradient(circle,#7B4FBE,#4A2C8A);color:var(--gold2);border-color:var(--gold2);transform:scale(1.15);box-shadow:0 0 15px rgba(201,168,76,0.6)}
.step-dot.done{background:radial-gradient(circle,#1B5E20,#2E7D32);color:#A5D6A7;border-color:#66BB6A}
.step-line{width:36px;height:1.5px;background:rgba(201,168,76,0.25);transition:background 0.4s}
.step-line.done{background:#66BB6A}

#activity-area{flex:1;display:flex;align-items:center;justify-content:center;padding:0.6vh 1.2vw;pointer-events:auto;overflow:hidden}

/* PARCHMENT CARD */
.activity-card{background:linear-gradient(135deg,rgba(245,236,215,0.97) 0%,rgba(237,217,163,0.97) 50%,rgba(230,205,145,0.97) 100%);border-radius:12px;border:2px solid var(--gold);padding:1.2vh 1.4vw;width:100%;max-width:920px;max-height:calc(100vh - 190px);overflow:hidden;display:flex;flex-direction:column;gap:0.7vh;box-shadow:0 0 40px rgba(201,168,76,0.3),0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.4);position:relative}
.activity-card::before{content:'';position:absolute;inset:6px;border:1px solid rgba(201,168,76,0.3);border-radius:8px;pointer-events:none}
.activity-title{font-family:'Cinzel',serif;font-size:clamp(0.8rem,1.4vw,1.1rem);font-weight:700;color:var(--ink);text-align:center;line-height:1.2}
.activity-title span{color:var(--crimson)}
.activity-subtitle{font-size:clamp(0.55rem,0.85vw,0.72rem);color:#4A2C0A;text-align:center;font-style:italic}
.activity-body{display:flex;gap:0.8vw;flex:1;min-height:0}

/* DRAG ITEMS */
.drag-item{padding:5px 9px;background:linear-gradient(135deg,#FFF9E6,#FFF0C0);border:1.5px solid var(--gold);border-radius:8px;cursor:grab;font-family:'Cinzel',serif;font-size:clamp(0.48rem,0.78vw,0.65rem);font-weight:600;color:var(--ink);user-select:none;transition:all 0.2s;text-align:center;line-height:1.3;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.drag-item:hover{transform:scale(1.05) rotate(-1deg);box-shadow:0 4px 12px rgba(201,168,76,0.5);background:linear-gradient(135deg,#FFE082,#FFD740)}
.drag-item.dragging{opacity:0.35;transform:scale(0.92)}
.drag-item.placed{cursor:default;background:linear-gradient(135deg,#C8E6C9,#A5D6A7);border-color:#388E3C;color:#1B5E20}

/* DROP ZONES */
.drop-zone{min-height:60px;border:1.5px dashed var(--gold);border-radius:10px;background:rgba(201,168,76,0.08);padding:5px;display:flex;flex-direction:column;gap:3px;transition:all 0.2s}
.drop-zone.over{background:rgba(123,79,190,0.15);border-color:var(--accent-purple);border-style:solid;box-shadow:0 0 10px rgba(123,79,190,0.3)}
.drop-zone.correct-flash{animation:correctFlash 0.5s ease}
.drop-zone.wrong-flash{animation:wrongFlash 0.5s ease}
@keyframes correctFlash{0%,100%{background:rgba(201,168,76,0.08)}50%{background:rgba(76,175,80,0.3)}}
@keyframes wrongFlash{0%,100%{background:rgba(201,168,76,0.08)}50%{background:rgba(244,67,54,0.2)}}

.zone-label{font-family:'Cinzel',serif;font-size:clamp(0.5rem,0.8vw,0.65rem);font-weight:700;color:var(--deep-purple);margin-bottom:2px;text-align:center;line-height:1.2}
.source-pool{display:flex;flex-wrap:wrap;gap:4px;padding:6px;background:rgba(42,27,100,0.08);border-radius:8px;border:1px solid rgba(201,168,76,0.3);min-height:50px;align-content:flex-start}
.label-sm{font-family:'Cinzel',serif;font-size:clamp(0.48rem,0.75vw,0.62rem);font-weight:600;color:var(--deep-purple);margin-bottom:2px}

/* SLAB BADGES */
.slab-nil{background:linear-gradient(135deg,#E3F2FD,#BBDEFB)!important;border-color:#42A5F5!important;color:#0D47A1!important}
.slab-low{background:linear-gradient(135deg,#E8F5E9,#C8E6C9)!important;border-color:#43A047!important;color:#1B5E20!important}
.slab-mid{background:linear-gradient(135deg,#FFF8E1,#FFE082)!important;border-color:#FFA000!important;color:#E65100!important}
.slab-high{background:linear-gradient(135deg,#FCE4EC,#F8BBD0)!important;border-color:#E91E63!important;color:#880E4F!important}

/* ACTIVITY 2 service cards */
.service-card{border-radius:10px;border:1.5px solid var(--gold);padding:6px 8px;background:linear-gradient(135deg,rgba(255,249,230,0.95),rgba(255,240,190,0.95));display:flex;flex-direction:column;gap:3px}
.service-icon{font-size:1.4rem;text-align:center}
.service-name{font-family:'Cinzel',serif;font-size:clamp(0.45rem,0.7vw,0.58rem);font-weight:700;color:var(--ink);text-align:center}

/* ACTIVITY 3 formula */
.formula-step{padding:5px 10px;background:linear-gradient(135deg,#EDE7F6,#D1C4E9);border:1.5px solid var(--accent-purple);border-radius:8px;cursor:grab;font-family:'Cinzel',serif;font-size:clamp(0.48rem,0.72vw,0.6rem);font-weight:600;color:var(--deep-purple);user-select:none;transition:all 0.2s;text-align:center}
.formula-step:hover{transform:scale(1.04);box-shadow:0 3px 10px rgba(123,79,190,0.4)}
.formula-step.placed{cursor:default;background:linear-gradient(135deg,#C8E6C9,#A5D6A7);border-color:#388E3C;color:#1B5E20}
.formula-slot{min-height:34px;min-width:80px;border:1.5px dashed var(--accent-purple);border-radius:8px;background:rgba(123,79,190,0.06);display:flex;align-items:center;justify-content:center;padding:3px 6px;font-size:0.5rem;color:var(--accent-purple);transition:all 0.2s;text-align:center}
.formula-slot.filled{border-style:solid;border-color:#388E3C;background:rgba(76,175,80,0.1)}
.formula-slot.over{background:rgba(123,79,190,0.2);border-style:solid}

/* FEEDBACK */
#feedback{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:7px 18px;border-radius:20px;font-family:'Cinzel',serif;font-weight:600;font-size:0.75rem;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
#feedback.show{opacity:1}
#feedback.success{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#A5D6A7;box-shadow:0 0 20px rgba(76,175,80,0.5)}
#feedback.error{background:linear-gradient(135deg,#8B0000,#C62828);color:#FFCDD2;box-shadow:0 0 20px rgba(244,67,54,0.5)}

/* POPUP */
#popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center}
#popup-overlay.active{display:flex}
.popup-box{background:linear-gradient(135deg,#F5ECD7,#EDD9A3);border:3px solid var(--gold);border-radius:16px;padding:1.8rem 2rem;max-width:400px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;box-shadow:0 0 40px rgba(201,168,76,0.6)}
.popup-box::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,0.4);border-radius:10px;pointer-events:none}
@keyframes popIn{0%{transform:scale(0.5) rotate(-5deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.popup-emoji{font-size:2.8rem;display:block;margin-bottom:0.4rem}
.popup-title{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:0.4rem}
.popup-text{font-size:0.8rem;color:#4A2C0A;margin-bottom:0.9rem;line-height:1.5;font-style:italic}
.popup-btn{display:inline-block;padding:9px 24px;background:linear-gradient(135deg,#7B4FBE,#4A2C8A);color:var(--gold2);border:2px solid var(--gold);border-radius:20px;font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(123,79,190,0.5);letter-spacing:1px}
.popup-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(123,79,190,0.7)}

.score-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(123,79,190,0.12);border:1px solid var(--accent-purple);border-radius:12px;padding:1px 7px;font-family:'Cinzel',serif;font-weight:700;font-size:0.55rem;color:var(--deep-purple)}
.flex-col{display:flex;flex-direction:column;gap:4px}
.hint-text{font-size:clamp(0.45rem,0.68vw,0.58rem);color:#6B3A00;font-style:italic;text-align:center}
</style>
</head>
<body>
<div id="canvas">
  <!-- Nebula blobs -->
  <div class="nebula" style="width:400px;height:400px;background:radial-gradient(circle,#7B4FBE,transparent);left:-100px;top:-100px;animation-delay:0s"></div>
  <div class="nebula" style="width:500px;height:500px;background:radial-gradient(circle,#1B5E20,transparent);right:-150px;top:10vh;animation-delay:-3s"></div>
  <div class="nebula" style="width:350px;height:350px;background:radial-gradient(circle,#8B0000,transparent);left:40vw;bottom:-50px;animation-delay:-6s"></div>
  <div class="nebula" style="width:300px;height:300px;background:radial-gradient(circle,#006064,transparent);left:20vw;top:30vh;animation-delay:-2s"></div>

  <!-- Stars generated by JS -->
  <div id="stars-container"></div>

  <!-- Sparks -->
  <div class="spark" style="left:10%;top:20%;background:#FFD740;--sx:25px;--sy:-35px;animation-duration:3s;animation-delay:0s;box-shadow:0 0 6px #FFD740"></div>
  <div class="spark" style="left:30%;top:40%;background:#69F0AE;--sx:-20px;--sy:-25px;animation-duration:4s;animation-delay:-1s;box-shadow:0 0 6px #69F0AE"></div>
  <div class="spark" style="left:60%;top:25%;background:#F48FB1;--sx:30px;--sy:-20px;animation-duration:3.5s;animation-delay:-2s;box-shadow:0 0 6px #F48FB1"></div>
  <div class="spark" style="left:80%;top:50%;background:#64B5F6;--sx:-15px;--sy:-30px;animation-duration:4.5s;animation-delay:-0.5s;box-shadow:0 0 6px #64B5F6"></div>
  <div class="spark" style="left:50%;top:60%;background:#FFD740;--sx:20px;--sy:-40px;animation-duration:3.8s;animation-delay:-3s;box-shadow:0 0 6px #FFD740"></div>
  <div class="spark" style="left:15%;top:70%;background:#69F0AE;--sx:-25px;--sy:-20px;animation-duration:5s;animation-delay:-1.5s;box-shadow:0 0 6px #69F0AE"></div>
  <div class="spark" style="left:90%;top:35%;background:#F48FB1;--sx:-20px;--sy:-35px;animation-duration:3.2s;animation-delay:-4s;box-shadow:0 0 6px #F48FB1"></div>
  <div class="spark" style="left:70%;top:70%;background:#64B5F6;--sx:15px;--sy:-25px;animation-duration:4.2s;animation-delay:-2.5s;box-shadow:0 0 6px #64B5F6"></div>

  <!-- Potion bubbles -->
  <div class="bubble" style="left:5%;width:6px;height:6px;--bx:10px;animation-duration:8s;animation-delay:0s"></div>
  <div class="bubble" style="left:18%;width:4px;height:4px;--bx:-8px;animation-duration:11s;animation-delay:-3s"></div>
  <div class="bubble" style="left:70%;width:5px;height:5px;--bx:12px;animation-duration:9s;animation-delay:-5s"></div>
  <div class="bubble" style="left:85%;width:7px;height:7px;--bx:-15px;animation-duration:13s;animation-delay:-1s"></div>
  <div class="bubble" style="left:42%;width:4px;height:4px;--bx:8px;animation-duration:10s;animation-delay:-7s"></div>

  <!-- Floating Books -->
  <svg class="fbook" style="left:2%;bottom:28%;--br:-8deg;width:40px;height:50px;animation-duration:4s;animation-delay:0s;opacity:0.45" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="36" height="46" fill="#7B4FBE" rx="3"/><rect x="6" y="2" width="30" height="46" fill="#9C6FDE" rx="2"/>
    <rect x="8" y="8" width="20" height="3" fill="rgba(255,255,255,0.5)" rx="1"/><rect x="8" y="14" width="16" height="2" fill="rgba(255,255,255,0.35)" rx="1"/>
    <rect x="8" y="19" width="18" height="2" fill="rgba(255,255,255,0.35)" rx="1"/><rect x="8" y="24" width="14" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>
    <rect x="2" y="2" width="4" height="46" fill="#5D3A9B" rx="2"/>
  </svg>
  <svg class="fbook" style="right:3%;bottom:30%;--br:6deg;width:35px;height:44px;animation-duration:5s;animation-delay:-2s;opacity:0.4" viewBox="0 0 35 44" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="31" height="40" fill="#8B0000" rx="3"/><rect x="5" y="2" width="26" height="40" fill="#C62828" rx="2"/>
    <rect x="7" y="7" width="16" height="2.5" fill="rgba(255,255,255,0.5)" rx="1"/><rect x="7" y="12" width="12" height="2" fill="rgba(255,255,255,0.35)" rx="1"/>
    <rect x="7" y="17" width="14" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>
    <rect x="2" y="2" width="3" height="40" fill="#5A0000" rx="2"/>
  </svg>
  <svg class="fbook" style="left:4%;top:25%;--br:5deg;width:32px;height:40px;animation-duration:6s;animation-delay:-1s;opacity:0.35" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="28" height="36" fill="#006064" rx="3"/><rect x="5" y="2" width="23" height="36" fill="#00838F" rx="2"/>
    <rect x="7" y="6" width="13" height="2.5" fill="rgba(255,255,255,0.5)" rx="1"/><rect x="7" y="11" width="10" height="2" fill="rgba(255,255,255,0.35)" rx="1"/>
    <rect x="2" y="2" width="3" height="36" fill="#004D40" rx="2"/>
  </svg>
  <svg class="fbook" style="right:4%;top:22%;--br:-5deg;width:38px;height:48px;animation-duration:4.5s;animation-delay:-3s;opacity:0.38" viewBox="0 0 38 48" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="34" height="44" fill="#E65100" rx="3"/><rect x="5" y="2" width="29" height="44" fill="#EF6C00" rx="2"/>
    <rect x="7" y="7" width="17" height="2.5" fill="rgba(255,255,255,0.5)" rx="1"/><rect x="7" y="13" width="13" height="2" fill="rgba(255,255,255,0.35)" rx="1"/>
    <rect x="2" y="2" width="3" height="44" fill="#BF360C" rx="2"/>
  </svg>

  <!-- Owl -->
  <svg class="owl" style="right:1.5%;top:18%;width:48px;height:56px;z-index:4;opacity:0.7;animation-duration:3s" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="24" cy="36" rx="18" ry="20" fill="#4A2C8A"/>
    <ellipse cx="24" cy="20" rx="14" ry="13" fill="#5D3A9B"/>
    <ellipse cx="17" cy="12" rx="5" ry="7" fill="#5D3A9B"/><ellipse cx="31" cy="12" rx="5" ry="7" fill="#5D3A9B"/>
    <polygon points="17,8 14,3 20,3" fill="#C9A84C"/><polygon points="31,8 28,3 34,3" fill="#C9A84C"/>
    <circle cx="19" cy="20" r="6" fill="#FFF9C4"/><circle cx="29" cy="20" r="6" fill="#FFF9C4"/>
    <circle cx="19" cy="21" r="3.5" fill="#1A0A2E"/><circle cx="29" cy="21" r="3.5" fill="#1A0A2E"/>
    <circle cx="20.2" cy="20" r="1" fill="#fff"/><circle cx="30.2" cy="20" r="1" fill="#fff"/>
    <ellipse cx="24" cy="28" rx="4" ry="3" fill="#C9A84C"/>
    <rect x="18" y="48" width="5" height="7" fill="#C9A84C" rx="1"/><rect x="25" y="48" width="5" height="7" fill="#C9A84C" rx="1"/>
    <path d="M18,48 Q14,50 10,48" stroke="#C9A84C" stroke-width="2.5" fill="none"/><path d="M30,48 Q34,50 38,48" stroke="#C9A84C" stroke-width="2.5" fill="none"/>
    <ellipse cx="24" cy="38" rx="10" ry="8" fill="rgba(255,255,255,0.1)"/>
    <path d="M8,34 Q5,38 8,42 Q3,36 8,34Z" fill="#4A2C8A"/><path d="M40,34 Q43,38 40,42 Q45,36 40,34Z" fill="#4A2C8A"/>
  </svg>

  <!-- Wand -->
  <svg style="position:absolute;left:1.2%;bottom:32%;width:28px;height:80px;z-index:4;opacity:0.5;animation:floatBook 5s ease-in-out infinite;--br:-12deg" viewBox="0 0 28 80" xmlns="http://www.w3.org/2000/svg">
    <rect x="11" y="10" width="6" height="65" fill="#3E2723" rx="3"/>
    <rect x="11" y="8" width="6" height="15" fill="#8D6E63" rx="3"/>
    <polygon points="14,2 11,10 17,10" fill="#C9A84C"/>
    <circle cx="14" cy="2" r="3" fill="#FFD740" opacity="0.9"/>
  </svg>

  <!-- Potion bottles -->

}
function showPopup(emoji,title,text,btnText,cb){

    });
  });
}

const calcScenarios=[
  {

    name:'Ravi — School Teacher',

    taxableAmt:'₹2,00,000',

    answers:{

            <span style="font-size:1rem">${c.icon}</span>

          <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">

function setupAct3Drag(){
  document.querySelectorAll('.formula-step').forEach(el=>{
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text',el.id);el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  document.querySelectorAll('.formula-slot.drop-zone').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('over');});
    slot.addEventListener('dragleave',()=>slot.classList.remove('over'));
    slot.addEventListener('drop',e=>{
      e.preventDefault();slot.classList.remove('over');
      const id=e.dataTransfer.getData('text');
      const item=calcItems.find(c=>c.id===id);
      if(!item)return;
      const si=parseInt(slot.dataset.sci);
      const slk=slot.dataset.slk;
      if(!slk)return;
      const sc=calcScenarios[si];
      const correct=sc.answers[slk]===id;
      if(act3State.scenarioFilled[si]&&act3State.scenarioFilled[si][slk]){showFeedback('⚠️ Slot already filled!','error');return;}
      const el=document.getElementById(id);
      if(!el)return;
      if(el.classList.contains('a3-placed-'+si)){showFeedback('⚠️ Already used here!','error');return;}
      if(correct){
        const clone=el.cloneNode(true);
        clone.classList.add('placed','a3-clone');
        clone.setAttribute('draggable','false');
        clone.id=el.id+'-clone-'+si;
        slot.classList.add('filled');
        const ph=slot.querySelector('span');if(ph)ph.remove();
        slot.appendChild(clone);
        slot.classList.add('correct-flash');
        setTimeout(()=>slot.classList.remove('correct-flash'),600);
        if(!act3State.scenarioFilled[si])act3State.scenarioFilled[si]={};
        act3State.scenarioFilled[si][slk]=id;
        const cnt=Object.keys(act3State.scenarioFilled[si]).length;
        const scoreEl=document.getElementById('sc'+si+'-score');
        if(scoreEl)scoreEl.textContent=cnt+'/5';
        if(cnt===5){
          document.getElementById('sc'+si+'-reveal').style.display='block';
          showFeedback('🌟 Scenario complete — see the result!','success');
        } else showFeedback('✅ Correct step placed!','success');
        const allDone=calcScenarios.every((_,i)=>Object.keys(act3State.scenarioFilled[i]||{}).length===5);
        if(allDone&&!act3State.done){
          act3State.done=true;scores[2]=8;
          setTimeout(()=>{updateProgress(4);showPopup('🎓','Master Arithmancer of Tax!',
            'You\'ve completed all three spells! You can now sort incomes by slab, connect tax revenue to public services, and calculate tax step by step. Remember: tax is not a fine — it\'s every citizen\'s contribution to building the India we all share!',
            '🏆 See My Score!',()=>showFinalScore());},700);
        }
      } else {
        slot.classList.add('wrong-flash');
        setTimeout(()=>slot.classList.remove('wrong-flash'),600);
        showFeedback('❌ Wrong step position — follow the formula order!','error');
      }
    });
  });
}

    <div class="activity-title">GRAND ARCHIVIST OF THE TREASURY — MISSION COMPLETE!</div>
    <div style="display:flex;gap:14px;justify-content:center;margin:6px 0;flex-wrap:wrap">
      <div style="background:rgba(123,79,190,0.15);border:2px solid var(--accent-purple);border-radius:12px;padding:10px 20px">
        <div style="font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;color:var(--deep-purple)">${total}/24</div>
        <div style="font-family:'Cinzel',serif;font-size:0.55rem;color:var(--accent-purple);letter-spacing:1px">TOTAL MASTERY SCORE</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${[['I','Tax Slab Sorting',scores[0]],['II','Revenue to Services',scores[1]],['III','Tax Calculation',scores[2]]].map(([n,l,sc])=>`
      <div style="background:rgba(201,168,76,0.12);border:1.5px solid var(--gold);border-radius:10px;padding:7px 14px;font-family:'Cinzel',serif">
        <div style="font-size:0.55rem;font-weight:700;color:#4A2C0A">Spell ${n}</div>
        <div style="font-size:0.5rem;color:#6B4C00;margin:1px 0">${l}</div>
        <div style="font-size:1rem;font-weight:700;color:var(--gold)">${sc}/8</div>
      </div>`).join('')}
    </div>
    <div style="background:linear-gradient(135deg,rgba(123,79,190,0.12),rgba(201,168,76,0.08));border-radius:12px;padding:10px 16px;max-width:500px;border:1px solid rgba(201,168,76,0.4)">
      <div style="font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;color:var(--ink);margin-bottom:4px">🦉 THE GOLDEN PRINCIPLE OF TAX:</div>
      <div style="font-size:0.65rem;color:#4A2C0A;line-height:1.6;font-style:italic">
        "Tax is not a fine or a punishment — it is every citizen's contribution<br>to the great potluck feast that builds our roads, trains, hospitals, and rockets."
      </div>
    </div>
    <button class="popup-btn" onclick="restartAll()">🔄 Cast All Spells Again</button>
  </div>`;
}

function restartAll(){
  currentActivity=1;scores=[0,0,0];
  act1State.placed={nil:[],low:[],mid:[],high:[]};act1State.done=false;
  act2State.placed={};act2State.done=false;
  act3State.placed={};act3State.done=false;act3State.scenarioFilled={};
  updateProgress(1);buildActivity1();
}

/* Generic drag helper for act1 */
function setupDragDrop(itemSel,zoneSel,checkFn,onDropFn){
  document.querySelectorAll(itemSel).forEach(el=>{
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text',el.id);el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  document.querySelectorAll(zoneSel).forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('over');
      const id=e.dataTransfer.getData('text');
      const el=document.getElementById(id);
      if(!el||el.classList.contains('placed'))return;
      const cat=zone.dataset.cat;
      if(act1State.placed[cat]&&act1State.placed[cat].length>=2){showFeedback('⚠️ Cauldron full — 2 salaries max!','error');return;}
      const correct=checkFn(el,zone);
      if(correct){
        el.classList.add('placed');
        zone.appendChild(el);
        zone.classList.add('correct-flash');
        setTimeout(()=>zone.classList.remove('correct-flash'),600);
        showFeedback('✅ Correct slab! Well sorted!','success');
      } else {
        zone.classList.add('wrong-flash');
        setTimeout(()=>zone.classList.remove('wrong-flash'),600);
        showFeedback('❌ Wrong slab — check the income range!','error');
        el.classList.remove('dragging');
      }
      onDropFn(el,zone,correct);
    });
  });
}

updateProgress(1);buildActivity1();
</script>
