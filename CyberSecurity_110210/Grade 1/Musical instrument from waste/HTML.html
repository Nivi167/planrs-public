<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Instrument from Waste</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif}
body{background:#0a0520;position:relative}

/* ── STAGE WORLD ── */
#stage-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.stage-floor{position:absolute;bottom:0;left:0;right:0;height:22%;background:linear-gradient(180deg,#1a0d3d 0%,#0f0828 100%);border-top:3px solid #4a2080}
.stage-curtain-l,.stage-curtain-r{position:absolute;top:0;width:80px;height:100%;z-index:2}
.stage-curtain-l{left:0;background:linear-gradient(90deg,#6b0f2b,#3d0618 60%,transparent)}
.stage-curtain-r{right:0;background:linear-gradient(270deg,#6b0f2b,#3d0618 60%,transparent)}
.spotlight{position:absolute;top:0;width:200px;height:90%;border-radius:0 0 50% 50%;opacity:0.07;animation:sway 4s ease-in-out infinite}
.sp1{left:10%;background:radial-gradient(ellipse,#fff6a0,transparent 70%);animation-delay:0s}
.sp2{left:38%;background:radial-gradient(ellipse,#a0d4ff,transparent 70%);animation-delay:1.3s}
.sp3{left:65%;background:radial-gradient(ellipse,#ffa0d4,transparent 70%);animation-delay:0.7s}
@keyframes sway{0%,100%{transform:rotate(-5deg) scaleX(1)}50%{transform:rotate(5deg) scaleX(1.1)}}

/* ── FLOATING NOTES ── */
.fnote{position:absolute;font-size:22px;opacity:0;color:#fff;animation:floatnote 6s ease-in-out infinite;pointer-events:none;text-shadow:0 0 10px currentColor}
@keyframes floatnote{0%{opacity:0;transform:translateY(0) rotate(0deg)}10%{opacity:0.7}80%{opacity:0.4}100%{opacity:0;transform:translateY(-120px) rotate(30deg)}}

/* ── STARS ── */
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ── SOUND WAVES ── */
.swave{position:absolute;border-radius:50%;border:2px solid rgba(255,200,100,0.3);animation:expand 3s ease-out infinite;pointer-events:none}
@keyframes expand{0%{transform:scale(0);opacity:0.7}100%{transform:scale(4);opacity:0}}

/* ── MAIN CONTENT ── */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}

/* ── TITLE BAR ── */
#title-bar{text-align:center;margin-bottom:8px}
#title-bar h1{font-family:'Fredoka One',cursive;font-size:clamp(18px,3vw,30px);color:#ffe566;text-shadow:0 0 20px #ff9900,0 0 40px #ff5500;letter-spacing:1px;animation:pulse-title 2s ease-in-out infinite}
@keyframes pulse-title{0%,100%{text-shadow:0 0 20px #ff9900,0 0 40px #ff5500}50%{text-shadow:0 0 30px #ffcc00,0 0 60px #ff7700,0 0 80px #ff3300}}
#progress-bar{display:flex;gap:12px;margin-top:6px;justify-content:center}
.prog-dot{width:30px;height:8px;border-radius:4px;background:rgba(255,255,255,0.2);transition:all 0.4s;cursor:default}
.prog-dot.done{background:#4eff91;box-shadow:0 0 8px #4eff91}
.prog-dot.active{background:#ffe566;box-shadow:0 0 8px #ffe566;animation:progblink 1s ease-in-out infinite}
@keyframes progblink{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── ACTIVITY CARD ── */
#activity-card{
  background:rgba(15,8,40,0.92);
  border:2px solid rgba(255,220,100,0.3);
  border-radius:24px;
  padding:16px 20px;
  width:100%;
  max-width:820px;
  box-shadow:0 0 60px rgba(255,150,50,0.15),inset 0 0 40px rgba(80,30,120,0.2);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  gap:10px;
  animation:cardin 0.5s ease
}
@keyframes cardin{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

#activity-label{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#ff9955;opacity:0.8}
#activity-title{font-family:'Fredoka One',cursive;font-size:clamp(16px,2.5vw,24px);color:#fff;line-height:1.2}
#activity-desc{font-size:clamp(11px,1.4vw,13px);color:rgba(255,255,255,0.6);line-height:1.4}

#activity-area{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  min-height:280px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ── DRAG PARTS ── */
.parts-palette{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:10px}
.drag-part{
  background:linear-gradient(135deg,#2a1060,#1a0840);
  border:2px solid rgba(255,200,100,0.4);
  border-radius:14px;
  padding:10px 14px;
  cursor:grab;
  user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:11px;color:#ffe566;font-weight:700;
  transition:all 0.2s;
  min-width:70px;
}
.drag-part:hover{transform:scale(1.08);border-color:#ffe566;box-shadow:0 0 15px rgba(255,220,100,0.3)}
.drag-part.dragging{opacity:0.5;transform:scale(0.95);cursor:grabbing}
.drag-part.used{opacity:0.3;pointer-events:none}
.part-icon{font-size:28px}

.drop-zone{
  border:2px dashed rgba(255,255,255,0.25);
  border-radius:12px;
  min-width:80px;min-height:70px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  position:relative;
  flex-shrink:0;
}
.drop-zone.over{border-color:#ffe566;background:rgba(255,220,100,0.1);box-shadow:0 0 15px rgba(255,220,100,0.2)}
.drop-zone.filled{border-style:solid;border-color:#4eff91;background:rgba(78,255,145,0.08)}
.drop-zone-label{font-size:10px;color:rgba(255,255,255,0.35);position:absolute;bottom:4px;left:0;right:0;text-align:center;font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* ── GUITAR LAYOUT ── */
#guitar-build{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;flex-wrap:wrap}
#guitar-preview{position:relative;width:320px;height:180px;flex-shrink:0}
.gzone{position:absolute}

/* ── SHAKER LAYOUT ── */
#shaker-build{display:flex;gap:16px;align-items:center;justify-content:center;width:100%;flex-wrap:wrap}
#shaker-vessel{position:relative;width:110px;height:170px}
.shaker-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:130px;background:linear-gradient(180deg,#3a8eee,#1a5ea0);border-radius:12px 12px 20px 20px;border:3px solid rgba(255,255,255,0.3)}
.shaker-neck{position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:50px;background:linear-gradient(180deg,#5ab4ff,#2a7ed0);border-radius:8px 8px 0 0;border:3px solid rgba(255,255,255,0.3)}
.shaker-fill-display{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:60px;height:0;background:rgba(255,200,100,0.6);border-radius:0 0 14px 14px;transition:height 0.4s;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.shaker-cap-zone{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:50px;height:25px}

/* ── STRAW FLUTE ── */
#flute-area{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
#straws-row{display:flex;gap:8px;align-items:flex-end;justify-content:center;padding:10px}
.straw-slot{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
  transition:transform 0.1s;
}
.straw-slot:hover{transform:translateY(-4px)}
.straw-tube{
  width:28px;
  background:linear-gradient(180deg,#ffe566,#ff9922);
  border-radius:4px 4px 0 0;
  border:2px solid rgba(255,255,255,0.3);
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.straw-tube::after{content:'';position:absolute;top:0;left:30%;width:4px;height:100%;background:rgba(255,255,255,0.2);border-radius:2px}
.straw-note-label{font-size:10px;font-weight:800;color:#ffe566;letter-spacing:1px}
.straw-tube.playing{box-shadow:0 0 20px #ff9922,0 0 40px #ff5500;transform:scaleY(1.05);background:linear-gradient(180deg,#fff566,#ffcc22)}
#tune-display{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:36px}
.tune-note-chip{
  background:rgba(255,220,100,0.15);
  border:1px solid rgba(255,220,100,0.4);
  border-radius:20px;
  padding:4px 10px;
  font-size:12px;font-weight:700;color:#ffe566;
  animation:chipin 0.2s ease
}
@keyframes chipin{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
#song-prompt{font-size:12px;color:rgba(255,255,255,0.5);text-align:center}
#play-btn{
  background:linear-gradient(135deg,#6633cc,#3311aa);
  border:2px solid #9966ff;
  color:#fff;padding:10px 24px;border-radius:30px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;
  cursor:pointer;transition:all 0.2s;letter-spacing:1px;
}
#play-btn:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(150,100,255,0.5)}
#play-btn:active{transform:scale(0.97)}
#play-btn:disabled{opacity:0.5;cursor:default;transform:none}

/* ── FEEDBACK RIPPLE ── */
.ripple{position:fixed;width:60px;height:60px;border-radius:50%;pointer-events:none;z-index:200;transform:translate(-50%,-50%);animation:ripple-out 0.6s ease-out forwards}
@keyframes ripple-out{from{transform:translate(-50%,-50%) scale(0);opacity:0.8}to{transform:translate(-50%,-50%) scale(3);opacity:0}}

/* ── COMPLETION FLASH ── */
.success-flash{position:fixed;inset:0;background:rgba(78,255,145,0.15);z-index:199;animation:flash 0.4s ease;pointer-events:none}
@keyframes flash{from{opacity:1}to{opacity:0}}

/* ── POPUP ── */
#popup-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(5,2,20,0.85);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#popup-overlay.show{display:flex;animation:popin 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popin{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
#popup-box{
  background:linear-gradient(135deg,#1a0850,#0d0530);
  border:2px solid rgba(255,220,100,0.5);
  border-radius:24px;
  padding:36px;
  text-align:center;
  max-width:400px;
  box-shadow:0 0 80px rgba(255,150,50,0.3);
  position:relative;overflow:hidden;
}
#popup-box::before{content:'';position:absolute;inset:-2px;background:linear-gradient(135deg,#ffe566,#ff5500,#9933ff,#ffe566);border-radius:26px;z-index:-1;animation:border-spin 3s linear infinite}
@keyframes border-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#popup-emoji{font-size:60px;display:block;margin-bottom:12px;animation:bounce-icon 0.6s ease infinite alternate}
@keyframes bounce-icon{from{transform:translateY(0) scale(1)}to{transform:translateY(-10px) scale(1.1)}}
#popup-title{font-family:'Fredoka One',cursive;font-size:28px;color:#ffe566;margin-bottom:8px}
#popup-msg{font-size:14px;color:rgba(255,255,255,0.75);margin-bottom:24px;line-height:1.5}
#popup-btn{
  background:linear-gradient(135deg,#ff6600,#cc3300);
  border:none;color:#fff;padding:14px 36px;border-radius:30px;
  font-family:'Fredoka One',cursive;font-size:20px;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 20px rgba(255,100,0,0.4);
}
#popup-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(255,100,0,0.6)}

/* ── CONFETTI ── */
.confetti-p{position:fixed;width:8px;height:8px;border-radius:2px;top:-10px;animation:fall linear forwards;pointer-events:none;z-index:400}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── CHECK BTN ── */
#check-btn{
  background:linear-gradient(135deg,#22aa66,#116633);
  border:2px solid #4eff91;
  color:#fff;padding:10px 28px;border-radius:30px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;
  cursor:pointer;transition:all 0.2s;align-self:center;
}
#check-btn:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(78,255,145,0.4)}
#check-btn:disabled{opacity:0.4;cursor:default;transform:none}
.feedback-msg{font-size:13px;font-weight:700;text-align:center;min-height:18px;transition:all 0.3s}
.feedback-msg.good{color:#4eff91}
.feedback-msg.bad{color:#ff6655}

/* PARTICLE BURST */
.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:350;animation:pflight 0.8s ease-out forwards}
@keyframes pflight{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* WAVE ANIMATION ON STRAW */
.straw-wave{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:16px;animation:wavefloat 0.6s ease-out forwards;pointer-events:none}
@keyframes wavefloat{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-40px)}}
</style>
</head>
<body>

<!-- BACKGROUND STAGE -->
<div id="stage-bg">
  <div class="spotlight sp1"></div>
  <div class="spotlight sp2"></div>
  <div class="spotlight sp3"></div>
  <div class="stage-curtain-l"></div>
  <div class="stage-curtain-r"></div>
  <div class="stage-floor"></div>
  <!-- Stars -->
  <div id="stars-container"></div>
  <!-- Sound waves -->
  <div id="waves-container"></div>
  <!-- Floating notes -->
  <div id="notes-container"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="title-bar">
    <h1>🎵 Music Instrument from Waste 🎵</h1>
    <div id="progress-bar">
      <div class="prog-dot active" id="pd1"></div>
      <div class="prog-dot" id="pd2"></div>
      <div class="prog-dot" id="pd3"></div>
    </div>
  </div>

  <div id="activity-card">
    <div id="activity-label">Activity 1 of 3</div>
    <div id="activity-title">Build a Rubber Band Guitar</div>
    <div id="activity-desc">Drag each part into its correct slot on the guitar to assemble it!</div>
    <div id="activity-area"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
    <button id="check-btn" onclick="checkActivity()">✓ Check My Guitar</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div id="popup-box">
    <span id="popup-emoji">🎉</span>
    <div id="popup-title">Amazing!</div>
    <div id="popup-msg">You completed the activity!</div>
    <button id="popup-btn" onclick="nextActivity()">Next Activity →</button>
  </div>
</div>

<script>
const NOTES=['♩','♪','♫','♬','𝄞'];
const COLORS=['#ff9922','#ff5599','#55ccff','#99ff55','#ff55cc','#ffee22'];
let currentActivity=1;
let activityDone=[false,false,false];

/* ── STARS ── */
const sc=document.getElementById('stars-container');
for(let i=0;i<60;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*80}%;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*2}s`;
  sc.appendChild(s);
}

/* ── SOUND WAVES ── */
const wc=document.getElementById('waves-container');
for(let i=0;i<4;i++){
  const w=document.createElement('div');
  w.className='swave';
  w.style.cssText=`left:${10+i*25}%;bottom:${10+Math.random()*20}%;width:40px;height:40px;animation-delay:${i*0.8}s`;
  wc.appendChild(w);
}

/* ── FLOATING NOTES ── */
const nc=document.getElementById('notes-container');
function spawnNote(){
  const n=document.createElement('div');
  n.className='fnote';
  n.textContent=NOTES[Math.floor(Math.random()*NOTES.length)];
  n.style.cssText=`left:${5+Math.random()*90}%;bottom:${5+Math.random()*30}%;color:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${4+Math.random()*4}s;animation-delay:${Math.random()*2}s;font-size:${16+Math.random()*16}px`;
  nc.appendChild(n);
  setTimeout(()=>n.remove(),8000);
}
setInterval(spawnNote,800);

/* ── AUDIO CONTEXT ── */
let actx=null;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}

function playTone(freq,dur=0.3,type='sine'){
  try{
    const ac=getActx();
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime);
    g.gain.setValueAtTime(0.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur);
  }catch(e){}
}

function playSuccess(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'triangle'),i*120));
}
function playDrop(ok){playTone(ok?440:200,0.2,ok?'triangle':'sawtooth');}
function playStrumNote(freq){playTone(freq,0.5,'triangle');}

/* ── RIPPLE ── */
function makeRipple(x,y,color='rgba(255,220,100,0.6)'){
  const r=document.createElement('div');
  r.className='ripple';
  r.style.cssText=`left:${x}px;top:${y}px;background:${color};border:2px solid ${color}`;
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),700);
}

/* ── PARTICLES ── */
function burst(x,y,color='#ffe566'){
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='particle';
    const ang=Math.random()*Math.PI*2;
    const dist=60+Math.random()*80;
    p.style.cssText=`left:${x}px;top:${y}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

/* ── CONFETTI ── */
function launchConfetti(){
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti-p';
      c.style.cssText=`left:${Math.random()*100}%;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:0s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),3500);
    },i*40);
  }
}

/* ── FLASH ── */
function flashSuccess(){
  const f=document.createElement('div');
  f.className='success-flash';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),500);
}

/* ══════════════════════════════════════════════
   ACTIVITY 1: RUBBER BAND GUITAR
══════════════════════════════════════════════ */
const guitarParts=[
  {id:'body',label:'Body',icon:'🟫',desc:'Cardboard Box Body'},
  {id:'neck',label:'Neck',icon:'📏',desc:'Cardboard Neck'},
  {id:'strings',label:'Strings',icon:'〰️',desc:'Rubber Bands'},
  {id:'bridge',label:'Bridge',icon:'▬',desc:'Pencil Bridge'},
  {id:'head',label:'Head',icon:'🔵',desc:'Bottle Cap Tuner'},
];

function buildActivity1(){
  const area=document.getElementById('activity-area');
  area.innerHTML='';
  area.style.flexDirection='row';
  area.style.gap='16px';
  area.style.alignItems='center';
  area.style.flexWrap='wrap';

  // Palette
  const palette=document.createElement('div');
  palette.style.cssText='display:flex;flex-direction:column;gap:8px;';
  guitarParts.forEach(p=>{
    const el=document.createElement('div');
    el.className='drag-part';
    el.id='part-'+p.id;
    el.draggable=true;
    el.innerHTML=`<span class="part-icon">${p.icon}</span><span>${p.label}</span>`;
    el.title=p.desc;
    el.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('partId',p.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    // Touch
    el.addEventListener('touchstart',handleTouchStart,{passive:true});
    palette.appendChild(el);
  });
  area.appendChild(palette);

  // Guitar SVG + drop zones
  const guitarWrap=document.createElement('div');
  guitarWrap.style.cssText='position:relative;flex:1;min-width:240px;height:220px;display:flex;align-items:center;justify-content:center;';

  // Guitar outline SVG
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','280');svg.setAttribute('height','200');
  svg.setAttribute('viewBox','0 0 280 200');
  svg.style.position='absolute';
  svg.innerHTML=`
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- body outline -->
    <ellipse cx="100" cy="125" rx="70" ry="60" fill="rgba(100,60,20,0.15)" stroke="rgba(255,200,100,0.25)" stroke-width="2" stroke-dasharray="6,4"/>

function handleGuitarDrop(dz,pid,cx,cy){
  if(dz.dataset.accepts!==pid){
    document.getElementById('feedback-msg').textContent='❌ Wrong spot! Try again.';
    document.getElementById('feedback-msg').className='feedback-msg bad';
    playDrop(false);
    return;
  }
  if(dz.classList.contains('filled'))return;

  const part=guitarParts.find(p=>p.id===pid);
  dz.innerHTML=`<span style="font-size:24px">${part.icon}</span>`;
  dz.classList.add('filled');
  document.getElementById('part-'+pid).classList.add('used');
  playDrop(true);
  makeRipple(cx,cy,'rgba(78,255,145,0.6)');
  burst(cx,cy);
  document.getElementById('feedback-msg').textContent='✓ Great! Keep going!';
  document.getElementById('feedback-msg').className='feedback-msg good';
  checkGuitarComplete();
}

function checkGuitarComplete(){
  const filled=document.querySelectorAll('#activity-area .drop-zone.filled').length;
  if(filled===5){
    setTimeout(()=>{
      document.getElementById('check-btn').click();
    },400);
  }
}

window.checkActivity=function(){
  if(currentActivity===1){
    const filled=document.querySelectorAll('#activity-area .drop-zone.filled').length;
    if(filled<5){
      document.getElementById('feedback-msg').textContent=`Place all ${5-filled} remaining part(s) first!`;
      document.getElementById('feedback-msg').className='feedback-msg bad';
      return;

    showPopup(1);
  } else if(currentActivity===2){

};

   ACTIVITY 2: SHAKER INSTRUMENT

const shakerParts=[

  {id:'cap',     label:'Cap',      icon:'🔵', desc:'Bottle cap'},
  {id:'tape',    label:'Tape',     icon:'🟡', desc:'Sticky tape to seal'},
];
let shakerSlots={bottle:false,filling:false,cap:false,tape:false};
let shakerFilling=null;

function buildActivity2(){
  document.getElementById('activity-label').textContent='Activity 2 of 3';
  document.getElementById('activity-title').textContent='Assemble a Waste Shaker';

  const area=document.getElementById('activity-area');

  area.style.flexWrap='wrap';

  // Palette
  const palette=document.createElement('div');
  palette.style.cssText='display:flex;flex-direction:column;gap:8px;';

    const el=document.createElement('div');

    {label:'2. Add rice or pebbles (choose one)',dzid:'dz-sfilling',accepts:'fill',height:'50px',width:'90px',icon:'🌾/🪨'},
    {label:'3. Seal with cap',dzid:'dz-scap',accepts:'cap',height:'40px',width:'70px',icon:'🔵'},

    row.style.cssText='display:flex;align-items:center;gap:10px;width:100%';

    lbl.style.cssText='font-size:10px;color:rgba(255,255,255,0.45);font-weight:700;width:160px;text-align:right;flex-shrink:0';

let shakerCompleteCount=0;
function handleShakerDrop(dz,pid,cx,cy){
  const accepts=dz.dataset.accepts;
  if(dz.classList.contains('filled'))return;

  let ok=false;
  if(accepts==='bottle' && pid==='bottle'){ok=true;shakerSlots.bottle=true;}
  else if(accepts==='fill' && (pid==='rice'||pid==='pebbles')){
    ok=true;shakerSlots.filling=true;shakerFilling=pid;
  }
  else if(accepts==='cap' && pid==='cap'){
    if(!shakerSlots.filling){
      document.getElementById('feedback-msg').textContent='Add a filling first!';
      document.getElementById('feedback-msg').className='feedback-msg bad';
      playDrop(false);return;
    }
    ok=true;shakerSlots.cap=true;
  }
  else if(accepts==='tape' && pid==='tape'){
    if(!shakerSlots.cap){
      document.getElementById('feedback-msg').textContent='Seal with cap first!';
      document.getElementById('feedback-msg').className='feedback-msg bad';
      playDrop(false);return;
    }
    ok=true;shakerSlots.tape=true;
  }

  if(!ok){
    document.getElementById('feedback-msg').textContent='❌ That doesn\'t go here!';
    document.getElementById('feedback-msg').className='feedback-msg bad';
    playDrop(false);return;
  }

  const part=shakerParts.find(p=>p.id===pid);
  dz.innerHTML=`<span style="font-size:24px">${part.icon}</span>`;
  dz.classList.add('filled');
  document.getElementById('spart-'+pid).classList.add('used');
  playDrop(true);
  makeRipple(cx,cy,'rgba(78,255,145,0.6)');
  burst(cx,cy);
  shakerCompleteCount++;

  const filled=Object.values(shakerSlots).filter(Boolean).length;
  document.getElementById('feedback-msg').textContent=`✓ Step ${filled}/4 done!`;
  document.getElementById('feedback-msg').className='feedback-msg good';

  // Update preview
  const prev=document.getElementById('shaker-preview');
  if(prev){prev.style.opacity=(0.3+filled*0.17).toString();}

  if(shakerSlots.bottle&&shakerSlots.filling&&shakerSlots.cap&&shakerSlots.tape){
    if(prev){prev.style.animation='bounce-icon 0.4s ease infinite alternate';prev.textContent='🎵🍾🎵';}
    setTimeout(()=>document.getElementById('check-btn').click(),400);
  }
}

function checkShaker(){
  if(!shakerSlots.bottle||!shakerSlots.filling||!shakerSlots.cap||!shakerSlots.tape){
    document.getElementById('feedback-msg').textContent='Complete all 4 steps first!';
    document.getElementById('feedback-msg').className='feedback-msg bad';
    return;
  }
  showPopup(2);
}

   ACTIVITY 3: STRAW FLUTE
══════════════════════════════════════════════ */
const STRAW_NOTES=[
  {note:'Do',  freq:261, color:'#ff5555'},
  {note:'Re',  freq:293, color:'#ff8822'},
  {note:'Mi',  freq:329, color:'#ffcc22'},
  {note:'Fa',  freq:349, color:'#55cc55'},
  {note:'Sol', freq:392, color:'#2299ff'},
  {note:'La',  freq:440, color:'#8855ff'},
  {note:'Si',  freq:494, color:'#ff55aa'},
];

const TARGET_MELODY=[0,0,4,4,5,5,4]; // Do Do Sol Sol La La Sol (Twinkle start)
const MELODY_NAMES=TARGET_MELODY.map(i=>STRAW_NOTES[i].note);
let playedNotes=[];
let fluteComplete=false;

function buildActivity3(){
  document.getElementById('activity-label').textContent='Activity 3 of 3';
  document.getElementById('activity-title').textContent='Play Your Straw Flute';
  document.getElementById('activity-desc').textContent='Tap the straws to play sounds! Match the tune: Do Do Sol Sol La La Sol';
  document.getElementById('check-btn').textContent='🎵 Play the Tune!';
  document.getElementById('feedback-msg').textContent='';
  document.getElementById('feedback-msg').className='feedback-msg';
  playedNotes=[];
  fluteComplete=false;

  const area=document.getElementById('activity-area');
  area.innerHTML='';
  area.style.flexDirection='column';
  area.style.gap='12px';
  area.style.alignItems='center';

  // Target melody display
  const targetRow=document.createElement('div');
  targetRow.style.cssText='display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;';
  const tlbl=document.createElement('span');
  tlbl.style.cssText='font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;margin-right:4px;';
  tlbl.textContent='Target:';
  targetRow.appendChild(tlbl);
  MELODY_NAMES.forEach((n,i)=>{
    const chip=document.createElement('div');
    chip.style.cssText=`background:${STRAW_NOTES[TARGET_MELODY[i]].color}33;border:1px solid ${STRAW_NOTES[TARGET_MELODY[i]].color}88;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:800;color:${STRAW_NOTES[TARGET_MELODY[i]].color};`;
    chip.textContent=n;
    chip.id='target-chip-'+i;
    targetRow.appendChild(chip);
  });
  area.appendChild(targetRow);

  // Straws
  const strawsRow=document.createElement('div');
  strawsRow.style.cssText='display:flex;gap:8px;align-items:flex-end;justify-content:center;padding:6px 10px;';

  const heights=[90,100,115,125,140,150,160];
  STRAW_NOTES.forEach((sn,i)=>{
    const slot=document.createElement('div');
    slot.className='straw-slot';
    slot.style.position='relative';

    const tube=document.createElement('div');
    tube.className='straw-tube';
    tube.style.cssText=`height:${heights[i]}px;background:linear-gradient(180deg,${sn.color},${sn.color}99);border-color:${sn.color}88;`;
    tube.id='straw-'+i;

    const noteLbl=document.createElement('div');
    noteLbl.className='straw-note-label';
    noteLbl.style.color=sn.color;
    noteLbl.textContent=sn.note;

    slot.appendChild(tube);
    slot.appendChild(noteLbl);

    slot.addEventListener('click',(e)=>{
      if(fluteComplete)return;
      playStrumNote(sn.freq);
      animateStraw(tube,sn.color,e.clientX,e.clientY);
      playedNotes.push(i);
      updateFluteDisplay();
      // Highlight target chip
      const idx=playedNotes.length-1;
      if(idx<TARGET_MELODY.length){
        const chip=document.getElementById('target-chip-'+idx);
        if(chip){
          chip.style.transform='scale(1.2)';
          chip.style.background=STRAW_NOTES[TARGET_MELODY[idx]].color+'66';
          setTimeout(()=>{chip.style.transform='scale(1)';},300);
        }
      }
      if(playedNotes.length>=7)checkFluteAuto();
    });
    strawsRow.appendChild(slot);
  });
  area.appendChild(strawsRow);

  // Played notes display
  const playedRow=document.createElement('div');
  playedRow.style.cssText='display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;min-height:36px;';
  const plbl=document.createElement('span');
  plbl.style.cssText='font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;margin-right:4px;';
  plbl.textContent='You played:';
  playedRow.appendChild(plbl);
  const notesDisplay=document.createElement('div');
  notesDisplay.id='played-notes-display';
  notesDisplay.style.cssText='display:flex;gap:6px;flex-wrap:wrap;';
  playedRow.appendChild(notesDisplay);
  area.appendChild(playedRow);

  // Clear + auto-play buttons
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;';
  const clearBtn=document.createElement('button');
  clearBtn.style.cssText='background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:7px 18px;border-radius:20px;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;';
  clearBtn.textContent='↺ Clear';
  clearBtn.onclick=()=>{playedNotes=[];updateFluteDisplay();document.getElementById('feedback-msg').textContent='';};
  const demoBtn=document.createElement('button');
  demoBtn.style.cssText='background:rgba(100,50,200,0.3);border:1px solid rgba(150,100,255,0.4);color:#bb88ff;padding:7px 18px;border-radius:20px;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;';
  demoBtn.textContent='▶ Hear Tune';
  demoBtn.onclick=()=>playDemoMelody();
  btnRow.appendChild(clearBtn);
  btnRow.appendChild(demoBtn);
  area.appendChild(btnRow);
}

function animateStraw(tube,color,cx,cy){
  tube.classList.add('playing');
  setTimeout(()=>tube.classList.remove('playing'),400);
  makeRipple(cx,cy,color+'aa');
  // Wave emoji float
  const wave=document.createElement('div');
  wave.className='straw-wave';
  wave.textContent=NOTES[Math.floor(Math.random()*NOTES.length)];
  wave.style.color=color;
  tube.style.position='relative';
  tube.appendChild(wave);
  setTimeout(()=>wave.remove(),700);
}

function updateFluteDisplay(){
  const disp=document.getElementById('played-notes-display');
  if(!disp)return;
  disp.innerHTML='';
  playedNotes.slice(-7).forEach(i=>{
    const chip=document.createElement('div');
    chip.className='tune-note-chip';
    const sn=STRAW_NOTES[i];
    chip.style.cssText=`background:${sn.color}33;border:1px solid ${sn.color}88;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;color:${sn.color};animation:chipin 0.2s ease;`;
    chip.textContent=sn.note;
    disp.appendChild(chip);
  });
}

function playDemoMelody(){
  TARGET_MELODY.forEach((ni,i)=>{
    setTimeout(()=>{
      playStrumNote(STRAW_NOTES[ni].freq);
      const tube=document.getElementById('straw-'+ni);
      if(tube){
        tube.classList.add('playing');
        setTimeout(()=>tube.classList.remove('playing'),350);
      }
    },i*380);
  });
}

function checkFluteAuto(){
  if(playedNotes.length<7)return;
  const last7=playedNotes.slice(-7);
  const correct=last7.every((n,i)=>n===TARGET_MELODY[i]);
  if(correct){
    fluteComplete=true;
    document.getElementById('feedback-msg').textContent='🎵 Perfect tune! You played Twinkle Twinkle!';
    document.getElementById('feedback-msg').className='feedback-msg good';
    flashSuccess();
    launchConfetti();
    playSuccess();
    setTimeout(()=>showPopup(3),800);
  } else {
    // Give hint
    let hint='Almost! Try the tune again: Do Do Sol Sol La La Sol';
    document.getElementById('feedback-msg').textContent=hint;
    document.getElementById('feedback-msg').className='feedback-msg bad';
  }
}

function checkFlute(){
  if(fluteComplete){showPopup(3);return;}
  if(playedNotes.length<7){
    document.getElementById('feedback-msg').textContent='Play 7 notes to match the tune: Do Do Sol Sol La La Sol';
    document.getElementById('feedback-msg').className='feedback-msg bad';
    return;
  }
  checkFluteAuto();
}

/* ══════════════════════════════════════════════
   POPUP SYSTEM
══════════════════════════════════════════════ */
const popupData=[
  {emoji:'🎸',title:'Guitar Master!',msg:'Your rubber band guitar is ready to rock! Every part found its perfect place.'},
  {emoji:'🎶',title:'Shake It Up!',msg:'Your waste shaker is assembled and ready to make music! You turned trash into treasure.'},
  {emoji:'⭐',title:'SUPERSTAR MUSICIAN!',msg:'You\'ve built THREE instruments from waste and played a real tune! The earth thanks you — and so does music!'},
];

function showPopup(actNum){
  if(!activityDone[actNum-1]){
    activityDone[actNum-1]=true;
    flashSuccess();
    if(actNum<3){playSuccess();}else{
      playSuccess();
      launchConfetti();
    }
  }
  updateProgress(actNum);

  const pd=popupData[actNum-1];
  document.getElementById('popup-emoji').textContent=pd.emoji;
  document.getElementById('popup-title').textContent=pd.title;
  document.getElementById('popup-msg').textContent=pd.msg;

  const btn=document.getElementById('popup-btn');
  if(actNum===3){
    btn.textContent='🎵 Play Again!';
    btn.onclick=()=>{currentActivity=0;nextActivity();};
  } else {
    btn.textContent='Next Activity →';
    btn.onclick=nextActivity;
  }

  document.getElementById('popup-overlay').classList.add('show');
}

window.nextActivity=function(){
  document.getElementById('popup-overlay').classList.remove('show');
  currentActivity++;
  if(currentActivity>3)currentActivity=1;
  loadActivity(currentActivity);
};

function updateProgress(done){
  for(let i=1;i<=3;i++){
    const d=document.getElementById('pd'+i);
    d.className='prog-dot';
    if(i<done)d.classList.add('done');
    else if(i===done)d.classList.add('done');
    if(i===currentActivity+1)d.classList.add('active');
  }
}

function loadActivity(n){
  document.getElementById('activity-card').style.animation='none';
  setTimeout(()=>{
    document.getElementById('activity-card').style.animation='cardin 0.5s ease';
    currentActivity=n;
    if(n===1){
      document.getElementById('activity-label').textContent='Activity 1 of 3';
      document.getElementById('activity-title').textContent='Build a Rubber Band Guitar';
      document.getElementById('activity-desc').textContent='Drag each part into its correct slot on the guitar to assemble it!';
      document.getElementById('check-btn').textContent='✓ Check My Guitar';
      document.getElementById('feedback-msg').textContent='';
      document.getElementById('feedback-msg').className='feedback-msg';
      buildActivity1();
    } else if(n===2){
      buildActivity2();
    } else if(n===3){
      buildActivity3();
    }
    // update progress dots
    for(let i=1;i<=3;i++){
      const d=document.getElementById('pd'+i);
      d.className='prog-dot';
      if(activityDone[i-1])d.classList.add('done');
      if(i===n && !activityDone[i-1])d.classList.add('active');
    }
  },10);
}

/* ══════════════════════════════════════════════
   TOUCH DRAG-AND-DROP SUPPORT
══════════════════════════════════════════════ */
let touchDragEl=null, touchDragClone=null, touchPartId=null, touchPartPrefix=null;

function handleTouchStart(e){
  const el=e.currentTarget;
  touchDragEl=el;
  touchPartId=el.id.replace('part-','').replace('spart-','');
  touchPartPrefix=el.id.startsWith('spart-')?'spartId':'partId';

  const rect=el.getBoundingClientRect();
  touchDragClone=el.cloneNode(true);
  touchDragClone.style.cssText=`position:fixed;width:${rect.width}px;height:${rect.height}px;opacity:0.85;z-index:9999;pointer-events:none;transform:scale(1.1);transition:none;left:${rect.left}px;top:${rect.top}px;`;
  document.body.appendChild(touchDragClone);
  el.classList.add('dragging');
}

document.addEventListener('touchmove',e=>{
  if(!touchDragClone)return;
  e.preventDefault();
  const t=e.touches[0];
  touchDragClone.style.left=(t.clientX-40)+'px';
  touchDragClone.style.top=(t.clientY-40)+'px';
  // Highlight zones
  document.querySelectorAll('.drop-zone').forEach(dz=>{
    const r=dz.getBoundingClientRect();
    if(t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom){
      dz.classList.add('over');
    } else {
      dz.classList.remove('over');
    }
  });
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!touchDragClone)return;
  const t=e.changedTouches[0];
  touchDragClone.remove();touchDragClone=null;
  touchDragEl.classList.remove('dragging');

  let targetZone=null;
  document.querySelectorAll('.drop-zone').forEach(dz=>{
    const r=dz.getBoundingClientRect();
    if(t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom){
      targetZone=dz;
    }
    dz.classList.remove('over');
  });

  if(targetZone&&touchPartId){
    if(currentActivity===1) handleGuitarDrop(targetZone,touchPartId,t.clientX,t.clientY);
    else if(currentActivity===2) handleShakerDrop(targetZone,touchPartId,t.clientX,t.clientY);
  }
  touchDragEl=null;touchPartId=null;
});

function setupTouchDnD(){}

/* ── INIT ── */
loadActivity(1);
</script>
</body>
</html>
