<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUBE GOLDBERG MACHINE!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF3B3B;
  --yellow: #FFD93D;
  --blue: #4ECDC4;
  --purple: #A855F7;
  --orange: #FF6B35;
  --green: #6BCB77;
  --pink: #FF6FAE;
  --cream: #FFF9F0;
  --dark: #2D1B4E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: var(--dark);
  user-select: none;
}

/* ───── CIRCUS BACKGROUND ───── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

.bg-scene {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #1a0a3e 0%, #2D1B4E 40%, #3d1f5e 100%);
  overflow: hidden;
}

/* Stars */
.stars { position: absolute; inset: 0; }
.star {
  position: absolute; border-radius: 50%;
  background: #fff; animation: twinkle 2s infinite alternate;
}

/* Ground */
.ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 22%;
  background: linear-gradient(180deg, #4a2c0a 0%, #3a1f05 100%);
  border-top: 4px solid #6B3F12;
}

/* Circus tent left */
.tent-left {
  position: absolute; bottom: 21%; left: -2%;
  width: 22%; height: 45%;
}
.tent-left .tent-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 75%;
  background: linear-gradient(135deg, var(--red) 0%, var(--red) 50%, var(--yellow) 50%);
  clip-path: polygon(10% 100%, 90% 100%, 100% 0, 0 0);
}
.tent-left .tent-roof {
  position: absolute; bottom: 72%;
  left: -5%; right: -5%; height: 32%;
  background: var(--red);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}
.tent-left .tent-flag {
  position: absolute; bottom: 103%; left: 48%;
  width: 3%; height: 20%;
  background: #8B5E3C; border-radius: 2px;
}
.tent-left .tent-flag::after {
  content: ''; position: absolute; top: 0; left: 100%;
  width: 200%; height: 60%;
  background: var(--yellow);
  clip-path: polygon(0 0, 100% 50%, 0 100%);
  animation: flagWave 1.5s ease-in-out infinite alternate;
  transform-origin: left;
}
.tent-left .tent-stripes {
  position: absolute; bottom: 0; left: 10%; right: 10%; height: 75%;
  clip-path: polygon(10% 100%, 90% 100%, 100% 0, 0 0);
  background: repeating-linear-gradient(90deg,
    transparent 0, transparent 14.28%,
    rgba(255,255,255,0.15) 14.28%, rgba(255,255,255,0.15) 28.57%);
}

/* Circus tent right */
.tent-right {
  position: absolute; bottom: 21%; right: -2%;
  width: 22%; height: 45%;
}
.tent-right .tent-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 75%;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue) 50%, var(--purple) 50%);
  clip-path: polygon(10% 100%, 90% 100%, 100% 0, 0 0);
}
.tent-right .tent-roof {
  position: absolute; bottom: 72%;
  left: -5%; right: -5%; height: 32%;
  background: var(--blue);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}
.tent-right .tent-flag {
  position: absolute; bottom: 103%; left: 48%;
  width: 3%; height: 20%;
  background: #8B5E3C; border-radius: 2px;
}
.tent-right .tent-flag::after {
  content: ''; position: absolute; top: 0; left: 100%;
  width: 200%; height: 60%;
  background: var(--blue);
  clip-path: polygon(0 0, 100% 50%, 0 100%);
  animation: flagWave 1.8s ease-in-out infinite alternate;
  transform-origin: left;
}

/* Ferris wheel */
.ferris-wheel {
  position: absolute; bottom: 19%; right: 18%;
  width: 12%; aspect-ratio: 1;
}
.ferris-hub {
  position: absolute; top: 50%; left: 50%;
  width: 18%; aspect-ratio: 1;
  background: var(--yellow);
  border-radius: 50%; border: 3px solid var(--orange);
  transform: translate(-50%, -50%);
  z-index: 2;
}
.ferris-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 4px solid var(--yellow);
  animation: spinWheel 8s linear infinite;
}
.ferris-spoke {
  position: absolute; top: 50%; left: 50%;
  width: 50%; height: 3px;
  background: var(--yellow);
  transform-origin: left center;
}
.ferris-gondola {
  position: absolute; width: 16%; aspect-ratio: 1;
  background: var(--orange); border-radius: 4px;
  border: 2px solid var(--red);
  top: -8%; left: 42%;
  transform-origin: center -200%;
}
.ferris-stand {
  position: absolute; bottom: -8%; left: 50%;
  width: 4px; height: 15%;
  background: var(--yellow);
  transform: translateX(-50%);
}
.ferris-stand::before, .ferris-stand::after {
  content: ''; position: absolute; top: 0;
  width: 4px; height: 110%;
  background: var(--yellow);
}
.ferris-stand::before { transform: rotate(-20deg); transform-origin: top center; }
.ferris-stand::after  { transform: rotate(20deg);  transform-origin: top center; }

/* Bunting flags */
.bunting {
  position: absolute; top: 8%; left: 0; right: 0;
  height: 6%; pointer-events: none;
}
.bunting-line {
  position: absolute; top: 20%; left: 5%; right: 5%;
  height: 2px; background: rgba(255,255,255,0.3);
}
.bunting-flag {
  position: absolute; top: 0;
  width: 3%; padding-bottom: 3.5%;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform: translateX(-50%);
}

/* Balloons */
.balloon {
  position: absolute;
  pointer-events: none;
  animation: floatBalloon linear infinite;
}
.balloon-body {
  width: 100%; padding-bottom: 115%;
  border-radius: 50% 50% 45% 45%;
  position: relative;
}
.balloon-body::after {
  content: ''; position: absolute;
  bottom: -4px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px;
  background: inherit; border-radius: 50%;
}
.balloon-string {
  position: absolute; top: 100%; left: 50%;
  width: 1px; height: 60px;
  background: rgba(255,255,255,0.5);
  transform: translateX(-50%);
}

/* Confetti */
.confetti-piece {
  position: absolute; pointer-events: none;
  animation: confettiFall linear infinite;
  border-radius: 2px;
}

/* Lights along the tent roofs */
.light-string {
  position: absolute; top: 5%; left: 10%; right: 10%;
  display: flex; justify-content: space-between; align-items: center;
}
.bulb {
  width: 10px; height: 13px;
  border-radius: 50% 50% 30% 30%;
  animation: bulbPulse 1.5s ease-in-out infinite alternate;
}

/* ───── MAIN UI ───── */
#app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* Title bar */
#title-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 14%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
  border-bottom: 4px solid var(--dark);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 20;
}
#title-bar h1 {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.4rem, 4vw, 2.8rem);
  color: var(--dark);
  text-shadow: 3px 3px 0 rgba(255,255,255,0.4);
  letter-spacing: 3px;
  animation: titleBounce 2s ease-in-out infinite;
}
.title-star {
  font-size: clamp(1.2rem, 3vw, 2rem);
  margin: 0 12px;
  animation: spinStar 3s linear infinite;
  display: inline-block;
}

/* Progress bar */
#progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 5px; background: var(--dark);
  transition: width 0.5s ease;
}

/* Activity container */
#activity-container {
  position: absolute;
  top: 14%; bottom: 0; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2%;
}

/* Activity card */
.activity-card {
  width: 94%; height: 86%;
  background: rgba(255,249,240,0.97);
  border-radius: 20px;
  border: 4px solid var(--yellow);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.8);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}

.activity-header {
  background: linear-gradient(90deg, var(--purple), var(--blue));
  padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.activity-header h2 {
  font-family: 'Boogaloo', cursive;
  color: white; font-size: clamp(1rem, 2.5vw, 1.6rem);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.activity-badge {
  background: var(--yellow); color: var(--dark);
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.8rem, 1.8vw, 1.1rem);
  padding: 3px 12px; border-radius: 20px;
  border: 2px solid var(--dark);
  white-space: nowrap;
}
.activity-instruction {
  background: var(--yellow);
  padding: 6px 16px;
  font-size: clamp(0.7rem, 1.5vw, 0.95rem);
  font-weight: 700; color: var(--dark);
  border-bottom: 2px solid var(--orange);
  flex-shrink: 0;
}

.activity-body {
  flex: 1; display: flex;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 16px;
  overflow: hidden;
  position: relative;
}

/* ───── ACTIVITY 1 ───── */
#act1-body {
  flex-direction: column; gap: 10px;
}
.seq-source-label, .seq-target-label {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.75rem, 1.5vw, 1rem);
  color: var(--dark); align-self: flex-start;
}

.seq-source {
  width: 100%; display: flex; flex-wrap: wrap;
  gap: 8px; justify-content: center;
  padding: 10px; border-radius: 12px;
  background: rgba(78,205,196,0.15);
  border: 2px dashed var(--blue);
  min-height: 70px;
}

.seq-target {
  width: 100%; display: flex;
  gap: 8px; justify-content: center; align-items: center;
  padding: 10px; border-radius: 12px;
  background: rgba(168,85,247,0.1);
  border: 2px dashed var(--purple);
  min-height: 80px; flex-wrap: nowrap; overflow-x: auto;
}

.seq-slot {
  min-width: 90px; height: 70px;
  border: 2px dashed rgba(168,85,247,0.5);
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 10px; color: rgba(100,50,180,0.5);
  font-weight: 700; text-align: center;
  transition: all 0.2s;
  position: relative;
  background: rgba(255,255,255,0.5);
  flex-shrink: 0;
}
.seq-slot.drag-over {
  border-color: var(--purple);
  background: rgba(168,85,247,0.2);
  transform: scale(1.05);
}
.seq-slot.filled { border-style: solid; border-color: var(--green); }

.arrow-between {
  font-size: 1.4rem; color: var(--orange);
  animation: arrowPulse 1s ease-in-out infinite alternate;
  flex-shrink: 0;
}

.seq-item {
  min-width: 88px; height: 66px;
  border-radius: 10px; border: 3px solid var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  cursor: grab; transition: all 0.2s;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  font-weight: 700; font-size: 11px;
  text-align: center;
  position: relative;
  flex-shrink: 0;
}
.seq-item:active { cursor: grabbing; transform: scale(1.08) rotate(2deg); z-index: 100; }
.seq-item .item-emoji { font-size: 1.8rem; line-height: 1; }
.seq-item .item-label { font-size: clamp(9px, 1.2vw, 12px); color: var(--dark); }

.btn-check {
  margin-top: 8px; padding: 10px 28px;
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1rem, 2vw, 1.3rem);
  background: linear-gradient(135deg, var(--green), #4CAF50);
  color: white; border: 3px solid var(--dark);
  border-radius: 30px; cursor: pointer;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.btn-check:hover { transform: translateY(-2px); box-shadow: 4px 6px 0 rgba(0,0,0,0.3); }
.btn-check:active { transform: translateY(1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

/* ───── ACTIVITY 2 ───── */
#act2-body { position: relative; }

.machine-scene {
  width: 100%; height: 68%;
  background: rgba(255,200,100,0.1);
  border: 2px solid var(--orange);
  border-radius: 14px;
  position: relative; overflow: hidden;
}

.machine-part {
  position: absolute; display: flex;
  flex-direction: column; align-items: center;
  font-size: 11px; font-weight: 700;
  color: var(--dark); text-align: center;
  cursor: default;
  transition: all 0.3s;
}
.machine-part .part-emoji { font-size: clamp(1.4rem, 2.5vw, 2rem); line-height: 1.1; }

.drop-zone {
  position: absolute;
  border: 3px dashed var(--red);
  border-radius: 10px;
  background: rgba(255,59,59,0.1);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: var(--red); text-align: center;
  transition: all 0.2s; cursor: default;
}
.drop-zone.drag-over {
  background: rgba(255,59,59,0.3);
  transform: scale(1.08);
}
.drop-zone.filled {
  border-style: solid; border-color: var(--green);
  background: rgba(107,203,119,0.2);
}

.fix-parts-tray {
  display: flex; gap: 10px; justify-content: center;
  margin-top: 8px; flex-wrap: wrap;
}

.fix-part {
  min-width: 70px; height: 60px;
  background: white; border: 3px solid var(--orange);
  border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: grab; transition: all 0.2s;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  font-weight: 700; font-size: 11px; text-align: center;
  flex-shrink: 0;
}
.fix-part:active { cursor: grabbing; transform: scale(1.1) rotate(-2deg); z-index: 100; }
.fix-part .fp-emoji { font-size: 1.6rem; line-height: 1.1; }
.fix-part.used { opacity: 0.3; pointer-events: none; }

.connection-line {
  position: absolute;
  height: 3px; background: var(--orange);
  transform-origin: left center;
  pointer-events: none;
}

/* ───── ACTIVITY 3 ───── */
#act3-body { flex-direction: row; gap: 10px; align-items: stretch; }

.parts-palette {
  width: 22%; min-width: 100px;
  background: rgba(255,107,53,0.1);
  border: 2px dashed var(--orange);
  border-radius: 12px; padding: 8px;
  display: flex; flex-direction: column; gap: 6px;
  overflow-y: auto;
}
.parts-palette h3 {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.75rem, 1.5vw, 1rem);
  color: var(--orange); text-align: center;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--orange);
}

.palette-item {
  padding: 6px 4px;
  background: white; border: 2px solid var(--dark);
  border-radius: 8px; cursor: grab;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  transition: all 0.2s;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  font-size: 10px; font-weight: 700; color: var(--dark);
  text-align: center; flex-shrink: 0;
}
.palette-item:hover { transform: scale(1.05); }
.palette-item:active { cursor: grabbing; }
.palette-item .pi-emoji { font-size: 1.3rem; line-height: 1.1; }

.build-area {
  flex: 1;
  background: rgba(255,249,240,0.8);
  border: 3px solid var(--purple);
  border-radius: 12px; position: relative;
  overflow: hidden;
}
.build-area-hint {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.8rem, 2vw, 1.2rem);
  color: rgba(100,80,180,0.3);
  text-align: center; pointer-events: none;
}

.build-item {
  position: absolute; cursor: grab;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  font-size: 10px; font-weight: 700; color: var(--dark);
  text-align: center;
  background: white; border: 2px solid var(--purple);
  border-radius: 8px; padding: 4px 6px;
  box-shadow: 2px 2px 0 rgba(100,50,180,0.3);
  transition: box-shadow 0.2s;
  z-index: 5;
  user-select: none;
}
.build-item:active { cursor: grabbing; }
.build-item .bi-emoji { font-size: 1.4rem; line-height: 1.1; }

.act3-controls {
  width: 22%; min-width: 90px;
  display: flex; flex-direction: column;
  gap: 8px; justify-content: center; align-items: center;
}

.btn-trigger {
  width: 100%; padding: 12px 8px;
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.9rem, 1.8vw, 1.2rem);
  background: linear-gradient(135deg, var(--red), var(--orange));
  color: white; border: 3px solid var(--dark);
  border-radius: 16px; cursor: pointer;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  transition: all 0.15s; text-align: center;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  line-height: 1.2;
}
.btn-trigger:hover { transform: translateY(-2px); box-shadow: 4px 6px 0 rgba(0,0,0,0.3); }
.btn-clear {
  width: 100%; padding: 8px;
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.8rem, 1.5vw, 1rem);
  background: var(--cream); color: var(--dark);
  border: 2px solid var(--dark); border-radius: 12px;
  cursor: pointer; box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  transition: all 0.15s;
}
.btn-clear:hover { background: #fff; }

.reaction-counter {
  text-align: center;
  font-family: 'Boogaloo', cursive;
  font-size: clamp(0.75rem, 1.5vw, 0.95rem);
  color: var(--dark);
  background: var(--yellow); border: 2px solid var(--dark);
  border-radius: 10px; padding: 6px 8px;
}

/* ───── CHAIN ANIMATION ───── */
.chain-beam {
  position: absolute; pointer-events: none;
  background: linear-gradient(90deg, var(--yellow), var(--orange));
  height: 4px; border-radius: 2px;
  opacity: 0; z-index: 10;
  transition: opacity 0.15s;
}
.chain-beam.active { opacity: 1; animation: beamZap 0.4s ease-out forwards; }

.item-activated {
  animation: itemPop 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
}

/* ───── POPUPS ───── */
.popup-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
.popup-box {
  background: var(--cream);
  border: 5px solid var(--yellow);
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popupBounce 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  max-width: 420px; width: 88%;
  position: relative; overflow: hidden;
}
.popup-box::before {
  content: ''; position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: var(--yellow); opacity: 0.2;
  border-radius: 50%;
}
.popup-emoji { font-size: 3.5rem; margin-bottom: 10px; animation: emojiWiggle 1s ease-in-out infinite; }
.popup-title {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--dark); margin-bottom: 8px;
}
.popup-text {
  font-size: clamp(0.85rem, 2vw, 1rem);
  color: #555; margin-bottom: 20px;
  line-height: 1.5;
}
.popup-score {
  display: inline-block;
  background: var(--green); color: white;
  font-family: 'Boogaloo', cursive;
  font-size: 1.2rem;
  padding: 4px 16px; border-radius: 20px;
  margin-bottom: 18px;
  border: 2px solid var(--dark);
}
.btn-next {
  padding: 12px 32px;
  font-family: 'Boogaloo', cursive; font-size: 1.3rem;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: white; border: 3px solid var(--dark);
  border-radius: 30px; cursor: pointer;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  transition: all 0.15s;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.btn-next:hover { transform: translateY(-3px) scale(1.03); box-shadow: 4px 7px 0 rgba(0,0,0,0.3); }
.popup-stars {
  font-size: 1.8rem; letter-spacing: 6px; margin-bottom: 4px;
  animation: starSpin 0.5s ease-out;
}
.popup-confetti {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.p-confetti {
  position: absolute; width: 8px; height: 8px;
  border-radius: 2px; animation: popupConfetti 1.5s ease-out forwards;
  top: -10%;
}

/* ───── FEEDBACK ───── */
.feedback-bubble {
  position: fixed; z-index: 200;
  background: var(--green); color: white;
  font-family: 'Boogaloo', cursive; font-size: 1.2rem;
  padding: 10px 22px; border-radius: 30px;
  border: 3px solid var(--dark);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  animation: feedbackPop 1.5s ease forwards;
  pointer-events: none;
}

/* ───── ANIMATIONS ───── */
@keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }
@keyframes flagWave { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }
@keyframes spinWheel { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes floatBalloon {
  0%   { transform: translateY(0) translateX(0); opacity: 0.9; }
  25%  { transform: translateY(-20px) translateX(8px); }
  50%  { transform: translateY(-10px) translateX(0); }
  75%  { transform: translateY(-25px) translateX(-8px); }
  100% { transform: translateY(0) translateX(0); opacity: 0.9; }
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
}
@keyframes titleBounce {
  0%,100% { transform: translateY(0); }

}
@keyframes spinStar {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes bulbPulse {
  from { opacity: 0.5; filter: brightness(0.8); }
  to   { opacity: 1;   filter: brightness(1.3); }
}
@keyframes arrowPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.3); }
}
@keyframes beamZap {
  0%   { transform: scaleX(0); opacity: 1; }
  60%  { transform: scaleX(1); opacity: 1; }
  100% { transform: scaleX(1); opacity: 0; }
}
@keyframes itemPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.3) rotate(5deg); filter: brightness(1.5); }
  70%  { transform: scale(0.9) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popupBounce {
  0%   { transform: scale(0.3) rotate(-5deg); opacity: 0; }
  70%  { transform: scale(1.05) rotate(1deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes emojiWiggle {
  0%,100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(5deg) scale(1.1); }
}
@keyframes popupConfetti {
  0%   { transform: translateY(-10%) rotate(0deg) translateX(0); opacity: 1; }
  100% { transform: translateY(120%) rotate(480deg) translateX(var(--tx)); opacity: 0.3; }
}
@keyframes feedbackPop {
  0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
  20%  { opacity: 1; transform: scale(1.1) translateY(-5px); }
  80%  { opacity: 1; transform: scale(1) translateY(0); }
  100% { opacity: 0; transform: scale(0.9) translateY(-15px); }
}
@keyframes starSpin {
  from { transform: scale(0) rotate(-180deg); }
  to   { transform: scale(1) rotate(0deg); }
}
@keyframes actTransitionIn {
  from { opacity: 0; transform: translateX(60px); }
  to   { opacity: 1; transform: translateX(0); }
}

.activity-card.entering { animation: actTransitionIn 0.4s ease; }

<script>
// ─── BACKGROUND SETUP ───────────────────────────────────────────────

    });
    const body = document.createElement('div');
    body.className = 'balloon-body';
    body.style.background = balloonColors[i%balloonColors.length];
    const str = document.createElement('div');

  // Confetti
  for(let i=0;i<30;i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const sz = Math.random()*8+4;
    Object.assign(c.style,{
      width: sz+'px', height: sz+'px',
      background: colors[Math.floor(Math.random()*colors.length)],
      left: Math.random()*100+'%',
      top: Math.random()*100+'%',
      animationDuration: (Math.random()*8+6)+'s',
      animationDelay: -(Math.random()*8)+'s',
      transform: `rotate(${Math.random()*360}deg)`,
    });
    document.querySelector('.bg-scene').appendChild(c);
  }
})();

// ─── GAME STATE ───────────────────────────────────────────────────
let currentActivity = 1;
let dragItem = null, dragSource = null;

// Activity 1 data
const SEQ_ORDER = ['dominos','ball','ramp','lever','buzzer'];
const SEQ_ITEMS = {
  dominos: { emoji: '🁢🁢', label: 'Dominos', color: '#FFD93D' },
  ball:    { emoji: '🎱', label: 'Ball',    color: '#4ECDC4' },
  ramp:    { emoji: '📐', label: 'Ramp',    color: '#FF6B35' },
  lever:   { emoji: '⚖️', label: 'Lever',   color: '#A855F7' },
  buzzer:  { emoji: '🔔', label: 'Buzzer',  color: '#FF6FAE' },
};
let act1Slots = [null, null, null, null, null];
let act1Shuffled = [];

// Activity 2 data
const FIX_PARTS = [
  { id: 'gear',    emoji: '⚙️', label: 'Gear',    zone: 'dz-gear' },
  { id: 'spring',  emoji: '🌀', label: 'Spring',  zone: 'dz-spring' },
  { id: 'pulley',  emoji: '🎠', label: 'Pulley',  zone: 'dz-pulley' },
];
let act2Filled = {};

// Activity 3 data
const PALETTE_PARTS = [
  { id: 'cannon',  emoji: '💣', label: 'Cannon'  },
  { id: 'wheel',   emoji: '🎡', label: 'Wheel'   },
  { id: 'ramp3',   emoji: '📐', label: 'Ramp'    },
  { id: 'domino3', emoji: '🁢',  label: 'Domino'  },
  { id: 'ball3',   emoji: '⚽', label: 'Ball'    },
  { id: 'fan',     emoji: '🌀', label: 'Fan'     },
  { id: 'bell3',   emoji: '🔔', label: 'Bell'    },
  { id: 'bucket',  emoji: '🪣', label: 'Bucket'  },
];
let act3Items = [];
let act3DragEl = null;
let act3OffX = 0, act3OffY = 0;
let act3TriggeredCount = 0;

// ─── RENDER SYSTEM ───────────────────────────────────────────────
function renderActivity(n) {
  const container = document.getElementById('activity-container');
  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'activity-card entering';

  if(n === 1) buildAct1(card);
  else if(n === 2) buildAct2(card);
  else if(n === 3) buildAct3(card);

  container.appendChild(card);
  updateProgress(n);

  // Remove entering class after animation
  setTimeout(()=> card.classList.remove('entering'), 500);
}

function updateProgress(n) {
  const pct = ((n-1)/3)*100;
  document.getElementById('progress-bar').style.width = pct+'%';
}

// ─── ACTIVITY 1 ──────────────────────────────────────────────────
function buildAct1(card) {
  card.innerHTML = `
    <div class="activity-header">
      <span class="activity-badge">🔗 Activity 1 of 3</span>
      <h2>BUILD THE CHAIN REACTION!</h2>
    </div>
    <div class="activity-instruction">
      🧩 Drag the parts into the correct order to build your Rube Goldberg chain reaction!
    </div>
    <div class="activity-body" id="act1-body">
      <div style="width:100%;text-align:left;margin-bottom:4px;">
        <span class="seq-source-label">📦 PARTS TO USE:</span>
      </div>
      <div class="seq-source" id="seq-source"></div>
      <div style="width:100%;text-align:left;margin-bottom:4px;margin-top:4px;">
        <span class="seq-target-label">➡️ DROP IN ORDER (1 → 5):</span>
      </div>
      <div class="seq-target" id="seq-target"></div>
      <button class="btn-check" onclick="checkAct1()">✅ CHECK MY ANSWER!</button>
    </div>`;

  // Shuffle items
  act1Shuffled = [...SEQ_ORDER].sort(()=>Math.random()-0.5);
  act1Slots = [null,null,null,null,null];

  const src = card.querySelector('#seq-source');
  act1Shuffled.forEach(id => {
    const el = makeSeqItem(id);
    src.appendChild(el);
  });

  const tgt = card.querySelector('#seq-target');
  for(let i=0;i<5;i++){
    if(i>0){
      const arr = document.createElement('div');
      arr.className='arrow-between'; arr.textContent='→';
      tgt.appendChild(arr);
    }
    const slot = document.createElement('div');
    slot.className = 'seq-slot';
    slot.dataset.index = i;
    slot.textContent = (i+1);
    slot.addEventListener('dragover', e=>{e.preventDefault(); slot.classList.add('drag-over');});
    slot.addEventListener('dragleave', ()=> slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e=>{
      e.preventDefault(); slot.classList.remove('drag-over');
      dropOnSlot(slot, i);
    });
    tgt.appendChild(slot);
  }
  setupDragFromSource(src);
}

function makeSeqItem(id) {
  const d = SEQ_ITEMS[id];
  const el = document.createElement('div');
  el.className = 'seq-item'; el.dataset.id = id; el.draggable = true;
  el.style.background = d.color;
  el.innerHTML = `<span class="item-emoji">${d.emoji}</span><span class="item-label">${d.label}</span>`;
  el.addEventListener('dragstart', ev=>{
    dragItem = id; dragSource = 'source';
    ev.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', ()=>{ dragItem=null; dragSource=null; });
  return el;
}

function setupDragFromSource(src) {
  // Already handled in makeSeqItem
}

function dropOnSlot(slot, index) {
  if(!dragItem) return;
  // If slot already has something, put it back or swap
  if(act1Slots[index]) {
    // Return previous to source
    const prevId = act1Slots[index];
    const src = document.getElementById('seq-source');
    const retEl = makeSeqItem(prevId);
    src.appendChild(retEl);
    slot.innerHTML = '';
  }
  // If item was in another slot, clear that slot
  const prevSlot = act1Slots.indexOf(dragItem);
  if(prevSlot !== -1 && prevSlot !== index) {
    act1Slots[prevSlot] = null;
    const allSlots = document.querySelectorAll('.seq-slot');
    let slotCount = 0;
    allSlots.forEach(s=>{
      if(s.dataset.index == prevSlot){
        s.innerHTML = (prevSlot+1)+'';
        s.classList.remove('filled');
        s.draggable = false;
      }
    });
  }
  // Remove from source if there
  const src = document.getElementById('seq-source');
  src.querySelectorAll('.seq-item').forEach(el=>{
    if(el.dataset.id === dragItem) el.remove();
  });

  act1Slots[index] = dragItem;
  const d = SEQ_ITEMS[dragItem];
  slot.innerHTML = `<span class="item-emoji" style="font-size:1.5rem">${d.emoji}</span><span class="item-label">${d.label}</span>`;
  slot.classList.add('filled');
  slot.style.background = d.color+'44';
  slot.draggable = true;
  slot.addEventListener('dragstart', ev=>{
    dragItem = act1Slots[index]; dragSource = 'slot_'+index;
    ev.dataTransfer.effectAllowed = 'move';
  });
}

function checkAct1() {
  if(act1Slots.includes(null)){
    showFeedback("Place ALL 5 parts first! 🤔", 'hint'); return;
  }
  const correct = act1Slots.every((id,i)=> id === SEQ_ORDER[i]);
  if(correct){
    // Animate chain
    animateChainAct1(()=>{
      showPopup(1);
    });
  } else {
    showFeedback("Not quite! Check the order — what should happen FIRST? 🔄", 'wrong');
    // Shake wrong slots
    document.querySelectorAll('.seq-slot').forEach((slot, i)=>{
      if(act1Slots[i] !== SEQ_ORDER[i]){
        slot.style.animation = 'none';
        slot.style.border = '2px solid '+getComputedStyle(document.documentElement).getPropertyValue('--red');
        setTimeout(()=>{ slot.style.border=''; }, 1200);
      }
    });
  }
}

function animateChainAct1(cb) {
  const slots = document.querySelectorAll('.seq-slot');
  let i = 0;
  const interval = setInterval(()=>{
    if(i >= slots.length){ clearInterval(interval); setTimeout(cb, 400); return; }
    slots[i].classList.add('item-activated');
    showFeedback(['DOMINOS FALL! 🁢🁢','BALL ROLLS! 🎱','RAMP TIPS! 📐','LEVER FLIPS! ⚖️','BUZZER RINGS! 🔔'][i], 'hint');
    i++;
  }, 500);
}

// ─── ACTIVITY 2 ──────────────────────────────────────────────────
function buildAct2(card) {
  act2Filled = {};
  card.innerHTML = `
    <div class="activity-header">
      <span class="activity-badge">🔧 Activity 2 of 3</span>
      <h2>FIX THE BROKEN MACHINE!</h2>
    </div>
    <div class="activity-instruction">
      ⚠️ 3 parts are missing! Drag the correct parts into the empty spots to fix the machine!
    </div>
    <div class="activity-body" id="act2-body">
      <div class="machine-scene" id="machine-scene">
        <!-- Fixed parts -->
        <div class="machine-part" style="left:3%;top:35%">
          <span class="part-emoji">💣</span><span style="font-size:10px">Launcher</span>
        </div>
        <div class="machine-part" style="left:23%;top:15%">
          <span class="part-emoji">⚽</span><span style="font-size:10px">Ball</span>
        </div>
        <!-- Drop zone 1: gear -->
        <div class="drop-zone" id="dz-gear" data-needs="gear"
             style="left:41%;top:10%;width:13%;height:38%">
          <span style="font-size:1.4rem">❓</span>
          <span style="font-size:9px;margin-top:2px">MISSING<br>PART</span>
        </div>
        <div class="machine-part" style="left:56%;top:15%">
          <span class="part-emoji">📐</span><span style="font-size:10px">Ramp</span>
        </div>
        <!-- Drop zone 2: spring -->
        <div class="drop-zone" id="dz-spring" data-needs="spring"
             style="left:68%;top:30%;width:13%;height:38%">
          <span style="font-size:1.4rem">❓</span>
          <span style="font-size:9px;margin-top:2px">MISSING<br>PART</span>
        </div>
        <div class="machine-part" style="left:82%;top:55%">
          <span class="part-emoji">⚖️</span><span style="font-size:10px">Lever</span>
        </div>
        <!-- Drop zone 3: pulley -->
        <div class="drop-zone" id="dz-pulley" data-needs="pulley"
             style="left:50%;top:58%;width:13%;height:38%">
          <span style="font-size:1.4rem">❓</span>
          <span style="font-size:9px;margin-top:2px">MISSING<br>PART</span>
        </div>
        <div class="machine-part" style="left:28%;top:60%">
          <span class="part-emoji">🔔</span><span style="font-size:10px">Bell</span>
        </div>
        <!-- Connection arrows -->
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs><marker id="arr" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto">
            <polygon points="0 0, 4 2, 0 4" fill="#FF6B35"/>
          </marker></defs>
          <path d="M 15 52 Q 25 30 23 28" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
          <path d="M 30 28 Q 38 22 41 28" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
          <path d="M 54 28 Q 60 25 56 28" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
          <path d="M 67 40 Q 69 45 68 46" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
          <path d="M 82 62 Q 70 70 63 72" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
          <path d="M 50 70 Q 42 72 38 72" stroke="#FF6B35" stroke-width="0.8" fill="none" marker-end="url(#arr)" stroke-dasharray="2,1"/>
        </svg>
      </div>
      <div style="font-family:'Boogaloo',cursive;font-size:clamp(0.75rem,1.5vw,1rem);color:var(--dark);margin-top:6px;text-align:center">
        📦 DRAG THESE MISSING PARTS:

      <div class="fix-parts-tray" id="fix-tray"></div>

  // Setup drop zones
  ['dz-gear','dz-spring','dz-pulley'].forEach(id=>{
    const dz = card.querySelector('#'+id);
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault(); dz.classList.remove('drag-over');
      dropOnFixZone(dz);
    });
  });

  // Shuffle fix parts
  const shuffled = [...FIX_PARTS].sort(()=>Math.random()-0.5);
  const tray = card.querySelector('#fix-tray');
  shuffled.forEach(p=>{
    const el = document.createElement('div');
    el.className = 'fix-part'; el.dataset.id = p.id; el.draggable = true;
    el.innerHTML = `<span class="fp-emoji">${p.emoji}</span><span>${p.label}</span>`;
    el.addEventListener('dragstart',ev=>{
      dragItem = p.id; dragSource = 'fix-tray';
      ev.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{dragItem=null;});
    tray.appendChild(el);
  });
}

function dropOnFixZone(dz) {
  if(!dragItem) return;
  const needs = dz.dataset.needs;
  const part = FIX_PARTS.find(p=>p.id===dragItem);
  if(!part) return;

  if(dragItem === needs) {
    // Correct!
    act2Filled[needs] = true;
    dz.classList.add('filled');
    dz.innerHTML = `<span style="font-size:1.6rem">${part.emoji}</span><span style="font-size:9px">${part.label}</span>`;
    dz.draggable = false;
    // Mark tray item used
    document.querySelectorAll('.fix-part').forEach(el=>{
      if(el.dataset.id === dragItem) el.classList.add('used');
    });
    dz.classList.add('item-activated');
    showFeedback('✅ Perfect fit!', 'hint');

    if(Object.keys(act2Filled).length === 3) {
      setTimeout(()=>{
        animateChainAct2(()=>showPopup(2));
      }, 600);
    }
  } else {
    // Wrong
    showFeedback('❌ Wrong part! Try again!', 'wrong');
    dz.classList.add('item-activated');
    setTimeout(()=>dz.classList.remove('item-activated'),500);
  }
}

function animateChainAct2(cb) {
  const parts = document.querySelectorAll('#machine-scene .machine-part, #machine-scene .drop-zone');
  let i = 0;
  const msgs = ['💣 LAUNCHING!','⚽ ROLLING!','⚙️ TURNING!','📐 SLIDING!','🌀 SPRINGING!','⚖️ TIPPING!','🎠 PULLING!','🔔 RINGING!'];
  const interval = setInterval(()=>{
    if(i>=parts.length){clearInterval(interval);setTimeout(cb,500);return;}
    parts[i].classList.add('item-activated');
    if(msgs[i]) showFeedback(msgs[i],'hint');
    i++;
  },350);
}

// ─── ACTIVITY 3 ──────────────────────────────────────────────────
function buildAct3(card) {
  act3Items = []; act3TriggeredCount = 0;
  card.innerHTML = `
    <div class="activity-header">
      <span class="activity-badge">🎨 Activity 3 of 3</span>
      <h2>BUILD YOUR OWN MACHINE!</h2>
    </div>
    <div class="activity-instruction">
      🚀 Drag parts onto the canvas, arrange them your way, then hit TRIGGER to run your machine!
    </div>
    <div class="activity-body" id="act3-body">
      <div class="parts-palette" id="parts-palette">
        <h3>🔧 PARTS</h3>
      </div>
      <div class="build-area" id="build-area">
        <div class="build-area-hint">Drop parts here!<br>🏗️ Build away!</div>
      </div>
      <div class="act3-controls">
        <div class="reaction-counter" id="rxn-counter">
          Parts placed:<br><span id="part-count" style="font-size:1.6rem;color:var(--purple)">0</span>
        </div>
        <button class="btn-trigger" onclick="triggerAct3()">
          ⚡ TRIGGER<br>MACHINE!
        </button>
        <button class="btn-clear" onclick="clearAct3()">🗑️ Clear</button>
        <div style="font-size:9px;text-align:center;color:#888;line-height:1.4">
          Place at least<br>3 parts to trigger!
        </div>
      </div>
    </div>`;

  // Populate palette
  const pal = card.querySelector('#parts-palette');
  PALETTE_PARTS.forEach(p=>{
    const el = document.createElement('div');
    el.className = 'palette-item'; el.draggable = true;
    el.dataset.id = p.id;
    el.innerHTML = `<span class="pi-emoji">${p.emoji}</span><span>${p.label}</span>`;
    el.addEventListener('dragstart',ev=>{
      dragItem = p.id; dragSource = 'palette';
      ev.dataTransfer.effectAllowed='copy';
    });
    pal.appendChild(el);
  });

  // Setup build area
  const ba = card.querySelector('#build-area');
  ba.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
  ba.addEventListener('drop',e=>{
    e.preventDefault();
    if(!dragItem || dragSource!=='palette') return;
    const rect = ba.getBoundingClientRect();
    const x = e.clientX - rect.left - 35;
    const y = e.clientY - rect.top - 30;
    addBuildItem(ba, dragItem, Math.max(0,x), Math.max(0,y));
  });
}

function addBuildItem(ba, id, x, y) {
  const part = PALETTE_PARTS.find(p=>p.id===id);
  if(!part) return;
  const hint = ba.querySelector('.build-area-hint');
  if(hint) hint.style.display='none';

  const uid = id+'_'+Date.now();
  const el = document.createElement('div');
  el.className = 'build-item'; el.dataset.uid = uid;
  el.innerHTML = `<span class="bi-emoji">${part.emoji}</span><span>${part.label}</span>`;
  el.style.left = x+'px'; el.style.top = y+'px';

  // Drag to reposition
  let isDragging=false, startX=0, startY=0, origLeft=0, origTop=0;
  el.addEventListener('mousedown', ev=>{
    if(ev.button!==0) return;
    isDragging=true;
    startX=ev.clientX; startY=ev.clientY;
    origLeft=parseInt(el.style.left)||0;
    origTop=parseInt(el.style.top)||0;
    el.style.zIndex=50; ev.preventDefault();
  });
  document.addEventListener('mousemove', ev=>{
    if(!isDragging) return;
    const dx=ev.clientX-startX, dy=ev.clientY-startY;
    el.style.left=(origLeft+dx)+'px';
    el.style.top=(origTop+dy)+'px';
  });
  document.addEventListener('mouseup', ()=>{ if(isDragging){isDragging=false; el.style.zIndex=5;} });

  // Double-click to remove
  el.addEventListener('dblclick',()=>{ el.remove(); updateAct3Count(); });

  act3Items.push({ uid, id, el });
  ba.appendChild(el);
  updateAct3Count();
}

function updateAct3Count() {
  const cnt = document.getElementById('part-count');
  if(cnt) {
    const items = document.querySelectorAll('.build-item');
    cnt.textContent = items.length;
  }
}

function clearAct3() {
  document.querySelectorAll('.build-item').forEach(el=>el.remove());
  const ba = document.getElementById('build-area');
  if(ba){
    const hint = ba.querySelector('.build-area-hint');
    if(hint) hint.style.display='';
  }
  act3Items = []; act3TriggeredCount = 0;
  updateAct3Count();
}

function triggerAct3() {
  const items = Array.from(document.querySelectorAll('.build-item'));
  if(items.length < 3) {
    showFeedback('Place at least 3 parts first! 🔧', 'hint'); return;
  }
  act3TriggeredCount++;
  // Animate each item in order (left to right roughly)
  const sorted = items.slice().sort((a,b)=> parseInt(a.style.left)-parseInt(b.style.left));
  const msgs = ['💥 BOOM!','🎯 PING!','💫 WHOOSH!','⚡ ZAP!','🎉 POP!','🌟 FLASH!','🔥 FIRE!','💥 BLAST!'];
  let i=0;
  const interval = setInterval(()=>{
    if(i>=sorted.length){
      clearInterval(interval);
      // Draw connections
      drawConnections(sorted);
      setTimeout(()=>{
        showPopup(3);
      },800);
      return;
    }
    sorted[i].classList.remove('item-activated');
    void sorted[i].offsetWidth;
    sorted[i].classList.add('item-activated');
    sorted[i].style.borderColor = '#FF3B3B';
    showFeedback(msgs[i % msgs.length],'hint');
    i++;
  },350);
}

function drawConnections(items) {
  const ba = document.getElementById('build-area');
  if(!ba) return;
  document.querySelectorAll('.chain-beam').forEach(e=>e.remove());
  for(let i=0;i<items.length-1;i++){
    const a=items[i], b=items[i+1];
    const ax=parseInt(a.style.left)+40, ay=parseInt(a.style.top)+30;
    const bx=parseInt(b.style.left), by=parseInt(b.style.top)+30;
    const len=Math.sqrt((bx-ax)**2+(by-ay)**2);
    const angle=Math.atan2(by-ay,bx-ax)*180/Math.PI;
    const beam=document.createElement('div');
    beam.className='chain-beam active';
    Object.assign(beam.style,{
      left:ax+'px',top:ay+'px',
      width:len+'px',
      transform:`rotate(${angle}deg)`,
    });
    ba.appendChild(beam);
    setTimeout(()=>beam.remove(),1500);
  }
}

// ─── POPUP SYSTEM ─────────────────────────────────────────────────
const POPUP_DATA = {
  1: { emoji:'🎉', title:'Chain Complete!', text:'Amazing! You put the parts in the perfect order. The dominos fell, the ball rolled, the ramp tipped, the lever flipped, and the buzzer rang!', score:'⭐⭐⭐ Chain Master!', next:'Next Activity →' },
  2: { emoji:'🔧', title:'Machine Fixed!', text:'Incredible engineering! You found all 3 missing parts and placed them perfectly. The machine is running smoothly now!', score:'⭐⭐⭐ Super Engineer!', next:'Next Activity →' },
  3: { emoji:'🏆', title:'YOUR Machine Works!', text:'You are a TRUE Rube Goldberg inventor! You built your own chain reaction machine from scratch. One small push... one HUGE reaction!', score:'⭐⭐⭐ INVENTOR!', next:'🎊 Finish!' },
};

function showPopup(actNum) {
  const data = POPUP_DATA[actNum];
  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';
  // Confetti inside popup
  const confColors = ['#FF3B3B','#FFD93D','#4ECDC4','#A855F7','#FF6B35','#6BCB77','#FF6FAE'];
  let confHtml = '<div class="popup-confetti">';
  for(let i=0;i<20;i++){
    const tx = (Math.random()*200-100);
    confHtml+=`<div class="p-confetti" style="
      left:${Math.random()*100}%;
      background:${confColors[i%confColors.length]};
      --tx:${tx}px;
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${Math.random()*0.8+1}s;
    "></div>`;
  }
  confHtml+='</div>';

  overlay.innerHTML = `<div class="popup-box">
    ${confHtml}
    <div class="popup-emoji">${data.emoji}</div>
    <div class="popup-stars">⭐⭐⭐</div>
    <div class="popup-title">${data.title}</div>
    <div class="popup-text">${data.text}</div>
    <div class="popup-score">${data.score}</div><br>
    <button class="btn-next" onclick="nextActivity(${actNum})">${data.next}</button>
  </div>`;
  document.body.appendChild(overlay);
  updateProgress(actNum); // Filled progress
}

function nextActivity(current) {
  document.querySelectorAll('.popup-overlay').forEach(e=>e.remove());
  if(current < 3) {
    currentActivity = current+1;
    renderActivity(currentActivity);
  } else {
    showFinalCelebration();
  }
}

function showFinalCelebration() {
  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';
  const confColors = ['#FF3B3B','#FFD93D','#4ECDC4','#A855F7','#FF6B35','#6BCB77','#FF6FAE'];
  let confHtml = '<div class="popup-confetti">';
  for(let i=0;i<35;i++){
    const tx=(Math.random()*300-150);
    confHtml+=`<div class="p-confetti" style="left:${Math.random()*100}%;width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;background:${confColors[i%confColors.length]};--tx:${tx}px;animation-delay:${Math.random()*0.8}s;animation-duration:${Math.random()*1+1.2}s;"></div>`;
  }
  confHtml+='</div>';
  overlay.innerHTML=`<div class="popup-box" style="border-color:var(--green);max-width:460px">
    ${confHtml}
    <div class="popup-emoji" style="font-size:4rem">🏆🎪🎉</div>
    <div class="popup-stars" style="font-size:2rem;letter-spacing:4px">⭐⭐⭐⭐⭐</div>
    <div class="popup-title" style="font-size:2rem;color:var(--purple)">YOU'RE A RUBE GOLDBERG LEGEND!</div>
    <div class="popup-text">You completed ALL 3 challenges! You built chain reactions, fixed broken machines, and invented your very own Rube Goldberg machine. Real engineers are proud of you! 🚀</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px">
      <span class="popup-score" style="background:var(--red)">🔗 Chain Builder</span>
      <span class="popup-score" style="background:var(--blue)">🔧 Machine Fixer</span>
      <span class="popup-score" style="background:var(--purple)">🏗️ Inventor</span>
    </div>
    <button class="btn-next" style="background:linear-gradient(135deg,var(--red),var(--orange),var(--yellow))" onclick="restartAll()">🔄 Play Again!</button>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('progress-bar').style.width='100%';
}

function restartAll() {
  document.querySelectorAll('.popup-overlay').forEach(e=>e.remove());
  currentActivity = 1;
  renderActivity(1);
}

// ─── FEEDBACK SYSTEM ──────────────────────────────────────────────
function showFeedback(msg, type='hint') {
  const el=document.createElement('div');
  el.className='feedback-bubble '+(type||'');
  el.textContent=msg;
  el.style.top=(20+Math.random()*20)+'%';
  el.style.left=(20+Math.random()*50)+'%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

// ─── INIT ──────────────────────────────────────────────────────────
window.addEventListener('load', ()=> {
  renderActivity(1);
});
</script>
