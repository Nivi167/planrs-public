<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Weather App — HTML Project</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky1: #87CEEB;
    --sky2: #B8E4F9;
    --sun: #FFD700;
    --cloud: #FFFDF5;
    --green: #4CAF50;
    --accent: #FF6B35;
    --purple: #9B59B6;
    --pink: #FF69B4;
    --teal: #00BCD4;
    --card: rgba(255,255,255,0.82);
    --shadow: 0 8px 32px rgba(0,80,160,0.13);
    --radius: 22px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ═══════════════════ BACKGROUND ═══════════════════ */
  #bg {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #87CEEB 0%, #B8E4F9 55%, #d4f1c2 100%);
    z-index: 0;
    overflow: hidden;
  }

  /* Sun */
  .sun {
    position: absolute; top: 32px; right: 80px;
    width: 90px; height: 90px;
    background: radial-gradient(circle, #FFE066 60%, #FFD700 100%);
    border-radius: 50%;
    box-shadow: 0 0 0 18px rgba(255,220,0,0.15), 0 0 0 36px rgba(255,220,0,0.07);
    animation: sunPulse 4s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 0 18px rgba(255,220,0,0.15), 0 0 0 36px rgba(255,220,0,0.07); }
    50% { box-shadow: 0 0 0 28px rgba(255,220,0,0.22), 0 0 0 52px rgba(255,220,0,0.10); }
  }
  .sun-ray {
    position: absolute; top: 50%; left: 50%;
    width: 110px; height: 4px;
    background: linear-gradient(90deg, rgba(255,220,0,0.5), transparent);
    transform-origin: 0 50%;
    border-radius: 4px;
    animation: rayRotate 12s linear infinite;
  }
  @keyframes rayRotate { to { transform: rotate(360deg); } }

  /* Clouds */
  .cloud-obj {
    position: absolute;
    background: var(--cloud);
    border-radius: 50px;
    opacity: 0.92;
    filter: drop-shadow(0 6px 16px rgba(180,210,255,0.3));
    animation: driftCloud linear infinite;
  }
  .cloud-obj::before, .cloud-obj::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  @keyframes driftCloud {
    0%   { transform: translateX(0); }
    50%  { transform: translateX(30px); }
    100% { transform: translateX(0); }
  }

  /* Birds */
  .bird {
    position: absolute;
    font-size: 18px;
    animation: birdFly 18s linear infinite;
    opacity: 0.7;
    z-index: 2;
  }
  @keyframes birdFly {
    0%   { transform: translateX(-60px) translateY(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.7; }
    100% { transform: translateX(110vw) translateY(-30px); opacity: 0; }
  }

  /* Rainbow */
  .rainbow {
    position: absolute;
    bottom: 30%;
    left: -8%;
    width: 55%;
    height: 260px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    background: transparent;
    border: 18px solid transparent;
    border-top: 22px solid rgba(255,100,100,0.25);
    filter: blur(1px);
    animation: rainbowFade 8s ease-in-out infinite;
    z-index: 1;
  }
  .rainbow::before {
    content: '';
    position: absolute;
    inset: -34px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    border: 18px solid transparent;
    border-top: 20px solid rgba(255,180,0,0.18);
  }
  .rainbow::after {
    content: '';
    position: absolute;
    inset: -60px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    border: 16px solid transparent;
    border-top: 20px solid rgba(100,200,100,0.15);
  }
  @keyframes rainbowFade { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Hot air balloons */
  .balloon {
    position: absolute;
    font-size: 36px;
    animation: balloonFloat linear infinite;
    z-index: 2;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  @keyframes balloonFloat {
    0%   { transform: translateY(0) rotate(-3deg); }
    50%  { transform: translateY(-18px) rotate(3deg); }
    100% { transform: translateY(0) rotate(-3deg); }
  }

  /* Ground strip */
  .ground {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, #7ec850 0%, #5aad3f 100%);
    border-radius: 40% 40% 0 0 / 20px 20px 0 0;
    z-index: 1;
  }
  .ground::before {
    content: '';
    position: absolute; top: -12px; left: 0; right: 0;
    height: 20px;
    background: linear-gradient(180deg, transparent, rgba(80,160,60,0.3));
    border-radius: 50%;
  }

  /* ═══════════════════ MAIN LAYOUT ═══════════════════ */
  #app {
    position: fixed; inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Header */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 24px 8px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(255,255,255,0.4);
    z-index: 20;
  }
  #header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(16px, 2.5vw, 24px);
    color: #1a5fa8;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
  }
  #progress-bar {
    display: flex; gap: 8px; align-items: center;
  }
  .pip {
    width: 28px; height: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    border: 2px solid rgba(100,150,220,0.4);
    transition: all 0.4s;
  }
  .pip.active { background: #FFD700; border-color: #e6a800; }
  .pip.done   { background: #4CAF50; border-color: #388E3C; }

  /* Activity card */
  #activity-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    box-shadow: var(--shadow), 0 0 0 3px rgba(255,255,255,0.6);
    width: min(94vw, 760px);
    max-height: calc(100vh - 100px);
    padding: 20px 24px 16px;
    display: flex; flex-direction: column; gap: 12px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.88) translateY(30px); }
    to   { opacity: 1; transform: none; }
  }

  #act-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(17px, 2.8vw, 26px);
    color: #1a5fa8;
    text-align: center;
    line-height: 1.2;
  }
  #act-desc {
    font-size: clamp(12px, 1.6vw, 14px);
    color: #444;
    text-align: center;
    font-weight: 600;
    padding: 0 8px;
  }

  /* Drag zones */
  .drag-area {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .toolbox {
    background: rgba(135,206,235,0.2);
    border: 2.5px dashed rgba(30,100,200,0.25);
    border-radius: 16px;
    padding: 10px;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-content: flex-start;
    min-height: 80px;
  }
  .drop-zone {
    background: rgba(255,255,255,0.6);
    border: 2.5px dashed rgba(30,100,200,0.3);
    border-radius: 16px;
    padding: 10px;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-content: flex-start;
    min-height: 80px;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .drop-zone.over {
    background: rgba(100,180,255,0.18);
    border-color: #3a9ef5;
  }
  .drop-zone.correct {
    background: rgba(76,175,80,0.12);
    border-color: #4CAF50;
    animation: correctFlash 0.5s ease;
  }
  @keyframes correctFlash {
    0%,100% { background: rgba(76,175,80,0.12); }
    50%      { background: rgba(76,175,80,0.35); }
  }
  .zone-label {
    position: absolute; top: -11px; left: 14px;
    background: #3a9ef5; color: #fff;
    font-size: 10px; font-weight: 800;
    padding: 2px 10px; border-radius: 20px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /* Draggable items */
  .drag-item {
    background: linear-gradient(135deg, #fff 70%, #e8f4ff 100%);
    border: 2px solid rgba(60,130,220,0.3);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: clamp(11px, 1.5vw, 13px);
    font-weight: 700;
    color: #1a4fa0;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 3px 8px rgba(0,60,180,0.12);
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .drag-item:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 16px rgba(0,60,180,0.2); }
  .drag-item.dragging { opacity: 0.4; transform: scale(0.96); cursor: grabbing; }
  .drag-item.placed { opacity: 0.92; }
  .drag-item.wrong-shake { animation: wrongShake 0.4s ease; }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  /* Preview panel */
  #preview {
    background: linear-gradient(135deg, #e3f0ff 0%, #f0fff4 100%);
    border-radius: 16px;
    border: 2px solid rgba(100,180,255,0.3);
    padding: 12px 16px;
    min-height: 90px;
    position: relative;
  }
  #preview-label {
    position: absolute; top: -11px; left: 14px;
    background: var(--green); color: #fff;
    font-size: 10px; font-weight: 800;
    padding: 2px 10px; border-radius: 20px;
  }

  /* ASCII weather display */
  .ascii-weather {
    font-family: monospace;
    font-size: clamp(9px, 1.2vw, 12px);
    color: #1a5fa8;
    white-space: pre;
    line-height: 1.35;
  }

  /* Button */
  .btn {
    background: linear-gradient(135deg, #3a9ef5, #1a5fa8);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(13px, 1.8vw, 16px);
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(30,100,220,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(30,100,220,0.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  /* Feedback toast */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #1a4fa0;
    color: #fff;
    padding: 10px 24px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 14px;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ═══════════════════ POPUP ═══════════════════ */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(20,60,120,0.45);
    backdrop-filter: blur(5px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .popup-box {
    background: linear-gradient(160deg, #fff 60%, #e8f4ff 100%);
    border-radius: 28px;
    padding: 32px 36px 28px;
    max-width: min(90vw, 460px);
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,50,150,0.25), 0 0 0 3px rgba(255,255,255,0.8);
    animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7) rotate(-3deg); }
    to   { opacity: 1; transform: none; }
  }
  .popup-emoji { font-size: 60px; display: block; margin-bottom: 10px; animation: bounce 1s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .popup-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(20px, 3.5vw, 30px);
    color: #1a4fa0;
    margin-bottom: 8px;
  }
  .popup-body { font-size: 14px; color: #444; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
  .popup-stars { font-size: 28px; letter-spacing: 4px; margin-bottom: 12px; }
  .popup-confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; border-radius: 28px; }

  /* Confetti pieces */
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
  }

  /* Act 3 weather tip button preview */
  #tip-btn-preview {
    background: linear-gradient(135deg, #FF6B35, #e85000);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 8px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(220,80,0,0.35);
    transition: all 0.2s;
    display: none;
  }
  #tip-btn-preview:hover { transform: scale(1.06); }

  .tip-bubble {
    background: linear-gradient(135deg, #fff9e6, #fff3cc);
    border: 2px solid #FFD700;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    color: #7a5500;
    display: none;
    text-align: center;
    animation: tipPop 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes tipPop { from{transform:scale(0.8)} to{transform:scale(1)} }

  /* Scrollable inner if needed */
  .scroll-inner { overflow-y: auto; max-height: calc(100vh - 200px); }

  /* Responsive tweaks */
  @media (max-height: 600px) {
    #activity-card { padding: 12px 16px 10px; gap: 8px; }
    .popup-box { padding: 20px 24px 18px; }
    .popup-emoji { font-size: 40px; }
  }
</style>
</head>

<!-- Popup container -->

<script>
// ═══════════════════════════════════════════════
// BACKGROUND SETUP
// ═══════════════════════════════════════════════
(function setupBackground() {
  const bg = document.getElementById('bg');

  // Clouds
  const clouds = [
    { w:160, h:55, top:'12%', left:'-5%', dur:60, delay:0, scale:1 },
    { w:120, h:42, top:'22%', left:'30%', dur:50, delay:10, scale:0.85 },
    { w:200, h:65, top:'8%',  left:'55%', dur:75, delay:5, scale:1.1 },
    { w:90,  h:32, top:'35%', left:'10%', dur:42, delay:15, scale:0.7 },
    { w:140, h:48, top:'18%', left:'75%', dur:65, delay:8, scale:0.95 },
    { w:170, h:58, top:'30%', left:'50%', dur:70, delay:20, scale:1.05 },
  ];
  clouds.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cloud-obj';
    el.style.cssText = `
      width:${c.w}px; height:${c.h}px;
      top:${c.top}; left:${c.left};
      animation-duration:${c.dur}s;
      animation-delay:-${c.delay}s;
    `;
    el.style.transform = `scale(${c.scale})`;
    // bumps
    const b1 = document.createElement('div');
    b1.style.cssText = `width:${c.w*0.55}px;height:${c.h*1.3}px;top:-${c.h*0.55}px;left:${c.w*0.18}px;`;
    el.appendChild(b1);
    const b2 = document.createElement('div');
    b2.style.cssText = `width:${c.w*0.4}px;height:${c.h*1.1}px;top:-${c.h*0.38}px;left:${c.w*0.52}px;`;
    el.appendChild(b2);
    bg.insertBefore(el, bg.querySelector('.ground'));
  });

  // Balloons
  const balloons = ['🎈','🎈','🎠','🏮'];
  const bPositions = [
    {top:'55%', left:'8%', dur:7},
    {top:'40%', left:'78%', dur:9},
    {top:'60%', left:'88%', dur:6},
    {top:'48%', left:'60%', dur:8},
  ];
  balloons.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'balloon';
    el.textContent = b;
    el.style.cssText = `top:${bPositions[i].top};left:${bPositions[i].left};animation-duration:${bPositions[i].dur}s;animation-delay:-${i*2}s;font-size:${28+i*4}px;`;
    bg.insertBefore(el, bg.querySelector('.ground'));
  });

  // Birds
  const birdRows = [
    { top: '15%', delay: 0,  dur: 22 },
    { top: '28%', delay: 7,  dur: 28 },
    { top: '42%', delay: 14, dur: 20 },
  ];
  birdRows.forEach(row => {
    const el = document.createElement('div');
    el.className = 'bird';
    el.textContent = '🐦';
    el.style.cssText = `top:${row.top};left:0;animation-duration:${row.dur}s;animation-delay:${row.delay}s;`;
    bg.insertBefore(el, bg.querySelector('.ground'));
  });
})();

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentActivity = 1;
let draggingItem = null;
let dragSource = null;

// ═══════════════════════════════════════════════
// ACTIVITY DEFINITIONS
// ═══════════════════════════════════════════════

// Activity 1: Build the UI structure for Bangalore weather
const ACT1 = {
  title: '🏗️ Activity 1: Build the Weather Card!',
  desc: 'Drag each HTML tag to the correct zone to build a weather card for Bangalore!',
  items: [
    { id: 'a1-h1', label: '&lt;h1&gt; City Name &lt;/h1&gt;', emoji: '🏙️', zone: 'structure', hint: 'Title tag — makes text BIG!' },
    { id: 'a1-p',  label: '&lt;p&gt; Weather Details &lt;/p&gt;', emoji: '📝', zone: 'structure', hint: 'Paragraph tag — for details!' },
    { id: 'a1-img',label: '&lt;img&gt; Weather Icon',            emoji: '🖼️', zone: 'structure', hint: 'Image tag — shows pictures!' },
    { id: 'a1-div',label: '&lt;div&gt; Container &lt;/div&gt;',  emoji: '📦', zone: 'structure', hint: 'Div tag — a box to hold things!' },
    { id: 'a1-btn',label: '&lt;button&gt; Refresh &lt;/button&gt;', emoji: '🔘', zone: 'interactive', hint: 'Button tag — for clicking!' },
    { id: 'a1-h2', label: '&lt;h2&gt; Temperature &lt;/h2&gt;', emoji: '🌡️', zone: 'interactive', hint: 'Subtitle tag — medium size heading!' },
  ],
  zones: [
    { id: 'structure',   label: 'STRUCTURE TAGS', color: '#3a9ef5', correct: ['a1-h1','a1-p','a1-img','a1-div'] },
    { id: 'interactive', label: 'INTERACTIVE TAGS', color: '#e85000', correct: ['a1-btn','a1-h2'] },
  ]
};

// Activity 2: Add ASCII-style weather visuals
const ACT2_WEATHERS = {
  sunny: {
    label: '☀️ Sunny Day',
    ascii: `    \\  |  /
   --( ☀️ )--
    /  |  \\
  Bright & Clear!
  🌡️ 32°C in Bangalore`,
    color: '#FFD700'
  },
  rainy: {
    label: '🌧️ Monsoon Rain',

function updatePips(activity) {
  for (let i = 1; i <= 3; i++) {

    pip.className = 'pip';
    if (i < activity) pip.classList.add('done');
    else if (i === activity) pip.classList.add('active');

function spawnConfetti(container) {
  const colors = ['#FFD700','#FF6B35','#4CAF50','#3a9ef5','#FF69B4','#9B59B6'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*30}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${0.8 + Math.random()*1.4}s;
      animation-delay:${Math.random()*0.5}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
    `;
    container.appendChild(p);

}

  overlay.className = 'popup-overlay';
  const box = document.createElement('div');

// ═══════════════════════════════════════════════
// DRAG & DROP ENGINE
// ═══════════════════════════════════════════════
function makeDraggable(el, itemData) {
  el.setAttribute('draggable', 'true');
  el.dataset.itemId = itemData.id;

  el.addEventListener('dragstart', e => {
    draggingItem = itemData;
    dragSource = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', itemData.id);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    draggingItem = null;
  });

  // Touch support
  let touchStartX, touchStartY, clone;
  el.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    touchStartX = touch.clientX; touchStartY = touch.clientY;
    draggingItem = itemData; dragSource = el;
    clone = el.cloneNode(true);
    clone.style.cssText = `position:fixed;opacity:0.75;pointer-events:none;z-index:9999;transform:scale(1.05);`;
    clone.style.left = touchStartX - el.offsetWidth/2 + 'px';
    clone.style.top  = touchStartY - el.offsetHeight/2 + 'px';
    document.body.appendChild(clone);
    e.preventDefault();
  }, { passive: false });
  el.addEventListener('touchmove', e => {
    const touch = e.touches[0];
    if (clone) {
      clone.style.left = touch.clientX - el.offsetWidth/2 + 'px';
      clone.style.top  = touch.clientY - el.offsetHeight/2 + 'px';
    }
    e.preventDefault();
  }, { passive: false });
  el.addEventListener('touchend', e => {
    if (clone) { clone.remove(); clone = null; }
    const touch = e.changedTouches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const zone = target ? target.closest('.drop-zone') : null;
    if (zone && draggingItem) {
      zone.dispatchEvent(new CustomEvent('itemDropped', { detail: { itemData } }));
    }
    draggingItem = null;
  }, { passive: false });
}

function makeDropZone(el, onDrop) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('over');
  });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('over');
    if (draggingItem) onDrop(draggingItem, el);
  });
  el.addEventListener('itemDropped', e => {
    el.classList.remove('over');
    onDrop(e.detail.itemData, el);
  });
}

             border-radius:12px;padding:8px 14px;font-size:11px;font-weight:700;
             color:#7a5500;max-width:260px;text-align:center;min-height:28px;display:flex;align-items:center;justify-content:center;">
      <em>Click the button to get your tip!</em>
    </div>`;
  }
  if (!hasBtn && !hasTip) {
    html = '<span style="font-size:11px;color:#aaa;">Drag parts to build your feature! ✨</span>';
  }

  inner.innerHTML = html;

  if (hasBtn && hasAction) {
    const btn = document.getElementById('a3-tip-btn-live');
    if (btn) {
      btn.addEventListener('click', () => {
        const tip = ACT3_TIPS[Math.floor(Math.random() * ACT3_TIPS.length)];
        const tipDiv = document.getElementById('a3-tip-display');
        if (tipDiv) { tipDiv.innerHTML = `<span>${tip}</span>`; tipDiv.style.animation='tipPop 0.3s cubic-bezier(.34,1.56,.64,1)'; }
        else showToast(tip, '#e6a800');
      });
    }
  }
}

function showFinalPopup() {
  const pc = document.getElementById('popup-container');
  pc.innerHTML = '';
  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';

  const tip = ACT3_TIPS[Math.floor(Math.random() * ACT3_TIPS.length)];

  const box = document.createElement('div');
  box.className = 'popup-box';
  box.style.maxWidth = 'min(95vw, 520px)';

  const confDiv = document.createElement('div');
  confDiv.className = 'popup-confetti';
  box.appendChild(confDiv);
  spawnConfetti(confDiv);

  box.innerHTML += `
    <span class="popup-emoji">🏆</span>
    <div class="popup-title">Weather App Complete!</div>
    <div class="popup-stars">🌟🌟🌟🌟🌟</div>
    <div class="popup-body" style="font-size:13px;">
      <p>You just built a real HTML Weather App for Bangalore!</p>
      <br>
      <div style="background:linear-gradient(135deg,#e3f0ff,#f0fff4);border-radius:14px;padding:12px;margin:8px 0;border:2px solid rgba(60,150,255,0.2)">
        <strong style="color:#1a4fa0;">🧠 What you learned:</strong><br>
        <span style="font-size:12px;">
          ✅ &lt;h1&gt; makes BIG titles<br>
          ✅ &lt;p&gt; shows weather details<br>
          ✅ &lt;img&gt; displays weather icons<br>
          ✅ &lt;button&gt; creates click actions<br>
          ✅ &lt;div&gt; is a container box
        </span>
      </div>
      <div style="background:linear-gradient(135deg,#fff9e6,#fff3cc);border:2px solid #FFD700;border-radius:12px;padding:10px;margin-top:8px;">
        <strong style="color:#7a5500;">💡 Your Weather Tip for Bangalore:</strong><br>
        <span style="font-size:12px;color:#7a5500;">${tip}</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="final-restart" style="background:linear-gradient(135deg,#4CAF50,#388E3C)">🔄 Try Again!</button>
      <button class="btn" id="final-share">🎉 Celebrate!</button>
    </div>
  `;
  overlay.appendChild(box);
  pc.appendChild(overlay);

  document.getElementById('final-restart').addEventListener('click', () => {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.3s';
    setTimeout(() => { pc.innerHTML = ''; renderActivity1(); }, 300);
  });
  document.getElementById('final-share').addEventListener('click', () => {
    spawnConfetti(confDiv);
    showToast('🎊 You are a Web Builder! Amazing!', '#9B59B6');
  });
}
