<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRADUATION SHOWCASE — DEMO DAY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --saffron: #FF6B00;
    --gold: #FFD700;
    --green: #138808;
    --teal: #00BFA5;
    --purple: #7C3AED;
    --pink: #FF4081;
    --sky: #0EA5E9;
    --cream: #FFF8E7;
    --dark: #1A0A2E;
    --white: #FFFFFF;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100vw; height:100vh; overflow:hidden;
    font-family:'Nunito', sans-serif;
    background: var(--dark);
  }

  /* ===== STADIUM BACKGROUND ===== */
  #stadium-bg {
    position:fixed; inset:0; z-index:0;
    background: linear-gradient(180deg,
      #0A0020 0%, #1A0A4E 18%, #0D3B6E 35%,
      #1B6E3E 55%, #2E9E50 65%, #8B6914 75%, #C8A028 82%, #5A3A10 100%);
    overflow:hidden;
  }

  /* Stars */
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle 2s infinite alternate; }
  @keyframes twinkle { from{opacity:.2;transform:scale(1)} to{opacity:1;transform:scale(1.4)} }

  /* Floodlights */
  .floodlight {
    position:absolute; top:2%; width:4px; height:120px;
    background:linear-gradient(#ccc, #888);
    transform-origin:bottom center;
  }
  .floodlight::after {
    content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    width:20px; height:20px; background:#fff;
    border-radius:50%; box-shadow:0 0 30px 15px rgba(255,240,180,.7);
    animation:flicker 3s ease-in-out infinite alternate;
  }
  @keyframes flicker { 0%{box-shadow:0 0 30px 15px rgba(255,240,180,.7)} 100%{box-shadow:0 0 50px 25px rgba(255,240,180,1)} }

  /* Light beam */
  .light-beam {
    position:absolute; top:0; width:80px; height:300px;
    background:linear-gradient(to bottom, rgba(255,240,180,.18), transparent);
    transform-origin:top center;
    animation:sweepBeam 6s ease-in-out infinite alternate;
    clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
  }
  @keyframes sweepBeam { 0%{transform:rotate(-15deg)} 100%{transform:rotate(15deg)} }

  /* Crowd rows */
  .crowd-row {
    position:absolute; display:flex; gap:2px; animation:crowdWave 1.5s ease-in-out infinite;
  }
  .crowd-person {
    width:14px; height:22px; border-radius:7px 7px 4px 4px;
    animation:personBob 1.2s ease-in-out infinite alternate;
  }
  @keyframes personBob { 0%{transform:translateY(0) scaleY(1)} 100%{transform:translateY(-5px) scaleY(1.05)} }
  @keyframes crowdWave { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  /* Cricket pitch */
  #pitch {
    position:absolute; bottom:16%; left:50%; transform:translateX(-50%);
    width:220px; height:90px; background:linear-gradient(180deg,#6BA832,#8BC34A);
    border-radius:50%; border:3px solid rgba(255,255,255,.2);
    box-shadow: 0 0 40px rgba(100,200,50,.3);
  }
  #pitch::after {
    content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:8px; height:80px; background:rgba(255,255,255,.5);
    border-radius:4px;
  }

  /* Stumps */
  .stump-set { position:absolute; bottom:28%; display:flex; gap:3px; align-items:flex-end; }
  .stump { width:5px; background:linear-gradient(#F5DEB3,#D2691E); border-radius:2px 2px 0 0; }
  .bail {
    position:absolute; top:-5px; left:50%; transform:translateX(-50%);
    width:18px; height:3px; background:#F5DEB3; border-radius:2px;
  }

  /* Indian flag */
  .flag-pole { position:absolute; width:4px; background:linear-gradient(#888,#555); border-radius:2px; }
  .flag-cloth { position:absolute; right:-38px; display:flex; flex-direction:column; transform-origin:left center; animation:waveflag 2s ease-in-out infinite; }
  @keyframes waveflag {
    0%,100%{ clip-path:polygon(0 0,100% 5%,98% 95%,0 100%) }
    25%{ clip-path:polygon(0 0,95% 0%,100% 100%,0 100%) }
    50%{ clip-path:polygon(0 0,100% 8%,95% 92%,0 100%) }
    75%{ clip-path:polygon(0 0,98% 2%,100% 98%,0 100%) }
  }
  .flag-stripe { height:12px; width:38px; }

  /* Confetti */
  .confetti-piece {
    position:fixed; width:8px; height:8px; border-radius:2px;
    animation:confettifall linear infinite;
    z-index:999; pointer-events:none;
  }
  @keyframes confettifall {
    0%{ transform:translateY(-20px) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
  }

  /* ===== MAIN LAYOUT ===== */
  #app {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:8px 12px 6px;
  }

  /* Header */
  #header {
    text-align:center; margin-bottom:6px; animation:headerGlow 3s ease-in-out infinite alternate;
  }
  @keyframes headerGlow { from{text-shadow:0 0 20px #FFD700} to{text-shadow:0 0 40px #FF6B00,0 2px 20px #FFD700} }
  #header h1 {
    font-family:'Baloo 2', cursive; font-size:clamp(1.1rem,3.2vw,1.8rem); font-weight:800;
    color:#FFD700; letter-spacing:2px; line-height:1.1; text-transform:uppercase;
  }
  #header .subtitle {
    font-size:clamp(.6rem,1.8vw,0.8rem); color:#FFA500; font-weight:700; letter-spacing:4px; margin-top:1px;
  }

  /* Progress bar */
  #progress-bar {
    display:flex; gap:8px; margin-bottom:8px; align-items:center;
  }
  .step-dot {
    width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:.7rem; font-weight:800; border:3px solid rgba(255,255,255,.3);
    color:rgba(255,255,255,.5); background:rgba(255,255,255,.05);
    transition:all .4s ease; font-family:'Baloo 2', cursive;
  }
  .step-dot.active { background:var(--gold); color:var(--dark); border-color:var(--gold); transform:scale(1.2); box-shadow:0 0 15px var(--gold); }
  .step-dot.done { background:var(--green); color:#fff; border-color:var(--green); }
  .step-connector { width:30px; height:3px; background:rgba(255,255,255,.2); border-radius:2px; position:relative; overflow:hidden; }
  .step-connector.done::after { content:''; position:absolute; inset:0; background:var(--green); border-radius:2px; }

  /* Activity card */
  #activity-card {
    background:linear-gradient(135deg, rgba(255,255,255,.13) 0%, rgba(255,255,255,.06) 100%);
    backdrop-filter:blur(12px);
    border:2px solid rgba(255,215,0,.35);
    border-radius:20px;
    padding:14px 18px 12px;
    width:100%; max-width:720px;
    flex:1; display:flex; flex-direction:column;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
    overflow:hidden;
  }

  .activity-title {
    font-family:'Baloo 2', cursive; font-size:clamp(.85rem,2.2vw,1.1rem); font-weight:800;
    color:#FFD700; margin-bottom:4px; text-align:center;
  }
  .activity-desc {
    font-size:clamp(.65rem,1.6vw,0.78rem); color:rgba(255,255,255,.8); text-align:center; margin-bottom:10px; font-weight:600;
  }

  /* ===== DRAG AND DROP AREA ===== */
  .dnd-container { flex:1; display:flex; gap:10px; min-height:0; }

  /* Source items area */
  .items-bank {
    display:flex; flex-direction:column; gap:6px;
    width:160px; flex-shrink:0;
  }
  .items-bank-title {
    font-size:.65rem; font-weight:800; color:rgba(255,255,255,.6); text-align:center;
    text-transform:uppercase; letter-spacing:2px; margin-bottom:2px;
  }

  /* Drop zones area */
  .zones-area {
    flex:1; display:flex; flex-direction:column; gap:6px; min-height:0;
  }
  .zones-row { display:flex; gap:6px; flex:1; }

  /* Draggable item */
  .drag-item {
    padding:7px 10px; border-radius:12px; cursor:grab; user-select:none;
    font-size:.72rem; font-weight:700; text-align:center;
    display:flex; align-items:center; gap:6px;
    border:2px solid rgba(255,255,255,.25);
    transition:transform .2s, box-shadow .2s, opacity .3s;
    position:relative;
  }
  .drag-item:hover { transform:scale(1.05); box-shadow:0 4px 20px rgba(0,0,0,.4); }
  .drag-item.dragging { opacity:.4; cursor:grabbing; }
  .drag-item.placed { opacity:.4; pointer-events:none; }
  .drag-item .emoji { font-size:1.1rem; }

  /* Drop zone */
  .drop-zone {
    flex:1; border-radius:14px; border:2px dashed rgba(255,255,255,.3);
    padding:8px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    gap:4px; min-height:60px; position:relative; overflow:hidden;
    transition:border-color .3s, background .3s;
    background:rgba(255,255,255,.04);
  }
  .drop-zone.dragover { border-color:var(--gold); background:rgba(255,215,0,.1); box-shadow:0 0 20px rgba(255,215,0,.2); }
  .drop-zone.correct { border-color:var(--green); background:rgba(19,136,8,.15); }
  .drop-zone-label {
    font-size:.62rem; font-weight:800; text-align:center; color:rgba(255,255,255,.7);
    text-transform:uppercase; letter-spacing:1px; width:100%; margin-bottom:3px;
  }
  .dropped-item {
    padding:4px 8px; border-radius:8px; font-size:.65rem; font-weight:700;
    display:flex; align-items:center; gap:4px; width:100%;
    animation:dropIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes dropIn { from{transform:scale(0) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

  /* Check button */
  #check-btn {
    margin:8px auto 0; padding:10px 30px; border-radius:50px; border:none; cursor:pointer;
    font-family:'Baloo 2', cursive; font-size:.9rem; font-weight:800;
    background:linear-gradient(135deg, var(--saffron), var(--gold));
    color:var(--dark); box-shadow:0 4px 20px rgba(255,107,0,.4);
    transition:transform .2s, box-shadow .2s; display:block;
  }
  #check-btn:hover { transform:scale(1.05); box-shadow:0 6px 30px rgba(255,215,0,.5); }
  #check-btn:active { transform:scale(.97); }

  /* Feedback message */
  #feedback {
    text-align:center; font-size:.75rem; font-weight:700; margin-top:4px; min-height:18px;
    transition:all .3s;
  }

  /* ===== POPUP OVERLAY ===== */
  #popup-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(10,0,40,.75); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn .4s ease;
  }
  #popup-overlay.hidden { display:none; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .popup-box {
    background:linear-gradient(135deg, #1A0A4E 0%, #0D3B6E 50%, #1B6E3E 100%);
    border:3px solid var(--gold); border-radius:24px; padding:28px 32px 24px;
    max-width:420px; width:90%; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.7), 0 0 40px rgba(255,215,0,.2);
    animation:popupIn .5s cubic-bezier(.34,1.56,.64,1);
    position:relative; overflow:hidden;
  }
  @keyframes popupIn { from{transform:scale(.6) rotate(-5deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
  .popup-box::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 30% 30%, rgba(255,215,0,.07), transparent 60%);
  }

  .popup-emoji { font-size:3rem; margin-bottom:8px; display:block; animation:bounce 1s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
  .popup-title { font-family:'Baloo 2', cursive; font-size:1.5rem; font-weight:800; color:var(--gold); margin-bottom:6px; }
  .popup-msg { font-size:.88rem; color:rgba(255,255,255,.9); font-weight:600; line-height:1.5; margin-bottom:16px; }
  .popup-btn {
    padding:12px 36px; border-radius:50px; border:none; cursor:pointer;
    font-family:'Baloo 2', cursive; font-size:1rem; font-weight:800;
    background:linear-gradient(135deg, var(--saffron), var(--gold));
    color:var(--dark); box-shadow:0 4px 20px rgba(255,107,0,.5);
    transition:transform .2s, box-shadow .2s;
  }
  .popup-btn:hover { transform:scale(1.07); box-shadow:0 8px 30px rgba(255,215,0,.6); }

  /* Trophy animation */
  .trophy-spin { animation:trophySpin 2s ease-in-out infinite; display:block; }
  @keyframes trophySpin { 0%,100%{transform:rotate(-10deg) scale(1)} 50%{transform:rotate(10deg) scale(1.1)} }

  /* Stars burst */
  .stars-burst { position:absolute; inset:0; pointer-events:none; }
  .burst-star {
    position:absolute; font-size:1.2rem; animation:burstOut 1.5s ease-out infinite;
    opacity:0;
  }
  @keyframes burstOut { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:var(--tx) scale(0)} }

  /* ===== ACTIVITY 2 — SEQUENCE ===== */
  .sequence-area { flex:1; display:flex; flex-direction:column; gap:6px; overflow-y:auto; padding-right:2px; }
  .sequence-slot {
    display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:12px;
    border:2px dashed rgba(255,255,255,.25); min-height:44px; background:rgba(255,255,255,.04);
    transition:border-color .3s, background .3s;
  }
  .sequence-slot.dragover { border-color:var(--teal); background:rgba(0,191,165,.1); }
  .sequence-slot.correct { border-color:var(--green); background:rgba(19,136,8,.15); }
  .slot-number {
    font-family:'Baloo 2', cursive; font-size:1rem; font-weight:800; color:var(--gold);
    min-width:24px; text-align:center;
  }
  .slot-content { font-size:.7rem; font-weight:700; color:rgba(255,255,255,.5); }
  .seq-item-bank {
    width:180px; flex-shrink:0; display:flex; flex-direction:column; gap:5px; overflow-y:auto;
  }

  /* ===== ACTIVITY 3 — AWARDS ===== */
  .awards-zones { flex:1; display:flex; gap:6px; }
  .award-category {
    flex:1; border-radius:14px; border:2px dashed rgba(255,255,255,.3);
    padding:8px 6px; display:flex; flex-direction:column; align-items:center;
    background:rgba(255,255,255,.04); transition:border-color .3s, background .3s;
  }
  .award-category.dragover { border-color:var(--pink); background:rgba(255,64,129,.1); }
  .award-category.correct { border-color:var(--gold); background:rgba(255,215,0,.12); }
  .award-cat-title { font-size:.62rem; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:1px; text-align:center; margin-bottom:4px; }
  .award-cat-emoji { font-size:1.4rem; margin-bottom:4px; }
  .award-dropped { font-size:.62rem; font-weight:700; padding:3px 7px; border-radius:7px; margin:2px; text-align:center; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:600px) {
    .dnd-container { flex-direction:column; }
    .items-bank { width:100%; flex-direction:row; flex-wrap:wrap; justify-content:center; }
    .drag-item { font-size:.65rem; padding:5px 8px; }
    #activity-card { padding:10px 10px 8px; }
    .popup-box { padding:20px 16px 18px; }
    .seq-item-bank { width:100%; flex-direction:row; flex-wrap:wrap; }
    .awards-zones { flex-wrap:wrap; }
    .award-category { min-width:45%; }
  }
</style>
</head>
<body>

<!-- ===== STADIUM BACKGROUND ===== -->
<div id="stadium-bg" aria-hidden="true"></div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div id="header">
    <h1>🏏 Graduation Showcase — Demo Day 🏆</h1>
    <div class="subtitle">✨ Planrs Academy · Your Moment to Shine! ✨</div>
  </div>

  <div id="progress-bar">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-connector" id="con1"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-connector" id="con2"></div>
    <div class="step-dot" id="dot3">3</div>
    <div class="step-connector" id="con3"></div>
    <div class="step-dot" id="dot-final">🏆</div>
  </div>

  <div id="activity-card"><!-- filled by JS --></div>

  <div id="feedback"></div>
  <button id="check-btn" onclick="checkActivity()">✅ Check My Answers!</button>
</div>

<!-- ===== POPUP ===== -->
<div id="popup-overlay" class="hidden">
  <div class="popup-box" id="popup-box"></div>
</div>

<script>
// =====================================================================
//  STADIUM BACKGROUND BUILDER
// =====================================================================
(function buildStadium(){
  const bg = document.getElementById('stadium-bg');

  // Stars
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+1;
    Object.assign(s.style,{
      left:Math.random()*100+'%', top:Math.random()*30+'%',
      width:sz+'px', height:sz+'px',
      animationDelay:Math.random()*3+'s', animationDuration:(1.5+Math.random()*2)+'s'
    });
    bg.appendChild(s);
  }

  // Floodlights
  const lightPositions=[5,22,38,62,78,95];
  lightPositions.forEach((lp,i)=>{
    const pole=document.createElement('div');
    pole.className='floodlight';
    Object.assign(pole.style,{left:lp+'%',height:(80+Math.random()*40)+'px',top:'5%'});
    bg.appendChild(pole);

    const beam=document.createElement('div');
    beam.className='light-beam';
    Object.assign(beam.style,{
      left:(lp-2)+'%', animationDelay:(i*0.8)+'s',
      animationDirection: i%2===0?'alternate':'alternate-reverse'
    });
    bg.appendChild(beam);
  });

  // Crowd colors
  const crowdColors=[
    '#FF6B00','#FF4081','#7C3AED','#00BFA5','#0EA5E9',
    '#FFD700','#138808','#E91E63','#FF5722','#4CAF50','#2196F3'
  ];

  // Crowd rows (left + right stands)
  for(let side=0;side<2;side++){
    for(let row=0;row<4;row++){
      const crowdRow=document.createElement('div');
      crowdRow.className='crowd-row';
      const count=30;
      const topPct=30+row*5;
      const leftPct=side===0? 2 : 52;
      Object.assign(crowdRow.style,{
        top:topPct+'%', left:leftPct+'%',
        animationDelay:(row*0.3+side*0.5)+'s',
        animationDuration:(1.2+row*0.2)+'s'
      });
      for(let p=0;p<count;p++){
        const person=document.createElement('div');
        person.className='crowd-person';
        const color=crowdColors[Math.floor(Math.random()*crowdColors.length)];
        Object.assign(person.style,{
          background:color, opacity:(0.5+Math.random()*0.5),
          animationDelay:(p*0.04+row*0.1)+'s',
          animationDuration:(0.8+Math.random()*0.6)+'s'
        });
        crowdRow.appendChild(person);
      }
      bg.appendChild(crowdRow);
    }
  }

  // Cricket pitch
  const pitch=document.createElement('div'); pitch.id='pitch';
  bg.appendChild(pitch);

  // Stumps sets (both ends)
  [28,72].forEach(lp=>{
    const ss=document.createElement('div');
    ss.className='stump-set';
    ss.style.left=lp+'%';
    const heights=[40,45,40];
    heights.forEach(h=>{
      const st=document.createElement('div');
      st.className='stump'; st.style.height=h+'px';
      ss.appendChild(st);
    });
    const bail=document.createElement('div'); bail.className='bail';
    ss.appendChild(bail);
    bg.appendChild(ss);
  });

  // Indian flags
  [[3,'%',10,'%'],[92,'%',10,'%']].forEach(([l,lu,t,tu])=>{
    const pole=document.createElement('div');
    pole.className='flag-pole';
    Object.assign(pole.style,{left:l+lu, top:t+tu, height:'90px'});
    const cloth=document.createElement('div'); cloth.className='flag-cloth';
    cloth.style.top='5px';
    const stripes=[{color:'#FF9933'},{color:'#FFFFFF'},{color:'#138808'}];
    stripes.forEach((s,i)=>{
      const stripe=document.createElement('div'); stripe.className='flag-stripe';
      stripe.style.background=s.color;
      if(i===1){
        // Ashoka chakra (simple dot)
        stripe.style.display='flex'; stripe.style.alignItems='center'; stripe.style.justifyContent='center';
        stripe.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:#000080;opacity:.7;"></div>';
      }
      cloth.appendChild(stripe);
    });
    pole.appendChild(cloth);
    bg.appendChild(pole);
  });

  // Trophy in centre sky
  const trophy=document.createElement('div');
  Object.assign(trophy.style,{
    position:'absolute', top:'5%', left:'50%', transform:'translateX(-50%)',
    fontSize:'2.2rem', animation:'trophySpin 3s ease-in-out infinite', filter:'drop-shadow(0 0 12px gold)'
  });
  trophy.textContent='🏆';
  bg.appendChild(trophy);
})();

// =====================================================================
//  CONFETTI
// =====================================================================
function spawnConfetti(count=40){
  const colors=['#FF6B00','#FFD700','#138808','#FF4081','#7C3AED','#00BFA5','#0EA5E9','#FF5722'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    Object.assign(c.style,{
      left:Math.random()*100+'vw',
      background:colors[Math.floor(Math.random()*colors.length)],
      animationDuration:(2+Math.random()*4)+'s',
      animationDelay:(Math.random()*2)+'s',
      width:(6+Math.random()*8)+'px', height:(6+Math.random()*8)+'px',
      borderRadius:Math.random()>.5?'50%':'2px'
    });
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 6000);
  }
}

// =====================================================================
//  ACTIVITY DATA
// =====================================================================
const activities=[
  {
    id:1,
    title:'🎤 Activity 1 — Set Up Your Demo Board!',
    desc:'Drag each project item into the right space on the Demo Board. Get ready to showcase!',

let currentActivity=0;
let draggedId=null;
// zone→[itemId], sequence slot→itemId, award cat→[itemId]
let placements={};

// =====================================================================
//  RENDER ACTIVITY
// =====================================================================
function renderActivity(){
  const act=activities[currentActivity];
  const card=document.getElementById('activity-card');
  placements={};
  document.getElementById('feedback').textContent='';

  card.innerHTML=`
    <div class="activity-title">${act.title}</div>
    <div class="activity-desc">${act.desc}</div>
    <div class="dnd-container" id="dnd-container"></div>
  `;

  if(act.checkLogic==='zones') renderZoneActivity(act);
  else if(act.checkLogic==='sequence') renderSequenceActivity(act);
  else if(act.checkLogic==='awards') renderAwardsActivity(act);

  updateProgressDots();
}

// ─── ACTIVITY 1: Zones ───
function renderZoneActivity(act){
  const container=document.getElementById('dnd-container');

  // Items bank
  const bank=document.createElement('div'); bank.className='items-bank';
  bank.innerHTML='<div class="items-bank-title">Your Projects</div>';
  act.items.forEach(item=>{
    const el=createDragItem(item);
    bank.appendChild(el);
  });
  container.appendChild(bank);

  // Zones area
  const zonesArea=document.createElement('div'); zonesArea.className='zones-area';
  const row=document.createElement('div'); row.className='zones-row'; row.style.flexWrap='wrap';
  act.zones.forEach(zone=>{
    placements[zone.id]=[];
    const zEl=document.createElement('div');
    zEl.className='drop-zone'; zEl.id=zone.id;
    zEl.dataset.zone=zone.id;
    zEl.innerHTML=`<div class="drop-zone-label">${zone.label}</div>`;
    setupDropZone(zEl, zone.id, 'zone');
    row.appendChild(zEl);
  });
  zonesArea.appendChild(row);
  container.appendChild(zonesArea);
}

// ─── ACTIVITY 2: Sequence ───
function renderSequenceActivity(act){
  const container=document.getElementById('dnd-container');

  // Items bank
  const bank=document.createElement('div'); bank.className='seq-item-bank';
  bank.innerHTML='<div class="items-bank-title" style="white-space:nowrap;">Steps to Order</div>';
  // Shuffle
  const shuffled=[...act.items].sort(()=>Math.random()-.5);
  shuffled.forEach(item=>{
    const el=createDragItem(item);
    el.style.fontSize='.65rem'; el.style.padding='5px 8px';
    bank.appendChild(el);
  });
  container.appendChild(bank);

  // Slots
  const seqArea=document.createElement('div'); seqArea.className='sequence-area';
  for(let i=1;i<=act.slots;i++){
    placements['slot'+i]=null;
    const slot=document.createElement('div');
    slot.className='sequence-slot'; slot.id='slot'+i;
    slot.dataset.slot=i;
    slot.innerHTML=`<div class="slot-number">${i}</div><div class="slot-content" id="slot-content-${i}">Drop a step here...</div>`;
    setupDropZone(slot, 'slot'+i, 'slot');
    seqArea.appendChild(slot);
  }
  container.appendChild(seqArea);
}

// ─── ACTIVITY 3: Awards ───
function renderAwardsActivity(act){
  const container=document.getElementById('dnd-container');

  // Items bank
  const bank=document.createElement('div'); bank.className='items-bank';
  bank.innerHTML='<div class="items-bank-title">Projects</div>';
  act.items.forEach(item=>{
    const el=createDragItem(item);
    bank.appendChild(el);
  });
  container.appendChild(bank);

  // Awards categories
  const awardsArea=document.createElement('div'); awardsArea.className='awards-zones';
  act.awards.forEach(award=>{
    placements[award.id]=[];
    const catEl=document.createElement('div');
    catEl.className='award-category'; catEl.id='award-'+award.id;
    catEl.dataset.award=award.id;
    catEl.innerHTML=`<div class="award-cat-emoji">${award.emoji}</div><div class="award-cat-title">${award.label}</div>`;
    setupDropZone(catEl, award.id, 'award');
    awardsArea.appendChild(catEl);
  });
  container.appendChild(awardsArea);
}

// =====================================================================
//  DRAG ITEM FACTORY
// =====================================================================
function createDragItem(item){
  const el=document.createElement('div');
  el.className='drag-item';
  el.id='item-'+item.id;
  el.dataset.itemId=item.id;
  el.draggable=true;
  el.style.background=item.color;
  el.style.color='#fff';
  el.innerHTML=`<span class="emoji">${item.emoji}</span><span>${item.label}</span>`;

  el.addEventListener('dragstart', e=>{
    draggedId=item.id;
    setTimeout(()=>el.classList.add('dragging'),10);
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));

  // Touch support
  el.addEventListener('touchstart', handleTouchStart, {passive:true});
  el.addEventListener('touchmove', handleTouchMove, {passive:false});
  el.addEventListener('touchend', handleTouchEnd);

  return el;
}

// =====================================================================
//  DROP ZONE SETUP
// =====================================================================
function setupDropZone(el, id, type){
  el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', ()=>el.classList.remove('dragover'));
  el.addEventListener('drop', e=>{
    e.preventDefault(); el.classList.remove('dragover');
    if(!draggedId) return;
    handleDrop(draggedId, id, type, el);
    draggedId=null;
  });
}

// =====================================================================
//  HANDLE DROP
// =====================================================================
function handleDrop(itemId, targetId, type, targetEl){
  const act=activities[currentActivity];
  const itemEl=document.getElementById('item-'+itemId);
  if(!itemEl) return;
  const item=act.items.find(i=>i.id===itemId);
  if(!item) return;

  if(type==='zone'){
    if(placements[targetId].includes(itemId)) return;
    placements[targetId].push(itemId);
    itemEl.classList.add('placed');

    const dropped=document.createElement('div');
    dropped.className='dropped-item';
    dropped.style.background=item.color;
    dropped.style.color='#fff';
    dropped.innerHTML=`${item.emoji} ${item.label}`;
    targetEl.appendChild(dropped);
  }
  else if(type==='slot'){
    if(placements[targetId]) return; // slot taken
    placements[targetId]=itemId;
    itemEl.classList.add('placed');

    const contentEl=document.getElementById('slot-content-'+targetId.replace('slot',''));
    contentEl.textContent=item.emoji+' '+item.label;
    contentEl.style.color='#fff'; contentEl.style.fontWeight='700';
  }
  else if(type==='award'){
    if(placements[targetId].includes(itemId)) return;
    placements[targetId].push(itemId);
    itemEl.classList.add('placed');

    const dropped=document.createElement('div');
    dropped.className='award-dropped';
    dropped.style.background=item.color;
    dropped.style.color='#fff';
    dropped.innerHTML=`${item.emoji}<br>${item.label}`;
    targetEl.appendChild(dropped);
  }
}

// =====================================================================
//  TOUCH DRAG SUPPORT
// =====================================================================
let touchItem=null, touchClone=null, touchStartX=0, touchStartY=0;

function handleTouchStart(e){
  const item=e.currentTarget;
  touchItem=item;
  draggedId=item.dataset.itemId;
  const touch=e.touches[0];
  touchStartX=touch.clientX; touchStartY=touch.clientY;

  touchClone=item.cloneNode(true);
  const rect=item.getBoundingClientRect();
  Object.assign(touchClone.style,{
    position:'fixed', left:rect.left+'px', top:rect.top+'px',
    width:rect.width+'px', opacity:'.85', zIndex:'9999',
    pointerEvents:'none', transition:'none', transform:'scale(1.05)'
  });
  document.body.appendChild(touchClone);
}

function handleTouchMove(e){
  e.preventDefault();
  if(!touchClone) return;
  const touch=e.touches[0];
  const dx=touch.clientX-touchStartX;
  const dy=touch.clientY-touchStartY;
  const rect=touchItem.getBoundingClientRect();
  touchClone.style.left=(rect.left+dx)+'px';
  touchClone.style.top=(rect.top+dy)+'px';

  // Highlight drop zones
  document.querySelectorAll('.drop-zone, .sequence-slot, .award-category').forEach(z=>{
    const zr=z.getBoundingClientRect();
    const over=touch.clientX>zr.left&&touch.clientX<zr.right&&touch.clientY>zr.top&&touch.clientY<zr.bottom;
    z.classList.toggle('dragover', over);
  });
}

function handleTouchEnd(e){
  if(!touchClone||!draggedId) return;
  const touch=e.changedTouches[0];
  touchClone.remove(); touchClone=null;

  const zones=[...document.querySelectorAll('.drop-zone, .sequence-slot, .award-category')];
  for(const zone of zones){
    const zr=zone.getBoundingClientRect();
    if(touch.clientX>zr.left&&touch.clientX<zr.right&&touch.clientY>zr.top&&touch.clientY<zr.bottom){
      zone.classList.remove('dragover');
      const type=zone.dataset.zone?'zone':zone.dataset.slot?'slot':'award';
      const targetId=zone.dataset.zone||('slot'+zone.dataset.slot)||zone.dataset.award;
      handleDrop(draggedId, targetId, type, zone);
      break;
    }
    zone.classList.remove('dragover');
  }
  draggedId=null;
}

// =====================================================================
//  CHECK LOGIC
// =====================================================================
function checkActivity(){
  const act=activities[currentActivity];
  let correct=false;

  if(act.checkLogic==='zones'){
    let allCorrect=true;
    act.zones.forEach(zone=>{
      const placed=placements[zone.id]||[];
      const hasCorrect=zone.accepts.some(acc=>placed.includes(acc));
      // Check wrong placements too
      const hasWrong=placed.some(p=>!zone.accepts.includes(p));
      if(!hasCorrect||hasWrong) allCorrect=false;
      else document.getElementById(zone.id)?.classList.add('correct');
    });
    correct=allCorrect;
  }
  else if(act.checkLogic==='sequence'){
    let allCorrect=true;
    act.items.forEach(item=>{
      const slotId='slot'+item.correctPos;
      if(placements[slotId]!==item.id) allCorrect=false;
      else document.getElementById(slotId)?.classList.add('correct');
    });
    correct=allCorrect;
  }
  else if(act.checkLogic==='awards'){
    let allCorrect=true;
    act.items.forEach(item=>{
      const placed=placements[item.award]||[];
      if(!placed.includes(item.id)) allCorrect=false;
    });
    if(allCorrect){
      act.awards.forEach(a=>document.getElementById('award-'+a.id)?.classList.add('correct'));
    }
    correct=allCorrect;
  }

  const feedback=document.getElementById('feedback');
  if(correct){
    feedback.style.color='#FFD700';
    feedback.textContent='✅ Amazing work! You nailed it!';
    spawnConfetti(30);
    setTimeout(()=>showSuccessPopup(), 700);
  } else {
    feedback.style.color='#FF6B6B';
    feedback.textContent='🤔 Almost there! Try again — you can do it!';
    // shake
    const card=document.getElementById('activity-card');
    card.style.animation='none';
    setTimeout(()=>{card.style.animation='shake .4s ease';},10);
  }
}

    s.textContent=bstars[Math.floor(Math.random()*bstars.length)];

    const dist=80+Math.random()*60;

      left:'50%', top:'50%', '--tx':tx,
      animationDelay:(i*.15)+'s', animationDuration:'1.5s'
    });
    burst.appendChild(s);
  }
}

function showFinalPopup(){
  const overlay=document.getElementById('popup-overlay');
  const box=document.getElementById('popup-box');

  box.innerHTML=`

    <div class="popup-title" style="font-size:1.6rem;color:#FFD700;">YOU DID IT!</div>

  for(let i=0;i<16;i++){

    Object.assign(s.style,{
      left:'50%', top:'50%', '--tx':tx,
      animationDelay:(i*.1)+'s', animationDuration:'2s', animationIterationCount:'infinite'

function nextActivity(){
  document.getElementById('popup-overlay').classList.add('hidden');
  currentActivity++;
  if(currentActivity>=activities.length){
    showFinalPopup();
    updateProgressDots();
    return;
  }
  renderActivity();
}

function restartAll(){
  document.getElementById('popup-overlay').classList.add('hidden');
  currentActivity=0;
  renderActivity();
}

// =====================================================================
//  PROGRESS DOTS
// =====================================================================
function updateProgressDots(){
  for(let i=1;i<=3;i++){
    const dot=document.getElementById('dot'+i);
    const con=document.getElementById('con'+i);
    dot.classList.remove('active','done');
    con?.classList.remove('done');
    if(i-1<currentActivity){ dot.classList.add('done'); con?.classList.add('done'); }
    else if(i-1===currentActivity) dot.classList.add('active');
  }
  const dotFinal=document.getElementById('dot-final');
  dotFinal.classList.remove('active','done');
  if(currentActivity>=activities.length) dotFinal.classList.add('active');
}

// =====================================================================
//  SHAKE KEYFRAME (injected)
// =====================================================================
const shakeStyle=document.createElement('style');
shakeStyle.textContent=`
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
`;
document.head.appendChild(shakeStyle);

// =====================================================================
//  INIT
// =====================================================================
renderActivity();
// Ambient confetti on load
setTimeout(()=>spawnConfetti(20), 800);
</script>
