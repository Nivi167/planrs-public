<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAKE YOUR OWN PAPER!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky1: #ffd6f0;
  --sky2: #d6eaff;
  --sky3: #ffe8b0;
  --pink: #ff7eb3;
  --lavender: #c084fc;
  --mint: #34d399;
  --yellow: #fbbf24;
  --peach: #fb923c;
  --blue: #60a5fa;
  --white: #ffffff;
  --soft-shadow: 0 4px 24px rgba(192,132,252,0.18);
  --card-bg: rgba(255,255,255,0.72);
  --border-r: rgba(255,255,255,0.9);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #ffd6f0 0%, #e0d4ff 35%, #d6eaff 65%, #fffbe8 100%);
  user-select: none;
  cursor: default;
}

/* ── ANIMATED BG LAYER ── */
#bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}

/* Rainbow arc */
.rainbow {
  position: absolute;
  width: 900px; height: 450px;
  left: 50%; bottom: -120px;
  transform: translateX(-50%);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  background: conic-gradient(from 180deg at 50% 100%,
    #ff6b6b, #ff9f43, #ffd700, #6bcb77, #4d96ff, #c77dff, #ff6b6b);
  opacity: 0.08;
  animation: rainbowBreath 8s ease-in-out infinite;
}
@keyframes rainbowBreath { 0%,100%{opacity:0.06} 50%{opacity:0.13} }

/* Clouds */
.cloud {
  position: absolute;
  border-radius: 60px;
  background: white;
  opacity: 0.75;
  animation: cloudDrift linear infinite;
  filter: blur(0.5px);
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
@keyframes cloudDrift {
  0% { transform: translateX(-200px); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

/* Stars / sparkles */
.sparkle {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--yellow);
  clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation: sparkleTwinkle ease-in-out infinite;
  opacity: 0;
}
@keyframes sparkleTwinkle {
  0%,100%{opacity:0;transform:scale(0.5) rotate(0deg)}
  40%{opacity:1;transform:scale(1.2) rotate(20deg)}
  60%{opacity:0.8;transform:scale(1) rotate(-10deg)}
}

/* Floating hearts */
.floatheart {
  position: absolute;
  font-size: 14px;
  opacity: 0;
  animation: heartFloat linear infinite;
}
@keyframes heartFloat {
  0%{opacity:0;transform:translateY(0) scale(0.6)}
  20%{opacity:0.9}
  80%{opacity:0.6}
  100%{opacity:0;transform:translateY(-80px) scale(1)}
}

/* Unicorn SVG mascot */
.unicorn-wrap {
  position: absolute;
  animation: unicornBob ease-in-out infinite;
}
@keyframes unicornBob {
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}

/* ── MAIN APP ── */
#app {
  position: relative; z-index: 10;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 10px 16px 8px;
  gap: 8px;
}

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  text-align: center;
}
.header h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(22px, 3.5vw, 38px);
  letter-spacing: 1px;
  background: linear-gradient(90deg, #ff7eb3, #c084fc, #60a5fa, #34d399, #fbbf24);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: rainbowText 5s linear infinite;
  line-height: 1.1;
  filter: drop-shadow(0 2px 6px rgba(192,132,252,0.25));
}
@keyframes rainbowText { to{background-position:200% center} }
.header-sub {
  font-size: 12px; font-weight: 700;
  color: var(--lavender); letter-spacing: 2px;
  text-transform: uppercase; margin-top: 2px;
  opacity: 0.85;
}
.header-deco {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 4px;
}
.header-deco-line {
  height: 2px; flex: 1; max-width: 180px;
  background: linear-gradient(90deg, transparent, var(--lavender), transparent);
  border-radius: 2px; opacity: 0.5;
}

/* ── PROGRESS STEPS ── */
.steps-bar {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.step-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 20px;
  font-family: 'Fredoka One', cursive;
  font-size: 13px; letter-spacing: 0.5px;
  background: rgba(255,255,255,0.5);
  border: 2px solid rgba(255,255,255,0.8);
  color: #b0a0c8;
  transition: all 0.5s cubic-bezier(.34,1.56,.64,1);
}
.step-pill.active {
  background: linear-gradient(135deg, #ffd6f0, #e0d4ff);
  border-color: var(--lavender);
  color: var(--lavender);
  box-shadow: 0 4px 16px rgba(192,132,252,0.3);
}
.step-pill.done {
  background: linear-gradient(135deg, #d4f5e8, #a7f3d0);
  border-color: var(--mint);
  color: var(--mint);
  box-shadow: 0 4px 12px rgba(52,211,153,0.25);
}
.step-dot {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900;
  background: rgba(255,255,255,0.6);
}
.step-conn {
  width: 28px; height: 2px;
  background: rgba(192,132,252,0.2); border-radius: 2px;
  transition: background 0.5s;
}
.step-conn.filled { background: var(--mint); }

/* ── MAIN CARD ── */
.main-card {
  flex: 1; width: 100%; max-width: 980px;
  background: var(--card-bg);
  border-radius: 28px;
  border: 2.5px solid var(--border-r);
  box-shadow: var(--soft-shadow), inset 0 0 0 1px rgba(255,255,255,0.5);
  display: flex; flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(12px);
  min-height: 0;
  transition: opacity 0.3s, transform 0.3s;
}
.main-card.fade-out { opacity: 0; transform: scale(0.97) translateY(8px); }
.main-card.fade-in { animation: cardFadeIn 0.5s cubic-bezier(.34,1.2,.64,1); }
@keyframes cardFadeIn { from{opacity:0;transform:scale(0.96) translateY(10px)} to{opacity:1;transform:none} }

.card-header {
  padding: 10px 20px 8px;
  background: linear-gradient(90deg, rgba(255,214,240,0.6), rgba(224,212,255,0.6), rgba(214,234,255,0.6));
  border-bottom: 2px solid rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.card-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(14px, 1.8vw, 20px);
  color: #7c5cbf;
  letter-spacing: 0.5px;
}
.card-emoji { font-size: 20px; }

.card-body {
  flex: 1; display: flex; gap: 12px;
  padding: 12px 14px;
  overflow: hidden; min-height: 0;
}

/* ── LEFT: ITEMS POOL ── */
.items-column {
  width: 175px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 0;
}
.items-pool-label {
  font-size: 10px; font-weight: 800; letter-spacing: 2px;
  color: var(--lavender); text-transform: uppercase;
  margin-bottom: 8px;
}
.items-pool {
  flex: 1; display: flex; flex-direction: column; gap: 7px;
  overflow-y: auto; padding-right: 2px;
}
.items-pool::-webkit-scrollbar { width: 3px; }
.items-pool::-webkit-scrollbar-thumb { background: var(--lavender); border-radius: 3px; }

.drag-item {
  padding: 8px 12px;
  border-radius: 16px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(11px, 1.1vw, 13px);
  font-weight: 700;
  cursor: grab;
  border: 2.5px solid;
  display: flex; align-items: center; gap: 7px;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
  animation: itemWobble 4s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.drag-item::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent);
  pointer-events: none; border-radius: inherit;
}
.drag-item:nth-child(even) { animation-delay: -2s; }
.drag-item:nth-child(3n) { animation-delay: -1s; }
@keyframes itemWobble {
  0%,100%{transform:rotate(-1deg) translateY(0)}
  50%{transform:rotate(1deg) translateY(-2px)}
}
.drag-item:hover {
  transform: scale(1.05) rotate(0deg) !important;
  box-shadow: 0 6px 20px rgba(192,132,252,0.3);
}
.drag-item.dragging { opacity: 0.35; transform: scale(0.93); }
.drag-item.used { opacity: 0.18; pointer-events: none; }

/* Item colors */
.item-pink   { background:#fff0f7; border-color:#ffb3d1; color:#d6547a; }
.item-purple { background:#f5f0ff; border-color:#c4a8f5; color:#7c5cbf; }
.item-blue   { background:#f0f7ff; border-color:#93c5fd; color:#3b82f6; }
.item-green  { background:#f0fff8; border-color:#6ee7b7; color:#059669; }
.item-yellow { background:#fffbf0; border-color:#fcd34d; color:#d97706; }
.item-peach  { background:#fff7f0; border-color:#fdba74; color:#ea580c; }

/* ── RIGHT: ACTIVITY AREA ── */
.activity-area {
  flex: 1; display: flex; flex-direction: column; gap: 10px;
  overflow-y: auto; min-height: 0;
}
.activity-area::-webkit-scrollbar { width: 3px; }
.activity-area::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 3px; }

/* Instruction */
.instruction-banner {
  background: linear-gradient(90deg, rgba(255,214,240,0.7), rgba(224,212,255,0.7));
  border: 2px solid rgba(255,255,255,0.85);
  border-radius: 16px;
  padding: 8px 14px;
  font-size: clamp(11px, 1.15vw, 13px);
  font-weight: 700;
  color: #7c5cbf;
  display: flex; align-items: flex-start; gap: 8px;
  flex-shrink: 0;
}
.instr-icon { font-size: 18px; flex-shrink: 0; }

/* Scene containers */
.scene {
  background: linear-gradient(160deg, rgba(255,250,255,0.8), rgba(245,240,255,0.6));
  border: 2.5px solid rgba(255,255,255,0.9);
  border-radius: 22px;
  padding: 12px 16px;
  position: relative;
  box-shadow: 0 2px 16px rgba(192,132,252,0.1);
}
.scene-label {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(11px, 1.2vw, 14px);
  color: var(--lavender);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.scene-label-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--lavender);
  box-shadow: 0 0 8px var(--lavender);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

/* Drop zones */
.drop-zone {
  border: 2.5px dashed rgba(192,132,252,0.4);
  border-radius: 14px;
  background: rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(124,92,191,0.4);
  transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
  position: relative; overflow: hidden;
  min-height: 36px;
}
.drop-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(192,132,252,0.06) 50%, transparent 100%);
  transform: translateX(-100%);
  animation: zoneSweep 3s linear infinite;
}
@keyframes zoneSweep { to{transform:translateX(200%)} }
.drop-zone.drag-over {
  border-color: var(--lavender);
  background: rgba(192,132,252,0.12);
  transform: scale(1.02);
  box-shadow: 0 0 16px rgba(192,132,252,0.3);
}
.drop-zone.filled {
  border-style: solid;
  border-color: var(--mint);
  background: rgba(52,211,153,0.1);
  box-shadow: 0 0 12px rgba(52,211,153,0.25);
  color: #059669;
}
.drop-zone.filled::before { display: none; }
.drop-zone.wrong {
  animation: wrongBounce 0.4s ease;
  border-color: var(--pink) !important;
}
@keyframes wrongBounce {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}

/* Activity 1 special — water bucket scene */
.bucket-scene {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.bucket-visual {
  width: 140px; height: 100px;
  position: relative; display: flex; align-items: flex-end; justify-content: center;
}
.bucket-body {
  width: 120px; height: 85px;
  background: linear-gradient(160deg, #bde0fe, #93c5fd);
  border-radius: 8px 8px 20px 20px;
  border: 3px solid #60a5fa;
  position: relative; overflow: hidden;
  box-shadow: inset 0 10px 20px rgba(255,255,255,0.4);
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
}
.water-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(96,165,250,0.6), rgba(147,197,253,0.3));
  transition: height 0.6s ease;
  height: 40%;
}
.water-ripple {
  position: absolute; top: 0; left: 0; right: 0; height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: ripple 2s ease-in-out infinite;
}
@keyframes ripple { 0%,100%{transform:scaleX(0.8)} 50%{transform:scaleX(1.05)} }
.paper-bits-in-bucket {
  position: absolute; bottom: 8px;
  display: flex; flex-wrap: wrap; gap: 3px;
  width: 80%; justify-content: center;
}
.paper-bit-bucket {
  width: 14px; height: 10px;
  border-radius: 3px;
  opacity: 0.85;
}
.drop-target-bucket {
  position: absolute; inset: 0; z-index: 5;
}

/* Pulp zones row */
.pulp-drop-row {
  display: flex; gap: 10px; flex-wrap: wrap;
}

/* Activity 2 — mesh frame */
.mesh-scene {
  display: flex; gap: 14px; align-items: flex-start;
}
.mesh-frame {
  width: 220px; flex-shrink: 0;
  aspect-ratio: 4/3;
  border: 4px solid #8b5cf6;
  border-radius: 12px;
  background: repeating-linear-gradient(
    0deg, rgba(192,132,252,0.15) 0px, rgba(192,132,252,0.15) 1px, transparent 1px, transparent 12px
  ),
  repeating-linear-gradient(
    90deg, rgba(192,132,252,0.15) 0px, rgba(192,132,252,0.15) 1px, transparent 1px, transparent 12px
  );
  box-shadow: 0 4px 18px rgba(139,92,246,0.2);
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0;
}
.mesh-slot {
  border: 1.5px dashed rgba(192,132,252,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(124,92,191,0.35); font-weight: 700;
  transition: all 0.3s; position: relative;
}
.mesh-slot.drag-over {
  background: rgba(192,132,252,0.18);
  border-color: var(--lavender);
}
.mesh-slot.filled {
  background: rgba(251,191,36,0.15);
  border-color: var(--yellow);
  border-style: solid;
}
.pulp-blob {
  width: 70%; height: 70%;
  border-radius: 40% 60% 50% 70% / 60% 40% 70% 50%;
  background: linear-gradient(135deg, #fef3c7, #fde68a, #d4a855);
  box-shadow: 0 2px 8px rgba(212,168,85,0.3);
  animation: blobWobble 3s ease-in-out infinite;
}
@keyframes blobWobble {
  0%,100%{border-radius:40% 60% 50% 70% / 60% 40% 70% 50%}
  50%{border-radius:60% 40% 70% 50% / 40% 60% 50% 70%}
}
.mesh-instructions {
  flex: 1; display: flex; flex-direction: column; gap: 8px;
}

/* Activity 3 — step sequence */
.steps-sequence { display: flex; flex-direction: column; gap: 8px; }
.step-slot {
  display: flex; align-items: center; gap: 10px;
}
.step-number {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #ffd6f0, #e0d4ff);
  border: 2px solid var(--lavender);
  font-family: 'Fredoka One', cursive;
  font-size: 14px; color: var(--lavender);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(192,132,252,0.2);
}
.step-drop {
  flex: 1; height: 38px;
  min-width: 160px;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  border-top: 2px solid rgba(255,255,255,0.7);
  background: linear-gradient(90deg, rgba(255,214,240,0.4), rgba(224,212,255,0.4));
  flex-shrink: 0;
}
.stars-display {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Fredoka One', cursive;
  font-size: 14px; color: var(--lavender);
}
.star-count {
  font-size: 20px; color: var(--yellow);
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.4));
}
.check-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 14px; letter-spacing: 0.5px;
  padding: 9px 26px; border-radius: 20px;
  background: linear-gradient(135deg, #ffd6f0, #e0d4ff, #d6eaff);
  border: 2.5px solid var(--lavender);
  color: #7c5cbf;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 16px rgba(192,132,252,0.25);
  position: relative; overflow: hidden;
}
.check-btn::after {
  content: '';
  position: absolute; top:-50%; left:-60%;
  width: 40%; height: 200%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-20deg);
  transition: left 0.5s;
}
.check-btn:hover::after { left: 160%; }
.check-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 6px 24px rgba(192,132,252,0.4);
}
.check-btn:disabled {
  opacity: 0.45; cursor: not-allowed; transform: none;
  box-shadow: 0 2px 8px rgba(192,132,252,0.1);
}

/* ── POPUP ── */
.popup-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(200,180,255,0.25);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
.popup-overlay.show { opacity: 1; pointer-events: all; }
.popup {
  background: linear-gradient(155deg, #fff9ff, #f5f0ff, #f0f9ff);
  border: 3px solid rgba(255,255,255,0.95);
  border-radius: 28px;
  padding: 28px 32px 24px;
  max-width: 460px; width: 92%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(192,132,252,0.25), inset 0 0 0 1px rgba(255,255,255,0.8);
  transform: scale(0.82) translateY(20px);
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  position: relative; overflow: hidden;
}
.popup::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(255,182,229,0.25), transparent 55%);
  pointer-events: none;
}
.popup-overlay.show .popup { transform: scale(1) translateY(0); }
.popup-emoji { font-size: 52px; display: block; animation: emojiBounce 0.8s cubic-bezier(.34,1.56,.64,1); margin-bottom: 8px; }
@keyframes emojiBounce { from{transform:scale(0) rotate(-30deg)} to{transform:scale(1) rotate(0)} }
.popup h2 {
  font-family: 'Fredoka One', cursive;
  font-size: 24px; letter-spacing: 0.5px;
  background: linear-gradient(90deg, #ff7eb3, #c084fc, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.popup p { font-size: 14px; font-weight: 600; color: #6b5b9e; line-height: 1.7; margin-bottom: 16px; }
.popup-fact {
  background: linear-gradient(90deg, rgba(255,214,240,0.6), rgba(224,212,255,0.6));
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 14px; padding: 10px 14px;
  font-size: 12px; font-weight: 700; color: #7c5cbf;
  margin-bottom: 16px; line-height: 1.6;
}
.popup-next {
  font-family: 'Fredoka One', cursive;
  font-size: 15px; padding: 11px 32px;
  border-radius: 22px;
  background: linear-gradient(135deg, #ffd6f0, #e0d4ff, #d6eaff);
  border: 2.5px solid var(--lavender);
  color: #7c5cbf;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 18px rgba(192,132,252,0.3);
}
.popup-next:hover { transform: scale(1.07); box-shadow: 0 8px 28px rgba(192,132,252,0.4); }

/* Final popup */
.badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
.badge {
  padding: 5px 14px; border-radius: 18px;
  font-size: 12px; font-weight: 800;
  border: 2px solid; letter-spacing: 0.3px;
}

// EVENTS
// ════════════════════════════════════════
function setupEvents() {
  document.querySelectorAll('.drag-item').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('touchstart', onTouchStart, {passive:true});
    el.addEventListener('touchmove', onTouchMove, {passive:false});
    el.addEventListener('touchend', onTouchEnd);
  });

  document.querySelectorAll('.drop-zone').forEach(z => {
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag-over'); });
    z.addEventListener('dragleave', () => z.classList.remove('drag-over'));
    z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('drag-over'); onDrop(z); });
  });
}

function onTouchStart(e) {
  const el = e.currentTarget;
  dragId = el.dataset.id;
  touchDragEl = el;
  const t = e.touches[0];
  const r = el.getBoundingClientRect();
  touchOffX = t.clientX - r.left;
  touchOffY = t.clientY - r.top;
  touchClone = el.cloneNode(true);
  touchClone.style.cssText = `position:fixed;opacity:0.88;pointer-events:none;z-index:9999;width:${r.width}px;left:${t.clientX-touchOffX}px;top:${t.clientY-touchOffY}px;transform:scale(1.08);transition:none`;
  document.body.appendChild(touchClone);
  el.style.opacity = '0.25';
}
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (touchClone) { touchClone.style.left=(t.clientX-touchOffX)+'px'; touchClone.style.top=(t.clientY-touchOffY)+'px'; }
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('drop-zone')) el.classList.add('drag-over');
}
function onTouchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  if (touchDragEl) { touchDragEl.style.opacity = ''; touchDragEl = null; }
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (el && el.classList.contains('drop-zone')) onDrop(el);
}

function onDrop(zone) {
  if (!dragId) return;
  const zid = zone.dataset.id;
  if (!zid) return; // bucket catch-all handled below
  const correct = zone.dataset.correct;

  // Return any prev item
  if (zoneMap[zid]) {
    const prev = document.getElementById('item-'+zoneMap[zid]);
    if (prev) prev.classList.remove('used');
    usedSet.delete(zoneMap[zid]);
  }

  const a = ACTIVITIES[act];
  const item = a.items.find(i => i.id === dragId);
  if (!item) return;

  zoneMap[zid] = dragId;
  usedSet.add(dragId);
  zone.textContent = item.label;
  zone.classList.add('filled');

  const el = document.getElementById('item-'+dragId);
  if (el) el.classList.add('used');
  dragId = null;

  updateFillFeedback();
  updateCheckBtn();
}

function updateFillFeedback() {
  const a = ACTIVITIES[act];
  const filled = Object.keys(zoneMap).length;
  const total = a.zones.length;
  const pct = filled / total;

  // Act 1 visual feedback
  if (act === 0) {
    const wf = document.getElementById('water-fill');
    if (wf) wf.style.height = Math.min(30 + pct*55, 85) + '%';
    const bits = document.getElementById('bits-in-bucket');
    if (bits) {
      bits.innerHTML = '';
      const colors = ['#93c5fd','#c4b5fd','#6ee7b7','#fca5a5','#fde68a','#f9a8d4'];
      for (let i = 0; i < Math.ceil(filled*3); i++) {
        const d = document.createElement('div');
        d.style.cssText = `width:${8+Math.random()*10|0}px;height:${6+Math.random()*6|0}px;border-radius:3px;background:${colors[i%colors.length]};opacity:0.75;transform:rotate(${(Math.random()-0.5)*40}deg)`;
        bits.appendChild(d);
      }
    }
    const tp = document.getElementById('transform-prev');
    if (tp) {
      if (filled === total) { tp.textContent = '🎉 Gudda (pulp) is ready! It\'s nice and mushy!'; tp.classList.add('active'); }
      else if (pct > 0.5) { tp.textContent = `💧 Getting mushier... ${filled}/${total} papers added!`; }
    }
  }

  // Act 2 feedback
  if (act === 1) {
    const tp = document.getElementById('transform-prev');
    if (tp) {
      if (filled === total) { tp.textContent = '✅ Perfect! The sheet is evenly spread!'; tp.classList.add('active'); }
      else { tp.textContent = `🟡 ${filled}/${total} corners filled — keep going!`; }
    }
  }

  // Act 3 visuals
  if (act === 2) {
    const vizMap = [0,1,1,2,2,3];
    for (let i = 0; i < filled; i++) {
      const vi = Math.min(vizMap[i], 3);
      const pviz = document.getElementById('pviz-'+vi);
      if (pviz) pviz.style.opacity = '1';
    }
  }
}

function updateCheckBtn() {
  const a = ACTIVITIES[act];
  const btn = document.getElementById('check-btn');
  if (btn) btn.disabled = Object.keys(zoneMap).length < a.zones.length;
}

// ════════════════════════════════════════
// CHECK ANSWERS
// ════════════════════════════════════════
function checkAnswers() {
  const a = ACTIVITIES[act];
  let wrong = 0;

  a.zones.forEach(z => {
    const zone = document.getElementById('zone-'+z.id);
    if (!zone) return;
    const placed = zoneMap[z.id];
    if (placed === z.correct) {
      zone.style.borderColor = 'var(--mint)';
      zone.style.boxShadow = '0 0 12px rgba(52,211,153,0.35)';
    } else {
      wrong++;
      zone.style.borderColor = 'var(--pink)';
      zone.classList.add('wrong');
      zone.textContent = z.hint;
      zone.classList.remove('filled');
      if (placed) {
        const el = document.getElementById('item-'+placed);
        if (el) el.classList.remove('used');
        usedSet.delete(placed);
        delete zoneMap[z.id];
      }
      setTimeout(() => { zone.classList.remove('wrong'); zone.style.borderColor=''; zone.style.boxShadow=''; }, 600);
    }
  });

  if (wrong > 0) {
    showToast(`Oops! ${wrong} spot${wrong>1?'s':''} need a retry! Try again! 🌸`, true);
    updateCheckBtn();
    return;
  }

  stars += a.zones.length * 5;
  spawnStarBurst();
  setTimeout(() => showPopup(a), 450);
}

// ════════════════════════════════════════
// POPUP
// ════════════════════════════════════════
function showPopup(a) {
  const ol = document.getElementById('popup-overlay');
  const pc = document.getElementById('popup');
  ol.className = 'popup-overlay';

  pc.innerHTML = `
    <span class="popup-emoji">${a.isFinal ? '🏆' : '🌟'}</span>
    <h2>${a.successTitle}</h2>
    <p>${a.successMsg}</p>
    <div class="popup-fact">${a.successFact}</div>
    <button class="popup-next" onclick="${a.isFinal ? 'showFinalPopup()' : 'nextActivity()'}">${a.nextLabel}</button>
  `;

  requestAnimationFrame(() => ol.classList.add('show'));
}

function nextActivity() {
  closePopup();
  act++;
  updateStepBar();
  setTimeout(render, 300);
}

function showFinalPopup() {
  closePopup();
  setTimeout(() => {
    const ol = document.getElementById('popup-overlay');
    const pc = document.getElementById('popup');
    ol.className = 'popup-overlay';
    pc.innerHTML = `
      <span class="popup-emoji">🦄</span>
      <h2>YOU'RE A PAPER WIZARD! 🎊</h2>
      <p>You turned old Raddi into brand new paper — you're a recycling superstar! Remember: every time you recycle paper, you save a tree!</p>
      <div class="badge-row">
        <span class="badge badge-gold">⭐ ${stars} Stars</span>
        <span class="badge badge-pink">♻️ Eco Hero</span>
        <span class="badge badge-green">🌳 Tree Saver</span>
      </div>
      <div class="popup-fact">🌈 Next time you have old notebooks or newspapers, YOU know how to make brand new paper! Science is splashy — and you are BRILLIANT! ✨</div>
      <button class="popup-next" onclick="restartAll()" style="border-color:var(--yellow);color:#d97706">🔄 Play Again!</button>
    `;
    launchConfetti();
    requestAnimationFrame(() => ol.classList.add('show'));
  }, 300);
}

function closePopup() {
  const ol = document.getElementById('popup-overlay');
  ol.classList.remove('show');
}

function restartAll() {
  closePopup(); act = 0; stars = 0;
  updateStepBar();
  setTimeout(render, 300);
}

// ════════════════════════════════════════
// STEP BAR
// ════════════════════════════════════════
function updateStepBar() {
  for (let i = 1; i <= 3; i++) {
    const sp = document.getElementById('sp'+i);
    sp.classList.remove('active','done');
    if (i-1 < act) sp.classList.add('done');
    else if (i-1 === act) sp.classList.add('active');
  }
  document.getElementById('sc1').className = 'step-conn' + (act > 0 ? ' filled' : '');
  document.getElementById('sc2').className = 'step-conn' + (act > 1 ? ' filled' : '');
}

// ════════════════════════════════════════
// VFX
// ════════════════════════════════════════
function showToast(msg, wrong) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (wrong?' wrong':'') + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function spawnStarBurst() {
  const emojis = ['⭐','🌟','💫','✨','🌸','🎉'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.style.cssText = `position:fixed;left:${15+Math.random()*70}vw;top:${15+Math.random()*70}vh;font-size:${16+Math.random()*16}px;z-index:150;pointer-events:none;animation:emojiBounce 0.9s ${i*0.07}s ease-out forwards;opacity:0`;
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    // inline anim
    s.style.animation = 'none';
    s.style.opacity = '1';
    document.body.appendChild(s);
    let start = null;
    function frame(ts) {
      if (!start) start = ts;
      const p = (ts-start)/900;
      if (p < 1) {
        s.style.transform = `translateY(${-p*50}px) scale(${1+Math.sin(p*Math.PI)*0.4})`;
        s.style.opacity = String(1-p*0.8);
        requestAnimationFrame(frame);
      } else s.remove();
    }
    setTimeout(() => requestAnimationFrame(frame), i*70);
  }
}

function launchConfetti() {
  const colors = ['#ff7eb3','#c084fc','#60a5fa','#34d399','#fbbf24','#fb923c'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    const sz = 6 + Math.random()*8;
    c.style.cssText = `
      left:${Math.random()*100}vw; top:0;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${sz}px; height:${sz}px;
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4500);
  }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
render();
</script>
