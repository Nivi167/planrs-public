<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Water Cycle in a Bag — PLANRS Academy</title>
<style>
/* ═══════════════════════════════════════════════════
   FONTS & RESET
═══════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif}

/* ═══════════════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════════════ */
:root{
  --jungle-deep:#0d3b1e;
  --jungle-mid:#1a5c32;
  --jungle-light:#2d8a50;
  --leaf-bright:#52c47a;
  --leaf-gold:#a8e063;
  --sky-top:#1a6fa8;
  --sky-mid:#2994d4;
  --sky-low:#87ceeb;
  --water-blue:#3aa8e0;
  --water-dark:#1a6fa8;
  --sun-gold:#ffd700;
  --sun-orange:#ff9d00;
  --drop-color:#60d4f5;
  --accent-coral:#ff6b6b;
  --accent-yellow:#ffe066;
  --white:#ffffff;
  --text-dark:#1a3320;
  --success-green:#27ae60;
  --popup-bg:rgba(10,30,15,0.82);
  --r:12px;
}

/* ═══════════════════════════════════════════════════
   BACKGROUND SCENE
═══════════════════════════════════════════════════ */
#scene{
  position:fixed;inset:0;
  background:linear-gradient(180deg,
    #1a6fa8 0%,#2994d4 30%,#87ceeb 55%,
    #2d8a50 55%,#1a5c32 75%,#0d3b1e 100%);
  overflow:hidden;
}

/* Sky layer */
.sky-glow{
  position:absolute;top:0;left:0;right:0;height:55%;
  background:radial-gradient(ellipse 60% 60% at 80% 20%,
    rgba(255,215,0,.18) 0%,transparent 70%);
}

/* ── ANIMATED SUN ── */
#bg-sun{
  position:absolute;top:6%;right:12%;
  width:clamp(54px,7vw,90px);height:clamp(54px,7vw,90px);
  border-radius:50%;
  background:radial-gradient(circle,#fff9c4 0%,#ffd700 45%,#ff9d00 100%);
  box-shadow:0 0 30px 12px rgba(255,215,0,.45),0 0 60px 30px rgba(255,160,0,.2);
  animation:sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse{0%,100%{box-shadow:0 0 30px 12px rgba(255,215,0,.45),0 0 60px 30px rgba(255,160,0,.2)}
  50%{box-shadow:0 0 45px 20px rgba(255,215,0,.6),0 0 90px 45px rgba(255,160,0,.3)}}

/* ── CLOUDS ── */
.cloud{
  position:absolute;border-radius:50px;
  background:rgba(255,255,255,.82);
  animation:cloudDrift linear infinite;
}
.cloud::before,.cloud::after{
  content:'';position:absolute;border-radius:50%;
  background:inherit;
}
.c1{width:110px;height:38px;top:8%;left:-130px;animation-duration:28s;animation-delay:0s}
.c1::before{width:55px;height:55px;top:-28px;left:18px}
.c1::after{width:40px;height:40px;top:-18px;left:55px}
.c2{width:80px;height:28px;top:16%;left:-100px;animation-duration:22s;animation-delay:-8s;opacity:.7}
.c2::before{width:40px;height:40px;top:-20px;left:14px}
.c3{width:140px;height:45px;top:4%;left:-170px;animation-duration:34s;animation-delay:-15s;opacity:.85}
.c3::before{width:65px;height:65px;top:-35px;left:22px}
.c3::after{width:50px;height:50px;top:-25px;left:72px}
.c4{width:90px;height:32px;top:22%;left:-110px;animation-duration:26s;animation-delay:-20s;opacity:.65}
.c4::before{width:48px;height:48px;top:-24px;left:16px}
@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 200px))}}

/* ── RAIN DROPS ── */
.rain-layer{position:absolute;inset:0;pointer-events:none}
.rdrop{
  position:absolute;top:-20px;
  width:2px;border-radius:2px;
  background:linear-gradient(180deg,transparent,rgba(96,212,245,.7));
  animation:rainFall linear infinite;
}
@keyframes rainFall{
  0%{transform:translateY(-20px);opacity:0}
  10%{opacity:1}
  90%{opacity:.7}
  100%{transform:translateY(110vh);opacity:0}
}

/* ── JUNGLE TREES (SVG-based polygons) ── */
.tree-layer{position:absolute;bottom:0;left:0;right:0;height:55%;pointer-events:none}
.tree{position:absolute;bottom:0}
.tree-trunk{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  background:linear-gradient(90deg,#5c3317,#7a4520);border-radius:4px}
.tree-crown{position:absolute;border-left:solid transparent;border-right:solid transparent;border-bottom:solid;left:50%;transform:translateX(-50%)}

/* ── VINES ── */
.vine{
  position:absolute;
  width:3px;
  background:linear-gradient(180deg,var(--jungle-light),var(--jungle-deep));
  border-radius:2px;
  transform-origin:top center;
  animation:vineSway ease-in-out infinite alternate;
}
.vine::after{
  content:'🍃';position:absolute;
  font-size:1.2rem;
  animation:leafSpin 3s ease-in-out infinite alternate;
}
@keyframes vineSway{0%{transform:rotate(-6deg)}100%{transform:rotate(6deg)}}
@keyframes leafSpin{0%{transform:rotate(-10deg) scale(1)}100%{transform:rotate(10deg) scale(1.1)}}

/* ── BUTTERFLIES ── */
.butterfly{
  position:absolute;font-size:1.6rem;
  animation:bflyFloat linear infinite;
  pointer-events:none;
}
@keyframes bflyFloat{
  0%{left:-60px;top:var(--bt);transform:translateY(0) scaleX(1)}
  25%{transform:translateY(-20px) scaleX(1)}
  50%{transform:translateY(5px) scaleX(-1)}
  75%{transform:translateY(-15px) scaleX(-1)}
  100%{left:calc(100vw + 60px);top:calc(var(--bt) + 30px);transform:translateY(0) scaleX(1)}
}

/* ── PARROTS ── */
.parrot{
  position:absolute;font-size:1.8rem;
  animation:parrotFly linear infinite;
  pointer-events:none;
}
@keyframes parrotFly{
  0%{right:-60px;transform:scaleX(-1) translateY(0)}
  30%{transform:scaleX(-1) translateY(-25px)}
  60%{transform:scaleX(-1) translateY(10px)}
  100%{right:calc(100vw + 60px);transform:scaleX(-1) translateY(-10px)}
}

/* ── FLOATING LEAVES ── */
.falling-leaf{
  position:absolute;top:-30px;font-size:1.2rem;
  animation:leafFall linear infinite;
  pointer-events:none;
}
@keyframes leafFall{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ═══════════════════════════════════════════════════
   MAIN UI FRAME
═══════════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(8px,1.5vh,16px) clamp(8px,2vw,20px);
  z-index:10;
}

/* ── HEADER ── */
#header{
  width:100%;max-width:900px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:clamp(4px,1vh,10px);
}
#logo{
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(10px,1.3vw,14px);
  color:rgba(255,255,255,.7);letter-spacing:.05em;
}
#main-title{
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(18px,3.5vw,36px);
  color:#ffffff;
  text-shadow:0 2px 8px rgba(0,0,0,.5),0 0 20px rgba(255,215,0,.4);
  text-align:center;line-height:1.1;
}
.title-drop{display:inline-block;animation:titleBounce 2s ease-in-out infinite alternate}
.title-drop:nth-child(2){animation-delay:.2s}
.title-drop:nth-child(3){animation-delay:.4s}
@keyframes titleBounce{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}
#step-counter{
  font-size:clamp(10px,1.3vw,13px);
  color:rgba(255,255,255,.75);
  background:rgba(255,255,255,.12);
  padding:4px 12px;border-radius:20px;
  backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);
  white-space:nowrap;
}

/* ── ACTIVITY CARD ── */
#card{
  width:100%;max-width:900px;flex:1;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(14px);
  border:2px solid rgba(255,255,255,.28);
  border-radius:20px;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.35);
  min-height:0;
}

.card-header{
  background:linear-gradient(135deg,rgba(10,50,25,.7),rgba(26,95,50,.5));
  padding:clamp(6px,1.2vh,12px) clamp(12px,2vw,22px);
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.15);
}
.act-badge{
  background:linear-gradient(135deg,var(--sun-gold),var(--sun-orange));
  color:var(--text-dark);font-weight:900;
  font-size:clamp(10px,1.5vw,14px);
  padding:4px 12px;border-radius:20px;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.act-title{
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(14px,2.2vw,22px);
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.act-instruction{
  font-size:clamp(11px,1.4vw,14px);
  color:rgba(255,255,255,.85);
  margin-left:auto;font-style:italic;
}

.card-body{
  flex:1;display:flex;gap:0;overflow:hidden;min-height:0;
}

/* ═══════════════════════════════════════════════════
   DRAG ITEMS PANEL
═══════════════════════════════════════════════════ */
#items-panel{
  width:clamp(90px,15%,140px);
  background:rgba(255,255,255,.08);
  border-right:1px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;
  align-items:center;
  padding:clamp(6px,1vh,12px) 6px;
  gap:clamp(6px,1vh,12px);
  overflow-y:auto;
}
#items-panel h4{
  font-size:clamp(9px,1.1vw,11px);
  color:rgba(255,255,255,.6);
  text-transform:uppercase;letter-spacing:.08em;
  text-align:center;margin-bottom:4px;
}

.drag-item{
  cursor:grab;
  user-select:none;-webkit-user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.3);
  border-radius:12px;
  padding:clamp(6px,1vh,10px) clamp(4px,.8vw,8px);
  transition:transform .15s,box-shadow .15s,opacity .15s;
  width:100%;text-align:center;
}
.drag-item:hover{
  transform:scale(1.06);
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  border-color:rgba(255,255,255,.6);
}
.drag-item.dragging{opacity:.4;transform:scale(.96)}
.drag-item .item-icon{font-size:clamp(20px,3.5vw,36px);line-height:1}
.drag-item .item-label{
  font-size:clamp(8px,1vw,11px);font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);
}
.drag-item.used{opacity:.3;pointer-events:none}

/* ═══════════════════════════════════════════════════
   ACTIVITY STAGE
═══════════════════════════════════════════════════ */
#stage{
  flex:1;position:relative;overflow:hidden;min-width:0;
}

/* ── DROP ZONES ── */
.drop-zone{
  position:absolute;
  border:2.5px dashed rgba(255,255,255,.45);
  border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  transition:border-color .2s,background .2s,transform .2s;
  background:rgba(255,255,255,.06);
  cursor:pointer;
}
.drop-zone .zone-icon{font-size:clamp(20px,3vw,34px);opacity:.5}
.drop-zone .zone-label{
  font-size:clamp(8px,1vw,12px);font-weight:700;
  color:rgba(255,255,255,.5);text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.5);padding:0 4px;
}
.drop-zone.hover{
  border-color:var(--sun-gold);
  background:rgba(255,215,0,.15);
  transform:scale(1.04);
}
.drop-zone.filled{
  border-color:var(--success-green);
  border-style:solid;
  background:rgba(39,174,96,.18);
}
.drop-zone.wrong{
  border-color:var(--accent-coral);
  background:rgba(255,107,107,.15);
  animation:shake .35s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── FILLED DROP ZONE content ── */
.zone-content{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
.zone-content .zc-icon{font-size:clamp(22px,3.5vw,40px);line-height:1}
.zone-content .zc-label{
  font-size:clamp(8px,1.1vw,13px);font-weight:800;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);text-align:center;
}
.checkmark{
  position:absolute;top:-8px;right:-8px;
  width:22px;height:22px;border-radius:50%;
  background:var(--success-green);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}

/* feedback toast */
#feedback{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;
  padding:8px 18px;border-radius:20px;
  font-size:clamp(11px,1.4vw,14px);font-weight:700;
  opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;z-index:30;
}
#feedback.show{opacity:1}

/* ── PROCEED BUTTON ── */
#proceed-btn{
  position:absolute;bottom:12px;right:14px;
  background:linear-gradient(135deg,var(--success-green),#1e8449);
  color:#fff;font-weight:800;
  font-family:'Bubblegum Sans',cursive;
  font-size:clamp(12px,1.5vw,16px);
  border:none;border-radius:30px;cursor:pointer;
  padding:clamp(7px,1.2vh,12px) clamp(16px,2.5vw,28px);
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  display:none;
  transition:transform .15s,box-shadow .15s;
  animation:pulseBtn 1.8s ease-in-out infinite;
}
#proceed-btn:hover{transform:scale(1.06);box-shadow:0 6px 22px rgba(0,0,0,.45)}
@keyframes pulseBtn{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.35)}
  50%{box-shadow:0 4px 24px rgba(39,174,96,.6),0 0 0 6px rgba(39,174,96,.15)}}

/* ═══════════════════════════════════════════════════
   ACTIVITY 1 – SETUP
═══════════════════════════════════════════════════ */
#act1-bg{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(135,206,235,.25) 0%,rgba(26,95,50,.3) 60%,rgba(13,59,30,.4) 100%);
}
/* Window frame */
#window-frame{
  position:absolute;
  top:8%;left:50%;transform:translateX(-50%);
  width:clamp(140px,22vw,220px);height:clamp(180px,28vh,260px);
  border:4px solid rgba(255,255,255,.45);
  border-radius:8px;
  background:linear-gradient(180deg,rgba(135,206,235,.35),rgba(173,216,230,.2));
  box-shadow:inset 0 0 20px rgba(255,255,255,.15),0 4px 20px rgba(0,0,0,.3);
  overflow:hidden;
}
#window-cross-h{position:absolute;top:50%;left:0;right:0;height:3px;background:rgba(255,255,255,.4);transform:translateY(-50%)}
#window-cross-v{position:absolute;left:50%;top:0;bottom:0;width:3px;background:rgba(255,255,255,.4);transform:translateX(-50%)}
.window-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  font-size:clamp(9px,1vw,11px);color:rgba(255,255,255,.6);white-space:nowrap}

/* counter area */
#act1-counter{
  position:absolute;bottom:clamp(44px,8vh,70px);left:50%;transform:translateX(-50%);
  font-size:clamp(10px,1.3vw,14px);color:rgba(255,255,255,.8);font-weight:700;
  background:rgba(0,0,0,.3);padding:4px 14px;border-radius:20px;
  white-space:nowrap;
}

/* ═══════════════════════════════════════════════════
   ACTIVITY 2 – LABEL THE PROCESS
═══════════════════════════════════════════════════ */
#act2-diagram{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
#bag-diagram{
  position:relative;
  width:clamp(130px,20vw,200px);
  height:clamp(170px,26vh,240px);
  background:rgba(200,235,255,.18);
  border:3px solid rgba(255,255,255,.5);
  border-radius:8px 8px 4px 4px;
  overflow:visible;
}
#bag-water{
  position:absolute;bottom:0;left:0;right:0;
  height:35%;
  background:linear-gradient(180deg,rgba(58,168,224,.5),rgba(26,111,168,.7));
  border-radius:0 0 4px 4px;
}
/* animated vapour arrows */
.vapour-arrow{
  position:absolute;
  font-size:1.4rem;
  animation:riseUp 2s ease-in-out infinite;
  opacity:.7;
}
@keyframes riseUp{
  0%{transform:translateY(0);opacity:.8}
  100%{transform:translateY(-40px);opacity:0}
}
/* condensation drops */
.cond-drop{
  position:absolute;
  width:8px;height:12px;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:rgba(96,212,245,.7);
  animation:dropSlide 2.5s ease-in-out infinite;
}
@keyframes dropSlide{
  0%{transform:translateY(0);opacity:.9}
  100%{transform:translateY(40px);opacity:.2}
}
/* sun in act2 */
#act2-sun{
  position:absolute;top:8%;right:12%;
  font-size:clamp(28px,5vw,52px);
  animation:sunSpin 8s linear infinite;
}
@keyframes sunSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* label drop zones in act2 */
.label-zone{
  position:absolute;
  width:clamp(100px,14vw,155px);
  height:clamp(44px,7vh,64px);
  border:2.5px dashed rgba(255,255,255,.5);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  font-size:clamp(9px,1.1vw,13px);
  font-weight:700;color:rgba(255,255,255,.5);
  text-align:center;
  transition:border-color .2s,background .2s;
}
.label-zone.hover{border-color:var(--sun-gold);background:rgba(255,215,0,.15)}
.label-zone.filled{border-color:var(--success-green);border-style:solid;background:rgba(39,174,96,.2)}
.label-zone.wrong{border-color:var(--accent-coral);background:rgba(255,107,107,.15);animation:shake .35s ease}
.label-zone .lz-text{font-size:clamp(11px,1.6vw,17px);font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}

/* ═══════════════════════════════════════════════════
   ACTIVITY 3 – ARRANGE THE CYCLE
═══════════════════════════════════════════════════ */
#act3-stage{position:absolute;inset:0}
.cycle-slot{
  position:absolute;
  width:clamp(90px,13vw,140px);
  height:clamp(70px,11vh,100px);
  border:2.5px dashed rgba(255,255,255,.5);
  border-radius:14px;
  background:rgba(255,255,255,.07);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  transition:border-color .2s,background .2s,transform .2s;
}
.cycle-slot .slot-num{
  position:absolute;top:4px;left:8px;
  font-size:clamp(9px,1vw,12px);font-weight:900;
  color:rgba(255,255,255,.5);
}
.cycle-slot .slot-hint{font-size:clamp(9px,1vw,11px);color:rgba(255,255,255,.4);text-align:center;padding:0 4px}
.cycle-slot .slot-icon{font-size:clamp(20px,3vw,32px);opacity:.4}
.cycle-slot.hover{border-color:var(--sun-gold);background:rgba(255,215,0,.12);transform:scale(1.04)}
.cycle-slot.filled{border-color:var(--success-green);border-style:solid;background:rgba(39,174,96,.18)}
.cycle-slot.wrong{animation:shake .35s ease;border-color:var(--accent-coral);background:rgba(255,107,107,.15)}
/* cycle arrows */
.cycle-arrow{position:absolute;font-size:1.4rem;color:rgba(255,255,255,.5);pointer-events:none}

/* ═══════════════════════════════════════════════════
   POPUP / MODAL
═══════════════════════════════════════════════════ */
#popup-overlay{
  position:fixed;inset:0;z-index:100;
  background:var(--popup-bg);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s;
}
#popup-overlay.show{opacity:1;pointer-events:all}

#popup{
  background:linear-gradient(145deg,#0a2e14,#14522a);
  border:2px solid rgba(255,255,255,.25);
  border-radius:24px;
  padding:clamp(18px,3vh,32px) clamp(20px,4vw,42px);
  max-width:min(90vw,480px);
  width:100%;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  transform:scale(.8);

}
@keyframes confettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(300px) rotate(720deg);opacity:0}
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
#drag-ghost{

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
#progress-dots{

}
.dot{

.dot.active{background:var(--sun-gold);border-color:var(--sun-gold);transform:scale(1.3)}
.dot.done{background:var(--success-green);border-color:var(--success-green)}
</style>
</head>
<body>

<!-- ═══════════════════════════ SCENE ═══════════════════════════ -->

<script>
/* ═══════════════════════════════════════════════════
   SCENE BUILDER
═══════════════════════════════════════════════════ */
(function buildScene(){
  // Rain drops
  const rain = document.getElementById('rain-layer');
  for(let i=0;i<28;i++){
    const d = document.createElement('div');
    d.className = 'rdrop';
    const h = 8 + Math.random()*18;
    d.style.cssText = `
      left:${Math.random()*100}%;
      height:${h}px;
      animation-duration:${1.2+Math.random()*2}s;
      animation-delay:${-Math.random()*3}s;
      opacity:${0.3+Math.random()*.5};
    `;
    rain.appendChild(d);
  }

  // Trees
  const treeL = document.getElementById('tree-layer');
  const treeData = [
    {left:2,h:85,cw:70},{left:8,h:110,cw:90},{left:14,h:70,cw:60},
    {left:22,h:130,cw:105},{left:30,h:95,cw:78},{left:75,h:120,cw:100},
    {left:82,h:85,cw:70},{left:88,h:140,cw:112},{left:94,h:90,cw:75},
  ];
  treeData.forEach(t=>{
    const tw = document.createElement('div');
    tw.className = 'tree';
    tw.style.cssText = `left:${t.left}%;`;
    const trunkW = t.cw*.12;
    const trunkH = t.h*.35;
    tw.innerHTML = `
      <div class="tree-trunk" style="width:${trunkW}px;height:${trunkH}px"></div>
      <div style="position:absolute;bottom:${trunkH*.6}px;left:50%;transform:translateX(-50%)">
        <div style="width:0;height:0;border-left:${t.cw*.55}px solid transparent;
          border-right:${t.cw*.55}px solid transparent;
          border-bottom:${t.h*.45}px solid #1a5c32;margin-bottom:-6px"></div>
        <div style="width:0;height:0;border-left:${t.cw*.45}px solid transparent;
          border-right:${t.cw*.45}px solid transparent;
          border-bottom:${t.h*.38}px solid #2d8a50;margin-bottom:-6px"></div>
        <div style="width:0;height:0;border-left:${t.cw*.35}px solid transparent;
          border-right:${t.cw*.35}px solid transparent;
          border-bottom:${t.h*.32}px solid #52c47a"></div>
      </div>
    `;
    treeL.appendChild(tw);
  });

  // Vines
  const vineL = document.getElementById('vine-layer');
  [{l:5,delay:0},{l:95,delay:1.5},{l:18,delay:.7},{l:80,delay:2}].forEach(v=>{
    const vine = document.createElement('div');
    vine.className = 'vine';
    vine.style.cssText = `left:${v.l}%;top:0;height:${30+Math.random()*20}vh;animation-duration:${3+Math.random()*2}s;animation-delay:${v.delay}s`;
    vine.after; vine.innerHTML = '<span style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)">🍃</span>';
    vineL.appendChild(vine);
  });

  // Butterflies
  const bflies = ['🦋','🦋','🌸'];
  bflies.forEach((b,i)=>{
    const el = document.createElement('div');
    el.className='butterfly';
    el.textContent=b;
    const topPct = 15+i*12;
    el.style.cssText=`--bt:${topPct}%;top:${topPct}%;animation-duration:${18+i*5}s;animation-delay:${-i*6}s`;
    document.getElementById('scene').appendChild(el);
  });

  // Parrots
  ['🦜','🦜'].forEach((p,i)=>{
    const el = document.createElement('div');
    el.className='parrot';
    el.textContent=p;
    el.style.cssText=`top:${20+i*18}%;animation-duration:${22+i*8}s;animation-delay:${-i*9}s`;
    document.getElementById('scene').appendChild(el);
  });

  // Falling leaves
  ['🍃','🌿','🍀','🍃'].forEach((l,i)=>{
    const el = document.createElement('div');
    el.className='falling-leaf';
    el.textContent=l;
    el.style.cssText=`left:${15+i*22}%;animation-duration:${6+i*2}s;animation-delay:${-i*2}s`;
    document.getElementById('scene').appendChild(el);
  });
})();

/* ═══════════════════════════════════════════════════
   ACTIVITY ENGINE
═══════════════════════════════════════════════════ */
const state = {
  currentAct: 1,
  dragData: null,
};

// ── Activity definitions ─────────────────────────
const activities = {
  1: {

      {id:'z-cond',accepts:'cond',label:'Drops on top',icon:'💧',hint:'Vapour becomes drops',
        style:'top:8%;left:35%;width:28%;height:20%'},

        style:'bottom:8%;left:60%;width:28%;height:20%'},
    ],
    popup:{
      emoji:'🌦️',stars:'⭐⭐⭐',
      title:'You Know the Water Cycle!',
      body:'Brilliant! Evaporation lifts the water up, Condensation turns it to drops on the bag, and Precipitation makes the drops fall back down — just like real rain! 🌧️',
      vocab:['Evaporation','Condensation','Precipitation'],

      {id:'s1',icon:'☀️',label:'Sun heats water'},
      {id:'s2',icon:'♨️',label:'Water evaporates'},
      {id:'s3',icon:'☁️',label:'Vapour cools & condenses'},
      {id:'s4',icon:'🌧️',label:'Drops fall as rain'},
    ],
    zones:[
      {id:'slot1',accepts:'s1',num:'1',hint:'First step',icon:'❓',
        style:'top:10%;left:8%;width:22%;height:30%'},
      {id:'slot2',accepts:'s2',num:'2',hint:'Second step',icon:'❓',
        style:'top:10%;right:8%;width:22%;height:30%'},
      {id:'slot3',accepts:'s3',num:'3',hint:'Third step',icon:'❓',
        style:'bottom:10%;right:8%;width:22%;height:30%'},
      {id:'slot4',accepts:'s4',num:'4',hint:'Fourth step',icon:'❓',
        style:'bottom:10%;left:8%;width:22%;height:30%'},
    ],
    popup:{
      emoji:'🏆',stars:'⭐⭐⭐⭐⭐',
      title:'Water Cycle Champion!',
      body:'Incredible! You completed the whole water cycle! The sun heats water → it evaporates → condenses into drops → and falls as rain. This journey goes on forever — the Jal Chakra! 🌍',
      vocab:['Evaporation','Condensation','Precipitation','Jal Chakra'],
      btn:'🎉 Celebrate!',
    }
  }
};

// ── DOM refs ─────────────────────────────────────
const itemsPanel = document.getElementById('items-panel');
const stage = document.getElementById('stage');
const stepCounter = document.getElementById('step-counter');
const actBadge = document.getElementById('act-badge');
const actTitle = document.getElementById('act-title');
const actInstruction = document.getElementById('act-instruction');
const proceedBtn = document.getElementById('proceed-btn');
const feedbackEl = document.getElementById('feedback');
const popupOverlay = document.getElementById('popup-overlay');
const popupEmoji = document.getElementById('popup-emoji');
const popupStars = document.getElementById('popup-stars');
const popupTitle = document.getElementById('popup-title');
const popupBody = document.getElementById('popup-body');
const popupVocab = document.getElementById('popup-vocab');
const popupBtn = document.getElementById('popup-btn');
const ghost = document.getElementById('drag-ghost');
const ghostIcon = document.getElementById('ghost-icon');
const ghostLabel = document.getElementById('ghost-label');

// track filled zones
let filledZones = {};
let totalZones = 0;

// ── LOAD ACTIVITY ────────────────────────────────
function loadActivity(n){
  state.currentAct = n;
  filledZones = {};
  const act = activities[n];
  totalZones = act.zones.length;

  // header
  stepCounter.textContent = `Activity ${n} / 3`;
  actBadge.textContent = act.badge;
  actTitle.textContent = act.title;
  actInstruction.textContent = act.instruction;

  // dots
  [0,1,2].forEach(i=>{
    const dot = document.getElementById('dot'+i);
    dot.className = 'dot';
    if(i < n-1) dot.classList.add('done');
    else if(i === n-1) dot.classList.add('active');
  });

  // items panel
  itemsPanel.innerHTML = '<h4>Drag me!</h4>';
  act.items.forEach(item=>{
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.id = 'item-'+item.id;
    el.dataset.id = item.id;
    el.dataset.icon = item.icon;
    el.dataset.label = item.label;
    el.innerHTML = `<div class="item-icon">${item.icon}</div><div class="item-label">${item.label}</div>`;
    itemsPanel.appendChild(el);
  });

  // stage
  // clear everything except feedback + proceed
  [...stage.children].forEach(c=>{
    if(c.id !== 'feedback' && c.id !== 'proceed-btn') c.remove();
  });

  // build activity-specific background
  if(n===1) buildAct1BG();
  else if(n===2) buildAct2BG();
  else if(n===3) buildAct3BG();

  // drop zones
  act.zones.forEach(z=>{
    const el = document.createElement('div');
    el.className = 'drop-zone' + (n===3 ? ' cycle-slot' : '');
    el.id = z.id;
    el.dataset.accepts = z.accepts;
    el.style.cssText = z.style;
    if(n===3){
      el.innerHTML = `
        <div class="slot-num">${z.num}</div>
        <div class="slot-icon">${z.icon}</div>
        <div class="slot-hint">${z.hint}</div>
      `;
    } else {
      el.innerHTML = `
        <div class="zone-icon">${z.icon}</div>
        <div class="zone-label">${z.hint}</div>
      `;
    }
    stage.appendChild(el);
  });

  // cycle arrows for act3
  if(n===3){
    const arrows = [
      {top:'24%',left:'34%',rot:'0deg',sym:'➡️'},
      {top:'44%',right:'5%',rot:'90deg',sym:'⬇️'},
      {bottom:'22%',left:'34%',rot:'180deg',sym:'⬅️'},
      {top:'44%',left:'5%',rot:'270deg',sym:'⬆️'},
    ];
    arrows.forEach(a=>{
      const el = document.createElement('div');
      el.className='cycle-arrow';
      el.textContent=a.sym;
      Object.keys(a).filter(k=>k!=='sym'&&k!=='rot').forEach(k=>el.style[k]=a[k]);
      stage.appendChild(el);
    });
    // center label
    const center = document.createElement('div');
    center.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center';
    center.innerHTML='<div style="font-size:clamp(28px,5vw,50px)">💧</div><div style="font-family:Bubblegum Sans,cursive;font-size:clamp(11px,1.5vw,16px);color:rgba(255,255,255,.75);margin-top:4px">Jal Chakra</div>';
    stage.appendChild(center);
  }

  proceedBtn.style.display='none';
  hideFeedback();

  // attach drag events
  attachDrag();
  attachDrop();
}

function buildAct1BG(){
  const bg = document.createElement('div');
  bg.id='act1-bg';
  stage.insertBefore(bg, stage.firstChild);

  // window frame
  const wf = document.createElement('div');

  wf.innerHTML='<div id="window-cross-h"></div><div id="window-cross-v"></div><div class="window-label">🌞 Sunny Window</div>';

function buildAct2BG(){
  // act2 has a bag diagram in centre
  const wrap = document.createElement('div');

  tape.textContent='📎 SEALED';

  // sun

function buildAct3BG(){
  // subtle circular path visual
  const bg = document.createElement('div');
  bg.style.cssText='position:absolute;inset:0;';
  // Circular dashed guide
  const guide = document.createElement('div');
  guide.style.cssText=`
    position:absolute;top:50%;left:50%;
    width:clamp(150px,30vw,280px);height:clamp(150px,30vh,260px);
    border:2px dashed rgba(255,255,255,.12);border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none
  `;
  bg.appendChild(guide);
  stage.insertBefore(bg, stage.firstChild);
}

// ── DRAG LOGIC ───────────────────────────────────
function attachDrag(){
  document.querySelectorAll('.drag-item').forEach(item=>{
    // Mouse
    item.addEventListener('mousedown', onDragStart);
    // Touch
    item.addEventListener('touchstart', onTouchStart, {passive:false});
  });
}

function onDragStart(e){
  e.preventDefault();
  startDrag(e.currentTarget, e.clientX, e.clientY);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
}
function onTouchStart(e){
  e.preventDefault();
  const t = e.touches[0];
  startDrag(e.currentTarget, t.clientX, t.clientY);
  document.addEventListener('touchmove', onTouchMove, {passive:false});
  document.addEventListener('touchend', onTouchEnd);
}

function startDrag(el, x, y){
  state.dragData = {
    id: el.dataset.id,
    icon: el.dataset.icon,
    label: el.dataset.label,
    source: el,
  };
  el.classList.add('dragging');
  ghost.style.display='flex';
  ghostIcon.textContent = el.dataset.icon;
  ghostLabel.textContent = el.dataset.label;
  moveGhost(x, y);
}

function onDragMove(e){ moveGhost(e.clientX, e.clientY) }
function onTouchMove(e){
  e.preventDefault();
  moveGhost(e.touches[0].clientX, e.touches[0].clientY);
  highlightZoneUnder(e.touches[0].clientX, e.touches[0].clientY);
}
function moveGhost(x,y){
  ghost.style.left = x+'px';
  ghost.style.top = y+'px';
}

function onDragEnd(e){
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  const zone = document.elementFromPoint(e.clientX, e.clientY);
  endDrag(zone);
}
function onTouchEnd(e){
  document.removeEventListener('touchmove',onTouchMove);
  document.removeEventListener('touchend',onTouchEnd);
  const t = e.changedTouches[0];
  const zone = document.elementFromPoint(t.clientX, t.clientY);
  clearZoneHighlights();
  endDrag(zone);
}

function endDrag(target){
  ghost.style.display='none';
  if(state.dragData) state.dragData.source.classList.remove('dragging');

  // find closest drop-zone ancestor
  const zone = target ? target.closest('.drop-zone, .cycle-slot') : null;
  if(zone && state.dragData){
    handleDrop(zone, state.dragData);
  }
  state.dragData = null;
}

function highlightZoneUnder(x,y){
  clearZoneHighlights();
  const el = document.elementFromPoint(x,y);
  const zone = el ? el.closest('.drop-zone,.cycle-slot') : null;
  if(zone && !zone.classList.contains('filled')) zone.classList.add('hover');
}

function clearZoneHighlights(){
  document.querySelectorAll('.drop-zone,.cycle-slot').forEach(z=>z.classList.remove('hover'));
}

// ── DROP ZONES ───────────────────────────────────
function attachDrop(){
  document.querySelectorAll('.drop-zone,.cycle-slot').forEach(zone=>{
    zone.addEventListener('mouseenter',()=>{ if(state.dragData && !zone.classList.contains('filled')) zone.classList.add('hover') });
    zone.addEventListener('mouseleave',()=>zone.classList.remove('hover'));
  });
}

function handleDrop(zone, drag){
  zone.classList.remove('hover');
  const accepts = zone.dataset.accepts;

  if(zone.classList.contains('filled')){
    showFeedback('This spot is already taken! 😊','warning');
    return;
  }

  if(drag.id === accepts){
    // ✅ Correct
    fillZone(zone, drag);
    drag.source.classList.add('used');
    filledZones[zone.id] = true;

    const count = Object.keys(filledZones).length;
    if(count < totalZones){
      showFeedback(`${drag.label} — Perfect! 🎉`, 'success');
      if(state.currentAct===1){
        const cnt = document.getElementById('act1-counter');
        if(cnt) cnt.textContent = `${count} of ${totalZones} placed — keep going!`;
      }
    }
    if(count === totalZones){
      setTimeout(()=>{ showActivityPopup(state.currentAct) }, 600);
    }
  } else {
    // ✗ Wrong
    zone.classList.add('wrong');
    setTimeout(()=>zone.classList.remove('wrong'),400);
    showFeedback('Hmm, try another spot! 🤔','error');
  }
}

function fillZone(zone, drag){
  zone.classList.add('filled');
  zone.innerHTML = `
    <div class="zone-content">
      <div class="zc-icon">${drag.icon}</div>
      <div class="zc-label">${drag.label}</div>
    </div>
    <div class="checkmark">✓</div>
  `;
  if(state.currentAct===3){
    // show slot number
    const num = zone.querySelector('.slot-num');
    // re-add it
    const numEl = document.createElement('div');
    numEl.className='slot-num';
    numEl.style.color='rgba(255,255,255,.6)';
    // slot num is in dataset... grab from id
    const slotNums = {slot1:'1',slot2:'2',slot3:'3',slot4:'4'};
    numEl.textContent = slotNums[zone.id] || '';
    zone.appendChild(numEl);
  }
}

// ── FEEDBACK TOAST ───────────────────────────────
let feedbackTimer;
function showFeedback(msg, type='success'){
  clearTimeout(feedbackTimer);
  feedbackEl.textContent = msg;
  feedbackEl.style.background = type==='success'
    ? 'rgba(39,174,96,.85)'
    : type==='error'
    ? 'rgba(231,76,60,.85)'
    : 'rgba(0,0,0,.7)';
  feedbackEl.classList.add('show');
  feedbackTimer = setTimeout(hideFeedback, 2000);
}
function hideFeedback(){ feedbackEl.classList.remove('show') }

// ── POPUP ────────────────────────────────────────
function showActivityPopup(n){
  const act = activities[n];
  const p = act.popup;
  popupEmoji.textContent = p.emoji;
  popupStars.textContent = p.stars;
  popupTitle.textContent = p.title;
  popupBody.textContent = p.body;
  popupVocab.innerHTML = '';
  p.vocab.forEach(v=>{
    const chip = document.createElement('div');
    chip.className='vocab-chip';
    chip.textContent=v;
    popupVocab.appendChild(chip);
  });
  popupBtn.textContent = p.btn;

  // confetti
  spawnConfetti();

  // set button action
  popupBtn.onclick = ()=>{
    hidePopup();
    if(n < 3){
      setTimeout(()=>loadActivity(n+1), 300);
    } else {
      showFinalSuccess();
    }
  };

  showPopup();
}

function showPopup(){
  popupOverlay.classList.add('show');
}
function hidePopup(){
  popupOverlay.classList.remove('show');
}

function showFinalSuccess(){
  popupEmoji.textContent = '🏆';
  popupStars.textContent = '⭐⭐⭐⭐⭐';
  popupTitle.textContent = '🌧️ You Made It Rain! 🌧️';
  popupBody.innerHTML = `
    You are a <strong>Water Cycle Scientist!</strong><br><br>
    Remember: Water is always on a journey — from puddles on the road, up to the sky, and back down as monsoon rain. The <strong>Jal Chakra</strong> never stops! 🌍💧
  `;
  popupVocab.innerHTML = '';
  ['Evaporation','Condensation','Precipitation','Jal Chakra','Water Cycle'].forEach(v=>{
    const chip = document.createElement('div');
    chip.className='vocab-chip';
    chip.textContent=v;
    popupVocab.appendChild(chip);
  });
  popupBtn.textContent = '🎊 Play Again!';
  popupBtn.onclick = ()=>{
    hidePopup();
    setTimeout(()=>loadActivity(1), 300);
  };
  spawnConfetti(true);
  showPopup();

  // update dots
  [0,1,2].forEach(i=>{
    const dot = document.getElementById('dot'+i);
    dot.className = 'dot done';
  });
}

// ── CONFETTI ─────────────────────────────────────
function spawnConfetti(big=false){
  const popup = document.getElementById('popup');
  const count = big ? 30 : 16;
  const colours = ['#ffd700','#ff6b6b','#52c47a','#60d4f5','#fff','#ff9d00','#a8e063'];
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.cssText=`
      left:${Math.random()*100}%;
      top:${-10+Math.random()*20}%;
      background:${colours[Math.floor(Math.random()*colours.length)]};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${1.5+Math.random()}s;
      transform:rotate(${Math.random()*360}deg);
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
    `;
    popup.appendChild(c);
    setTimeout(()=>c.remove(), 2500);
  }
}

// ── INIT ──────────────────────────────────────────
loadActivity(1);
</script>
