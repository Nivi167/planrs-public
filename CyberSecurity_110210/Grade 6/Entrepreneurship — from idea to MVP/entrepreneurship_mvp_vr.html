<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTREPRENEURSHIP — FROM IDEA TO MVP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030812;--bg2:#050E1F;--cyan:#00F5FF;--cyan2:#00C8D4;--green:#00FF88;--green2:#00CC6A;
  --purple:#BF40FF;--purple2:#8800CC;--orange:#FF6B00;--orange2:#FF9A00;--pink:#FF0080;
  --blue:#1E90FF;--text:#E0F4FF;--text2:#7DB9D4;--panel:rgba(5,18,40,0.92);
  --border-cyan:rgba(0,245,255,0.35);--border-green:rgba(0,255,136,0.35);
  --glow-cyan:0 0 12px rgba(0,245,255,0.5);--glow-green:0 0 12px rgba(0,255,136,0.5);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Exo 2',sans-serif;color:var(--text)}

#canvas{width:100vw;height:100vh;position:relative;overflow:hidden;background:var(--bg)}

/* MATRIX RAIN */
#matrix-canvas{position:absolute;inset:0;z-index:1;opacity:0.18}

/* GRID FLOOR */
.grid-floor{position:absolute;bottom:0;left:0;width:100%;height:40vh;z-index:2;opacity:0.12;
  background:repeating-linear-gradient(90deg,var(--cyan) 0,var(--cyan) 1px,transparent 1px,transparent 60px),
             repeating-linear-gradient(180deg,var(--cyan) 0,var(--cyan) 1px,transparent 1px,transparent 60px);
  transform:perspective(400px) rotateX(55deg);transform-origin:bottom center}

/* SCAN LINES */
.scanlines{position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(180deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
  animation:scanMove 8s linear infinite}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 100vh}}

/* PORTALS */
.portal{position:absolute;border-radius:50%;animation:portalSpin linear infinite;pointer-events:none;z-index:4}
@keyframes portalSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.portal-inner{position:absolute;border-radius:50%;animation:portalSpinRev linear infinite}
@keyframes portalSpinRev{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}

/* HOLOGRAMS */
.hologram{position:absolute;z-index:4;animation:holoBob ease-in-out infinite;filter:drop-shadow(0 0 8px var(--cyan));pointer-events:none}
@keyframes holoBob{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-12px) scaleY(1.03)}}
.hologram-flicker{animation:holoFlicker 4s ease-in-out infinite}
@keyframes holoFlicker{0%,90%,100%{opacity:0.6}93%{opacity:0.1}96%{opacity:0.7}}

/* PARTICLES */
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleDrift ease-in-out infinite;z-index:5}
@keyframes particleDrift{0%{opacity:0;transform:translate(0,0) scale(1)}30%{opacity:1}70%{opacity:0.6}100%{opacity:0;transform:translate(var(--px,30px),var(--py,-60px)) scale(0)}}

/* DATA STREAMS */
.data-stream{position:absolute;width:1px;animation:streamFlow linear infinite;z-index:3;pointer-events:none}
@keyframes streamFlow{0%{top:-100px;opacity:0}10%{opacity:1}90%{opacity:0.4}100%{top:110vh;opacity:0}}

/* MAIN UI */
#main-ui{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;pointer-events:none}

/* HEADER */
#header{pointer-events:auto;text-align:center;padding:0.9vh 2vw 0.6vh;background:linear-gradient(180deg,rgba(3,8,18,0.98) 0%,rgba(5,18,40,0.95) 100%);border-bottom:1px solid var(--cyan);position:relative;overflow:hidden}
#header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--purple),transparent);animation:headerGlow 3s ease-in-out infinite}
@keyframes headerGlow{0%,100%{opacity:0.6}50%{opacity:1}}
#header h1{font-family:'Orbitron',monospace;font-size:clamp(0.7rem,1.5vw,1.2rem);font-weight:900;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,245,255,0.3);line-height:1.2}
#header p{font-size:clamp(0.45rem,0.7vw,0.58rem);color:var(--text2);letter-spacing:2px;margin-top:2px;font-family:'Orbitron',monospace;font-weight:400}

/* PROGRESS */
#progress-bar{pointer-events:auto;display:flex;align-items:center;justify-content:center;gap:6px;padding:5px;background:rgba(3,8,18,0.9);border-bottom:1px solid rgba(0,245,255,0.2)}
.step-dot{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:0.55rem;transition:all 0.4s;border:1px solid rgba(0,245,255,0.3);color:var(--text2);background:rgba(0,245,255,0.04);cursor:default;letter-spacing:0}
.step-dot.active{background:rgba(0,245,255,0.12);color:var(--cyan);border-color:var(--cyan);box-shadow:var(--glow-cyan),inset 0 0 10px rgba(0,245,255,0.08);transform:scale(1.1)}
.step-dot.done{background:rgba(0,255,136,0.1);color:var(--green);border-color:var(--green);box-shadow:var(--glow-green)}
.step-line{width:32px;height:1px;background:rgba(0,245,255,0.2);transition:background 0.4s;position:relative}
.step-line::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--cyan),var(--green));transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.step-line.done::after{transform:scaleX(1)}

#activity-area{flex:1;display:flex;align-items:center;justify-content:center;padding:0.6vh 1.2vw;pointer-events:auto;overflow:hidden}

/* MAIN PANEL */
.activity-card{background:var(--panel);border-radius:8px;border:1px solid var(--border-cyan);padding:1.1vh 1.4vw;width:100%;max-width:920px;max-height:calc(100vh - 185px);overflow:hidden;display:flex;flex-direction:column;gap:0.6vh;box-shadow:0 0 30px rgba(0,245,255,0.1),0 0 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(0,245,255,0.1);position:relative}
.activity-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--purple),transparent)}
.activity-card::after{content:'';position:absolute;inset:0;border-radius:8px;background:linear-gradient(135deg,rgba(0,245,255,0.02) 0%,transparent 50%,rgba(0,255,136,0.02) 100%);pointer-events:none}

.activity-title{font-family:'Orbitron',monospace;font-size:clamp(0.75rem,1.3vw,1rem);font-weight:700;color:var(--cyan);text-align:center;letter-spacing:2px;text-shadow:0 0 15px rgba(0,245,255,0.5)}
.activity-subtitle{font-size:clamp(0.5rem,0.78vw,0.65rem);color:var(--text2);text-align:center;letter-spacing:1px}
.activity-body{display:flex;gap:0.8vw;flex:1;min-height:0}

/* DRAG ITEMS */
.drag-item{padding:5px 9px;background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.4);border-radius:4px;cursor:grab;font-family:'Exo 2',sans-serif;font-size:clamp(0.48rem,0.75vw,0.62rem);font-weight:600;color:var(--text);user-select:none;transition:all 0.2s;text-align:center;line-height:1.3;position:relative;overflow:hidden}
.drag-item::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.1),transparent);transition:left 0.4s}
.drag-item:hover{background:rgba(0,245,255,0.12);border-color:var(--cyan);color:#fff;transform:scale(1.04) translateY(-1px);box-shadow:var(--glow-cyan)}
.drag-item:hover::before{left:100%}
.drag-item.dragging{opacity:0.3;transform:scale(0.92)}
.drag-item.placed{cursor:default;background:rgba(0,255,136,0.1);border-color:var(--green);color:var(--green);box-shadow:var(--glow-green)}

/* DROP ZONES */
.drop-zone{min-height:55px;border:1px dashed rgba(0,245,255,0.3);border-radius:6px;background:rgba(0,245,255,0.03);padding:5px;display:flex;flex-direction:column;gap:3px;transition:all 0.2s}
.drop-zone.over{background:rgba(0,245,255,0.1);border-color:var(--cyan);border-style:solid;box-shadow:inset 0 0 12px rgba(0,245,255,0.1)}
.drop-zone.correct-flash{animation:correctFlash 0.5s ease}
.drop-zone.wrong-flash{animation:wrongFlash 0.5s ease}
@keyframes correctFlash{0%,100%{background:rgba(0,245,255,0.03)}50%{background:rgba(0,255,136,0.2)}}
@keyframes wrongFlash{0%,100%{background:rgba(0,245,255,0.03)}50%{background:rgba(255,0,80,0.18)}}

.zone-label{font-family:'Orbitron',monospace;font-size:clamp(0.45rem,0.7vw,0.58rem);font-weight:700;color:var(--cyan);margin-bottom:2px;text-align:center;letter-spacing:1px}
.source-pool{display:flex;flex-wrap:wrap;gap:4px;padding:6px;background:rgba(0,245,255,0.03);border-radius:6px;border:1px solid rgba(0,245,255,0.15);min-height:46px;align-content:flex-start}
.label-sm{font-family:'Orbitron',monospace;font-size:clamp(0.42rem,0.65vw,0.54rem);font-weight:600;color:var(--cyan);margin-bottom:2px;letter-spacing:1px}
.hint-text{font-size:clamp(0.42rem,0.6vw,0.52rem);color:rgba(125,185,212,0.7);text-align:center;letter-spacing:0.5px}

/* SCHOOL/HOME category colors */
.cat-school{background:rgba(0,245,255,0.07)!important;border-color:var(--cyan)!important}
.cat-home{background:rgba(191,64,255,0.07)!important;border-color:var(--purple)!important}
.cat-school .zone-label{color:var(--cyan)!important}
.cat-home .zone-label{color:var(--purple)!important}
.placed-school{background:rgba(0,245,255,0.1)!important;border-color:var(--cyan)!important;color:var(--cyan)!important;box-shadow:0 0 8px rgba(0,245,255,0.3)!important}
.placed-home{background:rgba(191,64,255,0.1)!important;border-color:var(--purple)!important;color:var(--purple)!important;box-shadow:0 0 8px rgba(191,64,255,0.3)!important}

/* ACTIVITY 2 workflow */
.workflow-step{border-radius:6px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid;position:relative}
.wf-arrow{font-size:1rem;color:var(--cyan);align-self:center;flex-shrink:0;text-shadow:0 0 8px var(--cyan)}
.wf-slot{min-height:50px;border-radius:5px;border:1px dashed;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;transition:all 0.2s;padding:4px}
.wf-slot.over{background:rgba(0,245,255,0.1)!important;border-style:solid!important;border-color:var(--cyan)!important}
.wf-slot.filled{border-style:solid!important}

/* ACTIVITY 3 canvas */
.canvas-cell{border-radius:6px;border:1px solid rgba(0,245,255,0.25);background:rgba(0,245,255,0.03);padding:6px 8px;display:flex;flex-direction:column;gap:3px;transition:all 0.2s}
.canvas-cell .zone-label{font-size:clamp(0.42rem,0.62vw,0.52rem)}
.canvas-cell .drop-zone{min-height:44px}
.canvas-cell.filled-cell{border-color:rgba(0,255,136,0.35);background:rgba(0,255,136,0.04)}

/* SCORE */
.score-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.3);border-radius:3px;padding:1px 7px;font-family:'Orbitron',monospace;font-weight:700;font-size:0.48rem;color:var(--cyan);letter-spacing:1px}

/* FEEDBACK */
#feedback{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);padding:7px 18px;border-radius:4px;font-family:'Orbitron',monospace;font-weight:600;font-size:0.65rem;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;letter-spacing:1px}
#feedback.show{opacity:1}
#feedback.success{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid var(--green);box-shadow:0 0 20px rgba(0,255,136,0.4)}
#feedback.error{background:rgba(255,0,80,0.12);color:#FF4DB8;border:1px solid #FF0080;box-shadow:0 0 20px rgba(255,0,80,0.4)}

/* POPUP */
#popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:none;align-items:center;justify-content:center}
#popup-overlay.active{display:flex}
.popup-box{background:linear-gradient(135deg,rgba(5,18,40,0.99),rgba(3,8,18,0.99));border:1px solid var(--cyan);border-radius:8px;padding:1.8rem 2rem;max-width:400px;width:90%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;box-shadow:0 0 40px rgba(0,245,255,0.3),0 0 80px rgba(0,0,0,0.8)}
.popup-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent)}
@keyframes popIn{0%{transform:scale(0.5) translateY(30px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.popup-emoji{font-size:2.5rem;display:block;margin-bottom:0.4rem;filter:drop-shadow(0 0 10px var(--cyan))}
.popup-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:var(--cyan);margin-bottom:0.4rem;letter-spacing:2px;text-shadow:0 0 15px rgba(0,245,255,0.5)}
.popup-text{font-size:0.72rem;color:var(--text2);margin-bottom:0.9rem;line-height:1.6;letter-spacing:0.3px}
.popup-btn{display:inline-block;padding:9px 22px;background:rgba(0,245,255,0.08);color:var(--cyan);border:1px solid var(--cyan);border-radius:4px;font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 0 12px rgba(0,245,255,0.2);letter-spacing:2px}
.popup-btn:hover{background:rgba(0,245,255,0.15);box-shadow:0 0 20px rgba(0,245,255,0.5);transform:translateY(-1px)}
.flex-col{display:flex;flex-direction:column;gap:4px}
</style>
</head>
<body>
<div id="canvas">
  <canvas id="matrix-canvas"></canvas>
  <div class="grid-floor"></div>
  <div class="scanlines"></div>

  <!-- Portals -->
  <div class="portal" style="width:120px;height:120px;left:-40px;top:15vh;border:2px solid rgba(0,245,255,0.2);animation-duration:12s;box-shadow:0 0 20px rgba(0,245,255,0.1)">
    <div class="portal-inner" style="position:absolute;inset:12px;border-radius:50%;border:1.5px solid rgba(0,255,136,0.25);animation-duration:8s">
      <div style="position:absolute;inset:12px;border-radius:50%;border:1px solid rgba(191,64,255,0.2);animation:portalSpin 5s linear infinite"></div>
    </div>
  </div>
  <div class="portal" style="width:90px;height:90px;right:-20px;bottom:20vh;border:1.5px solid rgba(191,64,255,0.25);animation-duration:9s;box-shadow:0 0 15px rgba(191,64,255,0.15)">
    <div class="portal-inner" style="position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,245,255,0.2);animation-duration:6s"></div>
  </div>
  <div class="portal" style="width:70px;height:70px;right:8%;top:12vh;border:1px solid rgba(255,107,0,0.3);animation-duration:15s;box-shadow:0 0 10px rgba(255,107,0,0.15)">
    <div class="portal-inner" style="position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(0,245,255,0.2);animation-duration:10s"></div>
  </div>

  <!-- Holograms -->
  <svg class="hologram hologram-flicker" style="left:2%;bottom:28%;width:50px;height:55px;animation-duration:3.5s;opacity:0.5" viewBox="0 0 50 55" xmlns="http://www.w3.org/2000/svg">
    <polygon points="25,3 47,40 3,40" fill="none" stroke="#00F5FF" stroke-width="1.5" opacity="0.7"/>
    <polygon points="25,10 40,36 10,36" fill="rgba(0,245,255,0.06)" stroke="#00F5FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="25" y1="3" x2="25" y2="50" stroke="#00F5FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="3" y1="40" x2="47" y2="40" stroke="#00F5FF" stroke-width="0.8" opacity="0.4"/>
    <circle cx="25" cy="3" r="2" fill="#00F5FF" opacity="0.8"/>
    <circle cx="3" cy="40" r="2" fill="#00F5FF" opacity="0.8"/>
    <circle cx="47" cy="40" r="2" fill="#00F5FF" opacity="0.8"/>
  </svg>
  <svg class="hologram" style="right:2%;bottom:30%;width:44px;height:50px;animation-duration:4s;animation-delay:-1.5s;opacity:0.45;filter:drop-shadow(0 0 8px #BF40FF)" viewBox="0 0 44 50" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="8" width="32" height="32" fill="none" stroke="#BF40FF" stroke-width="1.5" rx="2" opacity="0.7"/>
    <rect x="12" y="14" width="20" height="20" fill="rgba(191,64,255,0.06)" stroke="#BF40FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="8" x2="12" y2="14" stroke="#BF40FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="38" y1="8" x2="32" y2="14" stroke="#BF40FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="40" x2="12" y2="34" stroke="#BF40FF" stroke-width="0.8" opacity="0.5"/>
    <line x1="38" y1="40" x2="32" y2="34" stroke="#BF40FF" stroke-width="0.8" opacity="0.5"/>
  </svg>
  <svg class="hologram" style="left:4%;top:18%;width:38px;height:42px;animation-duration:5s;animation-delay:-2s;opacity:0.38;filter:drop-shadow(0 0 8px #00FF88)" viewBox="0 0 38 42" xmlns="http://www.w3.org/2000/svg">
    <circle cx="19" cy="19" r="16" fill="none" stroke="#00FF88" stroke-width="1.2" opacity="0.7"/>
    <circle cx="19" cy="19" r="9" fill="none" stroke="#00FF88" stroke-width="0.8" opacity="0.5"/>
    <circle cx="19" cy="19" r="3" fill="#00FF88" opacity="0.6"/>
    <line x1="19" y1="3" x2="19" y2="35" stroke="#00FF88" stroke-width="0.6" opacity="0.4"/>
    <line x1="3" y1="19" x2="35" y2="19" stroke="#00FF88" stroke-width="0.6" opacity="0.4"/>
  </svg>

  <!-- Data streams -->
  <div class="data-stream" style="left:12%;background:linear-gradient(180deg,transparent,#00F5FF,transparent);height:80px;animation-duration:4s;animation-delay:0s"></div>
  <div class="data-stream" style="left:35%;background:linear-gradient(180deg,transparent,#00FF88,transparent);height:60px;animation-duration:6s;animation-delay:-2s"></div>
  <div class="data-stream" style="left:62%;background:linear-gradient(180deg,transparent,#BF40FF,transparent);height:90px;animation-duration:5s;animation-delay:-1s"></div>
  <div class="data-stream" style="left:80%;background:linear-gradient(180deg,transparent,#00F5FF,transparent);height:70px;animation-duration:7s;animation-delay:-3s"></div>
  <div class="data-stream" style="left:92%;background:linear-gradient(180deg,transparent,#FF6B00,transparent);height:55px;animation-duration:4.5s;animation-delay:-4s"></div>

  <!-- Particles -->
  <div class="particle" style="left:20%;top:30%;width:3px;height:3px;background:#00F5FF;--px:40px;--py:-50px;animation-duration:4s;box-shadow:0 0 6px #00F5FF"></div>
  <div class="particle" style="left:45%;top:50%;width:2px;height:2px;background:#00FF88;--px:-30px;--py:-40px;animation-duration:5s;animation-delay:-2s;box-shadow:0 0 5px #00FF88"></div>
  <div class="particle" style="left:70%;top:35%;width:3px;height:3px;background:#BF40FF;--px:25px;--py:-55px;animation-duration:3.5s;animation-delay:-1s;box-shadow:0 0 6px #BF40FF"></div>
  <div class="particle" style="left:85%;top:55%;width:2px;height:2px;background:#FF6B00;--px:-35px;--py:-30px;animation-duration:4.5s;animation-delay:-3s;box-shadow:0 0 5px #FF6B00"></div>
  <div class="particle" style="left:10%;top:60%;width:3px;height:3px;background:#00F5FF;--px:20px;--py:-60px;animation-duration:6s;animation-delay:-0.5s;box-shadow:0 0 6px #00F5FF"></div>
  <div class="particle" style="left:55%;top:25%;width:2px;height:2px;background:#FF0080;--px:-20px;--py:-40px;animation-duration:4.2s;animation-delay:-2.5s;box-shadow:0 0 5px #FF0080"></div>

  <!-- MAIN UI -->
  <div id="main-ui">
    <div id="header">
      <h1>⬡ ENTREPRENEURSHIP — FROM IDEA TO MVP ⬡</h1>
      <p>// STARTUP PROTOCOL ACTIVATED — BUILD · MEASURE · LEARN //</p>
    </div>
    <div id="progress-bar">
      <div class="step-dot active" id="dot1">01</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">02</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">03</div>
      <div class="step-line" id="line3"></div>
      <div class="step-dot" id="dot4">⬡</div>
    </div>
    <div id="activity-area"></div>
  </div>

  <div id="feedback"></div>
  <div id="popup-overlay">
    <div class="popup-box">
      <span class="popup-emoji" id="popup-emoji">🚀</span>
      <div class="popup-title" id="popup-title">MODULE COMPLETE</div>
      <div class="popup-text" id="popup-text">Protocol successful.</div>
      <button class="popup-btn" id="popup-btn">NEXT MODULE ></button>
    </div>

(function(){
  const cv=document.getElementById('matrix-canvas');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=Math.floor(cv.width/14);
  const drops=Array.from({length:cols},()=>Math.random()*-50);
  const chars='01アイウエオABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&>{}[]';
  function draw(){
    ctx.fillStyle='rgba(3,8,18,0.05)';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.font='12px monospace';
    drops.forEach((y,i)=>{
      const ch=chars[Math.floor(Math.random()*chars.length)];
      const bright=Math.random()>0.95;
      ctx.fillStyle=bright?'#00FFAA':'#005533';
      ctx.fillText(ch,i*14,y*14);
      if(y*14>cv.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=0.5;
    });
  }
  setInterval(draw,50);
})();

      <div style="border:1px solid var(--cyan);border-radius:6px;padding:10px 20px;background:rgba(0,245,255,0.06);box-shadow:0 0 20px rgba(0,245,255,0.15)">
        <div style="font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:700;color:var(--cyan);text-shadow:0 0 20px var(--cyan)">${total}/24</div>
        <div style="font-family:'Orbitron',monospace;font-size:0.45rem;color:var(--text2);letter-spacing:2px">TOTAL SCORE</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${[['01','Problem Detection',scores[0],'#00F5FF'],['02','Lean Startup Cycle',scores[1],'#00FF88'],['03','Business Canvas',scores[2],'#BF40FF']].map(([n,l,sc,col])=>`
      <div style="border:1px solid ${col}44;border-radius:6px;padding:7px 14px;background:${col}08">
        <div style="font-family:'Orbitron',monospace;font-size:0.48rem;color:${col};letter-spacing:1px">MOD ${n}</div>
        <div style="font-size:0.5rem;color:var(--text2);margin:1px 0">${l}</div>
        <div style="font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:${col};text-shadow:0 0 10px ${col}">${sc}/8</div>
      </div>`).join('')}
    </div>
    <div style="border:1px solid rgba(0,245,255,0.2);border-radius:6px;padding:10px 16px;max-width:500px;background:rgba(0,245,255,0.03)">
      <div style="font-family:'Orbitron',monospace;font-size:0.55rem;color:var(--cyan);margin-bottom:5px;letter-spacing:1px">[ FOUNDER PRINCIPLES ]</div>
      <div style="font-size:0.6rem;color:var(--text2);line-height:1.8">
        🔍 Every business starts with a real problem<br>
        🔧 Your MVP is the simplest version that works<br>
        📊 Feedback from real users beats your own guesses<br>
        🔁 Start small · Fail fast · Learn from neighbours
      </div>
    </div>
    <button class="popup-btn" onclick="restartAll()">RESTART PROTOCOL ↺</button>
  </div>`;
}

function restartAll(){
  scores=[0,0,0];
  act1State.placed={school:[],home:[]};act1State.done=false;
  act2State.filled={};act2State.done=false;
  act3State.filled={};act3State.done=false;
  updateProgress(1);buildActivity1();
}

updateProgress(1);buildActivity1();
</script>
</body>
