<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYTHON — MATPLOTLIB: PLOT YOUR DATA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0a3d6b;position:relative}

/* SKY & OCEAN */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.sky{position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,#0a1628 0%,#1a3a6e 40%,#2d6a9f 100%)}
.ocean{position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(180deg,#1a5276 0%,#0e3460 60%,#081c3a 100%)}

/* STARS */
.stars{position:absolute;top:0;left:0;right:0;height:55%}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.9}}

/* MOON */
.moon{position:absolute;top:4%;right:8%;width:60px;height:60px;background:#f5e642;border-radius:50%;box-shadow:0 0 30px #f5e64260;animation:moonGlow 4s ease-in-out infinite alternate}
@keyframes moonGlow{0%{box-shadow:0 0 20px #f5e64240}100%{box-shadow:0 0 50px #f5e64280}}

/* CLOUDS */
.cloud{position:absolute;border-radius:50px;opacity:.15;animation:driftCloud linear infinite}
@keyframes driftCloud{0%{transform:translateX(-200px)}100%{transform:translateX(110vw)}}

/* WAVES */
.wave-wrap{position:absolute;bottom:0;left:0;right:0;height:45%}
.wave{position:absolute;left:-100%;width:300%;border-radius:50%;animation:waveRoll linear infinite}
.wave1{top:-18px;height:36px;background:rgba(255,255,255,.08);animation-duration:8s}
.wave2{top:-10px;height:24px;background:rgba(255,255,255,.05);animation-duration:11s;animation-delay:-3s}
.wave3{top:-6px;height:16px;background:rgba(255,255,255,.06);animation-duration:14s;animation-delay:-7s}
@keyframes waveRoll{0%{transform:translateX(0)}100%{transform:translateX(33.33%)}}

/* SHIP */
.ship{position:absolute;bottom:38%;left:3%;animation:shipBob 4s ease-in-out infinite}
@keyframes shipBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}

/* ISLAND */
.island{position:absolute;bottom:36%;right:4%;animation:islandBob 6s ease-in-out infinite}
@keyframes islandBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* PARROT */
.parrot{position:absolute;top:12%;left:15%;animation:parrotFly 7s ease-in-out infinite}
@keyframes parrotFly{0%,100%{transform:translate(0,0) scaleX(1)}49%{transform:translate(120px,-30px) scaleX(1)}50%{transform:translate(122px,-30px) scaleX(-1)}99%{transform:translate(2px,-1px) scaleX(-1)}}

/* MAIN UI */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* HEADER */
.header{text-align:center;margin-bottom:12px;animation:fadeDown .8s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.header h1{font-size:clamp(16px,2.2vw,26px);font-weight:700;color:#f5e642;text-shadow:0 2px 8px #00000080;letter-spacing:1px}
.header p{font-size:clamp(11px,1.2vw,14px);color:#a8d8f0;margin-top:4px}

/* PROGRESS DOTS */
.progress{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.dot{width:12px;height:12px;border-radius:50%;background:#ffffff30;border:2px solid #ffffff50;transition:all .4s}
.dot.active{background:#f5e642;border-color:#f5e642;box-shadow:0 0 10px #f5e64280}
.dot.done{background:#4caf7d;border-color:#4caf7d}

/* ACTIVITY CARD */
.card{background:rgba(8,25,60,.88);border:2px solid rgba(245,230,66,.3);border-radius:18px;padding:20px 24px;width:min(860px,94vw);max-height:78vh;backdrop-filter:blur(6px);animation:cardIn .5s ease;box-shadow:0 8px 40px #00000060}
@keyframes cardIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.card-title{font-size:clamp(13px,1.5vw,17px);font-weight:700;color:#f5e642;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.card-title .badge{background:#c0392b;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.card-desc{font-size:clamp(11px,1.1vw,13px);color:#a8d8f0;margin-bottom:14px;line-height:1.5}

/* DRAG ZONE */
.drag-area{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;padding:10px;background:rgba(255,255,255,.05);border:2px dashed rgba(245,230,66,.3);border-radius:10px;transition:border-color .3s;align-items:center}
.drag-area.over{border-color:#f5e642;background:rgba(245,230,66,.08)}
.drag-area.correct{border-color:#4caf7d;background:rgba(76,175,77,.1);border-style:solid}
.drag-area.wrong{border-color:#e74c3c;background:rgba(231,76,60,.1);border-style:solid;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* TOKENS */
.token{display:inline-flex;align-items:center;padding:7px 13px;border-radius:8px;font-family:monospace;font-size:clamp(11px,1.2vw,14px);font-weight:600;cursor:grab;user-select:none;border:1.5px solid transparent;transition:transform .15s,box-shadow .15s;white-space:nowrap}
.token:active{cursor:grabbing}
.token.dragging{opacity:.5;transform:scale(.95)}
.token.t-blue{background:#1a3a6e;color:#7ec8f0;border-color:#378add40}
.token.t-green{background:#1a3d2a;color:#7dd87a;border-color:#4caf7d40}
.token.t-amber{background:#3d2a00;color:#f5c842;border-color:#e09b2040}
.token.t-pink{background:#3d1a2a;color:#f07ab0;border-color:#d4537e40}
.token.t-purple{background:#2a1a3d;color:#b07af0;border-color:#7f77dd40}
.token.t-gray{background:#1a1a2a;color:#a0a8b8;border-color:#55555580}
.token:hover{transform:translateY(-2px);box-shadow:0 4px 12px #00000060}

/* BANK */
.bank-label{font-size:11px;color:#a8d8f050;margin-bottom:5px;font-weight:600;letter-spacing:.5px}
.bank{display:flex;flex-wrap:wrap;gap:7px;padding:10px;background:rgba(255,255,255,.03);border-radius:10px;min-height:48px}

/* SLOT */
.slot{min-width:80px;min-height:38px;padding:6px 10px;border:2px dashed rgba(255,255,255,.25);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#ffffff40;font-style:italic;transition:all .2s;flex-shrink:0}
.slot.occupied{border-style:solid;border-color:rgba(255,255,255,.15)}
.slot.over{border-color:#f5e642;background:rgba(245,230,66,.06)}

/* STEPS LAYOUT (Activity 2 & 3) */
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.step-row{display:flex;align-items:center;gap:8px}
.step-num{width:24px;height:24px;border-radius:50%;background:#f5e64220;color:#f5e642;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-slot{flex:1}

/* FEEDBACK */
.feedback{margin-top:10px;min-height:28px;font-size:clamp(11px,1.1vw,13px);font-weight:600;text-align:center;transition:opacity .3s}
.feedback.ok{color:#4caf7d}
.feedback.err{color:#e74c3c}
.feedback.hint{color:#f5c842}

/* BTN */
.btn{padding:9px 22px;border-radius:10px;font-size:clamp(12px,1.2vw,14px);font-weight:700;cursor:pointer;border:2px solid;transition:transform .15s,box-shadow .15s;letter-spacing:.5px}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px #00000060}
.btn:active{transform:scale(.97)}
.btn-gold{background:#f5e642;color:#0a1628;border-color:#d4c020}
.btn-outline{background:transparent;color:#a8d8f0;border-color:#a8d8f050}
.row-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}

/* CHART PREVIEW */
.chart-box{background:#0d1f40;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block}

/* POPUP OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup{background:linear-gradient(135deg,#0e2347,#1a3a6e);border:2px solid #f5e642;border-radius:20px;padding:32px 40px;text-align:center;max-width:480px;width:90%;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.popup h2{font-size:22px;color:#f5e642;margin-bottom:8px}
.popup p{color:#a8d8f0;font-size:14px;line-height:1.6;margin-bottom:20px}
.popup .big-icon{font-size:56px;margin-bottom:12px;display:block}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.conf{position:absolute;top:-10px;width:8px;height:14px;border-radius:2px;animation:confFall linear forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ACTIVITY 2 CHART */
#act2-preview{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}

/* RESPONSIVE */
@media(max-width:600px){
  .steps-grid{grid-template-columns:1fr}
  #act2-preview{grid-template-columns:1fr}
  .card{padding:14px 14px}
}
</style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div id="bg">
  <div class="sky"></div>
  <div class="ocean"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>
  <div class="wave-wrap">
    <div class="wave wave1"></div>

  </div>

  <!-- CLOUDS -->
  <div class="cloud" id="c1" style="top:8%;width:140px;height:38px;background:#fff;animation-duration:28s;animation-delay:-8s"></div>
  <div class="cloud" id="c2" style="top:14%;width:90px;height:26px;background:#fff;animation-duration:38s;animation-delay:-15s"></div>
  <div class="cloud" id="c3" style="top:6%;width:110px;height:32px;background:#fff;animation-duration:22s;animation-delay:-2s"></div>

  <!-- SHIP SVG -->
  <div class="ship">
    <svg width="110" height="90" viewBox="0 0 110 90" fill="none" xmlns="http://www.w3.org/2000/svg">

      <rect x="14" y="32" width="4" height="4" rx="1" fill="#f5c842"/>

  <!-- FLOATING ANCHORS -->
  <div style="position:absolute;bottom:42%;left:50%;opacity:.06;font-size:80px;animation:anchorFloat 9s ease-in-out infinite;color:#fff">⚓</div>
  <div style="position:absolute;bottom:44%;right:22%;opacity:.05;font-size:50px;animation:anchorFloat 13s ease-in-out infinite reverse;color:#fff">⚓</div>
  @keyframes anchorFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</div>

<!-- APP SHELL -->
<div id="app">
  <div class="header">
    <h1>⚓ PYTHON — MATPLOTLIB: PLOT YOUR DATA ⚓</h1>
    <p>Drag the treasure pieces into place to unlock the secrets of charting!</p>
  </div>
  <div class="progress" id="progress">
    <div class="dot active" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>

  <div id="activity-mount"></div>
</div>

<!-- POPUP -->
<div class="overlay" id="popup" style="display:none">
  <div class="confetti-wrap" id="confetti"></div>
  <div class="popup" id="popup-inner">
    <span class="big-icon" id="popup-icon">🏴‍☠️</span>
    <h2 id="popup-title">Well done!</h2>
    <p id="popup-desc">You cracked the code!</p>
    <button class="btn btn-gold" id="popup-btn" onclick="nextActivity()">Next Challenge →</button>
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────────
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*95}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
  starsEl.appendChild(s);
}

// ── STATE ──────────────────────────────────────────────────────
let currentActivity=0;
const mount=document.getElementById('activity-mount');

// ── DRAG HELPERS ───────────────────────────────────────────────
let dragSrc=null;
let dragOrigin=null; // 'bank' | 'slot' | 'zone'
let dragOriginEl=null;

function makeDraggable(el){
  el.setAttribute('draggable','true');
  el.addEventListener('dragstart',e=>{
    dragSrc=el;
    dragOriginEl=el.parentElement;
    dragOrigin=el.parentElement.dataset.role||'bank';
    setTimeout(()=>el.classList.add('dragging'),0);
  });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
}

function makeDropZone(el,onDrop){
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over')});
  el.addEventListener('dragleave',()=>el.classList.remove('over'));
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');if(dragSrc)onDrop(el,dragSrc)});
}

// ── CONFETTI ───────────────────────────────────────────────────
function spawnConfetti(){
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#f5e642','#e74c3c','#4caf7d','#a8d8f0','#f07ab0','#7ec8f0'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;width:${6+Math.random()*8}px;height:${10+Math.random()*8}px`;
    wrap.appendChild(c);
  }
}

// ── POPUP ──────────────────────────────────────────────────────
function showPopup(icon,title,desc,btnText){
  document.getElementById('popup-icon').textContent=icon;
  document.getElementById('popup-title').textContent=title;
  document.getElementById('popup-desc').textContent=desc;
  document.getElementById('popup-btn').textContent=btnText;
  document.getElementById('popup').style.display='flex';
  spawnConfetti();
}
function closePopup(){document.getElementById('popup').style.display='none'}

function nextActivity(){
  closePopup();
  currentActivity++;
  updateProgress();
  if(currentActivity===1)renderAct2();
  else if(currentActivity===2)renderAct3();
  else if(currentActivity===3)renderFinal();
}

function updateProgress(){
  for(let i=0;i<3;i++){
    const d=document.getElementById('d'+i);
    d.className='dot'+(i<currentActivity?' done':i===currentActivity?' active':'');
  }
}

// ══════════════════════════════════════════════════════════════
// ACTIVITY 1 — Build the import statement
// ══════════════════════════════════════════════════════════════
function renderAct1(){
  const CORRECT=['import','matplotlib.pyplot','as','plt'];
  const COLORS=['t-blue','t-purple','t-gray','t-amber'];
  const DECOYS=['numpy','as plt','show()','pandas','from','seaborn'];
  const allTokens=[...CORRECT.map((t,i)=>({text:t,color:COLORS[i],correct:true})),
    ...DECOYS.map(t=>({text:t,color:'t-gray',correct:false}))];
  shuffle(allTokens);

  let slots=Array(4).fill(null); // filled slot tokens
  const slotEls=[];

  mount.innerHTML=`
  <div class="card">
    <div class="card-title"><span class="badge">ACTIVITY 1 of 3</span> 🗝️ Assemble the Import Spell!</div>
    <div class="card-desc">Every Matplotlib chart begins with one magic line. Drag the correct pieces into the 4 treasure slots in the right order to form:<br><code style="color:#f5c842;font-size:13px">import matplotlib.pyplot as plt</code></div>
    <div class="bank-label">TREASURE CHEST — drag pieces from here</div>
    <div class="bank" id="bank1" data-role="bank"></div>
    <div style="margin:12px 0 6px;font-size:11px;color:#a8d8f050;font-weight:600;letter-spacing:.5px">DROP ZONE — build your spell here</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center" id="zone1" data-role="zone">
      <div class="slot" id="sl0" data-idx="0">slot 1</div>
      <div style="color:#f5e64270;font-size:18px;font-weight:700">·</div>
      <div class="slot" id="sl1" data-idx="1">slot 2</div>
      <div style="color:#f5e64270;font-size:18px;font-weight:700">·</div>
      <div class="slot" id="sl2" data-idx="2">slot 3</div>
      <div style="color:#f5e64270;font-size:18px;font-weight:700">·</div>
      <div class="slot" id="sl3" data-idx="3">slot 4</div>
    </div>
    <div class="feedback hint" id="fb1">👈 Start by dragging "import" into slot 1!</div>
    <div class="row-btns">
      <button class="btn btn-outline" onclick="resetAct1()">↺ Reset</button>
      <button class="btn btn-gold" onclick="checkAct1()">Check My Spell ✓</button>
    </div>
  </div>`;

  // populate bank
  const bank=document.getElementById('bank1');
  allTokens.forEach(t=>{
    const el=makeToken(t.text,t.color);
    bank.appendChild(el);
    makeDraggable(el);
  });

  // set up slots
  for(let i=0;i<4;i++){
    const sl=document.getElementById('sl'+i);
    slotEls.push(sl);
    makeDropZone(sl,(dropEl,src)=>{
      const idx=parseInt(dropEl.dataset.idx);
      // if slot occupied, send current back to bank
      if(slots[idx]){
        const old=dropEl.querySelector('.token');
        if(old){bank.appendChild(old);makeDraggable(old);}
        slots[idx]=null;
      }
      // if src came from another slot, clear that slot
      if(dragOrigin==='zone'||dragOriginEl?.classList.contains('slot')){
        const prevSlot=dragOriginEl;
        const prevIdx=parseInt(prevSlot?.dataset?.idx??'-1');
        if(prevIdx>=0){slots[prevIdx]=null;prevSlot.innerHTML='';prevSlot.textContent='slot '+(prevIdx+1);}
      }
      dropEl.innerHTML='';
      dropEl.appendChild(src);
      src.style.margin='0';
      src.setAttribute('draggable','true');
      makeDraggable(src);
      dropEl.classList.add('occupied');
      slots[idx]=src.dataset.text||src.textContent.trim();
      dragOriginEl=dropEl;
      dragOrigin='zone';
      setFeedback('fb1','','hint');
    });
  }
  // make bank a return zone
  makeDropZone(bank,(dropEl,src)=>{
    if(dragOrigin==='zone'||dragOriginEl?.classList.contains('slot')){
      const prevIdx=parseInt(dragOriginEl?.dataset?.idx??'-1');
      if(prevIdx>=0){
        slots[prevIdx]=null;
        slotEls[prevIdx].innerHTML='';
        slotEls[prevIdx].textContent='slot '+(prevIdx+1);
        slotEls[prevIdx].classList.remove('occupied');
      }
    }
    bank.appendChild(src);
    makeDraggable(src);
  });

  window.resetAct1=()=>{
    slots=Array(4).fill(null);
    slotEls.forEach((sl,i)=>{sl.innerHTML='';sl.textContent='slot '+(i+1);sl.classList.remove('occupied');});
    bank.innerHTML='';
    allTokens.forEach(t=>{
      const el=makeToken(t.text,t.color);
      bank.appendChild(el);makeDraggable(el);
    });
    setFeedback('fb1','👈 Start by dragging "import" into slot 1!','hint');
  };

  window.checkAct1=()=>{
    const filled=slots.filter(Boolean);

      ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText(lbl,x,padT+H+18);
    });

function animBar(ctx,x,baseY,w,targetH,color,delay){
  const start=performance.now()+delay;
  function frame(now){
    if(now<start){requestAnimationFrame(frame);return;}
    const elapsed=now-start;
    const dur=500;
    const t=Math.min(elapsed/dur,1);
    const ease=1-Math.pow(1-t,3);
    const h=targetH*ease;
    ctx.clearRect(x-1,baseY-targetH-5,w+2,targetH+6);
    ctx.fillStyle='#0d1f40';ctx.fillRect(x-1,baseY-targetH-5,w+2,targetH+6);
    ctx.fillStyle=color;ctx.fillRect(x,baseY-h,w,h);
    if(t<1)requestAnimationFrame(frame);
    else{ctx.fillStyle=color;ctx.fillRect(x,baseY-targetH,w,targetH);}
  }
  requestAnimationFrame(frame);
}

    const days=['Mon','Tue','Wed','Thu','Fri'];
    const temps=[28,32,30,35,31];
    const pL=28,pB=24,pT=18,pR=8;
    const W=250-pL-pR,H=150-pT-pB;

    ctx.fillStyle='#0d1f40';ctx.fillRect(0,0,250,150);
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pT+(i/4)*H;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+W,y);ctx.stroke();}

    const totalLen=pts.reduce((acc,p,i)=>{if(i===0)return 0;const pp=pts[i-1];return acc+Math.hypot(p.x-pp.x,p.y-pp.y);},0);
    function drawFrame(){
      ctx.fillStyle='#0d1f40';ctx.fillRect(0,0,250,150);
      ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
      for(let i=0;i<=4;i++){const y=pT+(i/4)*H;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+W,y);ctx.stroke();}

      ctx.strokeStyle='#7ec8f0';ctx.lineWidth=2;ctx.beginPath();
      let drawn=0;
      for(let i=0;i<pts.length-1;i++){
        const segLen=Math.hypot(pts[i+1].x-pts[i].x,pts[i+1].y-pts[i].y);
        if(drawn+segLen<=progress){
          if(i===0)ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[i+1].x,pts[i+1].y);
          drawn+=segLen;
        } else {
          const t=(progress-drawn)/segLen;
          const ex=pts[i].x+(pts[i+1].x-pts[i].x)*t;
          const ey=pts[i].y+(pts[i+1].y-pts[i].y)*t;
          if(i===0)ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(ex,ey);break;
        }
      }
      ctx.stroke();
      pts.forEach((p,i)=>{if(i===0||pts.slice(0,i).reduce((a,pp,j)=>a+Math.hypot(pts[j+1]?.x-pp.x||0,pts[j+1]?.y-pp.y||0),0)<=progress){ctx.fillStyle='#f5c842';ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}});
      ctx.fillStyle='rgba(245,230,66,.9)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
      ctx.fillText('Weekly Temperature (°C)',125,12);
      progress+=totalLen/50;
      if(progress<totalLen)requestAnimationFrame(drawFrame);
    }
    drawFrame();
  }
}

}

function setFeedback(id,msg,type){

  if(!el)return;

  el.className=`feedback ${type}`;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
