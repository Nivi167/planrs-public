<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Cycle in a Bag</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;}

#bg{
  position:fixed;inset:0;
  background:linear-gradient(180deg,#87CEEB 0%,#B8E4F7 38%,#C8EDB8 58%,#5A7A3A 58%,#4a6830 72%,#7B4F2E 72%,#6b4128 100%);
  overflow:hidden;
}

/* SUN */
.sun{position:absolute;top:16px;right:70px;width:66px;height:66px;background:radial-gradient(circle,#FFE566,#FFD700);border-radius:50%;box-shadow:0 0 28px #FFD70080;animation:sunPulse 3s ease-in-out infinite;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 28px #FFD70080;}50%{box-shadow:0 0 48px #FFD700cc;}}
.sun-ray{position:absolute;top:50%;left:50%;width:7px;height:18px;background:#FFD700;border-radius:4px;transform-origin:3.5px -4px;opacity:0.75;}

/* CLOUDS */
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.9;animation:cloudFloat linear infinite;}
@keyframes cloudFloat{0%{transform:translateX(-130%);}100%{transform:translateX(110vw);}}

/* GROUND */
.ground-strip{position:absolute;bottom:0;left:0;right:0;height:42%;}

/* PLANTS */
.plant{position:absolute;bottom:28%;}
.stem{position:absolute;bottom:0;left:50%;width:4px;background:linear-gradient(180deg,#2E7D32,#4CAF50);transform:translateX(-50%);border-radius:2px;}
.leaf-l{position:absolute;width:22px;height:12px;background:#4CAF50;border-radius:50% 50% 50% 0;}
.leaf-r{position:absolute;width:22px;height:12px;background:#4CAF50;border-radius:0 50% 50% 50%;}
.flower-head{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:20px;height:20px;background:#FF6B9D;border-radius:50%;box-shadow:0 0 0 5px #FFE08260;}
.flower-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:#FFD700;border-radius:50%;}

/* SEEDS */
.seed{position:absolute;width:10px;height:6px;background:#7B5E3A;border-radius:50%;bottom:28%;}
.root-line{position:absolute;width:2px;background:#5a3d1e;border-radius:1px;bottom:27%;opacity:0.6;}

/* WATERING CANS — both face right naturally (spout on right, handle on left) */
.can-wrap{position:absolute;bottom:29%;}
.can-body{width:38px;height:28px;border-radius:6px 6px 8px 4px;position:relative;}
.can-spout{position:absolute;top:-5px;right:-17px;width:20px;height:8px;border-radius:0 4px 4px 0;transform:rotate(-15deg);}
.can-handle{position:absolute;top:2px;left:-11px;width:13px;height:16px;border:3px solid;border-radius:50%;border-right:none;}
.wdrop{position:absolute;animation:dropFall 1.3s ease-in infinite;opacity:0.85;}
@keyframes dropFall{0%{transform:translateY(0);opacity:0.85;}100%{transform:translateY(20px);opacity:0;}}

/* WORMS */
.worm{position:absolute;bottom:27%;height:8px;background:#E88080;border-radius:4px;animation:wriggle 2.2s ease-in-out infinite;}
@keyframes wriggle{0%,100%{transform:scaleX(1);}50%{transform:scaleX(0.82) translateX(3px);}}

/* BUTTERFLIES */
.butterfly{position:absolute;animation:flyAround 8s ease-in-out infinite;}
.wing{width:15px;height:10px;background:#FF80AB;border-radius:50% 50% 0 50%;opacity:0.8;position:absolute;animation:wingFlap 0.28s ease-in-out infinite alternate;}
.wing.r{left:9px;border-radius:50% 50% 50% 0;}
@keyframes flyAround{0%{transform:translate(0,0);}25%{transform:translate(38px,-18px);}50%{transform:translate(8px,-8px);}75%{transform:translate(-18px,-24px);}100%{transform:translate(0,0);}}
@keyframes wingFlap{0%{transform:rotateY(0);}100%{transform:rotateY(55deg);}}

/* APP SHELL */
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;pointer-events:none;}
#app>*{pointer-events:auto;}

/* TITLE */
#titlebar{background:linear-gradient(135deg,#1565C0ee,#0D47A1ee);border-radius:20px;padding:9px 26px;margin-bottom:7px;box-shadow:0 4px 20px rgba(0,0,0,0.25);display:flex;align-items:center;gap:10px;}
#titlebar h1{font-family:'Fredoka One',cursive;color:white;font-size:1.45rem;text-shadow:2px 2px 4px rgba(0,0,0,0.3);}
.title-icon{font-size:1.5rem;}

/* PROGRESS */
#progress{display:flex;gap:7px;margin-bottom:7px;align-items:center;}
.prog-dot{width:30px;height:30px;border-radius:50%;border:3px solid white;background:rgba(255,255,255,0.28);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;color:white;font-size:0.82rem;transition:all 0.4s;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.prog-dot.active{background:#4CAF50;transform:scale(1.2);}
.prog-dot.done{background:#FFD700;}
.prog-line{width:28px;height:3px;background:rgba(255,255,255,0.38);border-radius:2px;transition:background 0.4s;}
.prog-line.done{background:#FFD700;}
.score-display{display:flex;gap:3px;align-items:center;margin-left:8px;}
.star-icon{font-size:1rem;transition:filter 0.3s;}

/* ACTIVITY CARD */
#activity-card{background:linear-gradient(135deg,#fffffff2,#E8F5E9f2);border-radius:22px;padding:14px 18px;width:min(780px,96vw);box-shadow:0 8px 40px rgba(0,0,0,0.22);border:2px solid rgba(76,175,80,0.3);position:relative;overflow:hidden;}
#activity-card::before{content:'';position:absolute;top:-40px;right:-40px;width:110px;height:110px;background:radial-gradient(circle,#C8E6C9,transparent);border-radius:50%;pointer-events:none;}

#act-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.act-badge{font-family:'Fredoka One',cursive;background:linear-gradient(135deg,#4CAF50,#2E7D32);color:white;padding:4px 14px;border-radius:20px;font-size:0.78rem;box-shadow:0 2px 8px rgba(76,175,80,0.4);}
#act-title{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#1a3a1a;}
#act-instruction{font-size:0.8rem;color:#3a5a3a;background:#E8F5E9;padding:5px 11px;border-radius:10px;border-left:3px solid #4CAF50;margin-bottom:10px;}

/* DRAG ITEMS */
.drag-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:white;border-radius:14px;padding:7px 9px;cursor:grab;box-shadow:0 3px 12px rgba(0,0,0,0.14);border:2px solid transparent;transition:transform 0.18s,box-shadow 0.18s;user-select:none;min-width:70px;font-size:0.7rem;font-weight:700;color:#2a4a2a;text-align:center;}
.drag-item:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 6px 18px rgba(0,0,0,0.2);}
.drag-item.dragging{opacity:0.35;transform:scale(0.93);}
.drag-item.placed{opacity:0.45;pointer-events:none;filter:grayscale(0.6);}
.item-icon{font-size:1.55rem;line-height:1;}

/* SOURCE ZONE */
.source-zone{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:rgba(200,230,201,0.35);border-radius:14px;padding:9px;border:2px dashed #81C784;min-height:68px;align-items:center;}

/* TARGET SLOTS — Activity 1 */
.target-slot{min-width:88px;min-height:62px;border:2px dashed #90CAF9;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;font-size:0.72rem;font-weight:600;color:#5a8a5a;background:rgba(255,255,255,0.6);transition:all 0.25s;padding:4px;text-align:center;}
.target-slot.over{border-color:#4CAF50;background:rgba(200,230,201,0.55);transform:scale(1.03);}
.target-slot.filled{border-color:#4CAF50 !important;background:rgba(200,230,201,0.72);}
.target-slot.wrong{animation:shake 0.38s ease;border-color:#ef5350 !important;}
.slot-hint{font-size:0.62rem;color:#90CAF9;font-weight:600;}

/* CYCLE SLOTS — Activity 2 */
.cycle-slot{min-width:98px;min-height:78px;border:2px dashed #90CAF9;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.72);transition:all 0.25s;padding:7px;text-align:center;gap:4px;}
.cycle-slot.over{border-color:#4CAF50;background:rgba(200,230,201,0.55);transform:scale(1.03);}
.cycle-slot.filled{border:2px solid #4CAF50 !important;background:rgba(200,230,201,0.82);}
.cycle-slot.wrong{animation:shake 0.38s ease;border-color:#ef5350 !important;}
.cycle-arrow{font-size:1.25rem;color:#1976D2;animation:arrowPulse 1.5s ease-in-out infinite;}
@keyframes arrowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.22);}}

/* BAG VISUAL — Activity 3 */
#bag-visual{position:relative;width:158px;height:198px;margin:0 auto;background:linear-gradient(135deg,#E3F2FD99,#BBDEFBcc);border:3px solid #64B5F6;border-radius:8px 8px 16px 16px;box-shadow:0 4px 20px rgba(33,150,243,0.28);}
.bag-seal{height:18px;background:linear-gradient(90deg,#1976D2,#2196F3,#1976D2);border-radius:5px 5px 0 0;display:flex;align-items:center;justify-content:center;}
.bag-seal-line{width:80%;height:3px;background:rgba(255,255,255,0.48);border-radius:2px;}
.bag-slot{position:absolute;border:2px dashed #90CAF9;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-size:0.6rem;font-weight:700;color:#1565C0;background:rgba(255,255,255,0.52);text-align:center;padding:4px;transition:all 0.25s;}
.bag-slot.over{border-color:#4CAF50;background:rgba(200,230,201,0.55);}
.bag-slot.filled{border-color:#4CAF50 !important;background:rgba(200,230,201,0.82);color:#1b5e20;}
.bag-slot.wrong{animation:shake 0.38s ease;border-color:#ef5350 !important;}
.water-in-bag{position:absolute;bottom:0;left:0;right:0;height:34%;background:linear-gradient(0deg,#1565C082,#2196F360);border-radius:0 0 13px 13px;animation:waterWave 2s ease-in-out infinite;}
@keyframes waterWave{0%,100%{height:34%;}50%{height:37%;}}
.droplet-anim{position:absolute;width:6px;height:8px;background:#2196F3;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;animation:dropRise 2.2s ease-in-out infinite;opacity:0;}
@keyframes dropRise{0%{transform:translateY(0);opacity:0;}18%{opacity:0.85;}80%{opacity:0.55;}100%{transform:translateY(-58px);opacity:0;}}
.cond-dot{position:absolute;width:5px;height:5px;background:rgba(33,150,243,0.7);border-radius:50%;animation:condAppear 3s ease-in-out infinite;}
@keyframes condAppear{0%,100%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1);}}

/* FEEDBACK */
#feedback{margin-top:7px;text-align:center;min-height:22px;font-weight:700;font-size:0.82rem;transition:all 0.3s;}
.fb-good{color:#2E7D32;}
.fb-bad{color:#c62828;}

/* POPUP */
#popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.52);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
#popup-overlay.show{display:flex;}
#popup{background:white;border-radius:26px;padding:28px 34px;text-align:center;max-width:390px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.32);animation:popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{0%{transform:scale(0.48);opacity:0;}100%{transform:scale(1);opacity:1;}}
.popup-emoji{font-size:3.4rem;display:block;margin-bottom:9px;animation:bounce 0.56s ease infinite alternate;}
@keyframes bounce{0%{transform:translateY(0);}100%{transform:translateY(-9px);}}
.popup-stars{font-size:1.45rem;letter-spacing:5px;margin-bottom:8px;}
.popup-title{font-family:'Fredoka One',cursive;font-size:1.55rem;color:#1b5e20;margin-bottom:5px;}
.popup-msg{font-size:0.88rem;color:#3a5a3a;margin-bottom:18px;line-height:1.55;}
.popup-btn{font-family:'Fredoka One',cursive;font-size:1.05rem;padding:11px 28px;border:none;border-radius:18px;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,#1565C0,#1976D2);color:white;box-shadow:0 4px 14px rgba(21,101,192,0.4);}
.popup-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(21,101,192,0.5);}
.popup-btn.final{background:linear-gradient(135deg,#E91E63,#C2185B);}

/* LAYOUT HELPERS */
.dz-row{display:flex;gap:8px;align-items:flex-start;}
.dz-col{display:flex;flex-direction:column;gap:6px;flex:1;}
.dz-label{font-size:0.68rem;font-weight:800;color:#5a8a5a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.act3-layout{display:flex;align-items:center;gap:14px;justify-content:center;}
.labels-col{display:flex;flex-direction:column;gap:7px;}

@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
@keyframes correctPop{0%{transform:scale(1);}50%{transform:scale(1.13);}100%{transform:scale(1);}}
.correct-pop{animation:correctPop 0.28s ease;}
</style>
</head>
<body>

<!-- ===== ANIMATED BACKGROUND ===== -->
<div id="bg">
  <div class="sun">
    <div class="sun-ray" style="transform:rotate(0deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(45deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(90deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(135deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(180deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(225deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(270deg) translateX(-3.5px)"></div>
    <div class="sun-ray" style="transform:rotate(315deg) translateX(-3.5px)"></div>
  </div>

  <div class="cloud" style="width:88px;height:26px;top:55px;animation-duration:27s;animation-delay:-6s;">
    <div style="position:absolute;width:38px;height:36px;background:white;border-radius:50%;top:-19px;left:14px;"></div>
    <div style="position:absolute;width:28px;height:28px;background:white;border-radius:50%;top:-13px;left:40px;"></div>
  </div>
  <div class="cloud" style="width:68px;height:20px;top:108px;animation-duration:21s;animation-delay:-14s;opacity:0.82;">
    <div style="position:absolute;width:28px;height:28px;background:white;border-radius:50%;top:-15px;left:9px;"></div>
    <div style="position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:-11px;left:30px;"></div>
  </div>
  <div class="cloud" style="width:58px;height:17px;top:38px;animation-duration:34s;animation-delay:-21s;opacity:0.68;">
    <div style="position:absolute;width:24px;height:24px;background:white;border-radius:50%;top:-13px;left:9px;"></div>
  </div>

  <div class="ground-strip">
    <div class="seed" style="left:6%;"></div>
    <div class="seed" style="left:17%;"></div>
    <div class="root-line" style="left:7.5%;height:18px;transform:rotate(9deg);"></div>
    <div class="root-line" style="left:8.5%;height:14px;transform:rotate(-7deg);"></div>
    <div class="root-line" style="left:19%;height:16px;transform:rotate(4deg);"></div>

    <!-- Plant 1 — left, tall pink flower -->
    <div class="plant" style="left:3%;height:72px;">
      <div class="stem" style="height:72px;"></div>
      <div class="leaf-l" style="bottom:46px;left:calc(50% - 23px);transform:rotate(-28deg);"></div>
      <div class="leaf-r" style="bottom:31px;left:calc(50% + 3px);transform:rotate(24deg);"></div>
      <div class="flower-head" style="background:#FF6B9D;"><div class="flower-center"></div></div>
    </div>

    <!-- Plant 2 — yellow -->
    <div class="plant" style="left:13%;height:54px;">
      <div class="stem" style="height:54px;"></div>
      <div class="leaf-l" style="bottom:28px;left:calc(50% - 22px);transform:rotate(-24deg);"></div>
      <div class="flower-head" style="background:#FFB300;"><div class="flower-center" style="background:#FF6B35;"></div></div>
    </div>

    <!-- Watering can LEFT — spout on right, handle on left, drops at spout tip -->
    <div class="can-wrap" style="left:21%;">
      <div class="can-body" style="background:linear-gradient(135deg,#26C6DA,#00ACC1);">
        <div class="can-spout" style="background:#00ACC1;"></div>
        <div class="can-handle" style="border-color:#00838F;"></div>
      </div>
      <div class="wdrop" style="left:52px;top:2px;width:4px;height:6px;background:#64B5F6;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;animation-delay:0s;"></div>
      <div class="wdrop" style="left:55px;top:2px;width:4px;height:6px;background:#2196F3;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;animation-delay:0.45s;"></div>
    </div>

    <!-- Plant 3 — right, purple -->
    <div class="plant" style="right:3%;height:80px;">
      <div class="stem" style="height:80px;"></div>
      <div class="leaf-l" style="bottom:52px;left:calc(50% - 23px);transform:rotate(-28deg);"></div>
      <div class="leaf-r" style="bottom:36px;left:calc(50% + 3px);transform:rotate(24deg);"></div>
      <div class="flower-head" style="background:#9C27B0;"><div class="flower-center"></div></div>
    </div>

    <!-- Plant 4 — orange -->
    <div class="plant" style="right:13%;height:50px;">
      <div class="stem" style="height:50px;"></div>
      <div class="leaf-l" style="bottom:27px;left:calc(50% - 21px);transform:rotate(-20deg);"></div>
      <div class="flower-head" style="background:#FF6B35;"><div class="flower-center" style="background:#FFD700;"></div></div>
    </div>

    <!-- Watering can RIGHT — same orientation (spout right, handle left) — no scaleX flip -->
    <div class="can-wrap" style="right:21%;">
      <div class="can-body" style="background:linear-gradient(135deg,#EF9A9A,#E57373);">
        <div class="can-spout" style="background:#EF9A9A;"></div>
        <div class="can-handle" style="border-color:#C62828;"></div>
      </div>
      <div class="wdrop" style="left:52px;top:2px;width:4px;height:6px;background:#FFCDD2;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;animation-delay:0.2s;"></div>
      <div class="wdrop" style="left:55px;top:2px;width:4px;height:6px;background:#EF9A9A;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;animation-delay:0.65s;"></div>
    </div>

    <div class="worm" style="left:29%;width:30px;animation-delay:-1s;"></div>
    <div class="worm" style="right:27%;width:22px;animation-delay:-0.5s;background:#F48FB1;"></div>

    <div class="butterfly" style="left:39%;bottom:36%;">
      <div class="wing" style="left:0;"></div>
      <div class="wing r"></div>
    </div>
    <div class="butterfly" style="right:34%;bottom:41%;animation-delay:-4s;animation-duration:10s;">
      <div class="wing" style="left:0;background:#80DEEA;"></div>
      <div class="wing r" style="background:#80DEEA;"></div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div id="titlebar">
    <span class="title-icon">💧</span>
    <h1>Water Cycle in a Bag</h1>

  </div>

  <div id="progress">
    <div class="prog-dot active" id="dot1">1</div>

  </div>

  <div id="activity-card">
    <div id="act-header">
      <span class="act-badge" id="act-badge">Activity 1</span>
      <span id="act-title">Set Up the Experiment!</span>

    <div id="activity-body"></div>
    <div id="feedback"></div>
  </div>
</div>

<!-- ===== POPUP ===== -->
<div id="popup-overlay">
  <div id="popup">
    <span class="popup-emoji" id="popup-emoji">🎉</span>
    <div class="popup-stars" id="popup-stars">⭐⭐⭐</div>

    <div class="popup-msg" id="popup-msg">You nailed it!</div>
    <button class="popup-btn" id="popup-btn">🌱 Next Activity!</button>
  </div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
var currentActivity = 1;
var scores   = [0, 0, 0];
var attempts = [0, 0, 0];

/* ============================================================
   CONFETTI
============================================================ */
function spawnConfetti() {
  var colors = ['#4CAF50','#FFD700','#2196F3','#FF6B9D','#FF6B35','#9C27B0'];
  for (var i = 0; i < 55; i++) {
    var el = document.createElement('div');
    var size = Math.random() * 9 + 5;
    el.style.cssText = 'position:fixed;width:' + size + 'px;height:' + size + 'px;' +
      'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
      'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';' +
      'left:' + (Math.random() * 100) + 'vw;top:-20px;z-index:300;pointer-events:none;';
    document.body.appendChild(el);
    var dur  = Math.random() * 1800 + 1400;
    var dlay = Math.random() * 400;
    (function(elem) {
      elem.animate([
        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
        { transform: 'translateY(105vh) rotate(' + Math.floor(Math.random() * 720) + 'deg)', opacity: 0 }
      ], { duration: dur, delay: dlay, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }).onfinish = function() { elem.remove(); };
    })(el);
  }
}

/* ============================================================
   DRAG & DROP ENGINE  (mouse + touch)
============================================================ */
var draggedItem = null;

function makeDraggable(el) {
  el.draggable = true;

  el.addEventListener('dragstart', function() {
    draggedItem = el;
    setTimeout(function() { el.classList.add('dragging'); }, 0);
  });
  el.addEventListener('dragend', function() {
    el.classList.remove('dragging');
    draggedItem = null;
  });

  /* touch support */
  var clone = null;
  el.addEventListener('touchstart', function(e) {
    draggedItem = el;
    var t = e.touches[0];
    clone = el.cloneNode(true);
    clone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;opacity:0.82;' +
      'transform:scale(1.06);left:' + (t.clientX - el.offsetWidth / 2) + 'px;' +
      'top:' + (t.clientY - el.offsetHeight / 2) + 'px;transition:none;';
    document.body.appendChild(clone);
    el.classList.add('dragging');
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    if (clone) {
      clone.style.left = (t.clientX - el.offsetWidth / 2) + 'px';
      clone.style.top  = (t.clientY - el.offsetHeight / 2) + 'px';
    }
    clearOvers();
    var under = document.elementFromPoint(t.clientX, t.clientY);
    var slot = under && (under.closest('.target-slot') || under.closest('.cycle-slot') || under.closest('.bag-slot'));
    if (slot && !slot.classList.contains('filled')) slot.classList.add('over');
  }, { passive: false });

  el.addEventListener('touchend', function(e) {
    if (clone) { clone.remove(); clone = null; }
    el.classList.remove('dragging');
    var t = e.changedTouches[0];
    var under = document.elementFromPoint(t.clientX, t.clientY);
    var slot = under && (under.closest('.target-slot') || under.closest('.cycle-slot') || under.closest('.bag-slot'));
    if (slot && !slot.classList.contains('filled') && draggedItem) {
      handleDrop(slot, draggedItem);
    }
    clearOvers();
    draggedItem = null;
  });
}

function makeDroppable(el) {
  el.addEventListener('dragover', function(e) {
    e.preventDefault();
    if (!el.classList.contains('filled')) el.classList.add('over');
  });
  el.addEventListener('dragleave', function() { el.classList.remove('over'); });
  el.addEventListener('drop', function(e) {
    e.preventDefault();
    el.classList.remove('over');
    if (draggedItem && !el.classList.contains('filled')) handleDrop(el, draggedItem);
  });
}

function clearOvers() {
  document.querySelectorAll('.over').forEach(function(s) { s.classList.remove('over'); });
}

/* central router — called after every drop */
function handleDrop(slot, item) {
  if (currentActivity === 1) handleDrop1(slot, item);
  else if (currentActivity === 2) handleDrop2(slot, item);
  else if (currentActivity === 3) handleDrop3(slot, item);
}

/* ============================================================
   SHARED HELPERS
============================================================ */
function setFeedback(msg, type) {
  var f = document.getElementById('feedback');
  f.textContent = msg;
  f.className = (type === 'bad') ? 'fb-bad' : 'fb-good';
}

function updateProgress(act) {
  for (var i = 1; i <= 3; i++) {
    var d = document.getElementById('dot' + i);
    d.classList.remove('active', 'done');
    if (i < act) d.classList.add('done');
    else if (i === act) d.classList.add('active');
  }
  document.getElementById('line1').classList.toggle('done', act > 1);
  document.getElementById('line2').classList.toggle('done', act > 2);
}

function updateStars() {
  var total  = scores[0] + scores[1] + scores[2];
  var earned = Math.round((total / 9) * 3);
  ['star1', 'star2', 'star3'].forEach(function(id, i) {
    document.getElementById(id).style.filter = (i < earned) ? 'none' : 'grayscale(1) opacity(0.35)';
  });
}

function calcScore(idx) {
  return (attempts[idx] === 0) ? 3 : (attempts[idx] <= 2) ? 2 : 1;
}

function markPlaced(slot, item, icon, label) {
  slot.innerHTML = '<span style="font-size:1.3rem;">' + icon + '</span>' +
                   '<span style="font-size:0.68rem;font-weight:700;color:#1b5e20;">' + label + '</span>';
  slot.classList.add('filled', 'correct-pop');
  item.classList.add('placed');
}

function markWrong(slot, idx, msg) {
  slot.classList.add('wrong');
  setTimeout(function() { slot.classList.remove('wrong'); }, 420);
  attempts[idx]++;
  setFeedback(msg, 'bad');
}

/* ============================================================
   POPUP — generic, driven by config object
============================================================ */
function showPopup(cfg) {
  document.getElementById('popup-emoji').textContent = cfg.emoji;
  document.getElementById('popup-stars').textContent = cfg.stars;
  document.getElementById('popup-title').textContent = cfg.title;
  document.getElementById('popup-msg').innerHTML     = cfg.msg;
  var btn = document.getElementById('popup-btn');
  btn.textContent = cfg.btnText;
  btn.className   = 'popup-btn' + (cfg.final ? ' final' : '');
  /* assign fresh onclick each time — no stale closure */
  btn.onclick = cfg.btnAction;
  document.getElementById('popup-overlay').classList.add('show');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}

/* go to the next activity number that was passed in */
function goToActivity(num) {
  closePopup();
  currentActivity = num;
  loadActivity(num);
}

/* ============================================================

/* ============================================================
   LOAD ACTIVITY
============================================================ */
function loadActivity(num) {
  updateProgress(num);
  document.getElementById('act-badge').textContent       = 'Activity ' + num;
  document.getElementById('feedback').textContent        = '';

  var titles = { 1:'Set Up the Experiment!', 2:'Order the Water Cycle!', 3:'Label the Bag!' };
  var instrs  = {
    1:'🌿 Drag each item to its correct spot to set up the Water Cycle in a Bag!',
    2:'☁️ Arrange the three stages of the water cycle in the correct order — 1st to last!',
    3:'🫙 The experiment is running! Drag each label to the right place on the bag!'
  };
  document.getElementById('act-title').textContent       = titles[num];
  document.getElementById('act-instruction').textContent = instrs[num];

  if      (num === 1) renderActivity1();
  else if (num === 2) renderActivity2();
  else if (num === 3) renderActivity3();
}
