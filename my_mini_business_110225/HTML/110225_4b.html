<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Word Scramble Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Bubblegum+Sans&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* ============================================================
   MAGICAL ANIMATED BACKGROUND
   ============================================================ */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(180deg,
    #87CEEB 0%,        /* sky blue top */
    #B0E0FF 30%,       /* lighter sky */
    #C8F5A0 60%,       /* grass transition */
    #7DC950 80%,       /* grass */
    #5BAD35 100%       /* dark grass */
  );
  overflow: hidden;
}

/* Sun */
.sun {
  position: absolute;
  top: 30px;
  right: 80px;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, #FFE234 60%, #FFC200 100%);
  border-radius: 50%;
  box-shadow: 0 0 0 16px rgba(255,226,52,0.25), 0 0 0 32px rgba(255,226,52,0.12), 0 0 60px rgba(255,200,0,0.4);
  animation: sunPulse 4s ease-in-out infinite;
}
.sun-ray {
  position: absolute;
  width: 10px;
  height: 28px;
  background: linear-gradient(180deg, #FFE234, transparent);
  border-radius: 6px;
  left: 50%;
  top: 50%;
  transform-origin: 50% 0;
  margin-left: -5px;
  margin-top: -55px;
}
@keyframes sunPulse {
  0%,100%{box-shadow:0 0 0 16px rgba(255,226,52,.25),0 0 0 32px rgba(255,226,52,.12),0 0 60px rgba(255,200,0,.4);}
  50%{box-shadow:0 0 0 24px rgba(255,226,52,.35),0 0 0 48px rgba(255,226,52,.18),0 0 90px rgba(255,200,0,.6);}
}

/* Clouds */
.cloud {
  position: absolute;
  border-radius: 50px;
  background: white;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
  animation: cloudFloat linear infinite;
  opacity: 0.92;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
@keyframes cloudFloat {
  from { transform: translateX(-300px); }
  to   { transform: translateX(110vw); }
}

/* Rainbow */
.rainbow {
  position: absolute;
  top: 60px;
  left: -10%;
  width: 55%;
  height: 220px;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  background: transparent;
  border: 18px solid transparent;
  border-top: 18px solid rgba(255,80,80,0.35);
  box-shadow:
    0 -18px 0 rgba(255,160,40,0.3),
    0 -36px 0 rgba(255,230,50,0.28),
    0 -54px 0 rgba(100,220,80,0.28),
    0 -72px 0 rgba(50,160,255,0.28),
    0 -90px 0 rgba(160,80,220,0.25);
  animation: rainbowFade 6s ease-in-out infinite;
}
@keyframes rainbowFade {
  0%,100%{opacity:0.7;} 50%{opacity:1;}
}

/* Mountains / Hills */
.hill {
  position: absolute;
  border-radius: 50%;
  bottom: 0;
}

/* Flowers */
.flower {
  position: absolute;
  bottom: 0;
  font-size: 28px;
  animation: sway ease-in-out infinite;
  transform-origin: bottom center;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
@keyframes sway {
  0%,100%{transform:rotate(-8deg);}
  50%{transform:rotate(8deg);}
}

/* Butterflies */
.butterfly {
  position: absolute;
  font-size: 22px;
  animation: butterflyFly linear infinite;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}
@keyframes butterflyFly {
  0%   { transform: translate(0,0) rotate(0deg); }
  25%  { transform: translate(60px,-40px) rotate(10deg); }
  50%  { transform: translate(30px,-80px) rotate(-5deg); }
  75%  { transform: translate(-30px,-50px) rotate(8deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}

/* Birds */
.bird {
  position: absolute;
  font-size: 18px;
  animation: birdFly linear infinite;
}
@keyframes birdFly {
  from{transform:translateX(-80px);}
  to{transform:translateX(110vw) translateY(-40px);}
}

/* Stars (night elements — kept subtle daytime sparkles) */
.sparkle {
  position: absolute;
  font-size: 16px;
  animation: sparklePop ease-in-out infinite;
  pointer-events: none;
}
@keyframes sparklePop {
  0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);}
  50%{opacity:1;transform:scale(1.3) rotate(180deg);}
}

/* Balloons */
.balloon {
  position: absolute;
  font-size: 32px;
  animation: balloonRise linear infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}
@keyframes balloonRise {
  from{transform:translateY(110vh) rotate(-5deg);}
  25%{transform:translateY(75vh) rotate(5deg);}
  50%{transform:translateY(40vh) rotate(-5deg);}
  75%{transform:translateY(10vh) rotate(5deg);}
  to{transform:translateY(-10vh) rotate(0deg);opacity:0;}
}

/* Trees */
.tree {
  position: absolute;
  bottom: 0;
  font-size: 60px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  animation: treeSway ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes treeSway {
  0%,100%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
}

/* Bees */
.bee {
  position: absolute;
  font-size: 20px;
  animation: beeBuzz ease-in-out infinite;
}
@keyframes beeBuzz {
  0%,100%{transform:translate(0,0) rotate(-5deg);}
  25%{transform:translate(20px,-15px) rotate(10deg);}
  50%{transform:translate(5px,-30px) rotate(-8deg);}
  75%{transform:translate(-15px,-12px) rotate(5deg);}
}

/* Floating hearts/stars */
.floaty-icon {
  position: absolute;
  animation: floatyIcon ease-in-out infinite;
  font-size: 20px;
  opacity: 0.7;
}
@keyframes floatyIcon {
  0%,100%{transform:translateY(0) rotate(-10deg);opacity:0.7;}
  50%{transform:translateY(-18px) rotate(10deg);opacity:1;}
}

/* ============================================================
   MAIN GAME UI
   ============================================================ */
.wrapper {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  padding: 16px 14px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Planrs pill */
.planrs-pill {
  position: fixed;
  top: 12px; right: 14px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,200,50,0.5);
  color: #E07020;
  font-family: 'Boogaloo', cursive;
  font-size: 15px;
  padding: 5px 14px;
  border-radius: 30px;
  z-index: 100;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
}

/* Title */
.game-title {
  font-family: 'Bubblegum Sans', cursive;
  font-size: clamp(32px, 7vw, 60px);
  color: #fff;
  text-shadow:
    3px 3px 0 #FF6B35,
    6px 6px 0 rgba(255,107,53,0.3),
    0 0 30px rgba(255,230,50,0.6);
  text-align: center;
  margin-top: 50px;
  margin-bottom: 4px;
  letter-spacing: 2px;
  animation: titleBounce 2.5s ease-in-out infinite;
}
@keyframes titleBounce {
  0%,100%{transform:translateY(0) rotate(-1deg);}
  50%{transform:translateY(-8px) rotate(1deg);}
}

.game-sub {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(15px, 3vw, 20px);
  color: rgba(255,255,255,0.95);
  text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: 1px;
}

/* Stats */
.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-bubble {
  background: white;
  border-radius: 50px;
  padding: 10px 20px;
  text-align: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.9);
  border: 3px solid rgba(255,200,50,0.4);
  min-width: 88px;
  transition: transform 0.2s;
}
.stat-bubble:hover { transform: scale(1.06) rotate(-2deg); }

.stat-n {
  font-family: 'Bubblegum Sans', cursive;
  font-size: 26px;
  color: #FF6B35;
  display: block;
  line-height: 1;
}
.stat-l {
  font-size: 11px;
  color: #aaa;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* Progress */
.prog-wrap {
  width: 100%;
  max-width: 520px;
  height: 14px;
  background: rgba(255,255,255,0.4);
  border-radius: 20px;
  margin-bottom: 18px;
  border: 2px solid rgba(255,255,255,0.6);
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}
.prog-fill {
  height: 100%;
  border-radius: 20px;
  background: linear-gradient(90deg, #FF6B35, #FFD93D, #6BCB77, #4ECDC4);
  background-size: 300%;
  animation: progAnim 2s linear infinite;
  transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes progAnim {
  0%{background-position:0%;}100%{background-position:300%;}
}

/* Word card */
.word-card {
  width: 100%;
  max-width: 560px;
  background: white;
  border-radius: 28px;
  padding: 26px 22px 22px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.18),
    0 0 0 4px rgba(255,220,50,0.35),
    inset 0 2px 0 rgba(255,255,255,1);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.word-card::before {
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:6px;
  background: linear-gradient(90deg,#FF6B35,#FFD93D,#6BCB77,#4ECDC4,#A78BFA,#FF6B9D);
  background-size:400%;
  animation:progAnim 3s linear infinite;
}
@keyframes cardIn {
  from{opacity:0;transform:scale(0.85) translateY(30px) rotate(-2deg);}
  to{opacity:1;transform:scale(1) translateY(0) rotate(0deg);}
}

/* Word badge */
.word-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg,#FFD93D,#FF9A3C);
  color: white;
  font-family: 'Boogaloo', cursive;
  font-size: 14px;
  padding: 5px 16px;
  border-radius: 30px;
  margin-bottom: 14px;
  box-shadow: 0 4px 12px rgba(255,154,60,0.4);
  letter-spacing: 0.5px;
}

/* Clue */
.clue-box {
  background: linear-gradient(135deg, #FFFBEA, #FFF3C4);
  border-radius: 18px;
  padding: 14px 16px;
  margin-bottom: 18px;
  border-left: 5px solid #FFD93D;
  font-size: clamp(14px,2.8vw,17px);
  color: #444;
  font-weight: 700;
  line-height: 1.5;
  box-shadow: 0 3px 10px rgba(255,210,50,0.18);
}

/* ---- PICTURE HINT (big emoji for kids) ---- */
.pic-hint {
  font-size: 52px;
  text-align: center;
  margin-bottom: 12px;
  animation: picBounce 1.8s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes picBounce {
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-8px) scale(1.08);}
}

/* Answer row */
.section-label {
  font-family: 'Boogaloo', cursive;
  font-size: 13px;
  color: #bbb;
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.answer-row {
  display: flex;
  gap: 7px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 62px;
  padding: 8px 6px;
  background: linear-gradient(135deg,rgba(78,205,196,0.07),rgba(78,205,196,0.04));
  border: 3px dashed rgba(78,205,196,0.35);
  border-radius: 18px;
  margin-bottom: 16px;
  transition: all 0.2s;
}
.answer-row.drag-over {
  background: rgba(78,205,196,0.15);
  border-color: #4ECDC4;
  box-shadow: 0 0 20px rgba(78,205,196,0.3);
}

.aslot {
  width: 48px;
  height: 54px;
  background: #F8FAFF;
  border: 3px solid #D0E8FF;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 24px;
  color: #2C5F8A;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.07), inset 0 1px 0 white;
  position: relative;
}
.aslot::after {
  content:'';
  position:absolute;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:2px;
  background:#D0E8FF;
  border-radius:2px;
}
.aslot:hover:not(:empty) {
  background:#FFF0D5;
  border-color:#FF9A3C;
  transform:scale(1.07);
}
.aslot.filled {
  background: linear-gradient(135deg,#EAF7FF,#D0EEFF);
  border-color: #4ECDC4;
  box-shadow: 0 4px 14px rgba(78,205,196,0.28), inset 0 1px 0 white;
  animation: slotPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.aslot.correct-slot {
  background: linear-gradient(135deg,#D5F5E3,#A9DFBF);
  border-color: #27AE60;
  color: #1A7A45;
  animation: bigPop 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
.aslot.wrong-slot {
  background: linear-gradient(135deg,#FADBD8,#F1948A);
  border-color: #E74C3C;
  animation: wobbly 0.45s ease;
}
@keyframes slotPop {
  from{transform:scale(0.6) rotate(-15deg);}to{transform:scale(1) rotate(0);}
}
@keyframes bigPop {
  0%{transform:scale(0.7);}55%{transform:scale(1.25);}100%{transform:scale(1);}
}
@keyframes wobbly {
  0%,100%{transform:rotate(0);}20%{transform:rotate(-7deg);}40%{transform:rotate(7deg);}60%{transform:rotate(-5deg);}80%{transform:rotate(5deg);}
}

/* Scrambled */
.scrambled-area {
  display: flex;
  gap: 7px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 64px;
  padding: 10px 6px;
  background: linear-gradient(135deg,rgba(255,217,61,0.08),rgba(255,107,53,0.05));
  border: 3px dashed rgba(255,180,50,0.35);
  border-radius: 18px;
  margin-bottom: 20px;
  transition: all 0.2s;
}
.scrambled-area.drag-over {
  background: rgba(255,180,50,0.14);
  border-color: #FFD93D;
}

.tile {
  width: 48px;
  height: 54px;
  background: linear-gradient(135deg,#FFF3B0,#FFE57A);
  border: 3px solid #FFB830;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 24px;
  color: #7A4A00;
  cursor: grab;
  transition: all 0.18s;
  box-shadow: 0 5px 14px rgba(255,180,50,0.35), inset 0 2px 0 rgba(255,255,255,0.7);
  user-select: none;
  animation: tileIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.tile:hover {
  background: linear-gradient(135deg,#FFE57A,#FFD93D);
  transform: translateY(-7px) rotate(4deg) scale(1.1);
  box-shadow: 0 14px 28px rgba(255,180,50,0.5);
  z-index: 5;
}
.tile:active { cursor: grabbing; }
.tile.used {
  opacity: 0;
  pointer-events: none;
  transform: scale(0);
  transition: all 0.18s;
}
.tile.dragging { opacity: 0.3; }
@keyframes tileIn {
  from{opacity:0;transform:scale(0.4) rotate(-20deg) translateY(20px);}
  to{opacity:1;transform:scale(1) rotate(0deg) translateY(0);}
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.gbtn {
  padding: 11px 22px;
  border: none;
  border-radius: 50px;
  font-family: 'Boogaloo', cursive;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.5px;
  box-shadow: 0 5px 14px rgba(0,0,0,0.15);
}
.gbtn:hover { transform: translateY(-4px) scale(1.07); }
.gbtn:active { transform: scale(0.95); }
.gbtn-clear { background: linear-gradient(135deg,#BDC3C7,#95A5A6); color:white; }
.gbtn-check { background: linear-gradient(135deg,#3498DB,#1A5FB5); color:white; box-shadow:0 5px 16px rgba(52,152,219,0.45); }
.gbtn-hint  { background: linear-gradient(135deg,#F39C12,#E07020); color:white; box-shadow:0 5px 16px rgba(243,156,18,0.45); }
.gbtn-next  { background: linear-gradient(135deg,#27AE60,#2ECC71); color:white; box-shadow:0 5px 16px rgba(39,174,96,0.45); display:none; }

/* Feedback */
.feedback {
  font-family: 'Bubblegum Sans', cursive;
  font-size: 20px;
  min-height: 30px;
  text-align: center;
  margin: 12px 0;
  animation: feedPop 0.3s ease;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.12);
}
@keyframes feedPop {
  from{transform:scale(0.7);}to{transform:scale(1);}
}

/* Confetti particle */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  animation: confettiFall linear forwards;
  border-radius: 3px;
}
@keyframes confettiFall {
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--dr));opacity:0;}
}

/* Result panel */
.result-panel {
  display: none;
  text-align: center;
  background: white;
  border-radius: 32px;
  padding: 40px 28px 32px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 0 0 5px rgba(255,220,50,0.3);
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.result-panel::before {
  content:'';position:absolute;top:0;left:0;right:0;height:7px;
  background:linear-gradient(90deg,#FF6B35,#FFD93D,#6BCB77,#4ECDC4,#A78BFA,#FF6B9D);
  background-size:400%;animation:progAnim 3s linear infinite;
}

.res-emoji {
  font-size: 80px;
  display: block;
  margin-bottom: 10px;
  animation: bigPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.res-title {
  font-family: 'Bubblegum Sans', cursive;
  font-size: 30px;
  color: #FF6B35;
  margin-bottom: 8px;
}
.res-sub {
  font-size: 15px;
  font-weight: 700;
  color: #666;
  margin-bottom: 18px;
  line-height: 1.6;
}
.stars-display {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}
.star-big {
  font-size: 44px;
  animation: starSpin 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes starSpin {
  from{transform:scale(0) rotate(-40deg);opacity:0;}
  to{transform:scale(1) rotate(0deg);opacity:1;}
}
.gbtn-finish { background: linear-gradient(135deg,#A78BFA,#7C3AED); color:white; box-shadow:0 5px 16px rgba(167,139,250,0.5); }

/* Drag ghost */
.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transition: none;
  width: 48px;
  height: 54px;
  background: linear-gradient(135deg,#FFE57A,#FFD93D);
  border: 3px solid #FFB830;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 24px;
  color: #7A4A00;
  box-shadow: 0 10px 28px rgba(0,0,0,0.3);
  transform: rotate(8deg) scale(1.15);
  opacity: 0.9;
}
</style>
</head>
<body>

<!-- ======================== ANIMATED BACKGROUND ======================== -->
<div class="bg" id="bg">
  <!-- Rainbow -->
  <div class="rainbow"></div>
  <!-- Sun -->
  <div class="sun" id="sun">
    <!-- rays added by JS -->
  </div>
</div>

<div class="planrs-pill">⭐ Planrs</div>

<div class="wrapper">
  <div class="game-title">🌈 Word Fun!</div>
  <div class="game-sub">🎮 Drag & Drop — Unscramble the Words!</div>

  <div class="stats-row">
    <div class="stat-bubble">
      <span class="stat-n" id="scoreVal">0</span>
      <div class="stat-l">⭐ Stars</div>
    </div>
    <div class="stat-bubble">
      <span class="stat-n" id="wordNum">1/8</span>
      <div class="stat-l">📖 Word</div>
    </div>
    <div class="stat-bubble">
      <span class="stat-n" id="solvedVal">0</span>
      <div class="stat-l">✅ Done</div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-fill" id="progFill" style="width:0%"></div>
  </div>

  <div class="word-card" id="wordCard">
    <div class="word-badge" id="wordBadge">🌟 Word 1 of 8</div>
    <div class="pic-hint" id="picHint">🛒</div>
    <div class="clue-box" id="clueText">Loading...</div>

    <div class="section-label">👇 DROP YOUR LETTERS HERE</div>
    <div class="answer-row" id="answerRow"></div>

    <div class="section-label">🔤 SCRAMBLED LETTERS — DRAG OR TAP!</div>
    <div class="scrambled-area" id="scrambledArea"></div>

    <div class="btn-row">
      <button class="gbtn gbtn-clear" onclick="clearAnswer()">🔄 Clear</button>
      <button class="gbtn gbtn-check" onclick="checkAnswer()">✅ Check!</button>
      <button class="gbtn gbtn-hint"  onclick="showHint()">💡 Hint!</button>
      <button class="gbtn gbtn-next"  id="nextBtn" onclick="nextWord()">Next ➡️</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="btn-row" style="margin-top:6px;">
    <button class="gbtn gbtn-clear" onclick="resetGame()">🔄 Try Again</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <span class="res-emoji" id="resEmoji">🏆</span>
    <div class="stars-display" id="starsDisplay"></div>
    <div class="res-title" id="resTitle">Amazing!</div>
    <div class="res-sub" id="resSub"></div>
    <div class="btn-row">
      <button class="gbtn gbtn-clear" onclick="resetGame()">🔄 Play Again</button>
      <button class="gbtn gbtn-finish" onclick="bigCelebrate()">🏆 Finish!</button>
    </div>
  </div>
</div>

<script>
// ======================================================
// EASY WORDS — short, simple, kid-friendly (4–8 letters)
// ======================================================
const words = [
  { word:"SHOP",    emoji:"🛒", clue:"A place where you BUY things — online or in a market!" },
  { word:"SELL",    emoji:"💰", clue:"When you give something to someone for money!" },
  { word:"PHOTO",   emoji:"📸", clue:"A picture taken with your phone or camera!" },
  { word:"BRAND",   emoji:"🌟", clue:"The special name and logo of your business!" },
  { word:"PRICE",   emoji:"🏷️", clue:"How much money something COSTS!" },
  { word:"ORDER",   emoji:"📦", clue:"When a customer asks to BUY something from you!" },
  { word:"REVIEW",  emoji:"⭐", clue:"What a customer SAYS about your product — good or bad!" },
  { word:"DIGITAL", emoji:"💻", clue:"Things on a computer or phone — like the Internet!" },
];

// ======================================================
// STATE
// ======================================================
let current=0, score=0, solved=0;
let shuffledWords=[];
let placedLetters=[];   // array indexed by slot, value = {letter, tileIdx} | null
let tileUsed=[];
let hintUsed=false;
let dragSrcTile=null;
let dragSrcSlot=null;
let ghostEl=null;

// ======================================================
// BACKGROUND BUILDER
// ======================================================
function buildBG() {
  const bg = document.getElementById('bg');

  // Sun rays
  const sun = document.getElementById('sun');
  for (let i=0;i<12;i++) {
    const r=document.createElement('div');
    r.className='sun-ray';
    r.style.transform=`rotate(${i*30}deg)`;
    sun.appendChild(r);
  }

  // Clouds
  const cloudData=[
    {w:160,h:50,top:'8%',dur:28,delay:0},
    {w:120,h:40,top:'14%',dur:22,delay:-8},
    {w:200,h:60,top:'5%',dur:35,delay:-15},
    {w:100,h:35,top:'20%',dur:20,delay:-5},
    {w:180,h:55,top:'12%',dur:30,delay:-20},
  ];
  cloudData.forEach(c=>{
    const cl=document.createElement('div');
    cl.className='cloud';
    cl.style.cssText=`width:${c.w}px;height:${c.h}px;top:${c.top};
      animation-duration:${c.dur}s;animation-delay:${c.delay}s;`;
    const b1=document.createElement('div');
    b1.style.cssText=`width:${c.w*0.5}px;height:${c.w*0.5}px;top:-${c.h*0.5}px;left:${c.w*0.2}px;`;
    const b2=document.createElement('div');
    b2.style.cssText=`width:${c.w*0.35}px;height:${c.w*0.35}px;top:-${c.h*0.35}px;left:${c.w*0.5}px;`;
    cl.appendChild(b1); cl.appendChild(b2);
    bg.appendChild(cl);
  });

  // Hills (big coloured mounds at the bottom)
  const hills=[
    {w:600,h:220,left:'-5%',bg:'#6EC95A'},
    {w:500,h:180,left:'30%',bg:'#7DD65B'},
    {w:700,h:200,left:'60%',bg:'#65C450'},
    {w:400,h:150,left:'-2%',bg:'#5BA840'},
    {w:450,h:170,left:'75%',bg:'#68C055'},
  ];
  hills.forEach(h=>{
    const el=document.createElement('div');
    el.className='hill';
    el.style.cssText=`width:${h.w}px;height:${h.h}px;left:${h.left};bottom:-${h.h*0.3}px;background:${h.bg};box-shadow:inset 0 10px 20px rgba(255,255,255,0.2);`;
    bg.appendChild(el);
  });

  // Trees
  const treeEmojis=['🌳','🌲','🌴','🌵'];
  const treePos=[5,15,82,92,68,45];
  treePos.forEach((p,i)=>{
    const t=document.createElement('div');
    t.className='tree';
    t.textContent=treeEmojis[i%treeEmojis.length];
    t.style.cssText=`left:${p}%;animation-duration:${3+Math.random()*2}s;animation-delay:${Math.random()*2}s;font-size:${50+Math.random()*30}px;`;
    bg.appendChild(t);
  });

  // Flowers
  const flowerEmojis=['🌸','🌺','🌼','🌻','🌷','💐'];
  for(let i=0;i<14;i++){
    const f=document.createElement('div');
    f.className='flower';
    f.textContent=flowerEmojis[i%flowerEmojis.length];
    f.style.cssText=`left:${3+i*6.5}%;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*2}s;font-size:${22+Math.random()*12}px;bottom:${Math.random()*40}px;`;
    bg.appendChild(f);
  }

  // Butterflies
  const butterflies=['🦋','🐝','🐛'];
  for(let i=0;i<6;i++){
    const b=document.createElement('div');
    b.className='butterfly';
    b.textContent=butterflies[i%butterflies.length];
    b.style.cssText=`left:${10+Math.random()*80}%;top:${30+Math.random()*35}%;animation-duration:${5+Math.random()*5}s;animation-delay:${Math.random()*4}s;font-size:${16+Math.random()*14}px;`;
    bg.appendChild(b);
  }

  // Birds
  for(let i=0;i<4;i++){
    const b=document.createElement('div');
    b.className='bird';
    b.textContent='🐦';
    b.style.cssText=`top:${8+Math.random()*18}%;animation-duration:${12+Math.random()*10}s;animation-delay:${-Math.random()*12}s;font-size:${14+Math.random()*10}px;`;
    bg.appendChild(b);
  }

  // Balloons
  const balloonEmojis=['🎈','🎀','🎊'];
  for(let i=0;i<5;i++){
    const b=document.createElement('div');
    b.className='balloon';
    b.textContent=balloonEmojis[i%balloonEmojis.length];
    b.style.cssText=`left:${5+Math.random()*90}%;animation-duration:${14+Math.random()*12}s;animation-delay:${-Math.random()*14}s;font-size:${26+Math.random()*16}px;`;
    bg.appendChild(b);
  }

  // Floating sparkles
  const sparkles=['✨','⭐','💫','🌟'];
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=sparkles[i%sparkles.length];
    s.style.cssText=`left:${Math.random()*100}%;top:${5+Math.random()*65}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;font-size:${12+Math.random()*10}px;`;
    bg.appendChild(s);
  }

  // Bees
  for(let i=0;i<4;i++){
    const b=document.createElement('div');
    b.className='bee';
    b.textContent='🐝';
    b.style.cssText=`left:${15+Math.random()*70}%;top:${25+Math.random()*40}%;animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(b);
  }

  // Floaty icons
  const icons=['🍭','🍬','🎁','🎠','🎪','🌈'];
  icons.forEach((ic,i)=>{
    const el=document.createElement('div');
    el.className='floaty-icon';
    el.textContent=ic;
    el.style.cssText=`left:${3+Math.random()*94}%;top:${3+Math.random()*60}%;animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*3}s;font-size:${16+Math.random()*14}px;`;
    bg.appendChild(el);
  });
}

// ======================================================
// HELPERS
// ======================================================
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}
function scrambleWord(w){
  let a=w.split(''),s;
  do{s=[...a].sort(()=>Math.random()-0.5);}while(s.join('')===w);
  return s;
}

// ======================================================
// LOAD WORD
// ======================================================
function loadWord(){
  if(current>=shuffledWords.length){showResult();return;}
  placedLetters=new Array(shuffledWords[current].word.length).fill(null);
  tileUsed=[];
  hintUsed=false;

  const w=shuffledWords[current];
  document.getElementById('wordBadge').textContent=`🌟 Word ${current+1} of ${shuffledWords.length}`;
  document.getElementById('wordNum').textContent=`${current+1}/${shuffledWords.length}`;
  document.getElementById('clueText').textContent='🔍 '+w.clue;
  document.getElementById('picHint').textContent=w.emoji;
  document.getElementById('progFill').style.width=(current/shuffledWords.length*100)+'%';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('feedback').textContent='';

  // Scrambled tiles
  const scArea=document.getElementById('scrambledArea');
  scArea.innerHTML='';
  const sc=scrambleWord(w.word);
  sc.forEach((letter,i)=>{
    tileUsed.push(false);
    const tile=makeTile(letter,i);
    tile.style.animationDelay=(i*0.06)+'s';
    scArea.appendChild(tile);
  });

  // Answer slots
  const ansRow=document.getElementById('answerRow');
  ansRow.innerHTML='';
  for(let i=0;i<w.word.length;i++) ansRow.appendChild(makeSlot(i));

  // Card animation
  const card=document.getElementById('wordCard');
  card.style.animation='none';
  card.offsetHeight;
  card.style.animation='cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1)';

  setupZones();
}

// ======================================================
// MAKE TILE
// ======================================================
function makeTile(letter,idx){
  const t=document.createElement('div');
  t.className='tile';
  t.id='tile-'+idx;
  t.dataset.idx=idx;
  t.textContent=letter;

  // Tap
  t.addEventListener('click',()=>{
    if(tileUsed[idx])return;
    tapPlaceLetter(idx,letter,t);
  });

  // Drag
  t.draggable=true;
  t.addEventListener('dragstart',e=>{
    if(tileUsed[idx]){e.preventDefault();return;}
    dragSrcTile=idx; dragSrcSlot=null;
    t.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',letter);
    spawnGhost(e,letter);
    setTimeout(()=>t.style.opacity='0.2',0);
  });
  t.addEventListener('dragend',()=>{
    t.classList.remove('dragging');
    if(!tileUsed[idx])t.style.opacity='1';
    killGhost();
  });

  // Touch
  touchDrag(t,letter,idx);
  return t;
}

// ======================================================
// MAKE SLOT
// ======================================================
function makeSlot(si){
  const s=document.createElement('div');
  s.className='aslot';
  s.id='aslot-'+si;
  s.dataset.slotIdx=si;

  s.addEventListener('click',()=>{if(s.textContent)returnFromSlot(si);});

  s.draggable=true;
  s.addEventListener('dragstart',e=>{
    if(!s.textContent){e.preventDefault();return;}
    dragSrcSlot=si; dragSrcTile=null;
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',s.textContent);
    spawnGhost(e,s.textContent);
    setTimeout(()=>s.style.opacity='0.2',0);
  });
  s.addEventListener('dragend',()=>{s.style.opacity='1';killGhost();});

  s.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
  s.addEventListener('drop',e=>{
    e.preventDefault();
    const letter=e.dataTransfer.getData('text/plain');
    if(dragSrcTile!==null) dropIntoSlot(si,letter,dragSrcTile);
    else if(dragSrcSlot!==null&&dragSrcSlot!==si) swapSlots(dragSrcSlot,si);
    dragSrcTile=null;dragSrcSlot=null;
  });
  return s;
}

function setupZones(){
  const ansRow=document.getElementById('answerRow');
  ansRow.addEventListener('dragover',e=>{e.preventDefault();ansRow.classList.add('drag-over');});
  ansRow.addEventListener('dragleave',()=>ansRow.classList.remove('drag-over'));
  ansRow.addEventListener('drop',e=>{
    e.preventDefault();ansRow.classList.remove('drag-over');
    if(dragSrcTile!==null){
      const letter=e.dataTransfer.getData('text/plain');
      const firstEmpty=placedLetters.findIndex(p=>!p);
      if(firstEmpty!==-1) dropIntoSlot(firstEmpty,letter,dragSrcTile);
    }
    dragSrcTile=null;dragSrcSlot=null;
  });

  const scArea=document.getElementById('scrambledArea');
  scArea.addEventListener('dragover',e=>{e.preventDefault();scArea.classList.add('drag-over');});
  scArea.addEventListener('dragleave',()=>scArea.classList.remove('drag-over'));
  scArea.addEventListener('drop',e=>{
    e.preventDefault();scArea.classList.remove('drag-over');
    if(dragSrcSlot!==null) returnFromSlot(dragSrcSlot);
    dragSrcTile=null;dragSrcSlot=null;
  });
}

// ======================================================
// PLACE / REMOVE
// ======================================================
function tapPlaceLetter(idx,letter,tile){
  const firstEmpty=placedLetters.findIndex(p=>!p);
  if(firstEmpty===-1)return;
  tileUsed[idx]=true;
  tile.classList.add('used');
  placedLetters[firstEmpty]={letter,tileIdx:idx};
  const slot=document.getElementById('aslot-'+firstEmpty);
  slot.textContent=letter;
  slot.classList.add('filled');
  autoCheck();
}

function dropIntoSlot(si,letter,tileIdx){
  if(tileUsed[tileIdx])return;
  if(placedLetters[si]) returnFromSlot(si);
  tileUsed[tileIdx]=true;
  const tile=document.getElementById('tile-'+tileIdx);
  if(tile){tile.classList.add('used');tile.style.opacity='0';}
  placedLetters[si]={letter,tileIdx};
  const slot=document.getElementById('aslot-'+si);
  slot.textContent=letter;
  slot.classList.add('filled');
  autoCheck();
}

function returnFromSlot(si){
  const entry=placedLetters[si];
  if(!entry)return;
  tileUsed[entry.tileIdx]=false;
  const tile=document.getElementById('tile-'+entry.tileIdx);
  if(tile){tile.classList.remove('used');tile.style.opacity='1';}
  placedLetters[si]=null;
  const slot=document.getElementById('aslot-'+si);
  slot.textContent='';
  slot.className='aslot';
}

function swapSlots(a,b){
  const sa=document.getElementById('aslot-'+a);
  const sb=document.getElementById('aslot-'+b);
  const tmp=placedLetters[a];
  placedLetters[a]=placedLetters[b]||null;
  placedLetters[b]=tmp||null;
  sa.textContent=placedLetters[a]?placedLetters[a].letter:'';
  sb.textContent=placedLetters[b]?placedLetters[b].letter:'';
  sa.className='aslot'+(sa.textContent?' filled':'');
  sb.className='aslot'+(sb.textContent?' filled':'');
}

function clearAnswer(){
  const w=shuffledWords[current];
  for(let i=0;i<w.word.length;i++){
    if(placedLetters[i]){
      tileUsed[placedLetters[i].tileIdx]=false;
      const t=document.getElementById('tile-'+placedLetters[i].tileIdx);
      if(t){t.classList.remove('used');t.style.opacity='1';}
      placedLetters[i]=null;
    }
  }
  document.querySelectorAll('.aslot').forEach(s=>{s.textContent='';s.className='aslot';});
}

function autoCheck(){
  const w=shuffledWords[current];
  if(placedLetters.every(p=>p)) setTimeout(checkAnswer,280);
}

// ======================================================
// CHECK
// ======================================================
function checkAnswer(){
  const w=shuffledWords[current];
  if(placedLetters.some(p=>!p)){showFB('📝 Fill all the letters first!','#E07020');return;}
  const ans=placedLetters.map(p=>p.letter).join('');
  if(ans===w.word){
    document.querySelectorAll('.aslot').forEach(s=>s.className='aslot correct-slot');
    score+=hintUsed?5:10;
    solved++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('solvedVal').textContent=solved;
    const msgs=['🌟 Woohoo! Correct!','⭐ You got it!','🎉 Superstar!','🚀 Amazing job!','💎 Brilliant!','🎊 Fantastic!'];
    showFB(msgs[Math.floor(Math.random()*msgs.length)],'#27AE60');
    boom();
    document.getElementById('nextBtn').style.display='inline-block';
    document.querySelectorAll('.tile').forEach(t=>t.style.pointerEvents='none');
    if(solved===shuffledWords.length) setTimeout(showResult,900);
  } else {
    document.querySelectorAll('.aslot').forEach(s=>{if(s.textContent)s.classList.add('wrong-slot');});
    showFB('🤔 Oops! Try again!','#E74C3C');
    setTimeout(()=>document.querySelectorAll('.aslot').forEach(s=>s.classList.remove('wrong-slot')),500);
  }
}

// ======================================================
// HINT
// ======================================================
function showHint(){
  hintUsed=true;
  clearAnswer();
  const w=shuffledWords[current];
  const first=w.word[0];
  const tiles=document.querySelectorAll('.tile');
  for(const t of tiles){
    const i=parseInt(t.dataset.idx);
    if(t.textContent===first&&!tileUsed[i]){tapPlaceLetter(i,first,t);break;}
  }
  showFB('💡 Hint! First letter placed!','#F39C12');
}

// ======================================================
// GHOST
// ======================================================
function spawnGhost(e,letter){
  killGhost();
  ghostEl=document.createElement('div');
  ghostEl.className='drag-ghost';
  ghostEl.textContent=letter;
  ghostEl.style.left=(e.clientX-24)+'px';
  ghostEl.style.top=(e.clientY-27)+'px';
  document.body.appendChild(ghostEl);
  document.addEventListener('dragover',moveGhost);
}
function moveGhost(e){
  if(ghostEl){ghostEl.style.left=(e.clientX-24)+'px';ghostEl.style.top=(e.clientY-27)+'px';}
}
function killGhost(){
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  document.removeEventListener('dragover',moveGhost);
}

// ======================================================
// TOUCH DRAG
// ======================================================
function touchDrag(tile,letter,tileIdx){
  let ghost2,moved;
  tile.addEventListener('touchstart',e=>{
    if(tileUsed[tileIdx])return;
    moved=false;ghost2=null;
  },{passive:true});

  tile.addEventListener('touchmove',e=>{
    if(tileUsed[tileIdx])return;
    moved=true;
    const t=e.touches[0];
    if(!ghost2){
      ghost2=document.createElement('div');
      ghost2.className='drag-ghost';
      ghost2.textContent=letter;
      ghost2.style.left=(t.clientX-24)+'px';
      ghost2.style.top=(t.clientY-27)+'px';
      document.body.appendChild(ghost2);
      tile.style.opacity='0.2';
    } else {
      ghost2.style.left=(t.clientX-24)+'px';
      ghost2.style.top=(t.clientY-27)+'px';
    }
    e.preventDefault();
  },{passive:false});

  tile.addEventListener('touchend',e=>{
    if(ghost2)ghost2.remove();
    if(!tileUsed[tileIdx])tile.style.opacity='1';
    if(!moved)return;
    const t=e.changedTouches[0];
    const target=document.elementFromPoint(t.clientX,t.clientY);
    if(target&&target.classList.contains('aslot')){
      dropIntoSlot(parseInt(target.dataset.slotIdx),letter,tileIdx);
    } else if(target&&target.closest('#answerRow')){
      const fe=placedLetters.findIndex(p=>!p);
      if(fe!==-1)dropIntoSlot(fe,letter,tileIdx);
    }
  });
}

// ======================================================
// CONFETTI BOOM
// ======================================================
function boom(){
  const colors=['#FF6B35','#FFD93D','#4ECDC4','#A78BFA','#FF6B9D','#6BCB77','#fff','#FFB830'];
  const cx=window.innerWidth/2, cy=window.innerHeight*0.4;
  for(let i=0;i<45;i++){
    const p=document.createElement('div');
    p.className='confetti';
    const sz=6+Math.random()*10;
    const ang=Math.random()*Math.PI*2;
    const dist=100+Math.random()*260;
    const rot=(Math.random()-0.5)*720;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      --dx:${Math.cos(ang)*dist}px;
      --dy:${Math.sin(ang)*dist}px;
      --dr:${rot}deg;
      animation-duration:${0.9+Math.random()*0.7}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1700);
  }
}

function bigCelebrate(){
  for(let i=0;i<6;i++) setTimeout(boom,i*200);
  setTimeout(()=>alert('🎉 WOW! You finished ALL the words!\nYou are a Word Scramble CHAMPION! 🏆🌈'),1300);
}

// ======================================================
// NEXT / RESULT
// ======================================================
function nextWord(){current++;loadWord();}

function showResult(){
  document.getElementById('wordCard').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  const panel=document.getElementById('resultPanel');
  panel.style.display='block';

  const pct=Math.round(solved/shuffledWords.length*100);
  let emoji,title;
  if(pct>=90){emoji='🏆';title='Word Champion! 🌈';}
  else if(pct>=70){emoji='⭐';title='Awesome Work! 🎉';}
  else if(pct>=50){emoji='😊';title='Good Job! Keep Going!';}
  else{emoji='📚';title='Keep Practising! You Can Do It!';}

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resSub').textContent=
    `You unscrambled ${solved} out of ${shuffledWords.length} words!\nScore: ${score} ⭐\nYou're learning Internet Business words!`;

  const sd=document.getElementById('starsDisplay');
  sd.innerHTML='';
  const sc=pct>=90?3:pct>=60?2:1;
  for(let i=0;i<3;i++){
    const s=document.createElement('span');
    s.className='star-big';
    s.textContent=i<sc?'⭐':'☆';
    s.style.animationDelay=(0.15+i*0.15)+'s';
    sd.appendChild(s);
  }
  boom();setTimeout(boom,350);
}

function resetGame(){
  current=0;score=0;solved=0;
  shuffledWords=shuffle(words);
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('solvedVal').textContent=0;
  document.getElementById('feedback').textContent='';
  document.getElementById('resultPanel').style.display='none';
  document.getElementById('wordCard').style.display='block';
  document.getElementById('nextBtn').style.display='none';
  loadWord();
}

// ======================================================
// FEEDBACK
// ======================================================
function showFB(msg,color){
  const el=document.getElementById('feedback');
  el.textContent=msg;
  el.style.color=color;
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='feedPop 0.3s ease';
  setTimeout(()=>{if(el.textContent===msg)el.textContent='';},2800);
}

// ======================================================
// 🔊 VOICE & SOUND SYSTEM
// ======================================================
let voiceReady = false;
let voices = [];
let kidVoice = null;
let audioCtx = null;
let voiceEnabled = true;

// Pick the best cheerful voice for kids
function pickVoice() {
  voices = window.speechSynthesis.getVoices();
  // Priority: child/fun English voices
  const prefer = ['Google UK English Female','Microsoft Zira','Samantha','Karen','Moira','Tessa','Victoria','Google US English'];
  for (const name of prefer) {
    const v = voices.find(v => v.name.includes(name));
    if (v) { kidVoice = v; break; }
  }
  if (!kidVoice) kidVoice = voices.find(v => v.lang.startsWith('en')) || voices[0] || null;
  voiceReady = true;
}
window.speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

function speak(text, opts={}) {
  if (!voiceEnabled) return;
  window.speechSynthesis.cancel();
  if (!text) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = kidVoice;
  utt.rate  = opts.rate  ?? 0.92;
  utt.pitch = opts.pitch ?? 1.25;
  utt.volume= opts.volume?? 1;
  window.speechSynthesis.speak(utt);
}

// AudioContext for sound effects
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.12, vol=0.28, delay=0) {
  if (!voiceEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.02);
  } catch(e){}
}

// Sounds
function soundPickup()  { playTone(520,'sine',0.10,0.22); }
function soundDrop()    { playTone(380,'sine',0.13,0.22); setTimeout(()=>playTone(460,'sine',0.10,0.18),80); }
function soundReturn()  { playTone(300,'triangle',0.10,0.18); }
function soundCorrect() {
  [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.18,0.3,i*0.1));
}
function soundWrong() {
  playTone(220,'sawtooth',0.15,0.25);
  setTimeout(()=>playTone(180,'sawtooth',0.18,0.25),120);
}
function soundHint()    { playTone(660,'sine',0.12,0.2); setTimeout(()=>playTone(880,'sine',0.12,0.2),140); }
function soundStart()   { [330,440,550].forEach((f,i)=>playTone(f,'sine',0.15,0.25,i*0.12)); }
function soundNext()    { playTone(480,'sine',0.1,0.2); setTimeout(()=>playTone(600,'sine',0.1,0.2),110); }

// Read the clue aloud
function readClue(w) {
  setTimeout(()=>speak(`Word ${current+1}. ${w.clue}`, {rate:0.88, pitch:1.15}), 400);
}

// Speak the letter when picked/dropped
function speakLetter(letter) {
  speak(letter, {rate:1.0, pitch:1.4, volume:0.9});
}

// Praise messages (spoken)
const praiseSpeech = [
  'Woohoo! That is correct! Amazing job!',
  'Yes! You got it! Super smart!',
  'Fantastic! You are a star!',
  'Brilliant! Keep going champion!',
  'Incredible! You nailed it!',
  'Great work! You are so clever!',
];
function speakCorrect() {
  soundCorrect();
  setTimeout(()=>speak(praiseSpeech[Math.floor(Math.random()*praiseSpeech.length)],{rate:0.9,pitch:1.3}),300);
}
function speakWrong() {
  soundWrong();
  setTimeout(()=>speak('Oops! Try again, you can do it!',{rate:0.9,pitch:1.1}),200);
}
function speakHint() {
  soundHint();
  setTimeout(()=>speak('Here is a hint! The first letter is placed for you!',{rate:0.88,pitch:1.2}),200);
}
function speakResult(solved,total,score) {
  const pct=Math.round(solved/total*100);
  let msg;
  if(pct>=90) msg=`Wow! You are a Word Scramble Champion! You got ${solved} out of ${total} words correct! Amazing!`;
  else if(pct>=70) msg=`Awesome work! You got ${solved} out of ${total} words! Keep it up!`;
  else msg=`Good try! You got ${solved} out of ${total} words. Practice makes perfect!`;
  setTimeout(()=>speak(msg,{rate:0.88,pitch:1.2}),600);
}

// ── Voice toggle button ──────────────────────────────────────────────────────
function addVoiceToggle() {
  const btn = document.createElement('button');
  btn.id = 'voiceToggle';
  btn.innerHTML = '🔊 Voice ON';
  btn.style.cssText = `
    position:fixed;top:12px;left:14px;z-index:200;
    background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);
    border:2px solid rgba(100,200,100,0.5);color:#27AE60;
    font-family:'Boogaloo',cursive;font-size:14px;
    padding:5px 13px;border-radius:30px;cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,0.12);transition:all .2s;`;
  btn.onclick = () => {
    voiceEnabled = !voiceEnabled;
    window.speechSynthesis.cancel();
    btn.innerHTML = voiceEnabled ? '🔊 Voice ON' : '🔇 Voice OFF';
    btn.style.color = voiceEnabled ? '#27AE60' : '#999';
    btn.style.borderColor = voiceEnabled ? 'rgba(100,200,100,0.5)' : 'rgba(180,180,180,0.5)';
    if (voiceEnabled) speak('Voice is on! Let us play!', {pitch:1.3});
  };
  document.body.appendChild(btn);
}

// ── Read clue button ─────────────────────────────────────────────────────────
function addReadClueBtn() {
  const btn = document.createElement('button');
  btn.id = 'readClueBtn';
  btn.innerHTML = '👂 Read Clue';
  btn.style.cssText = `
    display:block;margin:0 auto 10px;
    background:linear-gradient(135deg,#4ECDC4,#2EBDB5);color:white;
    font-family:'Boogaloo',cursive;font-size:15px;
    padding:8px 20px;border:none;border-radius:30px;cursor:pointer;
    box-shadow:0 4px 14px rgba(78,205,196,0.4);transition:all .18s;`;
  btn.onmouseover = () => btn.style.transform='scale(1.06)';
  btn.onmouseout  = () => btn.style.transform='scale(1)';
  btn.onclick = () => {
    soundStart();
    readClue(shuffledWords[current]);
  };
  const card = document.getElementById('wordCard');
  const clueBox = document.getElementById('clueText');
  clueBox.parentNode.insertBefore(btn, clueBox.nextSibling);
}

// ======================================================
// INIT
// ======================================================
buildBG();
addVoiceToggle();
resetGame();

// Patch loadWord to inject read-clue btn & auto-read, and patch all voice hooks
const _origLoadWord = loadWord;
// We'll weave voice into the existing functions below via wrappers

// ── Patch tapPlaceLetter ────────────────────────────────────────────────────
const _origTap = tapPlaceLetter;
tapPlaceLetter = function(idx, letter, tile) {
  soundPickup();
  speakLetter(letter);
  _origTap(idx, letter, tile);
};

// ── Patch dropIntoSlot ──────────────────────────────────────────────────────
const _origDrop = dropIntoSlot;
dropIntoSlot = function(si, letter, tileIdx) {
  soundDrop();
  speakLetter(letter);
  _origDrop(si, letter, tileIdx);
};

// ── Patch returnFromSlot ────────────────────────────────────────────────────
const _origReturn = returnFromSlot;
returnFromSlot = function(si) {
  soundReturn();
  _origReturn(si);
};

// ── Patch clearAnswer ───────────────────────────────────────────────────────
const _origClear = clearAnswer;
clearAnswer = function() {
  _origClear();
  speak('Cleared! Try again!', {rate:0.95, pitch:1.2});
};

// ── Patch checkAnswer ───────────────────────────────────────────────────────
const _origCheck = checkAnswer;
checkAnswer = function() {
  const w = shuffledWords[current];
  if (placedLetters.some(p=>!p)) {
    speak('Fill all the letters first!', {rate:0.9, pitch:1.2});
    _origCheck();
    return;
  }
  const ans = placedLetters.map(p=>p.letter).join('');
  if (ans === w.word) {
    _origCheck();
    speakCorrect();
  } else {
    _origCheck();
    speakWrong();
  }
};

// ── Patch showHint ──────────────────────────────────────────────────────────
const _origHint = showHint;
showHint = function() {
  speakHint();
  _origHint();
};

// ── Patch nextWord ──────────────────────────────────────────────────────────
const _origNext = nextWord;
nextWord = function() {
  soundNext();
  speak('Next word!', {rate:1.0, pitch:1.3});
  _origNext();
  setTimeout(()=>{ if(shuffledWords[current]) readClue(shuffledWords[current]); }, 900);
};

// ── Patch showResult ────────────────────────────────────────────────────────
const _origResult = showResult;
showResult = function() {
  _origResult();
  speakResult(solved, shuffledWords.length, score);
};

// ── Patch resetGame ─────────────────────────────────────────────────────────
const _origReset = resetGame;
resetGame = function() {
  window.speechSynthesis.cancel();
  _origReset();
  addReadClueBtn();
  soundStart();
  setTimeout(()=>{
    speak("Let's play Word Scramble! Drag the letters to make a word!", {rate:0.88, pitch:1.25});
    setTimeout(()=>{ if(shuffledWords[current]) readClue(shuffledWords[current]); }, 3200);
  }, 600);
};
