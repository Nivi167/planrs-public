<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S1B: True/False Rapid Fire | ⭐ Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pop1:#FF6B6B;--pop2:#FFE66D;--pop3:#4ECDC4;--pop4:#A29BFE;--pop5:#FD79A8;--pop6:#55EFC4;
  --pop7:#FDCB6E;--pop8:#74B9FF;
  --bg:#FFF0FB;--card:#FFF;--dark:#2D3436;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:14px 14px 40px;
  position:relative;
  overflow-x:hidden;
}

/* ===== ANIMATED GRADIENT SKY BACKGROUND ===== */
.bg-sky{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,#FFEAF9 0%,#FFF0E0 40%,#E8F8FF 100%);
  animation:skyShift 8s ease-in-out infinite alternate;
}
@keyframes skyShift{
  0%{background:linear-gradient(180deg,#FFEAF9 0%,#FFF0E0 40%,#E8F8FF 100%)}
  50%{background:linear-gradient(180deg,#E8F0FF 0%,#FFEAF9 40%,#F0FFF0 100%)}
  100%{background:linear-gradient(180deg,#FFF0E0 0%,#E8F8FF 40%,#FFEAF9 100%)}
}

/* ===== CLOUDS ===== */
.cloud-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.cloud{
  position:absolute;
  background:#FFF;
  border-radius:50px;
  opacity:0.75;
  animation:cloudDrift linear infinite;
}
.cloud::before,.cloud::after{content:'';position:absolute;background:#FFF;border-radius:50%;}
.cloud-1{width:120px;height:40px;top:8%;left:-140px;animation-duration:28s;animation-delay:0s;}
.cloud-1::before{width:60px;height:60px;top:-28px;left:20px;}
.cloud-1::after{width:40px;height:40px;top:-18px;left:55px;}
.cloud-2{width:90px;height:30px;top:18%;left:-120px;animation-duration:22s;animation-delay:-8s;opacity:0.55;}
.cloud-2::before{width:45px;height:45px;top:-22px;left:14px;}
.cloud-2::after{width:32px;height:32px;top:-14px;left:40px;}
.cloud-3{width:160px;height:50px;top:5%;left:-190px;animation-duration:35s;animation-delay:-18s;opacity:0.6;}
.cloud-3::before{width:80px;height:80px;top:-38px;left:26px;}
.cloud-3::after{width:55px;height:55px;top:-26px;left:75px;}
@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 220px))}}

/* ===== RAINBOW ARCH ===== */
.rainbow{
  position:fixed;bottom:-180px;left:50%;transform:translateX(-50%);
  width:700px;height:700px;border-radius:50%;
  background:conic-gradient(transparent 0deg 180deg,
    rgba(255,0,0,0.06) 180deg 190deg,
    rgba(255,165,0,0.06) 190deg 200deg,
    rgba(255,255,0,0.06) 200deg 210deg,
    rgba(0,200,0,0.06) 210deg 220deg,
    rgba(0,100,255,0.06) 220deg 230deg,
    rgba(150,0,255,0.06) 230deg 240deg,
    transparent 240deg 360deg);
  pointer-events:none;z-index:0;
  animation:rainbowPulse 5s ease-in-out infinite alternate;
}
@keyframes rainbowPulse{from{opacity:.6}to{opacity:1}}

/* ===== GROUND GRASS STRIP ===== */
.grass{
  position:fixed;bottom:0;left:0;right:0;height:70px;z-index:0;
  background:linear-gradient(180deg,#6FE08A 0%,#4CAF50 60%,#388E3C 100%);
  border-radius:80% 80% 0 0 / 40px 40px 0 0;
  overflow:hidden;
}
.grass-bumps{display:flex;gap:0;position:absolute;top:-18px;left:0;width:200%;}
.grass-bump{
  width:60px;height:36px;border-radius:50%;
  background:linear-gradient(180deg,#81C784,#4CAF50);
  flex-shrink:0;
  margin-right:-12px;
}
.grass-bump:nth-child(even){height:28px;background:linear-gradient(180deg,#A5D6A7,#66BB6A);}

/* ===== BOUNCING CHARACTERS on grass ===== */
.ground-chars{
  position:fixed;bottom:48px;left:0;right:0;z-index:1;
  display:flex;justify-content:space-around;align-items:flex-end;
  pointer-events:none;
}
.gc{font-size:34px;animation:groundBounce ease-in-out infinite;}
.gc:nth-child(1){animation-duration:2.1s;animation-delay:0s;}
.gc:nth-child(2){animation-duration:1.8s;animation-delay:.3s;}
.gc:nth-child(3){animation-duration:2.4s;animation-delay:.6s;}
.gc:nth-child(4){animation-duration:1.9s;animation-delay:.9s;}
.gc:nth-child(5){animation-duration:2.2s;animation-delay:.2s;}
.gc:nth-child(6){animation-duration:2.0s;animation-delay:.7s;}
@keyframes groundBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(4deg)}}

/* ===== STARS / SUN SPINNING in corners ===== */
.deco-sun{
  position:fixed;top:-30px;right:-30px;width:120px;height:120px;
  font-size:80px;z-index:0;pointer-events:none;
  animation:spinSun 12s linear infinite;
  filter:drop-shadow(0 0 16px #FFE66D88);
}
@keyframes spinSun{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.deco-moon{
  position:fixed;bottom:80px;left:-10px;font-size:54px;z-index:0;pointer-events:none;
  animation:moonBob 3s ease-in-out infinite alternate;
}
@keyframes moonBob{from{transform:translateY(0) rotate(-10deg)}to{transform:translateY(-18px) rotate(10deg)}}

/* ===== FLOATING EMOJIS ===== */
.floaties{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.floaty{position:absolute;animation:floatUp linear infinite;opacity:.45;}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg) scale(.8);opacity:.45}
  80%{opacity:.45}
  100%{transform:translateY(-10vh) rotate(360deg) scale(1.2);opacity:0}
}

/* ===== SPARKLE TRAIL ===== */
.sparkle{
  position:fixed;pointer-events:none;z-index:999;font-size:20px;
  animation:sparklePop .6s ease forwards;
}
@keyframes sparklePop{0%{transform:scale(0) rotate(0deg);opacity:1}60%{transform:scale(1.5) rotate(180deg);opacity:.9}100%{transform:scale(0) rotate(360deg);opacity:0}}

/* ===== LOGO ===== */
.logo{
  position:fixed;top:10px;right:12px;
  background:linear-gradient(135deg,var(--pop1),var(--pop5));
  color:#FFF;font-family:'Fredoka One',sans-serif;font-size:15px;
  padding:5px 14px;border-radius:20px;
  box-shadow:0 4px 14px rgba(255,107,107,.4);z-index:100;
  letter-spacing:.5px;
  animation:logoBob 3s ease-in-out infinite alternate;
}
@keyframes logoBob{from{transform:translateY(0)}to{transform:translateY(-4px)}}



/* ===== CLOSE MODAL ===== */
.close-modal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.close-modal.show{display:flex;}
.close-modal-box{
  background:#FFF;border-radius:28px;padding:32px 28px;text-align:center;
  max-width:320px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);
  border:4px solid var(--pop2);
}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.close-modal-box .bigmoji{font-size:56px;margin-bottom:10px;animation:mascotBounce 1.5s infinite;}
.close-modal-box h2{font-family:'Fredoka One',sans-serif;font-size:24px;color:var(--dark);margin-bottom:8px;}
.close-modal-box p{font-size:15px;color:#636e72;margin-bottom:20px;line-height:1.5;}
.modal-btns{display:flex;gap:10px;justify-content:center;}
.modal-btn{border:none;border-radius:14px;padding:12px 22px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:transform .15s;}
.modal-btn:hover{transform:scale(1.06);}
.modal-stay{background:linear-gradient(135deg,var(--pop3),#00b894);color:#FFF;}
.modal-leave{background:linear-gradient(135deg,var(--pop1),#d63031);color:#FFF;}

/* ===== HEADER ===== */
.header-area{
  position:relative;z-index:1;text-align:center;margin:54px 0 16px;
}
.header-area h1{
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(24px,7vw,42px);
  background:linear-gradient(135deg,var(--pop1),var(--pop4),var(--pop5),var(--pop3));
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 4s ease-in-out infinite alternate;
  filter:drop-shadow(3px 3px 0px rgba(162,155,254,.4));
  line-height:1.2;
}
@keyframes gradShift{0%{background-position:0% 50%}100%{background-position:100% 50%}}
.subtitle{font-size:14px;font-weight:800;color:#b2bec3;margin-top:4px;letter-spacing:.5px;}

/* ===== SCORE BAR ===== */
.score-bar{
  position:relative;z-index:1;
  background:linear-gradient(135deg,var(--pop4),var(--pop5));
  border-radius:20px;padding:10px 20px;text-align:center;
  color:#FFF;font-family:'Fredoka One',sans-serif;font-size:20px;
  margin-bottom:14px;
  box-shadow:0 6px 0 #7c6fe0,0 8px 20px rgba(162,155,254,.4);
  letter-spacing:.5px;
  animation:scoreWiggle 6s ease-in-out infinite;
}
@keyframes scoreWiggle{0%,90%,100%{transform:rotate(0deg)}92%{transform:rotate(-1.5deg)}96%{transform:rotate(1.5deg)}}
.score-bar span{font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.2);}

/* ===== PROGRESS ===== */
.progress-wrap{
  position:relative;z-index:1;
  background:#FFE8CC;border-radius:20px;height:18px;margin-bottom:4px;
  overflow:hidden;border:3px solid #FFCBA4;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.08);
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--pop1),var(--pop2),var(--pop5),var(--pop3));
  background-size:300% 100%;
  border-radius:20px;transition:width .6s cubic-bezier(.68,-.55,.265,1.55);
  animation:shimmer 2s linear infinite;
  position:relative;
}
.progress-bar::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:20px;
  background:rgba(255,255,255,.4);border-radius:50%;
  animation:sparkleHead 1s ease-in-out infinite alternate;
}
@keyframes sparkleHead{from{opacity:.4}to{opacity:1;box-shadow:0 0 12px 4px rgba(255,255,255,.8)}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.progress-txt{position:relative;z-index:1;text-align:center;font-size:13px;font-weight:900;color:#a0a0a0;margin-bottom:14px;}

/* ===== QUESTION CARD ===== */
.qcard{
  position:relative;z-index:1;
  background:#FFF;border-radius:28px;
  padding:28px 18px 22px;
  box-shadow:0 10px 0 rgba(162,155,254,.25),0 14px 40px rgba(162,155,254,.18);
  border:4px solid var(--pop2);
  margin-bottom:16px;
  animation:cardPop .45s cubic-bezier(.175,.885,.32,1.275);
}
/* wobble idle */
.qcard.idle{animation:cardIdle 4s ease-in-out infinite;}
@keyframes cardIdle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(.4deg)}75%{transform:rotate(-.4deg)}}

@keyframes cardPop{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.qnum{
  display:inline-block;
  background:linear-gradient(135deg,var(--pop1),var(--pop5));
  color:#FFF;font-family:'Fredoka One',sans-serif;font-size:13px;
  padding:4px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:1px;
  box-shadow:0 3px 0 rgba(255,107,107,.4);
  animation:numPop .5s cubic-bezier(.175,.885,.32,1.275) .1s both;
}
@keyframes numPop{from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0deg)}}
.qtext{
  font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;
  color:var(--dark);line-height:1.55;margin-bottom:20px;
}

/* ===== TRUE / FALSE BUTTONS ===== */
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tf-btn{
  border:none;border-radius:20px;padding:22px 10px;
  font-family:'Fredoka One',sans-serif;font-size:24px;
  cursor:pointer;transition:transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;
  letter-spacing:.5px;
}
/* button shimmer on hover */
.tf-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.3) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .4s;
}
.tf-btn:hover:not(:disabled)::before{transform:translateX(100%);}
.tf-btn:hover:not(:disabled){transform:scale(1.08) rotate(-1deg);filter:brightness(1.05);}
.tf-btn:active:not(:disabled){transform:scale(.95) rotate(1deg);}

.true-btn{
  background:linear-gradient(135deg,#C8F7C5,#7FD37F);
  color:#005500;
  box-shadow:0 7px 0 #5ab55a, 0 9px 20px rgba(127,211,127,.35);
  animation:trueWiggle 7s ease-in-out infinite;
}
@keyframes trueWiggle{0%,88%,100%{transform:rotate(0)}90%{transform:rotate(-2deg)}94%{transform:rotate(2deg)}}
.true-btn:hover:not(:disabled){box-shadow:0 10px 0 #5ab55a, 0 12px 28px rgba(127,211,127,.5);}

.false-btn{
  background:linear-gradient(135deg,#FFD6D6,#FF8F8F);
  color:#660000;
  box-shadow:0 7px 0 #e07070, 0 9px 20px rgba(255,107,107,.35);
  animation:falseWiggle 7s ease-in-out infinite .5s;
}
@keyframes falseWiggle{0%,88%,100%{transform:rotate(0)}90%{transform:rotate(2deg)}94%{transform:rotate(-2deg)}}
.false-btn:hover:not(:disabled){box-shadow:0 10px 0 #e07070, 0 12px 28px rgba(255,107,107,.5);}

.tf-btn:disabled{cursor:not-allowed;transform:none !important;filter:none !important;}
.tf-btn.correct{
  background:linear-gradient(135deg,#6FCF97,#27AE60);
  color:#FFF;box-shadow:0 6px 0 #1e8449, 0 8px 20px rgba(39,174,96,.45);
  animation:correctPulse .4s ease!important;
}
@keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.1) rotate(-2deg)}100%{transform:scale(1)}}
.tf-btn.wrong{
  background:linear-gradient(135deg,#EB5757,#C0392B);
  color:#FFF;box-shadow:0 5px 0 #922b21, 0 7px 18px rgba(192,57,43,.4);
}
.tf-btn.missed{
  background:linear-gradient(135deg,#6FCF97,#27AE60);
  color:#FFF;opacity:.55;box-shadow:0 3px 0 #1e8449;
}

/* ===== EXPLANATION ===== */
.expl{
  margin-top:16px;
  background:linear-gradient(135deg,#FFF9E6,#FFF3CD);
  border-left:6px solid var(--pop2);
  border-radius:16px;padding:14px 16px;
  font-size:14px;color:#2d3436;line-height:1.65;
  display:none;font-weight:700;
  box-shadow:0 4px 14px rgba(255,230,109,.3);
}
.expl.show{display:block;animation:cardPop .4s ease;}
.expl-label{font-family:'Fredoka One',sans-serif;font-size:17px;color:var(--pop1);margin-bottom:6px;}

/* ===== NEXT BUTTON ===== */
.next-btn{
  display:none;margin:18px auto 0;
  background:linear-gradient(135deg,var(--pop4),var(--pop5));
  color:#FFF;border:none;border-radius:18px;
  padding:15px 40px;font-family:'Fredoka One',sans-serif;
  font-size:19px;cursor:pointer;
  box-shadow:0 6px 0 #7c6fe0, 0 8px 20px rgba(162,155,254,.45);
  transition:transform .15s,box-shadow .15s;
  letter-spacing:.5px;position:relative;overflow:hidden;
}
.next-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.next-btn:hover::before{transform:translateX(100%);}
.next-btn.show{display:block;animation:cardPop .35s ease;}
.next-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 10px 0 #7c6fe0, 0 14px 28px rgba(162,155,254,.55);}
.next-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7c6fe0;}

/* ===== MASCOT ===== */
.mascot{
  font-size:50px;position:absolute;right:14px;top:-28px;
  animation:mascotBounce 2s ease-in-out infinite;
  filter:drop-shadow(3px 5px 8px rgba(0,0,0,.18));
  z-index:2;
}
@keyframes mascotBounce{0%,100%{transform:translateY(0) rotate(-6deg) scale(1)}50%{transform:translateY(-12px) rotate(6deg) scale(1.08)}}

/* ===== RESULT SCREEN ===== */
.result{
  display:none;position:relative;z-index:1;
  text-align:center;background:#FFF;
  border-radius:30px;padding:32px 20px;
  box-shadow:0 12px 0 rgba(162,155,254,.3),0 16px 50px rgba(162,155,254,.25);
  border:4px solid var(--pop2);
}
.result.show{display:block;animation:cardPop .55s cubic-bezier(.175,.885,.32,1.275);}
.r-emoji{font-size:80px;margin-bottom:8px;animation:mascotBounce 1.5s ease-in-out infinite;}
.r-title{font-family:'Fredoka One',sans-serif;font-size:32px;background:linear-gradient(135deg,var(--pop1),var(--pop4),var(--pop5));background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;margin-bottom:6px;}
.r-score{font-family:'Fredoka One',sans-serif;font-size:64px;color:var(--pop4);margin:10px 0;text-shadow:4px 4px 0 rgba(162,155,254,.3);}
.r-msg{font-size:15px;font-weight:700;color:#636e72;margin-bottom:24px;line-height:1.65;max-width:280px;margin-left:auto;margin-right:auto;}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.b-retry{
  background:linear-gradient(135deg,var(--pop2),#FDCB6E);
  color:#2d3436;border:none;border-radius:16px;
  padding:14px 28px;font-family:'Fredoka One',sans-serif;
  font-size:17px;cursor:pointer;
  box-shadow:0 5px 0 #e0a800, 0 7px 18px rgba(253,203,110,.4);
  transition:transform .15s;
}
.b-done{
  background:linear-gradient(135deg,var(--pop3),#00b894);
  color:#FFF;border:none;border-radius:16px;
  padding:14px 28px;font-family:'Fredoka One',sans-serif;
  font-size:17px;cursor:pointer;
  box-shadow:0 5px 0 #00816a, 0 7px 18px rgba(78,205,196,.4);
  transition:transform .15s;
}
.b-retry:hover,.b-done:hover{transform:translateY(-4px) scale(1.06);}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:999;
  top:-20px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg) scale(.6);opacity:0}
}

/* ===== SHAKE ===== */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.shake{animation:shake .5s ease!important;}

/* ===== CORRECT GLOW ===== */
@keyframes glowRing{0%{box-shadow:0 10px 0 rgba(162,155,254,.25),0 0 0 0 rgba(39,174,96,.7)}100%{box-shadow:0 10px 0 rgba(162,155,254,.25),0 0 0 20px rgba(39,174,96,0)}}
.glow-correct{animation:glowRing .7s ease forwards!important;}

/* ===== STAR BURST ===== */
.star-burst{position:fixed;pointer-events:none;z-index:998;animation:starPop .8s ease forwards;}
@keyframes starPop{0%{transform:scale(0) rotate(0deg);opacity:1}60%{transform:scale(1.6) rotate(200deg);opacity:1}100%{transform:scale(0) rotate(400deg);opacity:0}}

/* ===== STREAK BADGE ===== */
.streak-badge{
  position:relative;z-index:1;text-align:center;margin-bottom:12px;
  font-family:'Fredoka One',sans-serif;font-size:17px;color:var(--pop1);
  display:none;
  background:linear-gradient(135deg,#FFF9E0,#FFF3CC);
  border-radius:16px;padding:8px 18px;
  box-shadow:0 4px 14px rgba(255,230,109,.4);
  border:2px dashed var(--pop2);
}
.streak-badge.show{display:block;animation:cardPop .3s ease;}
.streak-badge span{color:#FF6B6B;}

/* ===== BALLOON CHARACTERS floating up ===== */
.balloon{
  position:fixed;pointer-events:none;z-index:0;
  font-size:32px;
  animation:balloonRise linear infinite;
  bottom:-60px;
}
@keyframes balloonRise{
  0%{transform:translateY(0) rotate(-6deg);opacity:.9}
  50%{transform:translateY(-50vh) rotate(6deg);opacity:.7}
  100%{transform:translateY(-110vh) rotate(-6deg);opacity:0}
}

/* ===== CORRECT/WRONG BANNER ===== */
.answer-banner{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  z-index:500;font-family:'Fredoka One',sans-serif;
  font-size:48px;border-radius:24px;
  padding:18px 40px;text-align:center;
  pointer-events:none;
  animation:bannerPop .7s cubic-bezier(.175,.885,.32,1.275) forwards;
  white-space:nowrap;
}
.answer-banner.correct-banner{
  background:linear-gradient(135deg,#6FCF97,#27AE60);
  color:#FFF;box-shadow:0 10px 40px rgba(39,174,96,.5);
}
.answer-banner.wrong-banner{
  background:linear-gradient(135deg,#EB5757,#C0392B);
  color:#FFF;box-shadow:0 10px 40px rgba(192,57,43,.5);
}
@keyframes bannerPop{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg);opacity:1}
  80%{transform:translate(-50%,-50%) scale(.95) rotate(-1deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:0}
}
</style>
</head>
<body>

<!-- Sky gradient -->
<div class="bg-sky"></div>

<!-- Clouds -->
<div class="cloud-layer">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
</div>

<!-- Rainbow -->
<div class="rainbow"></div>

<!-- Spinning sun corner -->
<div class="deco-sun">☀️</div>
<div class="deco-moon">🌙</div>

<!-- Floating background emojis -->
<div class="floaties" id="floaties"></div>

<!-- Ground grass -->
<div class="grass">
  <div class="grass-bumps" id="grassBumps"></div>
</div>

<!-- Bouncing ground characters -->
<div class="ground-chars">
  <span class="gc">🦋</span>
  <span class="gc">🌸</span>
  <span class="gc">🐸</span>
  <span class="gc">🌻</span>
  <span class="gc">🦄</span>
  <span class="gc">🐝</span>
</div>

<!-- Logo + Close -->
<div class="logo">⭐ Planrs</div>


<!-- Answer flash banners -->
<div class="answer-banner correct-banner" id="correctBanner">🎉 CORRECT!</div>
<div class="answer-banner wrong-banner" id="wrongBanner">😅 WRONG!</div>

<!-- CLOSE CONFIRMATION MODAL -->
<div class="close-modal" id="closeModal">
  <div class="close-modal-box">
    <div class="bigmoji">🥺</div>
    <h2>Wait! Don't go!</h2>
    <p>You're doing so great! Are you sure you want to leave the quiz?</p>
    <div class="modal-btns">
      <button class="modal-btn modal-stay" onclick="closeModal()">🎮 Stay!</button>
      <button class="modal-btn modal-leave" onclick="leaveQuiz()">👋 Leave</button>
    </div>
  </div>
</div>

<div class="header-area">
  <h1>⚡ True / False Rapid Fire!</h1>
  <div class="subtitle">Section 1B — 10 Quick Questions on Cyberbullying 🛡️</div>
</div>

<div class="score-bar">⭐ Score: <span id="sc">0</span> / 10</div>
<div class="progress-wrap"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
<div class="progress-txt" id="ptxt">Question 0 of 10</div>
<div class="streak-badge" id="strkbadge">🔥 Streak: <span id="strknum" style="color:var(--pop4)">0</span> in a row! <span>🎯</span></div>

<div id="qarea"></div>

<div class="result" id="res">
  <div class="r-emoji" id="re">🏆</div>
  <div class="r-title" id="rt"></div>
  <div class="r-score" id="rs">0/10</div>
  <div class="r-msg" id="rm"></div>
  <div class="btns">
    <button class="b-retry" onclick="reset()">🔄 Try Again</button>
    <button class="b-done" onclick="done()">🎓 Continue</button>
  </div>
</div>

<script>
const qs=[
  {q:"Cyberbullying is only bullying that happens at school.",ans:false,e:"FALSE! Cyberbullying happens online — through phones, apps and internet — so it can happen ANYWHERE including at home, on holidays, and even at 2am!",mascot:"🏠"},
  {q:"Cyberbullying can be done anonymously — the bully can hide their identity.",ans:true,e:"TRUE! Bullies can create fake accounts or use anonymous apps to hide who they are — which is one reason cyberbullying feels so scary for victims.",mascot:"🕵️"},
  {q:"Once you delete a post online, it is completely gone forever.",ans:false,e:"FALSE! Screenshots make digital content permanent. Even after you delete something, others may have already saved a copy that can spread further.",mascot:"📸"},
  {q:"Sending one rude message to someone once counts as cyberbullying.",ans:false,e:"FALSE! A single rude message, while unkind, is not usually cyberbullying. Cyberbullying involves repeated, intentional harm — happening again and again.",mascot:"💬"},
  {q:"Purposely leaving someone out of a WhatsApp group to hurt them is cyberbullying.",ans:true,e:"TRUE! Deliberate digital exclusion — repeatedly removing someone from group chats to isolate them — is a recognised form of cyberbullying called Exclusion.",mascot:"😔"},
  {q:"Cyberbullying can cause real physical effects like trouble sleeping and stomach aches.",ans:true,e:"TRUE! The stress of cyberbullying causes real physical symptoms — insomnia, headaches, loss of appetite, and stomach problems are all documented effects.",mascot:"😰"},
  {q:"Only students who are weak or sensitive get affected by cyberbullying.",ans:false,e:"FALSE! Cyberbullying can affect ANYONE — regardless of age, gender, confidence level or background. It is the bully's behaviour, not the victim's personality, that is the problem.",mascot:"💪"},
  {q:"Sharing someone's photo online without asking them is a form of cyberbullying.",ans:true,e:"TRUE! Sharing someone's image without consent — especially if it is embarrassing — is called non-consensual image sharing and is a recognised form of cyberbullying.",mascot:"📷"},
  {q:"Cyberbullying stops affecting a student once they close the app.",ans:false,e:"FALSE! The emotional damage continues long after the device is put down. Victims feel anxious, scared and humiliated even when offline — the harm is not digital, it is real.",mascot:"💔"},
  {q:"Creating a fake account pretending to be your classmate to post rude things is called Impersonation cyberbullying.",ans:true,e:"TRUE! Impersonation involves creating a fake account pretending to be someone else to damage their reputation or trick their contacts. It is both cyberbullying AND illegal under the IT Act in India.",mascot:"🎭"},
];

let cur=0,score=0,answered=false,streak=0;

// ---- Build grass bumps ----
(function(){
  const c=document.getElementById('grassBumps');
  for(let i=0;i<30;i++){
    const b=document.createElement('div');
    b.className='grass-bump';
    c.appendChild(b);
  }
})();

// ---- Floating emojis background ----
(function(){
  const emojis=['⭐','🌟','💫','✨','🎉','🎊','🌈','💜','💛','❤️','🔥','🌸','🦋','🎈','🍭','🌺','🎀','🦄'];
  const container=document.getElementById('floaties');
  for(let i=0;i<24;i++){
    const el=document.createElement('div');
    el.className='floaty';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'%';
    el.style.fontSize=(12+Math.random()*18)+'px';
    el.style.animationDuration=(10+Math.random()*16)+'s';
    el.style.animationDelay=(-Math.random()*16)+'s';
    container.appendChild(el);
  }
})();

// ---- Periodic balloons ----
function launchBalloon(){
  const balloons=['🎈','🎀','🎊','🎁','🌈'];
  const el=document.createElement('div');
  el.className='balloon';
  el.textContent=balloons[Math.floor(Math.random()*balloons.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.animationDuration=(8+Math.random()*10)+'s';
  el.style.fontSize=(22+Math.random()*20)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),18000);
}
setInterval(launchBalloon,3500);
launchBalloon();

// ---- Sparkle trail on mouse move ----
let sparkleTimer=0;
document.addEventListener('mousemove',e=>{
  const now=Date.now();
  if(now-sparkleTimer<80)return;
  sparkleTimer=now;
  const sparkles=['✨','⭐','💫','🌟'];
  const el=document.createElement('div');
  el.className='sparkle';
  el.textContent=sparkles[Math.floor(Math.random()*sparkles.length)];
  el.style.left=(e.clientX-10)+'px';
  el.style.top=(e.clientY-10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),700);
});

function render(){
  if(cur>=qs.length){showResult();return;}
  const q=qs[cur];
  document.getElementById('pbar').style.width=(cur/qs.length*100)+'%';
  document.getElementById('ptxt').textContent=`Question ${cur+1} of ${qs.length}`;
  document.getElementById('sc').textContent=score;
  const sb=document.getElementById('strkbadge');
  if(streak>=2){sb.classList.add('show');document.getElementById('strknum').textContent=streak;}
  else sb.classList.remove('show');

  document.getElementById('qarea').innerHTML=`
    <div class="qcard" id="qcard">
      <div class="mascot">${q.mascot}</div>
      <div class="qnum">⚡ Question ${cur+1} of ${qs.length}</div>
      <div class="qtext">${q.q}</div>
      <div class="tf-btns">
        <button class="tf-btn true-btn" id="tbtn" onclick="ans(true)">✅ TRUE</button>
        <button class="tf-btn false-btn" id="fbtn" onclick="ans(false)">❌ FALSE</button>
      </div>
      <div class="expl" id="expl">
        <div class="expl-label">💡 Explanation</div>
        ${q.e}
      </div>
      <button class="next-btn" id="nbtn" onclick="next()">${cur<qs.length-1?'Next Question ➡️':'See My Results 🏆'}</button>
    </div>`;

  // Idle wobble after 3s
  setTimeout(()=>{
    const c=document.getElementById('qcard');
    if(c&&!answered)c.classList.add('idle');
  },3000);

  answered=false;
}

function showBanner(correct){
  const cb=document.getElementById('correctBanner');
  const wb=document.getElementById('wrongBanner');
  const el=correct?cb:wb;
  el.style.display='block';
  // Re-trigger animation
  el.style.animation='none';
  el.offsetHeight; // reflow
  el.style.animation='bannerPop .7s cubic-bezier(.175,.885,.32,1.275) forwards';
  setTimeout(()=>{el.style.display='none';},900);
}

function ans(a){
  if(answered)return;
  answered=true;
  const q=qs[cur];
  const correct=a===q.ans;
  if(correct){score++;streak++;}else{streak=0;}
  document.getElementById('sc').textContent=score;
  const tb=document.getElementById('tbtn'),fb=document.getElementById('fbtn');
  tb.disabled=fb.disabled=true;
  if(q.ans===true){tb.classList.add('correct');}else{tb.classList.add('missed');}
  if(q.ans===false){fb.classList.add('correct');}else{fb.classList.add('missed');}
  if(!correct)(a?tb:fb).classList.add('wrong');
  document.getElementById('expl').classList.add('show');
  document.getElementById('nbtn').classList.add('show');
  // Remove idle wobble
  const card=document.getElementById('qcard');
  card.classList.remove('idle');

  showBanner(correct);

  if(!correct){
    card.classList.add('shake');
  }else{
    card.classList.add('glow-correct');
    burstStars();
    if(score===10||streak>=3) launchConfetti(streak>=3?35:18);
    else launchConfetti(10);
    // Extra balloons on streak
    if(streak>=3){launchBalloon();launchBalloon();}
  }
}

function next(){cur++;render();}

function burstStars(){
  const card=document.getElementById('qcard');
  if(!card)return;
  const rect=card.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/3;
  const emojis=['⭐','🌟','✨','💫','🎉','💥'];
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='star-burst';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=(cx+(-80+Math.random()*160))+'px';
      el.style.top=(cy+(-60+Math.random()*120))+'px';
      el.style.fontSize=(20+Math.random()*20)+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),900);
    },i*70);
  }
}

function launchConfetti(n=20){
  const shapes=['circle','square','triangle'];
  const colors=['#FF6B6B','#FFE66D','#4ECDC4','#A29BFE','#FD79A8','#55EFC4','#FDCB6E','#74B9FF','#FF9FF3','#48DBFB'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      const size=6+Math.random()*12;
      el.style.width=size+'px';
      el.style.height=size+'px';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      const r=Math.random();
      el.style.borderRadius=r>.66?'50%':r>.33?'2px':'0';
      if(r<=.33){
        el.style.clipPath='polygon(50% 0%,0% 100%,100% 100%)';
      }
      el.style.animationDuration=(1.5+Math.random()*2.5)+'s';
      el.style.animationDelay=(Math.random()*.6)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },i*35);
  }
}

function showResult(){
  document.getElementById('qarea').style.display='none';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('ptxt').textContent='Quiz Complete! 🎉';
  document.getElementById('strkbadge').classList.remove('show');
  const r=document.getElementById('res');r.classList.add('show');
  document.getElementById('rs').textContent=score+'/10';
  let em,ti,msg;
  if(score===10){em='🏆';ti='Perfect! Legendary!';msg='You got EVERY answer right! You truly understand what cyberbullying is and what it is not. Share your knowledge with your friends! 🌟';launchConfetti(80);}
  else if(score>=7){em='🌟';ti='Brilliant Work!';msg=`You scored ${score} out of 10. Excellent understanding! Review the ones you missed and you will be perfect next time!`;launchConfetti(40);}
  else if(score>=5){em='👍';ti='Good Effort!';msg=`You scored ${score} out of 10. You are on the right track. Re-read Section 1 and try again — you can do it!`;launchConfetti(15);}
  else{em='💡';ti='Keep Learning!';msg=`You scored ${score} out of 10. Review the lesson carefully — understanding cyberbullying is really important. Try again! 💪`;}
  document.getElementById('re').textContent=em;
  document.getElementById('rt').textContent=ti;
  document.getElementById('rm').textContent=msg;
  // Fireworks on good scores
  if(score>=7){
    for(let i=0;i<4;i++) setTimeout(launchBalloon,i*400);
  }
}

function reset(){
  cur=0;score=0;answered=false;streak=0;
  document.getElementById('res').classList.remove('show');
  document.getElementById('qarea').style.display='block';
  render();
}
function done(){alert('Amazing! Move on to Section 2: Who Gets Affected? 🚀');}

function openCloseModal(){document.getElementById('closeModal').classList.add('show');}
function closeModal(){document.getElementById('closeModal').classList.remove('show');}
function leaveQuiz(){
  document.getElementById('closeModal').classList.remove('show');
  if(window.history.length>1) window.history.back();
  else window.close();
}
document.getElementById('closeModal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

render();
</script>
</body>
</html>
