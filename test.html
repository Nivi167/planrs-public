<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber True/False — Section 1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1230px;
    height: 650px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #eafff3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Floating background blobs ── */
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatBlob linear infinite;
    pointer-events: none;
  }
  @keyframes floatBlob {
    0%   { transform: translateY(0px) scale(1); }
    50%  { transform: translateY(-28px) scale(1.06); }
    100% { transform: translateY(0px) scale(1); }
  }

  .planrs {
    position: absolute; top: 10px; right: 16px;
    font-size: 13px; color: #888; font-weight: bold;
    animation: fadeInDown 0.6s ease both;
  }

  h1 {
    color: #1F7A4D; font-size: 26px; margin-bottom: 2px; text-align: center;
    animation: fadeInDown 0.5s ease both;
  }
  .subtitle {
    color: #666; font-size: 13px; margin-bottom: 10px; text-align: center;
    animation: fadeInDown 0.6s 0.05s ease both;
  }

  .score-bar {
    background: #fff;
    border: 2px solid #A9DFBF;
    border-radius: 40px;
    padding: 7px 36px;
    margin-bottom: 10px;
    font-size: 17px;
    color: #1F7A4D;
    font-weight: bold;
    display: flex;
    gap: 32px;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(39,174,96,0.1);
    animation: fadeInDown 0.7s 0.1s ease both;
  }
  .score-val { display: inline-block; transition: transform 0.2s; }
  .score-pop { animation: scorePop 0.35s ease; }
  @keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.7); }
    100% { transform: scale(1); }
  }

  .progress {
    width: 820px;
    background: #d4f5e4;
    border-radius: 20px;
    height: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    animation: fadeInDown 0.7s 0.15s ease both;
  }
  .progress-bar {
    background: linear-gradient(90deg, #27AE60, #82e0aa);
    height: 100%; border-radius: 20px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
  }
  .progress-bar::after {
    content: '';
    position: absolute; top: 0; left: -60%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer { to { left: 130%; } }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 26px 44px;
    width: 820px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(39,174,96,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 2px solid #A9DFBF;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    animation: cardEntrance 0.5s 0.2s cubic-bezier(.34,1.56,.64,1) both;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #27AE60, #82e0aa, #27AE60);
    background-size: 200%;
    animation: gradientSlide 3s linear infinite;
  }
  @keyframes gradientSlide { to { background-position: 200%; } }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .q-num { font-size: 13px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }

  .question {
    font-size: 21px; color: #1A5276; font-weight: bold;
    line-height: 1.5; min-height: 66px;
    display: flex; align-items: center; justify-content: center;
  }
  .question.fade-out { opacity: 0; transform: translateY(-8px); transition: opacity 0.2s, transform 0.2s; }
  .question.fade-in  { animation: fadeInUp 0.35s ease both; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn-row { display: flex; gap: 28px; justify-content: center; margin-top: 22px; }

  .btn-tf {
    padding: 14px 56px; border: none; border-radius: 50px;
    font-size: 20px; font-weight: bold; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
    animation: btnSlideIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .btn-true  { background: linear-gradient(135deg, #27AE60, #1e8449); color: #fff; animation-delay: 0.35s; }
  .btn-false { background: linear-gradient(135deg, #E74C3C, #c0392b); color: #fff; animation-delay: 0.45s; }

  @keyframes btnSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn-tf:not(:disabled):hover {
    transform: translateY(-4px) scale(1.07);
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  }
  .btn-tf:not(:disabled):active { transform: scale(0.95); }
  .btn-tf:disabled { opacity: 0.45; cursor: not-allowed; }

  /* idle pulse on buttons */
  .btn-true:not(:disabled)  { animation: btnSlideIn 0.5s 0.35s cubic-bezier(.34,1.56,.64,1) both, idlePulseGreen 2.5s 1s ease-in-out infinite; }
  .btn-false:not(:disabled) { animation: btnSlideIn 0.5s 0.45s cubic-bezier(.34,1.56,.64,1) both, idlePulseRed 2.5s 1.3s ease-in-out infinite; }
  @keyframes idlePulseGreen {
    0%,100% { box-shadow: 0 0 0 0 rgba(39,174,96,0); }
    50%     { box-shadow: 0 0 0 8px rgba(39,174,96,0.18); }
  }
  @keyframes idlePulseRed {
    0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    50%     { box-shadow: 0 0 0 8px rgba(231,76,60,0.18); }
  }

  .feedback-box {
    min-height: 58px; text-align: center; font-size: 16px; font-weight: bold;
    margin-top: 14px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 5px;
  }
  .feedback-msg { animation: feedbackPop 0.4s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes feedbackPop {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }
  .explain {
    font-size: 13px; color: #555; font-style: italic;
    font-weight: normal; max-width: 700px; line-height: 1.5;
    animation: fadeInUp 0.4s 0.15s ease both;
  }

  .btn-next-q {
    background: linear-gradient(135deg, #2E86AB, #1a6a8a);
    color: #fff; border: none; border-radius: 50px;
    padding: 11px 32px; font-size: 15px; font-weight: bold;
    cursor: pointer; margin-top: 8px; display: none;
    animation: fadeInUp 0.4s ease both;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-next-q:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(46,134,171,0.4); }

  .result-screen {
    display: none;
    background: linear-gradient(135deg, #d5f5e3, #eafff3);
    border-radius: 24px; padding: 36px 44px;
    width: 820px; text-align: center;
    border: 2px solid #27AE60;
    box-shadow: 0 8px 40px rgba(39,174,96,0.15);
  }
  .result-screen.show { animation: cardEntrance 0.5s cubic-bezier(.34,1.56,.64,1) both; }
  .result-screen h2 { color: #1F7A4D; font-size: 30px; margin-bottom: 10px; }
  .result-screen p { color: #333; font-size: 16px; margin-bottom: 14px; }
  .btn-reset { background: linear-gradient(135deg,#E8735A,#c0392b); color:#fff; border:none; border-radius:50px; padding:12px 34px; font-size:15px; font-weight:bold; cursor:pointer; margin:6px; transition: transform 0.18s, box-shadow 0.18s; }
  .btn-nxt   { background: linear-gradient(135deg,#27AE60,#1e8449); color:#fff; border:none; border-radius:50px; padding:12px 34px; font-size:15px; font-weight:bold; cursor:pointer; margin:6px; transition: transform 0.18s, box-shadow 0.18s; }
  .btn-reset:hover, .btn-nxt:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

  /* confetti */
  .confetti-piece {
    position: absolute;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(240px) rotate(720deg) scale(0.3); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-12px)}
    40%{transform:translateX(12px)}
    60%{transform:translateX(-8px)}
    80%{transform:translateX(8px)}
  }
  @keyframes correctPulse {
    0%  { box-shadow: 0 8px 40px rgba(39,174,96,0.12); border-color: #A9DFBF; }
    40% { box-shadow: 0 0 0 14px rgba(39,174,96,0.2); border-color: #27AE60; }
    100%{ box-shadow: 0 8px 40px rgba(39,174,96,0.12); border-color: #A9DFBF; }
  }
  .shake         { animation: shake 0.45s ease !important; }
  .correct-pulse { animation: correctPulse 0.6s ease !important; }
</style>
</head>
<body>

<div class="bg-blob" style="width:320px;height:320px;background:#27AE60;top:-80px;left:-90px;animation-duration:7s;"></div>
<div class="bg-blob" style="width:200px;height:200px;background:#82e0aa;bottom:-50px;right:60px;animation-duration:9s;animation-delay:-3s;"></div>
<div class="bg-blob" style="width:160px;height:160px;background:#a9dfbf;top:50px;right:-50px;animation-duration:11s;animation-delay:-5s;"></div>
<div class="bg-blob" style="width:110px;height:110px;background:#27AE60;bottom:70px;left:30px;animation-duration:8s;animation-delay:-2s;"></div>

<div class="planrs">⭐ Planrs</div>
<h1>⚡ True or False Rapid Fire!</h1>
<p class="subtitle">Section 1 — What is Cybersecurity? | Activity 2 of 2</p>

<div class="score-bar">
  <span>✅ <span id="correct" class="score-val">0</span></span>
  <span>❌ <span id="wrong" class="score-val">0</span></span>
  <span>⚡ Q<span id="qnum">1</span>/10</span>
</div>

<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

<div class="card" id="gameCard">
  <div class="q-num" id="qLabel">Question 1 of 10</div>
  <div class="question" id="questionText">Loading...</div>
  <div class="btn-row">
    <button class="btn-tf btn-true" id="btnTrue" onclick="answer(true)">✅ TRUE</button>
    <button class="btn-tf btn-false" id="btnFalse" onclick="answer(false)">❌ FALSE</button>
  </div>
  <div class="feedback-box" id="feedbackBox"></div>
  <button class="btn-next-q" id="nextQBtn" onclick="nextQuestion()">Next Question ➡️</button>
</div>

<div class="result-screen" id="resultScreen">
  <h2 id="resultTitle"></h2>
  <p id="resultDetails"></p>
  <p id="resultMsg"></p>
  <button class="btn-reset" onclick="resetGame()">🔄 Play Again</button>
  <button class="btn-nxt" onclick="alert('You have completed Section 1! Move on to Section 2 — Passwords! 🔑')">➡️ Next Section</button>
</div>

<script>
const questions = [
  { q: "Cybersecurity is only important for adults — children don't need to worry about it.", ans: false, explain: "False! Children use the internet for games, school, and videos — they need cybersecurity too. Cybercriminals target everyone!" },
  { q: "A virus is a harmful program that can damage your computer and spread to other devices.", ans: true, explain: "Correct! Computer viruses work like real flu viruses — they spread and cause damage. Antivirus software protects you." },
  { q: "It is safe to share your password with your best friend at school.", ans: false, explain: "Never share your password with ANYONE — even your best friend. Passwords are private, like a secret only you should know." },
  { q: "The word 'phishing' means tricking someone into revealing personal information using fake messages.", ans: true, explain: "Yes! Phishing (from 'fishing') means using fake bait (messages) to 'catch' your personal info. Very sneaky!" },
  { q: "If you receive a message saying 'You won Rs. 10 lakhs! Click here!' — it is probably real.", ans: false, explain: "This is almost certainly a phishing scam! Real prize draws don't randomly message people. When in doubt, delete!" },
  { q: "Cyberbullying can only happen face-to-face, not through phones or computers.", ans: false, explain: "False! Cyberbullying happens ONLINE — through messages, comments, gaming, and social media. It can happen 24/7." },
  { q: "A firewall helps protect your network by monitoring and controlling incoming and outgoing traffic.", ans: true, explain: "Correct! A firewall is like a security guard for your internet connection — it blocks suspicious activity." },
  { q: "HTTPS in a website address means the connection is more secure than HTTP.", ans: true, explain: "Yes! The 'S' in HTTPS stands for Secure. Always look for the padlock icon and HTTPS before entering personal info." },
  { q: "Hacking means entering someone's account or device without their permission.", ans: true, explain: "Exactly right! Hacking is unauthorized access to someone's accounts, devices, or data. It is illegal and harmful." },
  { q: "Using the internet in open family areas at home is safer than using it alone in your room.", ans: true, explain: "True! Using devices in common areas helps trusted adults notice if something harmful happens online. Safety in the open!" },
];

let current = 0, correctCount = 0, wrongCount = 0;
const shuffled = [...questions].sort(() => Math.random() - 0.5);

function spawnConfetti() {
  const colors = ['#27AE60','#F1C40F','#3498DB','#E74C3C','#9B59B6','#1ABC9C','#E67E22','#FF69B4'];
  const card = document.getElementById('gameCard');
  const rect = card.getBoundingClientRect();
  for (let i = 0; i < 32; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 9;
    el.style.cssText = `
      left:${rect.left + Math.random()*rect.width}px;
      top:${rect.top + 30}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-duration:${0.7+Math.random()*0.9}s;
      animation-delay:${Math.random()*0.35}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

function popScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
  setTimeout(() => el.classList.remove('score-pop'), 400);
}

function loadQuestion() {
  const q = shuffled[current];
  const qt = document.getElementById('questionText');
  qt.classList.add('fade-out');
  setTimeout(() => {
    qt.textContent = q.q;
    qt.classList.remove('fade-out');
    qt.classList.add('fade-in');
    setTimeout(() => qt.classList.remove('fade-in'), 400);
  }, 230);
  document.getElementById('qLabel').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('qnum').textContent = current+1;
  document.getElementById('progressBar').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('nextQBtn').style.display = 'none';
  const btns = document.querySelectorAll('.btn-tf');
  btns.forEach(b => { b.disabled = false; });
  // re-enable idle pulse
  document.getElementById('btnTrue').style.animation = '';
  document.getElementById('btnFalse').style.animation = '';
}

function answer(userAnswer) {
  const q = shuffled[current];
  const isCorrect = userAnswer === q.ans;
  document.querySelectorAll('.btn-tf').forEach(b => {
    b.disabled = true;
    b.style.animation = 'none'; // stop idle pulse
  });

  const fb = document.getElementById('feedbackBox');
  const card = document.getElementById('gameCard');

  if (isCorrect) {
    correctCount++;
    const msgs = ['🎉 Brilliant!', '⭐ Amazing!', '🔥 You\'re on fire!', '💪 Superstar!', '🚀 Nailed it!', '✨ Fantastic!'];
    fb.innerHTML = `<span class="feedback-msg" style="color:#27AE60;font-size:22px">${msgs[Math.floor(Math.random()*msgs.length)]}</span><span class="explain">${q.explain}</span>`;
    card.classList.add('correct-pulse');
    setTimeout(() => card.classList.remove('correct-pulse'), 620);
    spawnConfetti();
    popScore('correct');
  } else {
    wrongCount++;
    const correct_word = q.ans ? 'TRUE' : 'FALSE';
    fb.innerHTML = `<span class="feedback-msg" style="color:#E74C3C;font-size:17px">❌ Not quite! The answer is <strong>${correct_word}</strong></span><span class="explain">${q.explain}</span>`;
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 450);
    popScore('wrong');
  }

  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;

  const nxt = document.getElementById('nextQBtn');
  nxt.style.display = 'inline-block';
  if (current === questions.length - 1) {
    nxt.textContent = 'See Results 🏆';
    nxt.onclick = showResult;
  } else {
    nxt.textContent = 'Next Question ➡️';
    nxt.onclick = nextQuestion;
  }
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
}

function showResult() {
  const card = document.getElementById('gameCard');
  card.style.transition = 'opacity 0.3s, transform 0.3s';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.93) translateY(-10px)';
  setTimeout(() => {
    card.style.display = 'none';
    const rs = document.getElementById('resultScreen');
    rs.style.display = 'block';
    rs.classList.add('show');
    spawnConfetti(); spawnConfetti();
  }, 300);
  document.getElementById('progressBar').style.width = '100%';
  const pct = Math.round((correctCount/questions.length)*100);
  let title, msg;
  if (pct === 100) { title = '🏆 Perfect Score! Cyber Champion!'; msg = 'You got everything right! You are a true cybersecurity star!'; }
  else if (pct >= 70) { title = '⭐ Great Job! Well Done!'; msg = 'Excellent understanding! A little more practice and you will be perfect!'; }
  else if (pct >= 50) { title = '💪 Good Effort! Keep Going!'; msg = 'You are on the right track! Review the questions you missed and try again!'; }
  else { title = '🌱 Keep Learning — You Can Do It!'; msg = 'Cybersecurity is a big topic! Try again after reviewing the slides.'; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetails').textContent = `Score: ${correctCount}/${questions.length} (${pct}%) | Correct: ${correctCount} | Wrong: ${wrongCount}`;
  document.getElementById('resultMsg').textContent = msg;
}

function resetGame() {
  current = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('correct').textContent = 0;
  document.getElementById('wrong').textContent = 0;
  const card = document.getElementById('gameCard');
  card.style.display = 'flex';
  card.style.opacity = '1';
  card.style.transform = '';
  card.style.animation = 'cardEntrance 0.5s cubic-bezier(.34,1.56,.64,1) both';
  document.getElementById('resultScreen').style.display = 'none';
  shuffled.sort(() => Math.random() - 0.5);
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
