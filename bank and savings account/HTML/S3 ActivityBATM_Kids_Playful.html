<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏧 ATM Adventure!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:    #FF6EB4;
    --yellow:  #FFD700;
    --mint:    #3DFFA0;
    --sky:     #4FC3F7;
    --purple:  #B388FF;
    --orange:  #FF8C42;
    --red:     #FF5252;
    --green:   #69F0AE;
    --dark:    #1A1A2E;
    --card:    rgba(255,255,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 80px;
    position: relative;
  }

  /* ── Animated BG ─────────────────────────── */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, #3a1c71 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, #1b0a3a 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #16213e 0%, transparent 100%);
  }
  .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bubble {
    position: absolute; border-radius: 50%;
    opacity: 0.18; animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(1) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.12; }
    100% { transform: translateY(-20vh) scale(1.3) rotate(360deg); opacity: 0; }
  }

  /* Stars */
  .star {
    position: fixed; pointer-events: none; z-index: 0;
    font-size: 1.2rem; animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.3); }
  }

  /* ── Layout ───────────────────────────────── */
  .content { position: relative; z-index: 1; width: 100%; max-width: 420px; }

  /* ── Header ──────────────────────────────── */
  .header {
    text-align: center; margin-bottom: 18px;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem; color: var(--yellow);
    text-shadow: 3px 3px 0 var(--orange), 0 0 30px rgba(255,215,0,0.5);
    animation: bounce-title 2s ease-in-out infinite;
  }
  @keyframes bounce-title {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-6px) rotate(1deg); }
  }
  .header p {
    color: var(--sky); font-size: 0.95rem; font-weight: 700;
    letter-spacing: 1px; margin-top: 4px;
  }

  /* ── Score Bar ───────────────────────────── */
  .score-bar {
    background: var(--card); backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 30px; padding: 10px 22px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .score-bar .label { color: #fff; font-weight: 800; font-size: 1rem; flex: 1; }
  .score-bar .stars { font-size: 1.3rem; letter-spacing: 2px; }
  .star-icon { display: inline-block; animation: spin-star 1s ease-in-out; }
  @keyframes spin-star {
    0%   { transform: scale(0) rotate(-180deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* ── Step Dots ───────────────────────────── */
  .step-indicator {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 14px;
  }
  .step-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.4s cubic-bezier(0.68,-0.55,0.27,1.55);
  }
  .step-dot.active {
    background: var(--sky); border-color: var(--sky);
    box-shadow: 0 0 12px var(--sky); transform: scale(1.3);
  }
  .step-dot.done {
    background: var(--green); border-color: var(--green);
    box-shadow: 0 0 12px var(--green); transform: scale(1.1);
  }

  /* ── ATM Machine ─────────────────────────── */
  .atm-machine {
    background: var(--card); backdrop-filter: blur(16px);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 28px; padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    animation: machine-float 4s ease-in-out infinite;
  }
  @keyframes machine-float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* Card Slot drag target */
  .card-slot-wrap {
    position: relative; margin-bottom: 14px;
  }
  .card-slot {
    height: 28px; border-radius: 8px;
    border: 3px dashed rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); font-size: 0.8rem; font-weight: 700;
    letter-spacing: 2px; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .card-slot.drag-over {
    border-color: var(--yellow); background: rgba(255,215,0,0.15);
    color: var(--yellow); box-shadow: 0 0 20px rgba(255,215,0,0.4);
  }
  .card-slot.inserted {
    border-style: solid; border-color: var(--green);
    background: rgba(105,240,174,0.15); color: var(--green);
  }

  /* Draggable Card */
  .drag-card-container { display: flex; justify-content: center; margin: 10px 0 14px; }
  .drag-card {
    width: 180px; height: 110px; border-radius: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 10px 30px rgba(102,126,234,0.5), 0 4px 0 rgba(0,0,0,0.3);
    cursor: grab; position: relative; overflow: hidden;
    animation: card-idle 3s ease-in-out infinite;
    border: 2px solid rgba(255,255,255,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    touch-action: none;
    user-select: none;
  }
  .drag-card:hover { transform: scale(1.05) rotate(-2deg); box-shadow: 0 14px 40px rgba(102,126,234,0.7); }
  .drag-card:active { cursor: grabbing; transform: scale(1.08) rotate(-3deg); }
  .drag-card .chip {
    position: absolute; top: 18px; left: 16px;
    width: 32px; height: 24px; border-radius: 5px;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
  }
  .drag-card .card-no {
    position: absolute; bottom: 20px; left: 16px; right: 16px;
    color: rgba(255,255,255,0.9); font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; letter-spacing: 3px;
  }
  .drag-card .card-name {
    position: absolute; bottom: 6px; left: 16px;
    color: rgba(255,255,255,0.7); font-size: 0.7rem; font-weight: 700;
  }
  .drag-card .shine {
    position: absolute; top: -50%; left: -60%;
    width: 60%; height: 200%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
    transform: skewX(-15deg); animation: card-shine 3s ease-in-out infinite;
  }
  @keyframes card-shine {
    0%,100% { left: -60%; } 50% { left: 110%; }
  }
  @keyframes card-idle {
    0%,100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg) translateY(-3px); }
  }
  .drag-hint {
    text-align: center; color: var(--yellow); font-size: 0.85rem;
    font-weight: 700; animation: pulse-hint 1.5s ease-in-out infinite;
    margin-bottom: 6px;
  }
  @keyframes pulse-hint {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.05); }
  }

  /* ── ATM Screen ──────────────────────────── */
  .atm-screen {
    background: #0d1117; border-radius: 16px; padding: 18px 16px;
    margin-bottom: 16px; min-height: 140px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: 'Nunito', sans-serif; text-align: center; line-height: 1.7;
    border: 2px solid rgba(79,195,247,0.3);
    box-shadow: inset 0 0 30px rgba(79,195,247,0.08), 0 0 20px rgba(79,195,247,0.1);
    position: relative; overflow: hidden;
  }
  .atm-screen::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
    pointer-events: none;
  }
  .screen-title { color: var(--yellow); font-size: 1.05rem; font-weight: 800; margin-bottom: 8px; font-family: 'Fredoka One', cursive; }
  .screen-balance { color: var(--green); font-size: 1.5rem; font-weight: 800; font-family: 'Fredoka One', cursive; }
  .screen-warning { color: var(--red); font-size: 0.9rem; font-weight: 700; }
  .screen-sub { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
  .pin-display { font-size: 1.8rem; letter-spacing: 10px; color: var(--yellow); margin: 8px 0; font-family: 'Fredoka One', cursive; }

  /* ── PIN Pad ─────────────────────────────── */
  .pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .pin-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 14px 0;
    font-size: 1.3rem; font-weight: 800; color: #fff;
    cursor: pointer; text-align: center; font-family: 'Fredoka One', cursive;
    transition: all 0.15s; position: relative; overflow: hidden;
    backdrop-filter: blur(4px);
  }
  .pin-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.08); border-color: var(--sky); }
  .pin-btn:active { transform: scale(0.93); }
  .pin-btn::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.3), transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .pin-btn:active::after { opacity: 1; }
  .pin-btn.del { background: rgba(255,82,82,0.2); border-color: rgba(255,82,82,0.4); color: var(--red); }
  .pin-btn.enter { background: rgba(105,240,174,0.2); border-color: rgba(105,240,174,0.4); color: var(--green); }

  /* ── Action Buttons ──────────────────────── */
  .action-btns { display: flex; gap: 10px; flex-direction: column; }
  .act-btn {
    border: none; border-radius: 16px; padding: 14px 18px;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.68,-0.55,0.27,1.55);
    font-family: 'Nunito', sans-serif;
    position: relative; overflow: hidden;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
  }
  .act-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 rgba(0,0,0,0.3); }
  .act-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
  .act-btn.blue  { background: linear-gradient(135deg, var(--sky), #1565C0); color: #fff; }
  .act-btn.red   { background: linear-gradient(135deg, var(--pink), #C62828); color: #fff; }
  .act-btn.green { background: linear-gradient(135deg, var(--mint), #00897B); color: #1A1A2E; }
  .act-btn.purple { background: linear-gradient(135deg, var(--purple), #4527A0); color: #fff; }
  .act-btn.orange { background: linear-gradient(135deg, var(--orange), #E65100); color: #fff; }

  /* ── Amount Buttons ──────────────────────── */
  .amount-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .amt-btn {
    background: rgba(255,215,0,0.12); border: 2px solid rgba(255,215,0,0.4);
    border-radius: 14px; padding: 14px; font-size: 1.1rem;
    font-weight: 800; color: var(--yellow); cursor: pointer;
    font-family: 'Fredoka One', cursive;
    transition: all 0.2s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  .amt-btn:hover { background: rgba(255,215,0,0.25); transform: translateY(-3px) scale(1.04); box-shadow: 0 7px 0 rgba(0,0,0,0.3); }
  .amt-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  /* ── Bottom Buttons ──────────────────────── */
  .buttons-bottom {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-top: 20px;
  }
  .btn {
    padding: 12px 24px; border: none; border-radius: 30px;
    font-size: 0.95rem; font-weight: 800; cursor: pointer;
    font-family: 'Nunito', sans-serif; transition: all 0.2s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.3);
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
  .btn:active { transform: translateY(2px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
  .btn-reset { background: linear-gradient(135deg, var(--orange), #E65100); color: #fff; }
  .btn-next  { background: linear-gradient(135deg, var(--purple), #4527A0); color: #fff; }

  /* ── Popup ───────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none; z-index: 99;
  }
  .result-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    background: #1e1e3a; border: 2px solid rgba(255,255,255,0.2);
    border-radius: 28px; padding: 32px 28px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 320px; width: 90%; transition: transform 0.4s cubic-bezier(0.68,-0.55,0.27,1.55); z-index: 100;
  }
  .result-popup.show { transform: translate(-50%,-50%) scale(1); }
  .popup-icon { font-size: 3.5rem; display: block; margin-bottom: 8px; animation: icon-bounce 0.5s ease; }
  @keyframes icon-bounce {
    0%   { transform: scale(0) rotate(-30deg); }
    70%  { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .popup-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--yellow); margin-bottom: 8px; }
  .popup-msg { font-size: 0.95rem; color: rgba(255,255,255,0.8); margin-bottom: 20px; line-height: 1.5; }
  .popup-btn {
    width: 100%; padding: 14px; border: none; border-radius: 16px;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, var(--mint), #00897B);
    color: var(--dark); box-shadow: 0 5px 0 rgba(0,0,0,0.3);
    transition: all 0.2s;
  }
  .popup-btn:hover { transform: translateY(-2px); }
  .popup-btn:active { transform: translateY(2px); }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    pointer-events: none; z-index: 200;
    animation: confetti-fall 1.5s ease-in forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
  }

  /* Planrs badge */
  .planrs {
    position: fixed; top: 12px; right: 14px;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #fff; font-size: 0.8rem; font-weight: 800;
    padding: 6px 14px; border-radius: 30px;
    z-index: 50; font-family: 'Fredoka One', cursive;
    box-shadow: 0 4px 12px rgba(255,140,66,0.5);
    animation: badge-pulse 2s ease-in-out infinite;
  }
  @keyframes badge-pulse {
    0%,100% { box-shadow: 0 4px 12px rgba(255,140,66,0.5); }
    50%      { box-shadow: 0 4px 24px rgba(255,140,66,0.8); }
  }

  /* Receipt style */
  .receipt {
    background: #fff; color: #222; border-radius: 12px;
    padding: 14px; font-family: 'Courier New', monospace;
    font-size: 0.85rem; text-align: left; line-height: 2;
    border-top: 8px dashed #eee; border-bottom: 8px dashed #eee;
    margin: 6px 0;
  }

  /* Wiggle animation for hints */
  .wiggle { animation: wiggle 0.5s ease-in-out; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    20%      { transform: rotate(-5deg); }
    60%      { transform: rotate(5deg); }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bubbles" id="bubbles"></div>
<div id="stars-container"></div>

<div class="planrs">⭐ Planrs</div>

<div class="content">
  <div class="header">
    <h1>🏧 ATM Adventure!</h1>
    <p>Section 3 — Activity B | Learn to use an ATM</p>
  </div>

  <div class="score-bar">
    <span class="label">Progress: <span id="stepsText">0 / 5</span></span>
    <span class="stars" id="starDisplay">⚫⚫⚫⚫⚫</span>
  </div>

  <div class="step-indicator" id="stepDots">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
    <div class="step-dot" id="dot4"></div>
  </div>

  <div class="atm-machine" id="atmMachine">
    <div class="card-slot-wrap">
      <div class="card-slot" id="cardSlot">📤 CARD SLOT</div>
    </div>
    <div class="atm-screen" id="atmScreen">
      <div class="screen-title">🏦 Welcome to Planrs Bank!</div>
      <div class="screen-sub">Drag your card into the slot above ☝️</div>
    </div>
    <div id="atmControls"></div>
  </div>

  <!-- Draggable Card -->
  <div id="dragCardWrap">
    <p class="drag-hint">👆 Drag the card up to the slot!</p>
    <div class="drag-card-container">
      <div class="drag-card" id="dragCard" draggable="true">
        <div class="chip"></div>
        <div class="shine"></div>
        <div class="card-no">**** 1234</div>
        <div class="card-name">PLANRS BANK</div>
      </div>
    </div>
  </div>

  <div class="buttons-bottom">
    <button class="btn btn-reset" onclick="resetATM()">🔄 Start Over</button>
    <button class="btn btn-next" onclick="nextSection()">Next ➡️</button>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="result-popup" id="popup">
  <span class="popup-icon" id="popupIcon">✅</span>
  <div class="popup-title" id="popupTitle">Success!</div>
  <p class="popup-msg" id="popupMsg">Great job!</p>
  <button class="popup-btn" onclick="closePopup()">Continue ➡️</button>
</div>

<script>
// ── Background Bubbles ──────────────────
const bubbleColors = ['#FF6EB4','#FFD700','#3DFFA0','#4FC3F7','#B388FF','#FF8C42'];
const bubblesEl = document.getElementById('bubbles');
for(let i=0;i<18;i++){
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 30 + Math.random()*80;
  b.style.cssText = `
    width:${size}px; height:${size}px;
    background:${bubbleColors[Math.floor(Math.random()*bubbleColors.length)]};
    left:${Math.random()*100}%;
    animation-duration:${8+Math.random()*14}s;
    animation-delay:${Math.random()*10}s;
  `;
  bubblesEl.appendChild(b);
}

// ── Stars ────────────────────────────────
const starsC = document.getElementById('stars-container');
const starEmojis = ['⭐','✨','💫','🌟'];
for(let i=0;i<12;i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = starEmojis[Math.floor(Math.random()*starEmojis.length)];
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
  starsC.appendChild(s);
}

// ── State ────────────────────────────────
let balance = 3500;
let pinEntry = '';
const correctPIN = '1234';
let stepsCompleted = 0;
let wrongPINCount = 0;
let withdrawAmount = 0;
const starArr = ['⚫','⚫','⚫','⚫','⚫'];

function updateScore(){
  document.getElementById('stepsText').textContent = `${stepsCompleted} / 5`;
  for(let i=0;i<5;i++) starArr[i] = i<stepsCompleted ? '⭐' : '⚫';
  document.getElementById('starDisplay').innerHTML = starArr.map((s,i)=>`<span class="star-icon" style="animation-delay:${i*0.1}s">${s}</span>`).join('');
}
function setDot(idx,type){
  document.getElementById('dot'+idx).className='step-dot '+type;
}
function setScreen(html){ document.getElementById('atmScreen').innerHTML = html; }
function setControls(html){ document.getElementById('atmControls').innerHTML = html; }
function hideDragCard(){ document.getElementById('dragCardWrap').style.display='none'; }
function showDragCard(){ document.getElementById('dragCardWrap').style.display=''; }

// ── Confetti ─────────────────────────────
function spawnConfetti(){
  const colors=['#FF6EB4','#FFD700','#3DFFA0','#4FC3F7','#B388FF','#FF8C42'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className='confetti-piece';
    const shape = Math.random()>0.5 ? '50%' : '0';
    c.style.cssText=`
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${shape};
      animation-delay:${Math.random()*0.8}s;
      animation-duration:${1+Math.random()*1}s;
    `;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2500);
  }
}

// ── Drag & Drop ───────────────────────────
const dragCard = document.getElementById('dragCard');
const cardSlot = document.getElementById('cardSlot');

// Desktop
dragCard.addEventListener('dragstart', e=>{
  e.dataTransfer.effectAllowed='move';
  dragCard.style.opacity='0.5';
});
dragCard.addEventListener('dragend', ()=>{ dragCard.style.opacity='1'; });
cardSlot.addEventListener('dragover', e=>{ e.preventDefault(); cardSlot.classList.add('drag-over'); });
cardSlot.addEventListener('dragleave', ()=>{ cardSlot.classList.remove('drag-over'); });
cardSlot.addEventListener('drop', e=>{ e.preventDefault(); cardSlot.classList.remove('drag-over'); step_insertCard(); });

// Touch
let isDragging=false, startX, startY, clone=null;
dragCard.addEventListener('touchstart', e=>{
  if(isDragging) return;
  isDragging=true;
  const t=e.touches[0];
  startX=t.clientX; startY=t.clientY;
  clone=dragCard.cloneNode(true);
  clone.style.cssText=`position:fixed;left:${t.clientX-90}px;top:${t.clientY-55}px;width:180px;height:110px;z-index:999;pointer-events:none;opacity:0.85;transition:none;`;
  document.body.appendChild(clone);
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove', e=>{
  if(!isDragging||!clone) return;
  const t=e.touches[0];
  clone.style.left=(t.clientX-90)+'px';
  clone.style.top=(t.clientY-55)+'px';
  const slotRect=cardSlot.getBoundingClientRect();
  if(t.clientX>=slotRect.left&&t.clientX<=slotRect.right&&t.clientY>=slotRect.top&&t.clientY<=slotRect.bottom){
    cardSlot.classList.add('drag-over');
  } else { cardSlot.classList.remove('drag-over'); }
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend', e=>{
  if(!isDragging||!clone) return;
  isDragging=false;
  const t=e.changedTouches[0];
  const slotRect=cardSlot.getBoundingClientRect();
  clone.remove(); clone=null; cardSlot.classList.remove('drag-over');
  if(t.clientX>=slotRect.left&&t.clientX<=slotRect.right&&t.clientY>=slotRect.top&&t.clientY<=slotRect.bottom){
    step_insertCard();
  }
});

// ── ATM Flow ──────────────────────────────
function step_insertCard(){
  if(stepsCompleted>=1) return;
  stepsCompleted=1; updateScore(); setDot(0,'done'); setDot(1,'active');
  cardSlot.className='card-slot inserted'; cardSlot.textContent='💳 CARD INSERTED ✓';
  hideDragCard(); spawnConfetti();
  setScreen(`<div class="screen-title">🔐 Enter Your PIN</div><div class="screen-sub">Type your secret 4-digit PIN</div><div class="pin-display" id="pinDisplay">_ _ _ _</div>`);
  buildPinPad();
}

function buildPinPad(){
  let html=`<div class="pin-pad">`;
  for(let i=1;i<=9;i++) html+=`<div class="pin-btn" onclick="enterPin('${i}')">${i}</div>`;
  html+=`<div class="pin-btn del" onclick="clearPin()">✕</div>`;
  html+=`<div class="pin-btn" onclick="enterPin('0')">0</div>`;
  html+=`<div class="pin-btn enter" onclick="submitPin()">↵</div>`;
  html+=`</div>`;
  setControls(html);
}

function enterPin(d){
  if(pinEntry.length<4){ pinEntry+=d; updatePinDisplay(); }
}
function clearPin(){ pinEntry=''; updatePinDisplay(); }
function updatePinDisplay(){
  let disp=''; for(let i=0;i<4;i++) disp+=(i<pinEntry.length?'●':'_')+(i<3?' ':'');
  const el=document.getElementById('pinDisplay'); if(el) el.textContent=disp;
}
function submitPin(){
  if(pinEntry.length<4){ shakePopup(); showPopup('⚠️','Not Enough Digits!','Please enter all 4 digits of your PIN!',true); return; }
  if(pinEntry===correctPIN){
    stepsCompleted=2; updateScore(); setDot(1,'done'); setDot(2,'active');
    spawnConfetti();
    showPopup('✅','PIN Correct! 🎉','Awesome! Your PIN is secret — never tell anyone! 🔐',false,showMenu);
  } else {
    wrongPINCount++; pinEntry='';
    if(wrongPINCount>=3){
      setScreen(`<div class="screen-title" style="color:var(--red)">🚫 Card Blocked!</div><div class="screen-warning">3 wrong PINs — your card is blocked for safety.<br>Always remember your PIN!</div>`);
      setControls(`<div class="action-btns"><button class="act-btn red" onclick="resetATM()">🔄 Start Again</button></div>`);
    } else {
      showPopup('❌','Wrong PIN!',`Oops! That's not right. Try again! Attempt ${wrongPINCount}/3. (Hint: try 1234!)`,true,buildPinPad);
      updatePinDisplay();
    }
  }
}

function showMenu(){
  setScreen(`<div class="screen-title">📋 What would you like to do?</div><div class="screen-sub">Balance: <span class="screen-balance">₹${balance.toLocaleString('en-IN')}</span></div>`);
  setControls(`<div class="action-btns">
    <button class="act-btn green" onclick="step_balance()">💰 Check Balance</button>
    <button class="act-btn blue" onclick="step_withdraw()">💸 Withdraw Money</button>
    <button class="act-btn red" onclick="step_exit()">🚪 Exit & Take Card</button>
  </div>`);
}

function step_balance(){
  stepsCompleted=3; updateScore(); setDot(2,'done'); setDot(3,'active');
  setScreen(`<div class="screen-title">💰 Your Balance</div><div class="screen-balance">₹${balance.toLocaleString('en-IN')}</div><div class="screen-sub" style="margin-top:8px">As of today ✨</div>`);
  setControls(`<div class="action-btns"><button class="act-btn blue" onclick="showMenu()">⬅️ Back to Menu</button></div>`);
  showPopup('📊','Balance Checked! 🎉',`Your balance is ₹${balance.toLocaleString('en-IN')}. Always know your balance before spending!`,false);
}

function step_withdraw(){
  setScreen(`<div class="screen-title">💸 Withdraw Money</div><div class="screen-sub">Tap the amount you want:</div>`);
  let html=`<div class="amount-btns">`;
  [100,200,500,1000].forEach(a=>{html+=`<button class="amt-btn" onclick="confirmWithdraw(${a})">₹${a}</button>`;});
  html+=`</div><div class="action-btns"><button class="act-btn red" onclick="showMenu()">❌ Cancel</button></div>`;
  setControls(html);
}

function confirmWithdraw(amt){
  withdrawAmount=amt;
  if(amt>balance){
    showPopup('⚠️','Not Enough Money!',`You want ₹${amt} but only have ₹${balance.toLocaleString('en-IN')}. You can't take more than you have!`,true,step_withdraw);
    return;
  }
  stepsCompleted=4; updateScore(); setDot(3,'done'); setDot(4,'active');
  balance-=amt; spawnConfetti();
  setScreen(`<div class="screen-title">✅ Collect Your Cash!</div><div class="screen-balance">₹${amt.toLocaleString('en-IN')}</div><div class="screen-sub" style="margin-top:8px">Remaining: ₹${balance.toLocaleString('en-IN')}</div>`);
  setControls(`<div class="action-btns"><button class="act-btn green" onclick="step_receipt()">📄 Get My Receipt</button></div>`);
  showPopup('💵','Cash Coming Out! 🎉',`Grab your ₹${amt.toLocaleString('en-IN')}! Remaining balance: ₹${balance.toLocaleString('en-IN')}.`,false);
}

function step_receipt(){
  setScreen(`<div class="screen-title">📄 Your Receipt</div><div class="screen-sub" style="text-align:left;width:100%;padding:0 8px;line-height:2">🔹 Withdrawn: ₹${withdrawAmount.toLocaleString('en-IN')}<br>🔹 Balance: ₹${balance.toLocaleString('en-IN')}<br>🔹 Date: Today<br>🔹 Thank you! 🏦</div>`);
  setControls(`<div class="action-btns"><button class="act-btn red" onclick="step_exit()">💳 Take Card & Exit</button></div>`);
}

function step_exit(){
  stepsCompleted=5; updateScore(); for(let i=0;i<5;i++) setDot(i,'done');
  cardSlot.className='card-slot'; cardSlot.textContent='📤 CARD SLOT';
  setScreen(`<div class="screen-title">👋 See You Next Time!</div><div class="screen-sub" style="line-height:2">Card removed safely 💳<br>Have a great day! 🌟<br><span style="color:var(--yellow)">Never share your PIN! 🔐</span></div>`);
  setControls(`<div class="action-btns"><button class="act-btn green" onclick="showFinalPopup()">🏆 See My Score!</button></div>`);
  spawnConfetti(); setTimeout(spawnConfetti,700); setTimeout(spawnConfetti,1400);
}

function showFinalPopup(){
  showPopup('🏆','ATM Expert! 🎉','You completed ALL 5 steps perfectly! You\'re ready to use a real ATM with a parent! ⭐⭐⭐⭐⭐',false);
}

// ── Popup ─────────────────────────────────
function showPopup(icon, title, msg, isWarn, cb){
  document.getElementById('popupIcon').textContent=icon;
  document.getElementById('popupTitle').textContent=title;
  document.getElementById('popupMsg').textContent=msg;
  document.getElementById('popup').className='result-popup show';
  document.getElementById('overlay').style.display='block';
  window._popupCB=cb;
}
function closePopup(){
  document.getElementById('popup').className='result-popup';
  document.getElementById('overlay').style.display='none';
  if(window._popupCB){ window._popupCB(); window._popupCB=null; }
}
document.getElementById('overlay').onclick=closePopup;

function shakePopup(){
  const p=document.getElementById('popup');
  p.classList.add('wiggle'); setTimeout(()=>p.classList.remove('wiggle'),500);
}

function resetATM(){
  stepsCompleted=0; pinEntry=''; wrongPINCount=0; balance=3500; withdrawAmount=0;
  updateScore();
  cardSlot.className='card-slot'; cardSlot.textContent='📤 CARD SLOT';
  for(let i=0;i<5;i++) setDot(i,i===0?'active':'');
  setScreen(`<div class="screen-title">🏦 Welcome to Planrs Bank!</div><div class="screen-sub">Drag your card into the slot above ☝️</div>`);
  setControls('');
  showDragCard();
}

function nextSection(){ showPopup('🌟','Amazing Work!','You mastered the ATM! Time for Section 4 — Smart Saving Habits! 🐷💰',false); }

// Init
resetATM();
</script>
