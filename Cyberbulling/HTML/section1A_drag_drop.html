<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What is Cyberbullying? | ⭐ Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Lilita+One&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════
   ANIMATED BACKGROUND CANVAS
══════════════════════════════════════ */
body{
  font-family:'Baloo 2',cursive;
  min-height:100vh;
  padding:12px 12px 50px;
  overflow-x:hidden;
  position:relative;
  background:#0D0D2B;
}

/* Aurora layer */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.aurora-blob{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;
  animation:blobDrift 12s ease-in-out infinite alternate;
}
.ab1{width:500px;height:500px;background:radial-gradient(circle,#FF4DA6,#FF9A00 60%,transparent);top:-100px;left:-120px;animation-duration:14s}
.ab2{width:450px;height:450px;background:radial-gradient(circle,#00E5FF,#00FF85 60%,transparent);top:-80px;right:-100px;animation-duration:11s;animation-delay:-3s}
.ab3{width:400px;height:400px;background:radial-gradient(circle,#A855F7,#F472B6 60%,transparent);bottom:-80px;left:10%;animation-duration:16s;animation-delay:-6s}
.ab4{width:380px;height:380px;background:radial-gradient(circle,#FACC15,#FB923C 60%,transparent);bottom:-60px;right:5%;animation-duration:13s;animation-delay:-2s}
.ab5{width:300px;height:300px;background:radial-gradient(circle,#34D399,#60A5FA 60%,transparent);top:40%;left:45%;transform:translate(-50%,-50%);animation-duration:18s;animation-delay:-8s}

@keyframes blobDrift{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-40px) scale(1.08)}
  66%{transform:translate(-20px,30px) scale(.94)}
  100%{transform:translate(20px,20px) scale(1.04)}
}

/* Floating stars / dots */
.star{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  animation:starFloat linear infinite;
}
@keyframes starFloat{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:1}
  90%{opacity:.8}
  100%{transform:translateY(-120px) rotate(720deg);opacity:0}
}

/* Overlay to tint background readable */
.bg-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:rgba(13,13,43,.35);
  backdrop-filter:blur(0px);
}

/* ══════════════════════════════════════
   LAYOUT WRAPPER
══════════════════════════════════════ */
.wrapper{position:relative;z-index:2;max-width:700px;margin:0 auto}

/* ── LOGO ── */
.logo{
  position:fixed;top:10px;right:12px;z-index:300;
  background:linear-gradient(135deg,#FACC15,#FB923C);
  color:#1A0A00;font-family:'Lilita One',cursive;font-size:13px;
  padding:6px 16px;border-radius:30px;
  box-shadow:0 4px 14px rgba(250,204,21,.5);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{box-shadow:0 4px 14px rgba(250,204,21,.5)}50%{box-shadow:0 4px 28px rgba(250,204,21,.9)}}

/* ── TITLE ── */
.title-box{text-align:center;margin-bottom:10px;padding-top:6px}
.title-emoji{font-size:52px;display:block;margin-bottom:4px;
  animation:spinFloat 4s ease-in-out infinite}
@keyframes spinFloat{
  0%,100%{transform:translateY(0) rotate(-4deg)}
  50%{transform:translateY(-10px) rotate(4deg)}
}
h1{
  font-family:'Lilita One',cursive;
  font-size:clamp(26px,7vw,42px);line-height:1.1;
  background:linear-gradient(90deg,#FF4DA6,#FACC15,#00E5FF,#A855F7,#34D399);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbowSlide 5s linear infinite;
  filter:drop-shadow(0 2px 8px rgba(255,77,166,.4));
}
@keyframes rainbowSlide{0%{background-position:0%}100%{background-position:300%}}
.sub{
  color:rgba(255,255,255,.65);font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;
}

/* ── SCORE PILL ── */
.score-wrap{display:flex;justify-content:center;margin:12px 0}
.score-pill{
  background:linear-gradient(135deg,#FF4DA6,#A855F7);
  color:#FFF;font-family:'Lilita One',cursive;font-size:18px;
  padding:10px 34px;border-radius:40px;
  box-shadow:0 6px 24px rgba(168,85,247,.5),0 2px 0 rgba(0,0,0,.2);
  position:relative;overflow:hidden;
  animation:pillGlow 2.5s ease-in-out infinite alternate;
}
@keyframes pillGlow{
  from{box-shadow:0 6px 24px rgba(168,85,247,.5),0 2px 0 rgba(0,0,0,.2)}
  to{box-shadow:0 6px 36px rgba(255,77,166,.7),0 2px 0 rgba(0,0,0,.2)}
}
.score-pill::after{
  content:'';position:absolute;top:0;left:-120%;width:70%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 2.2s ease-in-out infinite;
}
.score-num{color:#FACC15;font-size:24px}
@keyframes shine{0%{left:-120%}100%{left:150%}}

/* ── TIP BOX ── */
.tip{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,.25);
  border-radius:18px;padding:14px 18px 12px;margin-bottom:20px;
  font-size:14px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.6;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  position:relative;
  animation:tipBounceIn .6s cubic-bezier(.34,1.56,.64,1);
}
.tip::before{content:'💡';position:absolute;top:-14px;left:16px;font-size:24px;
  animation:spinFloat 3s ease-in-out infinite;}
@keyframes tipBounceIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.tip strong{color:#FACC15}

/* ── POOL LABEL ── */
.pool-label{
  font-family:'Lilita One',cursive;font-size:17px;
  color:#FACC15;margin-bottom:8px;
  text-shadow:0 2px 8px rgba(250,204,21,.5);
  display:flex;align-items:center;gap:6px;
}

/* ── POOL ── */
.pool{
  display:flex;flex-wrap:wrap;gap:10px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(14px);
  border-radius:22px;padding:16px;
  border:2.5px dashed rgba(255,255,255,.3);
  min-height:84px;margin-bottom:22px;
  box-shadow:0 8px 32px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15);
  transition:background .25s,border-color .25s;
}
.pool-empty{
  color:rgba(255,255,255,.35);font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;width:100%;height:48px;pointer-events:none;
}

/* ── CARDS ── */
.card{
  border-radius:16px;padding:11px 16px;cursor:grab;
  font-size:13.5px;font-weight:700;color:#1A0A00;
  user-select:none;touch-action:none;
  position:relative;border:3px solid transparent;line-height:1.4;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,opacity .15s;
  box-shadow:0 5px 14px rgba(0,0,0,.25),0 2px 0 rgba(0,0,0,.15);
}
/* Rainbow card colors cycling */
.card:nth-child(7n+1){background:linear-gradient(135deg,#FFE566,#FFA800);border-color:#E8B800}
.card:nth-child(7n+2){background:linear-gradient(135deg,#FF9DE2,#FF4DA6);border-color:#C9185A;color:#2D0018}
.card:nth-child(7n+3){background:linear-gradient(135deg,#6EE7F7,#00BFDF);border-color:#0099B8;color:#002533}
.card:nth-child(7n+4){background:linear-gradient(135deg,#6EF5C4,#00C88C);border-color:#008F63;color:#001F15}
.card:nth-child(7n+5){background:linear-gradient(135deg,#D8B4FE,#A855F7);border-color:#7D22CE;color:#1A0040}
.card:nth-child(7n+6){background:linear-gradient(135deg,#FFCBA4,#FF6B1A);border-color:#D94500;color:#200800}
.card:nth-child(7n+0){background:linear-gradient(135deg,#A5F3FC,#38BDF8);border-color:#0178B6;color:#002535}

.card::after{
  content:'✦';position:absolute;top:5px;right:9px;
  font-size:11px;opacity:.4;
}
.card:hover{
  transform:scale(1.07) rotate(-2deg);
  box-shadow:0 12px 28px rgba(0,0,0,.35),0 2px 0 rgba(0,0,0,.15);
}
.card.dragging{opacity:.15;cursor:grabbing;transform:scale(.9) rotate(3deg)}

/* ── ZONES ── */
.zones{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:500px){.zones{grid-template-columns:1fr}}

.zone{
  border-radius:24px;padding:14px;border:3.5px solid;min-height:170px;
  transition:transform .18s,box-shadow .18s,border-color .18s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(12px);
}
/* Animated shimmer inside zones */
.zone::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 60%);
  border-radius:inherit;
}

.zone.cyber{
  border-color:#FF4DA6;
  background:linear-gradient(145deg,rgba(255,77,166,.18),rgba(201,24,74,.1));
  box-shadow:0 4px 20px rgba(255,77,166,.2),inset 0 1px 0 rgba(255,200,220,.2);
}
.zone.not{
  border-color:#00E5A0;
  background:linear-gradient(145deg,rgba(0,229,160,.18),rgba(4,145,112,.1));
  box-shadow:0 4px 20px rgba(0,229,160,.2),inset 0 1px 0 rgba(180,255,230,.2);
}
.zone.over{transform:scale(1.025)}
.zone.cyber.over{
  border-color:#FF9DE2;border-style:dashed;
  box-shadow:0 0 0 4px rgba(255,77,166,.25),0 8px 32px rgba(255,77,166,.4);
}
.zone.not.over{
  border-color:#6EF5C4;border-style:dashed;
  box-shadow:0 0 0 4px rgba(0,229,160,.25),0 8px 32px rgba(0,229,160,.4);
}

.zone-header{
  font-family:'Lilita One',cursive;font-size:15px;font-weight:400;
  margin-bottom:10px;padding:8px 16px;border-radius:14px;
  text-align:center;letter-spacing:.5px;position:relative;z-index:1;
}
.zone.cyber .zone-header{
  background:linear-gradient(135deg,#FF4DA6,#C9185A);color:#FFF;
  box-shadow:0 4px 14px rgba(255,77,166,.5);
  animation:headerPulse1 3s ease-in-out infinite alternate;
}
.zone.not .zone-header{
  background:linear-gradient(135deg,#00E5A0,#049170);color:#FFF;
  box-shadow:0 4px 14px rgba(0,229,160,.5);
  animation:headerPulse2 3s ease-in-out infinite alternate;
}
@keyframes headerPulse1{from{box-shadow:0 4px 14px rgba(255,77,166,.4)}to{box-shadow:0 4px 24px rgba(255,77,166,.8)}}
@keyframes headerPulse2{from{box-shadow:0 4px 14px rgba(0,229,160,.4)}to{box-shadow:0 4px 24px rgba(0,229,160,.8)}}

/* ── CHIPS ── */
.chip{
  border-radius:12px;padding:7px 11px;font-size:13px;font-weight:700;
  display:flex;align-items:flex-start;gap:6px;margin-bottom:7px;line-height:1.4;
  position:relative;z-index:1;
  animation:chipBounce .4s cubic-bezier(.34,1.56,.64,1);
}
.chip.correct{
  background:linear-gradient(135deg,#6EF5C4,#34D399);
  border:2px solid #00C88C;color:#002A1A;
  box-shadow:0 3px 10px rgba(0,200,140,.3);
}
.chip.incorrect{
  background:linear-gradient(135deg,#FF9DE2,#FF4DA6);
  border:2px solid #C9185A;color:#2D0018;
  box-shadow:0 3px 10px rgba(255,77,166,.3);
}
.chip.neutral{
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.35);color:rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.chip-icon{flex-shrink:0;font-size:14px;margin-top:2px}
@keyframes chipBounce{
  0%{transform:scale(0) rotate(-12deg);opacity:0}
  70%{transform:scale(1.1) rotate(2deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}

/* ── FEEDBACK BAR ── */
.fb-wrap{text-align:center;min-height:40px;margin:6px 0 12px}
.fb{
  display:inline-block;font-family:'Lilita One',cursive;font-size:17px;
  padding:8px 24px;border-radius:30px;
  background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.1));
  backdrop-filter:blur(10px);
  color:#FFF;border:2px solid rgba(255,255,255,.3);
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  letter-spacing:.3px;
  transition:all .3s;
}

/* ── RESULT CARD ── */
.result{
  display:none;border-radius:26px;padding:30px 24px;text-align:center;margin-top:18px;
  backdrop-filter:blur(16px);
  border:3px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12);
}
.result.show{
  display:block;
  animation:resultReveal .55s cubic-bezier(.34,1.56,.64,1);
}
.result.perfect{
  background:linear-gradient(135deg,rgba(110,245,196,.2),rgba(250,204,21,.15),rgba(168,85,247,.15));
  border-color:#34D399;
  box-shadow:0 0 60px rgba(52,211,153,.3),0 12px 40px rgba(0,0,0,.3);
}
.result.great{
  background:linear-gradient(135deg,rgba(96,165,250,.2),rgba(250,204,21,.15));
  border-color:#60A5FA;
  box-shadow:0 0 40px rgba(96,165,250,.3),0 12px 40px rgba(0,0,0,.3);
}
.result.ok{
  background:linear-gradient(135deg,rgba(251,146,60,.2),rgba(250,204,21,.15));
  border-color:#FB923C;
  box-shadow:0 0 40px rgba(251,146,60,.3),0 12px 40px rgba(0,0,0,.3);
}
.result-emoji{font-size:56px;display:block;margin-bottom:8px;animation:spinFloat 2.5s ease-in-out infinite}
.result h2{
  font-family:'Lilita One',cursive;font-size:28px;margin-bottom:10px;
  background:linear-gradient(90deg,#FACC15,#FF4DA6,#00E5FF);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbowSlide 3s linear infinite;
}
.result p{font-size:15px;font-weight:700;color:rgba(255,255,255,.88);line-height:1.7}
.score-big{
  font-family:'Lilita One',cursive;font-size:54px;display:block;
  background:linear-gradient(135deg,#FACC15,#FB923C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:6px 0;filter:drop-shadow(0 4px 12px rgba(250,204,21,.4));
}
.stars{font-size:24px;letter-spacing:6px;margin:8px 0}

/* ── TRY AGAIN BUTTON ── */
.retry-btn{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:18px;
  background:linear-gradient(135deg,#FACC15,#FB923C);
  color:#1A0800;font-family:'Lilita One',cursive;font-size:18px;
  border:none;border-radius:50px;
  padding:13px 36px;cursor:pointer;
  box-shadow:0 6px 24px rgba(250,204,21,.5),0 3px 0 rgba(180,90,0,.4);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;
  position:relative;overflow:hidden;
  letter-spacing:.4px;
}
.retry-btn::after{
  content:'';position:absolute;top:0;left:-120%;width:70%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shine 2s ease-in-out infinite;
}
.retry-btn:hover{
  transform:scale(1.08) translateY(-2px);
  box-shadow:0 10px 30px rgba(250,204,21,.65),0 3px 0 rgba(180,90,0,.4);
}
.retry-btn:active{transform:scale(.97) translateY(1px)}
.retry-icon{font-size:22px;animation:spinOnce .5s ease;display:inline-block}
@keyframes spinOnce{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@keyframes resultReveal{
  0%{transform:scale(.75) translateY(30px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}

/* ── CONFETTI ── */
.confetti{
  position:fixed;pointer-events:none;z-index:999;font-size:22px;
  animation:confettiFall var(--dur,2s) ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-30px) rotate(0deg) scale(0);opacity:1}
  15%{transform:translateY(0px) rotate(45deg) scale(1.2);opacity:1}
  100%{transform:translateY(105vh) rotate(900deg) scale(.6);opacity:0}
}
</style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="aurora">
  <div class="aurora-blob ab1"></div>
  <div class="aurora-blob ab2"></div>
  <div class="aurora-blob ab3"></div>
  <div class="aurora-blob ab4"></div>
  <div class="aurora-blob ab5"></div>
</div>
<div class="bg-overlay"></div>

<!-- FLOATING STARS (added by JS) -->

<div class="wrapper">
  <div class="logo">⭐ Planrs</div>

  <div class="title-box">
    <span class="title-emoji">🌐</span>
    <h1>What is Cyberbullying?</h1>
    <p class="sub">Section 1A · Drag &amp; Drop</p>
  </div>

  <div class="score-wrap">
    <div class="score-pill">⭐ Sorted: <span class="score-num" id="sc">0</span> / 12</div>
  </div>

  <div class="tip">
    Drag each colourful card into the right bucket —
    <strong>🚫 Cyberbullying</strong> or <strong>✅ Not Cyberbullying</strong>.
    Sort all 12 to see your score!
  </div>

  <div class="pool-label">📦 Cards to sort:</div>
  <div class="pool" id="pool"><div class="pool-empty">Loading cards…</div></div>

  <div class="zones">
    <div class="zone cyber" id="z-cyber" data-zone="cyber">
      <div class="zone-header">🚫 Cyberbullying</div>
      <div id="p-cyber"></div>
    </div>
    <div class="zone not" id="z-not" data-zone="not">
      <div class="zone-header">✅ Not Cyberbullying</div>
      <div id="p-not"></div>
    </div>
  </div>

  <div class="fb-wrap"><span class="fb" id="fb">👆 Drag a card to get started!</span></div>

  <div class="result" id="res">
    <span class="result-emoji" id="r-emoji">🏆</span>
    <span class="score-big" id="r-score"></span>
    <div class="stars" id="r-stars"></div>
    <h2 id="r-title"></h2>
    <p id="r-msg"></p>
    <button class="retry-btn" onclick="tryAgain()">
      <span class="retry-icon">🔄</span> Try Again
    </button>
  </div>
</div>

<script>
/* ── FLOATING STARS ── */
(function spawnStars(){
  const colors=['#FF4DA6','#FACC15','#00E5FF','#A855F7','#34D399','#FB923C','#60A5FA','#F472B6'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='star';
    const size=(Math.random()*8+4)+'px';
    el.style.cssText=`
      width:${size};height:${size};
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}vw;
      --dur:${6+Math.random()*10}s;
      animation-duration:var(--dur);
      animation-delay:${Math.random()*12}s;
      opacity:.7;
    `;
    document.body.appendChild(el);
  }
})();

/* ── CARDS DATA ── */
const cards=[
  {id:1,t:"Sending repeated mean messages to Priya on WhatsApp every night",c:"cyber"},
  {id:2,t:"Posting an embarrassing photo of Karan without his permission",c:"cyber"},
  {id:3,t:"Creating a fake account pretending to be Meera to insult classmates",c:"cyber"},
  {id:4,t:"Leaving hurtful comments on someone's YouTube school project video",c:"cyber"},
  {id:5,t:"Purposely removing Raju from every WhatsApp group to isolate him",c:"cyber"},
  {id:6,t:"Spreading false rumours about Divya on Instagram Stories",c:"cyber"},
  {id:7,t:"Sending death threats to a classmate's inbox",c:"cyber"},
  {id:8,t:"Sharing someone's home address in a group to threaten them",c:"cyber"},
  {id:9,t:"Sending a 'Happy Birthday!' message with a mango cake emoji to your friend",c:"not"},
  {id:10,t:"Sharing a funny cricket meme that your friend also laughed at",c:"not"},
  {id:11,t:"Inviting a classmate to join an online study group for the exam",c:"not"},
  {id:12,t:"Complimenting a classmate's drawing posted in the school WhatsApp group",c:"not"},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let order=shuffle(cards),placements={},dragId=null,touchClone=null,touchZone=null;

/* ── RENDER ── */
function render(){
  const pool=document.getElementById('pool');
  pool.innerHTML='';
  const rem=order.filter(c=>!placements[c.id]);
  if(rem.length===0){
    pool.innerHTML='<div class="pool-empty" style="color:rgba(255,255,255,.4)">All cards sorted! 🎉</div>';
  } else {
    rem.forEach(c=>{
      const d=document.createElement('div');
      d.className='card';d.draggable=true;d.dataset.id=c.id;d.textContent=c.t;
      d.addEventListener('dragstart',()=>{dragId=c.id;d.classList.add('dragging')});
      d.addEventListener('dragend',()=>d.classList.remove('dragging'));
      d.addEventListener('touchstart',onTS,{passive:true});
      d.addEventListener('touchmove',onTM,{passive:false});
      d.addEventListener('touchend',onTE);
      pool.appendChild(d);
    });
  }
  const done=Object.keys(placements).length===cards.length;
  ['cyber','not'].forEach(z=>{
    const el=document.getElementById('p-'+z);el.innerHTML='';
    Object.entries(placements).filter(([,zz])=>zz===z).forEach(([id])=>{
      const card=cards.find(c=>c.id==id);const correct=card.c===z;
      const ch=document.createElement('div');
      ch.className='chip '+(done?(correct?'correct':'incorrect'):'neutral');
      ch.innerHTML=`<span class="chip-icon">${done?(correct?'✅':'❌'):'📌'}</span><span>${card.t}</span>`;
      el.appendChild(ch);
    });
  });
  document.getElementById('sc').textContent=Object.keys(placements).length;
  updateFb();
}

function updateFb(){
  const n=Object.keys(placements).length,el=document.getElementById('fb');
  if(n===0)el.textContent='👆 Drag a card to get started!';
  else if(n<cards.length)el.textContent='💪 '+n+' of 12 sorted — keep going!';
  else el.textContent='🎉 All sorted! Check your results below!';
  if(n===cards.length)showResult();
}

function drop(zone){if(!dragId)return;placements[dragId]=zone;dragId=null;render()}

/* ── DESKTOP DRAG ── */
['z-cyber','z-not'].forEach(zid=>{
  const el=document.getElementById(zid);
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over')});
  el.addEventListener('dragleave',e=>{if(!el.contains(e.relatedTarget))el.classList.remove('over')});
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');drop(el.dataset.zone)});
});

/* ── TOUCH DRAG ── */
function onTS(e){
  const src=e.currentTarget;dragId=src.dataset.id;
  touchClone=src.cloneNode(true);
  const r=src.getBoundingClientRect();
  touchClone.style.cssText=`position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;`+
    `opacity:.92;pointer-events:none;z-index:9999;`+
    `transform:rotate(-3deg) scale(1.08);`+
    `box-shadow:0 16px 40px rgba(0,0,0,.4);transition:none`;
  document.body.appendChild(touchClone);
}
function onTM(e){
  e.preventDefault();const t=e.touches[0];
  touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
  touchClone.style.top=(t.clientY-40)+'px';
  touchZone=null;
  ['z-cyber','z-not'].forEach(zid=>{
    const z=document.getElementById(zid);z.classList.remove('over');
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      touchZone=z.dataset.zone;z.classList.add('over');
    }
  });
}
function onTE(){
  if(touchClone){touchClone.remove();touchClone=null}
  ['z-cyber','z-not'].forEach(zid=>document.getElementById(zid).classList.remove('over'));
  if(touchZone&&dragId){placements[dragId]=touchZone;dragId=null;touchZone=null;render()}
  else{dragId=null;touchZone=null}
}

/* ── RESULT ── */
function showResult(){
  let ok=0;
  Object.entries(placements).forEach(([id,z])=>{if(cards.find(c=>c.id==id).c===z)ok++});
  const res=document.getElementById('res');
  res.className='result show '+(ok===12?'perfect':ok>=8?'great':'ok');
  document.getElementById('r-emoji').textContent=ok===12?'🏆':ok>=8?'🌟':ok>=6?'👍':'💡';
  document.getElementById('r-score').textContent=ok+' / 12';
  document.getElementById('r-stars').textContent='⭐'.repeat(Math.max(1,Math.round(ok/cards.length*5)));
  document.getElementById('r-title').textContent=ok===12?'Perfect Score!':ok>=8?'Brilliant!':ok>=6?'Good Try!':'Keep Learning!';
  document.getElementById('r-msg').textContent=
    ok===12?'Amazing! You\'re a Cyberbullying expert! 🎓 Every single one correct!':
    ok>=8?'Great job! You got '+ok+' out of 12. You understand online safety really well! 💪':
    ok>=6?'You got '+ok+' out of 12. Not bad! Review the lesson and you\'ll ace it next time 📚':
    'You got '+ok+' out of 12. That\'s okay — everyone learns! Review and try again 🌱';
  setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'center'}),100);
  if(ok===12)launchConfetti();
}

/* ── CONFETTI ── */
function launchConfetti(){
  const emojis=['🎊','🎉','⭐','🌟','✨','🎈','🏆','💫','🌈','🎀'];
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.setProperty('--dur',(1.5+Math.random()*1.5)+'s');
      el.style.animationDelay=(Math.random()*.5)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3000);
    },i*70);
  }
}

/* ── TRY AGAIN ── */
function tryAgain(){
  placements={};dragId=null;touchClone=null;touchZone=null;
  order=shuffle(cards);
  const res=document.getElementById('res');
  res.classList.remove('show','perfect','great','ok');
  // re-trigger icon spin
  const icon=document.querySelector('.retry-icon');
  if(icon){icon.style.animation='none';void icon.offsetWidth;icon.style.animation='spinOnce .5s ease'}
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
