<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Builder — Section 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background: #0a1628;
}

/* ─── OCEAN BACKGROUND ─── */
.ocean-bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg,
    #0d2137 0%,
    #0a3d6b 25%,
    #0e5a8a 55%,
    #1a7a9a 80%,
    #22a0b8 100%
  );
  overflow: hidden;
}

/* Bubbles */
.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  animation: rise linear infinite;
  bottom: -60px;
}
@keyframes rise {
  0%   { transform: translateX(0) scale(1); opacity: 0.6; }
  50%  { transform: translateX(20px) scale(1.05); }
  100% { transform: translateX(-10px) scale(0.8); opacity: 0; bottom: 110vh; }
}

/* Seaweed */
.seaweed {
  position: absolute;
  bottom: 0;
  width: 18px;
  height: 120px;
  background: linear-gradient(180deg, #1dbb6e, #0e8a4a);
  border-radius: 40px 10px 0 0;
  transform-origin: bottom center;
  animation: sway 3s ease-in-out infinite;
}
.seaweed:nth-child(even) { animation-direction: reverse; background: linear-gradient(180deg, #26e88a, #0daa59); }
@keyframes sway {
  0%,100% { transform: rotate(-12deg); }
  50%      { transform: rotate(12deg); }
}

/* Coral */
.coral {
  position: absolute;
  bottom: 0;
  width: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
}

/* Light rays */
.ray {
  position: absolute;
  top: -10%;
  width: 60px;
  height: 80vh;
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
  transform-origin: top center;
  animation: shimmer 5s ease-in-out infinite;
  border-radius: 0 0 50% 50%;
}
@keyframes shimmer {
  0%,100% { opacity: 0.4; transform: scaleX(1); }
  50%      { opacity: 0.8; transform: scaleX(1.3); }
}

/* ─── FISH ─── */
.fish {
  position: absolute;
  cursor: pointer;
  animation: swim linear infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  transition: transform 0.2s;
  user-select: none;
}
.fish:hover { transform: scale(1.15) !important; }

@keyframes swim {
  0%   { left: -200px; }
  100% { left: 110vw; }
}
@keyframes swimBack {
  0%   { left: 110vw; transform: scaleX(-1); }
  100% { left: -200px; transform: scaleX(-1); }
}

/* ─── LAYOUT ─── */
.page-wrap {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.planrs {
  position: fixed; top: 12px; right: 16px;
  font-size: 13px; color: rgba(255,255,255,0.7);
  font-weight: bold; font-family: 'Fredoka One', cursive;
  z-index: 100;
  background: rgba(0,0,0,0.3);
  padding: 4px 12px;
  border-radius: 20px;
  backdrop-filter: blur(6px);
}

h1 {
  font-family: 'Fredoka One', cursive;
  color: #fff;
  font-size: 32px;
  margin: 36px 0 4px;
  text-align: center;
  text-shadow: 0 4px 20px rgba(0,200,255,0.5);
  letter-spacing: 1px;
}

.subtitle {
  color: rgba(255,255,255,0.75);
  font-size: 14px;
  margin-bottom: 18px;
  text-align: center;
  font-weight: 700;
}

/* Score bar */
.score-bar {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 40px;
  padding: 10px 28px;
  margin-bottom: 18px;
  font-size: 15px;
  color: #fff;
  font-weight: 800;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

/* Card */
.card {
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  padding: 26px;
  max-width: 560px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 3px rgba(255,255,255,0.15);
  margin-bottom: 18px;
  border: 3px solid rgba(255,255,255,0.6);
  backdrop-filter: blur(16px);
  animation: cardPop 0.5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardPop {
  from { transform: scale(0.85) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.q-label {
  font-size: 12px; color: #888;
  margin-bottom: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
}

.scenario {
  font-size: 15px; color: #0d3b6e;
  font-weight: 700; line-height: 1.6;
  margin-bottom: 18px;
  background: linear-gradient(135deg, #e8f4fd, #d0ebff);
  border-radius: 14px;
  padding: 14px 16px;
  border-left: 5px solid #2E86AB;
}

/* ─── DRAG & DROP ─── */
.dnd-section {
  margin-bottom: 16px;
}
.dnd-label {
  font-size: 13px; font-weight: 800; color: #333;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}

/* Source ingredients */
.ingredients-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 14px;
  background: linear-gradient(135deg, #f0f9ff, #e6f3ff);
  border-radius: 16px;
  border: 2px dashed #aad4f0;
  min-height: 70px;
  margin-bottom: 12px;
}

.ingredient {
  padding: 8px 16px;
  background: linear-gradient(135deg, #fff, #f5f5f5);
  border: 2.5px solid #2E86AB;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 800;
  color: #0d3b6e;
  cursor: grab;
  user-select: none;
  transition: all 0.2s;
  box-shadow: 0 3px 8px rgba(46,134,171,0.25);
  position: relative;
  animation: ingredientBounce 0.4s cubic-bezier(.34,1.56,.64,1) backwards;
}
.ingredient:hover {
  transform: translateY(-3px) scale(1.08);
  box-shadow: 0 8px 20px rgba(46,134,171,0.4);
  background: linear-gradient(135deg, #2E86AB, #1a6a8e);
  color: #fff;
  border-color: #1a6a8e;
}
.ingredient:active { cursor: grabbing; transform: scale(1.12) rotate(3deg); }
.ingredient.dragging {
  opacity: 0.4;
  transform: scale(0.95);
}
@keyframes ingredientBounce {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* Drop Zone */
.drop-zone {
  min-height: 64px;
  background: linear-gradient(135deg, #1a252f, #0d1f30);
  border-radius: 16px;
  border: 3px dashed #2ECC71;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  padding: 10px 12px;
  gap: 6px;
  transition: all 0.2s;
  position: relative;
  box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
}
.drop-zone.drag-over {
  border-color: #f39c12;
  background: linear-gradient(135deg, #1a2f1a, #0d2010);
  box-shadow: inset 0 4px 20px rgba(0,0,0,0.3), 0 0 20px rgba(46,204,113,0.3);
}
.drop-zone-hint {
  font-family: 'Courier New', monospace;
  color: rgba(46,204,113,0.4);
  font-size: 14px;
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
  letter-spacing: 2px;
  white-space: nowrap;
}

.dropped-piece {
  font-family: 'Courier New', monospace;
  font-size: 16px;
  font-weight: bold;
  color: #2ECC71;
  background: rgba(46,204,113,0.15);
  border: 1.5px solid rgba(46,204,113,0.4);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  transition: all 0.2s;
  animation: dropIn 0.3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.dropped-piece:hover {
  background: rgba(231,76,60,0.2);
  border-color: rgba(231,76,60,0.5);
  color: #E74C3C;
  transform: scale(1.1);
}
.dropped-piece:hover::after {
  content: '×';
  position: absolute;
  top: -6px; right: -6px;
  width: 16px; height: 16px;
  background: #E74C3C;
  color: white;
  border-radius: 50%;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 16px;
  text-align: center;
}
@keyframes dropIn {
  from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
  to   { transform: scale(1) rotate(0); opacity: 1; }
}

/* pwd preview */
.pwd-preview {
  font-family: 'Courier New', monospace;
  font-size: 20px;
  background: linear-gradient(135deg, #0d1f2d, #1a2f40);
  color: #2ECC71;
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  letter-spacing: 3px;
  min-height: 52px;
  margin: 12px 0 0;
  word-break: break-all;
  border: 2px solid rgba(46,204,113,0.3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(46,204,113,0.1);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pwd-preview.has-content {
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 8px rgba(46,204,113,0.2); }
  50%      { box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 20px rgba(46,204,113,0.5); }
}

/* Strength bar */
.strength-bar-wrap { margin: 14px 0 4px; }
.strength-label { font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 700; }
.strength-bar { height: 14px; border-radius: 20px; background: #e8e8e8; overflow: hidden; box-shadow: inset 0 2px 6px rgba(0,0,0,0.1); }
.strength-fill { height: 100%; border-radius: 20px; transition: width 0.5s cubic-bezier(.34,1.56,.64,1), background 0.4s; }
.strength-text { font-size: 15px; font-weight: 800; margin-top: 6px; transition: color 0.3s; }

/* Checklist */
.checklist { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.check-item {
  font-size: 12px; padding: 5px 14px;
  border-radius: 24px; font-weight: 800;
  transition: all 0.3s;
}
.check-yes {
  background: linear-gradient(135deg, #d5f5e3, #c1f0d6);
  color: #1a7a4d;
  border: 1.5px solid #1a7a4d;
  animation: checkBounce 0.3s cubic-bezier(.34,1.56,.64,1);
}
.check-no { background: #fdecea; color: #922b21; border: 1.5px solid #e74c3c; }
@keyframes checkBounce {
  from { transform: scale(0.7); }
  to   { transform: scale(1); }
}

/* Feedback */
.feedback {
  text-align: center;
  font-size: 16px;
  min-height: 30px;
  margin: 10px 0;
  font-weight: 800;
  transition: all 0.3s;
}

/* Buttons */
.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.btn {
  padding: 12px 26px;
  border: none;
  border-radius: 30px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  font-family: 'Nunito', sans-serif;
}
.btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.btn:active { transform: scale(0.96); }
.btn-check { background: linear-gradient(135deg, #2E86AB, #1a6a8e); color: #fff; }
.btn-try   { background: linear-gradient(135deg, #E8735A, #c0512f); color: #fff; }
.btn-next  { background: linear-gradient(135deg, #27AE60, #1a8248); color: #fff; display: none; }

/* Result Screen */
.result-screen {
  display: none;
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  padding: 36px 28px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  border: 3px solid rgba(255,255,255,0.6);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  backdrop-filter: blur(16px);
  animation: cardPop 0.5s cubic-bezier(.34,1.56,.64,1);
}
.result-screen h2 { color: #1F7A4D; font-size: 28px; margin-bottom: 10px; font-family: 'Fredoka One', cursive; }

/* Drag ghost */
.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  padding: 8px 16px;
  background: linear-gradient(135deg, #2E86AB, #1a6a8e);
  color: white;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 800;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  transform: rotate(6deg) scale(1.1);
  transition: none;
}

/* Tip box */
.tip-box {
  background: linear-gradient(135deg, #fff9e6, #fff3c4);
  border: 2px solid #f39c12;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: #7d5000;
  font-weight: 700;
  margin-top: 6px;
  display: none;
}
.tip-box.visible { display: block; animation: fadeIn 0.4s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Stars burst */
.star-burst {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 28px;
  animation: starFly 1s ease-out forwards;
}
@keyframes starFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
}
</style>
</head>
<body>

<!-- OCEAN BACKGROUND -->
<div class="ocean-bg" id="oceanBg">
  <!-- Light rays injected by JS -->
  <!-- Fish injected by JS -->
</div>

<div class="page-wrap">
  <div class="planrs">⭐ Planrs</div>
  <h1>🔨 Password Builder Workshop!</h1>
  <p class="subtitle">Section 2 — Passwords & Account Safety | Activity 2 of 2</p>

  <div class="score-bar">
    <span>⭐ Score: <span id="score">0</span></span>
    <span>✅ Built: <span id="built">0</span>/5</span>
  </div>

  <div class="card" id="gameCard">
    <div class="q-label" id="qLabel">Challenge 1 of 5</div>
    <div class="scenario" id="scenario"></div>

    <!-- DRAG & DROP -->
    <div class="dnd-section">
      <div class="dnd-label">🧩 Drag ingredients to build your password:</div>
      <div class="ingredients-pool" id="ingredientsPool"></div>

      <div class="dnd-label">🔐 Drop Zone — assemble your password here:</div>
      <div class="drop-zone" id="dropZone">
        <span class="drop-zone-hint" id="dzHint">drag pieces here →</span>
      </div>
    </div>

    <div class="pwd-preview" id="preview">_</div>

    <div class="strength-bar-wrap">
      <div class="strength-label">💪 Password Strength:</div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
      <div class="strength-text" id="strengthText">—</div>
    </div>

    <div class="checklist" id="checklist"></div>
    <div class="tip-box" id="tipBox"></div>
    <div class="feedback" id="feedback"></div>

    <div class="btn-row">
      <button class="btn btn-check" onclick="checkAnswer()">✅ Check Password</button>
      <button class="btn btn-try" onclick="resetCurrentQ()">🔄 Rebuild</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextQ()">➡️ Next Challenge</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <h2 id="resultTitle"></h2>
    <p id="resultDetails" style="color:#555;margin:10px 0;font-size:16px;font-weight:700;"></p>
    <p id="resultMsg" style="color:#1F7A4D;font-size:15px;font-weight:800;margin-top:8px;"></p>
    <div class="btn-row" style="margin-top:22px;">
      <button class="btn btn-try" onclick="fullReset()">🔄 Play Again</button>
      <button class="btn btn-next" style="display:inline-block;" onclick="alert('Password Master! Move to Section 3 — Phishing & Safe Browsing! 🔍')">➡️ Next Section</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   OCEAN BACKGROUND — FISH & BUBBLES
   ============================================================ */
const bg = document.getElementById('oceanBg');

// Light rays
for (let i = 0; i < 6; i++) {
  const ray = document.createElement('div');
  ray.className = 'ray';
  ray.style.cssText = `left:${5+i*18}%;animation-delay:${i*0.8}s;animation-duration:${4+i}s;transform:rotate(${-10+i*4}deg);`;
  bg.appendChild(ray);
}

// Bubbles
function spawnBubble() {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = 6 + Math.random()*18;
  b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*4}s;`;
  bg.appendChild(b);
  setTimeout(() => b.remove(), 20000);
}
setInterval(spawnBubble, 600);
for (let i=0;i<15;i++) spawnBubble();

// Seaweed
for (let i=0;i<10;i++) {
  const sw = document.createElement('div');
  sw.className = 'seaweed';
  sw.style.cssText = `left:${5+i*10}%;height:${80+Math.random()*80}px;animation-delay:${Math.random()*2}s;animation-duration:${2.5+Math.random()*2}s;`;
  bg.appendChild(sw);
}

// FISH SVG templates
const fishTemplates = [
  // Big colorful tropical fish
  (id,c1,c2,sz) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70" width="${sz}" height="${sz*0.6}">
    <ellipse cx="60" cy="35" rx="45" ry="22" fill="${c1}"/>
    <polygon points="110,35 130,15 130,55" fill="${c2}"/>
    <ellipse cx="60" cy="35" rx="35" ry="14" fill="${c2}" opacity="0.5"/>
    <circle cx="28" cy="30" r="5" fill="white"/>
    <circle cx="27" cy="30" r="3" fill="#111"/>
    <ellipse cx="60" cy="20" rx="18" ry="7" fill="${c2}" opacity="0.7"/>
    <line x1="40" y1="15" x2="40" y2="55" stroke="${c2}" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="13" x2="60" y2="57" stroke="${c2}" stroke-width="2" opacity="0.5"/>
    <line x1="78" y1="15" x2="78" y2="55" stroke="${c2}" stroke-width="2" opacity="0.5"/>
    <path d="M20,30 Q15,25 20,20" stroke="${c2}" stroke-width="2" fill="none"/>
  </svg>`,

  // Clownfish
  (id,c1,c2,sz) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 65" width="${sz}" height="${sz*0.6}">
    <ellipse cx="52" cy="33" rx="40" ry="20" fill="#FF6B35"/>
    <polygon points="92,33 115,15 115,51" fill="#FF6B35"/>
    <ellipse cx="52" cy="33" rx="28" ry="12" fill="#FF8C55" opacity="0.6"/>
    <rect x="28" y="13" width="6" height="40" fill="white" rx="3" opacity="0.9"/>
    <rect x="52" y="13" width="6" height="40" fill="white" rx="3" opacity="0.9"/>
    <rect x="72" y="16" width="5" height="34" fill="white" rx="3" opacity="0.9"/>
    <circle cx="22" cy="27" r="5" fill="white"/>
    <circle cx="21" cy="27" r="3" fill="#222"/>
    <path d="M15,33 Q10,28 15,23" stroke="white" stroke-width="2" fill="none"/>
  </svg>`,

  // Blue Tang
  (id,c1,c2,sz) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115 70" width="${sz}" height="${sz*0.6}">
    <ellipse cx="55" cy="35" rx="42" ry="22" fill="#1E90FF"/>
    <polygon points="97,35 120,12 120,58" fill="#1874CD"/>
    <ellipse cx="55" cy="35" rx="30" ry="13" fill="#63B3FF" opacity="0.5"/>
    <ellipse cx="55" cy="26" rx="20" ry="8" fill="#FFD700" opacity="0.85"/>
    <circle cx="24" cy="30" r="5" fill="white"/>
    <circle cx="23" cy="30" r="3" fill="#111"/>
    <path d="M17,35 Q12,29 17,23" stroke="#63B3FF" stroke-width="2" fill="none"/>
    <path d="M50,13 Q55,5 60,13" fill="#1874CD" stroke="none"/>
    <path d="M50,57 Q55,65 60,57" fill="#1874CD" stroke="none"/>
  </svg>`,

  // Pufferfish
  (id,c1,c2,sz) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" width="${sz*0.8}" height="${sz*0.8}">
    <ellipse cx="50" cy="45" rx="38" ry="36" fill="#F4A460"/>
    <polygon points="85,45 108,28 108,62" fill="#DEB887"/>
    <circle cx="32" cy="36" r="7" fill="white"/>
    <circle cx="30" cy="35" r="4" fill="#222"/>
    <line x1="15" y1="20" x2="10" y2="10" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="12" x2="28" y2="2" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="10" x2="50" y2="0" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="70" x2="10" y2="80" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="78" x2="28" y2="88" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="80" x2="50" y2="90" stroke="${c2}" stroke-width="3" stroke-linecap="round"/>
    <path d="M36,52 Q50,60 64,52" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>`,

  // Angelfish
  (id,c1,c2,sz) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" width="${sz*0.6}" height="${sz*0.9}">
    <ellipse cx="40" cy="60" rx="22" ry="34" fill="${c1}"/>
    <polygon points="40,95 15,120 65,120" fill="${c2}"/>
    <polygon points="40,10 20,35 60,35" fill="${c2}"/>
    <rect x="30" y="35" width="6" height="50" fill="white" rx="3" opacity="0.8"/>
    <rect x="42" y="37" width="5" height="46" fill="white" rx="3" opacity="0.8"/>
    <circle cx="28" cy="52" r="5" fill="white"/>
    <circle cx="27" cy="51" r="3" fill="#222"/>
  </svg>`
];

const fishColors = [
  ['#FF6B6B','#FFE66D'],['#4ECDC4','#FF6B6B'],['#A8E6CF','#FF8B94'],
  ['#FFB347','#FF6B6B'],['#C3A6FF','#79DEEC'],['#F7DC6F','#EB984E'],
  ['#48C9B0','#F39C12'],['#EC407A','#FFB74D'],['#7C4DFF','#64FFDA'],
  ['#FF7043','#FFCA28']
];

function createFish(index) {
  const wrapper = document.createElement('div');
  wrapper.className = 'fish';

  const goRight = Math.random() > 0.35;
  const topPct  = 5 + Math.random() * 80;
  const [c1, c2]= fishColors[index % fishColors.length];
  const sz      = 80 + Math.random() * 120;   // bigger fish!
  const dur     = 14 + Math.random() * 22;
  const delay   = -Math.random() * dur;
  const tIdx    = index % fishTemplates.length;

  wrapper.innerHTML = fishTemplates[tIdx](index, c1, c2, sz);

  if (goRight) {
    wrapper.style.cssText = `top:${topPct}%;animation-name:swim;animation-duration:${dur}s;animation-delay:${delay}s;`;
  } else {
    wrapper.style.cssText = `top:${topPct}%;animation-name:swimBack;animation-duration:${dur}s;animation-delay:${delay}s;`;
  }

  bg.appendChild(wrapper);
}

// Spawn 14 fish
for (let i = 0; i < 14; i++) createFish(i);

// Continuously respawn
setInterval(() => {
  const fishes = bg.querySelectorAll('.fish');
  if (fishes.length < 14) createFish(Math.floor(Math.random()*14));
}, 4000);

/* ============================================================
   GAME LOGIC
   ============================================================ */
const challenges = [
  {
    scenario: "🎮 Arjun wants a password for his gaming account on Free Fire. It should be something only he knows and very hard to guess.",
    minLength: 8, needUpper: true, needNumber: true, needSymbol: true,
    baseWords: ["arjun","game","freefire","fire","play"],
    symbols: ["!","@","#","*"],
    extras: ["ABC","xyz","99","2024"],
    tip: "Try combining a random word with numbers and symbols — like: G@m3r#99!"
  },
  {
    scenario: "📧 Priya wants to protect her Gmail account. She should use a password that is long, unique, and has all required elements.",
    minLength: 10, needUpper: true, needNumber: true, needSymbol: true,
    baseWords: ["priya","email","gmail","inbox","safe"],
    symbols: ["@","!","#","$"],
    extras: ["Pr1y@","2024","Secure","M@il"],
    tip: "Think of a phrase: 'I check mail daily' → ICh3ck@M@ilD@ily!"
  },
  {
    scenario: "🏦 Rahul's parent needs a strong password for their banking app. It must be very secure with maximum strength.",
    minLength: 12, needUpper: true, needNumber: true, needSymbol: true,
    baseWords: ["bank","money","secure","rahul","paisa"],
    symbols: ["#","!","@","&"],
    extras: ["B@nk!","S3cur3","2024#","R@hul*"],
    tip: "Banks need the strongest passwords! Use long random combinations: S3cur3B@nk!2024"
  },
  {
    scenario: "📚 Meena wants a password for her school portal (CBSE). It should be easy for her to remember but hard for others to guess.",
    minLength: 8, needUpper: true, needNumber: true, needSymbol: true,
    baseWords: ["meena","school","cbse","study","learn"],
    symbols: ["!","*","@","#"],
    extras: ["M3ena!","CBSE@","St@r","L3arn"],
    tip: "Use your favourite subject + a symbol + year: Sc!ence@2024"
  },
  {
    scenario: "💻 Rohan wants a password for his YouTube Kids account that his parents set up. It needs all the right ingredients!",
    minLength: 8, needUpper: true, needNumber: true, needSymbol: true,
    baseWords: ["rohan","youtube","video","watch","fun"],
    symbols: ["@","!","#","*"],
    extras: ["Y0uTub3!","R0han@","V!deo#","W@tch*"],
    tip: "Mix the platform name cleverly: Y0uTub3@R0han!"
  }
];

let current = 0, score = 0, builtCount = 0;
let droppedParts = [];
let dragItem = null, ghostEl = null;

function loadChallenge() {
  const c = challenges[current];
  document.getElementById('qLabel').textContent = `Challenge ${current+1} of ${challenges.length}`;
  document.getElementById('scenario').textContent = c.scenario;
  droppedParts = [];
  document.getElementById('preview').textContent = '_';
  document.getElementById('preview').classList.remove('has-content');
  document.getElementById('strengthFill').style.width = '0%';
  document.getElementById('strengthText').textContent = '—';
  document.getElementById('checklist').innerHTML = '';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('tipBox').className = 'tip-box';
  document.getElementById('dzHint').style.display = '';

  const allParts = [...c.baseWords, ...c.symbols, ...c.extras];
  const shuffled = allParts.sort(() => Math.random() - 0.5).slice(0, 14);

  const pool = document.getElementById('ingredientsPool');
  pool.innerHTML = '';
  shuffled.forEach((part, idx) => {
    const el = document.createElement('div');
    el.className = 'ingredient';
    el.textContent = part;
    el.style.animationDelay = (idx * 0.04) + 's';
    el.dataset.part = part;
    setupDrag(el, part);
    pool.appendChild(el);
  });

  renderDropZone();
}

function setupDrag(el, part) {
  // Mouse
  el.addEventListener('mousedown', e => startDrag(e, part, el));
  // Touch
  el.addEventListener('touchstart', e => startTouchDrag(e, part, el), {passive:false});
  // Click fallback
  el.addEventListener('click', e => {
    if (!droppedParts.includes(part) || true) {
      droppedParts.push(part);
      renderDropZone();
      updatePreview();
    }
  });
}

/* ─── Mouse Drag ─── */
function startDrag(e, part, el) {
  if (e.button !== 0) return;
  e.preventDefault();
  dragItem = part;
  el.classList.add('dragging');

  ghostEl = document.createElement('div');
  ghostEl.className = 'drag-ghost';
  ghostEl.textContent = part;
  document.body.appendChild(ghostEl);

  moveGhost(e.clientX, e.clientY);

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onMouseMove(e) {
  moveGhost(e.clientX, e.clientY);
  checkDropZoneHover(e.clientX, e.clientY);
}

function onMouseUp(e) {
  const dz = document.getElementById('dropZone');
  const rect = dz.getBoundingClientRect();
  if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
    droppedParts.push(dragItem);
    renderDropZone();
    updatePreview();
  }
  cleanupDrag();
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

/* ─── Touch Drag ─── */
function startTouchDrag(e, part, el) {
  e.preventDefault();
  dragItem = part;
  el.classList.add('dragging');

  ghostEl = document.createElement('div');
  ghostEl.className = 'drag-ghost';
  ghostEl.textContent = part;
  document.body.appendChild(ghostEl);

  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);

  el.addEventListener('touchmove', onTouchMove, {passive:false});
  el.addEventListener('touchend', onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);
  checkDropZoneHover(t.clientX, t.clientY);
}

function onTouchEnd(e) {
  const t = e.changedTouches[0];
  const dz = document.getElementById('dropZone');
  const rect = dz.getBoundingClientRect();
  if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
    droppedParts.push(dragItem);
    renderDropZone();
    updatePreview();
  }
  cleanupDrag();
  this.removeEventListener('touchmove', onTouchMove);
  this.removeEventListener('touchend', onTouchEnd);
}

function moveGhost(x, y) {
  if (!ghostEl) return;
  ghostEl.style.left = (x - 40) + 'px';
  ghostEl.style.top  = (y - 20) + 'px';
}

function checkDropZoneHover(x, y) {
  const dz = document.getElementById('dropZone');
  const rect = dz.getBoundingClientRect();
  const over = (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom);
  dz.classList.toggle('drag-over', over);
}

function cleanupDrag() {
  document.getElementById('dropZone').classList.remove('drag-over');
  document.querySelectorAll('.ingredient.dragging').forEach(el => el.classList.remove('dragging'));
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  dragItem = null;
}

function renderDropZone() {
  const dz = document.getElementById('dropZone');
  dz.innerHTML = '';

  const hint = document.createElement('span');
  hint.className = 'drop-zone-hint';
  hint.id = 'dzHint';
  hint.textContent = 'drag pieces here →';
  dz.appendChild(hint);

  if (droppedParts.length > 0) hint.style.display = 'none';

  droppedParts.forEach((part, idx) => {
    const el = document.createElement('div');
    el.className = 'dropped-piece';
    el.textContent = part;
    el.title = 'Click to remove';
    el.onclick = () => {
      droppedParts.splice(idx, 1);
      renderDropZone();
      updatePreview();
    };
    dz.appendChild(el);
  });
}

function updatePreview() {
  const pwd = droppedParts.join('');
  const prev = document.getElementById('preview');
  prev.textContent = pwd || '_';
  prev.classList.toggle('has-content', pwd.length > 0);
  analyzeStrength(pwd);
}

function analyzeStrength(pwd) {
  const c = challenges[current];
  const checks = [
    { label: `${pwd.length}/${c.minLength} chars`, ok: pwd.length >= c.minLength },
    { label: 'Uppercase A-Z', ok: /[A-Z]/.test(pwd) },
    { label: 'Lowercase a-z', ok: /[a-z]/.test(pwd) },
    { label: 'Numbers 0-9',   ok: /[0-9]/.test(pwd) },
    { label: 'Symbols !@#',   ok: /[!@#$*&]/.test(pwd) },
  ];

  const cl = document.getElementById('checklist');
  cl.innerHTML = '';
  checks.forEach(ch => {
    const el = document.createElement('div');
    el.className = `check-item ${ch.ok ? 'check-yes' : 'check-no'}`;
    el.textContent = (ch.ok ? '✅ ' : '❌ ') + ch.label;
    cl.appendChild(el);
  });

  const passed = checks.filter(c => c.ok).length;
  const pct = (passed / 5) * 100;
  const fill = document.getElementById('strengthFill');
  fill.style.width = pct + '%';
  const colors = ['#E74C3C','#E67E22','#F4D03F','#27AE60','#1F7A4D'];
  fill.style.background = colors[passed - 1] || '#eee';
  const labels = ['','Very Weak 😟','Weak 😐','OK 🙂','Strong 💪','Very Strong 🔥'];
  const st = document.getElementById('strengthText');
  st.textContent = labels[passed] || '—';
  st.style.color  = colors[passed - 1] || '#aaa';
}

function checkAnswer() {
  const pwd = droppedParts.join('');
  const fb  = document.getElementById('feedback');
  if (!pwd) { fb.style.color='#E74C3C'; fb.textContent='Build a password first! 🔑'; return; }
  const c = challenges[current];
  const ok = pwd.length >= c.minLength && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[!@#$*&]/.test(pwd);
  if (ok) {
    score += 20; builtCount++;
    document.getElementById('score').textContent = score;
    document.getElementById('built').textContent = builtCount;
    fb.style.color = '#27AE60';
    fb.textContent = ['🎉 Amazing password! Super secure!','🌟 Excellent! Password Pro!','🔥 Outstanding! Uncrackable!'][Math.floor(Math.random()*3)];
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('tipBox').className = 'tip-box';
    burstStars();
    if (current === challenges.length - 1) {
      document.getElementById('nextBtn').textContent = 'See Results 🏆';
      document.getElementById('nextBtn').onclick = showResult;
    }
  } else {
    fb.style.color = '#E74C3C';
    fb.textContent = 'Not strong enough yet! See tip below 👇';
    const tb = document.getElementById('tipBox');
    tb.textContent = '💡 Tip: ' + c.tip;
    tb.className = 'tip-box visible';
  }
}

function burstStars() {
  const emojis = ['⭐','🌟','✨','💫','🎉','🔑'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'star-burst';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const x = 30 + Math.random() * 40; // vw %
    const y = 20 + Math.random() * 60; // vh %
    s.style.left = x + 'vw';
    s.style.top  = y + 'vh';
    s.style.setProperty('--dx', (-60+Math.random()*120) + 'px');
    s.style.setProperty('--dy', (-80+Math.random()*60) + 'px');
    s.style.animationDelay = (i*0.08) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }
}

function resetCurrentQ() {
  droppedParts = [];
  renderDropZone();
  updatePreview();
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('tipBox').className = 'tip-box';
}

function nextQ() {
  current++;
  if (current < challenges.length) {
    loadChallenge();
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('nextBtn').onclick = nextQ;
    document.getElementById('nextBtn').textContent = '➡️ Next Challenge';
  } else showResult();
}

function showResult() {
  document.getElementById('gameCard').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('resultTitle').textContent = score>=80 ? '🏆 Password Master! Outstanding!' : score>=60 ? '⭐ Great Job! Well Done!' : '💪 Good Effort! Keep Practising!';
  document.getElementById('resultDetails').textContent = `Score: ${score}/100 | Challenges: ${builtCount}/5`;
  document.getElementById('resultMsg').textContent = 'You now know how to build strong passwords to protect your digital life!';
  burstStars(); burstStars();
}

function fullReset() {
  current=0; score=0; builtCount=0; droppedParts=[];
  document.getElementById('score').textContent=0;
  document.getElementById('built').textContent=0;
  document.getElementById('gameCard').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('nextBtn').onclick=nextQ;
  document.getElementById('nextBtn').textContent='➡️ Next Challenge';
  loadChallenge();
}

loadChallenge();
</script>
