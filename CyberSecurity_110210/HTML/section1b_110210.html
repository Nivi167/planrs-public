<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber True/False — Section 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00C853;
    --red: #FF3D57;
    --blue: #2979FF;
    --yellow: #FFD600;
    --purple: #AA00FF;
    --orange: #FF6D00;
    --pink: #FF4081;
    --cyan: #00E5FF;
    --card-bg: rgba(255,255,255,0.95);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0a0a2e;
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a0533 40%, #0d2b1a 100%);
    overflow: hidden;
  }

  /* Floating emoji bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: floatUp linear infinite;
    font-size: 0px;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Twinkling stars */
  .star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.8); }
  }

  /* Neon rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid;
    animation: expandRing ease-out infinite;
    opacity: 0;
  }

  @keyframes expandRing {
    0%   { transform: scale(0.2); opacity: 0.6; }
    100% { transform: scale(4);   opacity: 0; }
  }

  /* Floating emoji icons */
  .float-emoji {
    position: absolute;
    font-size: 28px;
    animation: floatEmoji ease-in-out infinite;
    user-select: none;
    pointer-events: none;
  }

  @keyframes floatEmoji {
    0%, 100% { transform: translateY(0px) rotate(-8deg); }
    50%       { transform: translateY(-20px) rotate(8deg); }
  }

  /* Zigzag moving comets */
  .comet {
    position: absolute;
    width: 80px;
    height: 3px;
    border-radius: 2px;
    animation: cometFly linear infinite;
    opacity: 0;
  }

  @keyframes cometFly {
    0%   { opacity: 0; transform: translateX(-120px); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateX(120vw); }
  }

  /* Animated grid lines */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,83,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,83,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 8s linear infinite;
  }

  @keyframes gridScroll {
    from { background-position: 0 0; }
    to   { background-position: 60px 60px; }
  }

  /* Blob glows in background */
  .glow-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: blobPulse ease-in-out infinite alternate;
    opacity: 0.25;
  }

  @keyframes blobPulse {
    from { transform: scale(1) translate(0,0); opacity: 0.2; }
    to   { transform: scale(1.3) translate(10px, -10px); opacity: 0.35; }
  }

  /* ===== CONTENT ===== */
  .content { position: relative; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }

  .planrs {
    position: fixed; top: 12px; right: 16px;
    font-size: 13px; color: rgba(255,255,255,0.7);
    font-weight: bold; z-index: 100;
    background: rgba(255,255,255,0.1);
    padding: 4px 12px; border-radius: 20px;
    backdrop-filter: blur(10px);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    color: #fff;
    font-size: 30px;
    margin: 48px 0 4px;
    text-align: center;
    text-shadow: 0 0 30px var(--yellow), 0 0 60px var(--orange);
    animation: titlePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both, titleGlow 2s ease-in-out infinite alternate;
    letter-spacing: 1px;
  }

  @keyframes titlePop {
    from { transform: scale(0) rotate(-5deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }

  @keyframes titleGlow {
    from { text-shadow: 0 0 20px var(--yellow), 0 0 40px var(--orange); }
    to   { text-shadow: 0 0 40px var(--cyan),   0 0 80px var(--blue); }
  }

  .subtitle {
    color: rgba(255,255,255,0.8);
    font-size: 14px; margin-bottom: 18px;
    text-align: center; font-weight: 700;
    background: rgba(255,255,255,0.1);
    padding: 5px 16px; border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* Score bar */
  .score-bar {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 10px 24px;
    margin-bottom: 14px;
    font-size: 18px;
    color: #fff;
    font-weight: 900;
    display: flex; gap: 24px;
    flex-wrap: wrap; justify-content: center;
    backdrop-filter: blur(12px);
    font-family: 'Fredoka One', cursive;
    animation: slideDown 0.6s ease both;
    animation-delay: 0.3s;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }

  .score-bar span { display: flex; align-items: center; gap: 6px; }

  @keyframes slideDown {
    from { transform: translateY(-30px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }

  /* Progress bar */
  .progress {
    width: 100%; max-width: 480px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px; height: 14px;
    margin-bottom: 20px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .progress-bar {
    background: linear-gradient(90deg, var(--green), var(--cyan), var(--yellow));
    background-size: 200% 100%;
    height: 100%; border-radius: 20px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: shimmer 2s linear infinite;
    box-shadow: 0 0 15px var(--cyan);
  }

  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.97);
    border-radius: 28px;
    padding: 30px 26px;
    max-width: 480px; width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 3px rgba(255,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.9);
    margin-bottom: 20px;
    animation: cardEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--green), var(--cyan), var(--blue), var(--purple), var(--pink), var(--orange), var(--yellow));
    background-size: 200%;
    animation: rainbowSlide 3s linear infinite;
  }

  @keyframes rainbowSlide {
    from { background-position: 0%; }
    to   { background-position: 200%; }
  }

  @keyframes cardEntrance {
    from { transform: scale(0.8) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0);      opacity: 1; }
  }

  .q-num {
    font-size: 12px; color: #888;
    margin-bottom: 8px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
  }

  .question {
    font-size: 17px; color: #1A1A3E;
    font-weight: 800; line-height: 1.5;
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 16px; justify-content: center; margin-top: 22px; }

  .btn-tf {
    padding: 16px 32px;
    border: none; border-radius: 50px;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Fredoka One', cursive;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .btn-tf::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 60%);
    border-radius: inherit;
  }

  .btn-true {
    background: linear-gradient(135deg, #00C853, #00E676);
    color: #fff;
    box-shadow: 0 6px 0 #00882A, 0 8px 20px rgba(0,200,83,0.5);
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .btn-false {
    background: linear-gradient(135deg, #FF3D57, #FF6B6B);
    color: #fff;
    box-shadow: 0 6px 0 #C62828, 0 8px 20px rgba(255,61,87,0.5);
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .btn-tf:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.05);
  }

  .btn-true:hover:not(:disabled) {
    box-shadow: 0 10px 0 #00882A, 0 15px 30px rgba(0,200,83,0.6);
  }

  .btn-false:hover:not(:disabled) {
    box-shadow: 0 10px 0 #C62828, 0 15px 30px rgba(255,61,87,0.6);
  }

  .btn-tf:active:not(:disabled) {
    transform: translateY(2px);
  }

  .btn-true:active:not(:disabled) {
    box-shadow: 0 2px 0 #00882A, 0 4px 10px rgba(0,200,83,0.4);
  }

  .btn-false:active:not(:disabled) {
    box-shadow: 0 2px 0 #C62828, 0 4px 10px rgba(255,61,87,0.4);
  }

  .btn-tf:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Feedback */
  .feedback-box {
    min-height: 60px; text-align: center;
    font-size: 15px; font-weight: 700;
    margin-bottom: 12px; margin-top: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
  }

  .explain {
    font-size: 13px; color: #555;
    font-style: italic; font-weight: 600;
    max-width: 400px; line-height: 1.6;
    background: rgba(0,0,0,0.04);
    padding: 8px 14px;
    border-radius: 12px;
    border-left: 3px solid var(--cyan);
  }

  .btn-next-q {
    background: linear-gradient(135deg, var(--blue), #6C63FF);
    color: #fff; border: none;
    border-radius: 50px;
    padding: 12px 32px;
    font-size: 16px; font-weight: 900;
    cursor: pointer; margin-top: 8px;
    display: none;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 6px 0 #1A237E, 0 8px 20px rgba(41,121,255,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }

  .btn-next-q:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 #1A237E, 0 12px 30px rgba(41,121,255,0.6);
  }

  /* Result screen */
  .result-screen {
    display: none;
    background: rgba(255,255,255,0.97);
    border-radius: 28px;
    padding: 36px 30px;
    max-width: 480px; width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }

  .result-screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--green), var(--cyan), var(--yellow), var(--orange), var(--pink));
    background-size: 200%;
    animation: rainbowSlide 2s linear infinite;
  }

  .result-screen h2 {
    font-family: 'Fredoka One', cursive;
    color: #1A1A3E;
    font-size: 28px; margin-bottom: 14px;
    line-height: 1.3;
  }

  .result-screen p { color: #444; font-size: 15px; margin-bottom: 14px; font-weight: 700; }

  .btn-reset {
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: #fff; border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-size: 15px; font-weight: 900;
    cursor: pointer; margin: 6px;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 5px 0 #b71c1c, 0 8px 20px rgba(255,64,129,0.4);
    transition: transform 0.15s;
    letter-spacing: 1px;
  }

  .btn-reset:hover { transform: translateY(-3px); }

  .btn-nxt {
    background: linear-gradient(135deg, var(--green), #00BCD4);
    color: #fff; border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-size: 15px; font-weight: 900;
    cursor: pointer; margin: 6px;
    font-family: 'Fredoka One', cursive;
    box-shadow: 0 5px 0 #006064, 0 8px 20px rgba(0,200,83,0.4);
    transition: transform 0.15s;
    letter-spacing: 1px;
  }

  .btn-nxt:hover { transform: translateY(-3px); }

  /* Confetti particles */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 999;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Animations */
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    20%      { transform: translateX(-12px) rotate(-2deg); }
    40%      { transform: translateX(12px) rotate(2deg); }
    60%      { transform: translateX(-8px) rotate(-1deg); }
    80%      { transform: translateX(8px) rotate(1deg); }
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0) scale(1); }
    30%     { transform: translateY(-16px) scale(1.03); }
    60%     { transform: translateY(-6px) scale(1.01); }
  }

  .shake  { animation: shake 0.5s ease; }
  .bounce { animation: bounce 0.5s ease; }

  /* Sparkles on correct */
  .sparkle {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
    animation: sparkleOut 0.8s ease forwards;
  }

  @keyframes sparkleOut {
    0%   { transform: scale(0) translate(0,0); opacity: 1; }
    100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0; }
  }

  .mascot {
    font-size: 50px;
    animation: mascotFloat 3s ease-in-out infinite;
    display: block;
    margin: 0 auto 8px;
  }

  @keyframes mascotFloat {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%     { transform: translateY(-12px) rotate(3deg); }
  }
</style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-canvas" id="bgCanvas">
  <div class="grid-bg"></div>
  <!-- Glow blobs -->
  <div class="glow-blob" style="width:400px;height:400px;background:var(--green);top:-100px;left:-100px;animation-duration:7s;"></div>
  <div class="glow-blob" style="width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px;animation-duration:9s;"></div>
  <div class="glow-blob" style="width:300px;height:300px;background:var(--purple);top:40%;left:30%;animation-duration:11s;"></div>
</div>

<div class="planrs">⭐ Planrs</div>

<div class="content">
  <h1>⚡ True or False Rapid Fire!</h1>
  <p class="subtitle">Section 1 — What is Cybersecurity? | Activity 2 of 2</p>

  <div class="score-bar">
    <span>✅ <span id="correct">0</span> Correct</span>
    <span>❌ <span id="wrong">0</span> Wrong</span>
    <span>⚡ Q<span id="qnum">1</span>/10</span>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="card" id="gameCard">
    <span class="mascot" id="mascot">🛡️</span>
    <div class="q-num" id="qLabel">Question 1 of 10</div>
    <div class="question" id="questionText">Loading...</div>
    <div class="btn-row">
      <button class="btn-tf btn-true" onclick="answer(true)">✅ TRUE</button>
      <button class="btn-tf btn-false" onclick="answer(false)">❌ FALSE</button>
    </div>
    <div class="feedback-box" id="feedbackBox"></div>
    <button class="btn-next-q" id="nextQBtn" onclick="nextQuestion()">Next Question ➡️</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <h2 id="resultTitle"></h2>
    <p id="resultDetails"></p>
    <p id="resultMsg"></p>
    <button class="btn-reset" onclick="resetGame()">🔄 Play Again</button>
    <button class="btn-nxt" onclick="alert('You completed Section 1! Move to Section 2 — Passwords! 🔑')">➡️ Next Section</button>
  </div>
</div>

<script>
// ===== BACKGROUND GENERATION =====
const canvas = document.getElementById('bgCanvas');

// Stars
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.cssText = `
    left: ${Math.random()*100}%;
    top: ${Math.random()*100}%;
    animation-duration: ${1.5 + Math.random()*3}s;
    animation-delay: ${Math.random()*3}s;
    width: ${Math.random() > 0.7 ? 4 : 2}px;
    height: ${Math.random() > 0.7 ? 4 : 2}px;
  `;
  canvas.appendChild(star);
}

// Floating emojis
const emojis = ['🔐','🛡️','💻','🔑','🌐','⚡','🎮','🦠','🔒','📱','🎯','💡','🚀','⭐','🎉'];
emojis.forEach((em, i) => {
  const el = document.createElement('div');
  el.className = 'float-emoji';
  el.textContent = em;
  el.style.cssText = `
    left: ${5 + (i / emojis.length) * 90}%;
    top: ${10 + Math.random() * 80}%;
    animation-duration: ${3 + Math.random()*3}s;
    animation-delay: ${Math.random()*3}s;
    opacity: 0.35;
    font-size: ${20 + Math.random()*18}px;
  `;
  canvas.appendChild(el);
});

// Neon rings
const ringColors = ['#00E5FF','#FF4081','#FFD600','#00C853','#AA00FF'];
for (let i = 0; i < 5; i++) {
  const ring = document.createElement('div');
  ring.className = 'ring';
  const size = 60 + Math.random() * 80;
  ring.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random()*80}%;
    top: ${Math.random()*80}%;
    border-color: ${ringColors[i % ringColors.length]};
    animation-duration: ${3 + Math.random()*4}s;
    animation-delay: ${Math.random()*5}s;
  `;
  canvas.appendChild(ring);
}

// Comets
const cometColors = ['#00E5FF','#FFD600','#FF4081','#00C853'];
for (let i = 0; i < 4; i++) {
  const comet = document.createElement('div');
  comet.className = 'comet';
  comet.style.cssText = `
    top: ${10 + Math.random()*80}%;
    left: 0;
    background: linear-gradient(90deg, transparent, ${cometColors[i]});
    animation-duration: ${4 + Math.random()*6}s;
    animation-delay: ${Math.random()*8}s;
  `;
  canvas.appendChild(comet);
}

// Bubble circles
const bubbleColors = ['#00C853','#2979FF','#AA00FF','#FFD600','#FF4081','#00E5FF'];
for (let i = 0; i < 12; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 30 + Math.random() * 80;
  b.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random()*100}%;
    bottom: -100px;
    background: radial-gradient(circle, ${bubbleColors[i % bubbleColors.length]}, transparent);
    animation-duration: ${8 + Math.random()*10}s;
    animation-delay: ${Math.random()*8}s;
  `;
  canvas.appendChild(b);
}

// ===== QUIZ LOGIC =====
const questions = [
  { q: "Cybersecurity is only important for adults — children don't need to worry about it.", ans: false, explain: "False! Children use the internet for games, school, and videos — they need cybersecurity too. Cybercriminals target everyone!" },
  { q: "A virus is a harmful program that can damage your computer and spread to other devices.", ans: true, explain: "Correct! Computer viruses work like real flu viruses — they spread and cause damage. Antivirus software protects you." },
  { q: "It is safe to share your password with your best friend at school.", ans: false, explain: "Never share your password with ANYONE — even your best friend. Passwords are private, like a secret only you should know." },
  { q: "The word 'phishing' means tricking someone into revealing personal information using fake messages.", ans: true, explain: "Yes! Phishing (from 'fishing') means using fake bait (messages) to 'catch' your personal info. Very sneaky!" },
  { q: "If you receive a message saying 'You won Rs. 10 lakhs! Click here!' — it is probably real.", ans: false, explain: "This is almost certainly a phishing scam! Real prize draws don't randomly message people. When in doubt, delete!" },
  { q: "Cyberbullying can only happen face-to-face, not through phones or computers.", ans: false, explain: "False! Cyberbullying happens ONLINE — through messages, comments, gaming, and social media. It can happen 24/7." },
  { q: "A firewall helps protect your network by monitoring and controlling incoming and outgoing traffic.", ans: true, explain: "Correct! A firewall is like a security guard for your internet connection — it blocks suspicious activity." },
  { q: "HTTPS in a website address means the connection is more secure than HTTP.", ans: true, explain: "Yes! The 'S' in HTTPS stands for Secure. Always look for the padlock icon and HTTPS before entering personal info." },
  { q: "Hacking means entering someone's account or device without their permission.", ans: true, explain: "Exactly right! Hacking is unauthorized access to someone's accounts, devices, or data. It is illegal and harmful." },
  { q: "Using the internet in open family areas at home is safer than using it alone in your room.", ans: true, explain: "True! Using devices in common areas helps trusted adults notice if something harmful happens online. Safety in the open!" },
];

const mascots = {
  idle:    ['🛡️','🤖','🦸','🧠','🔐'],
  correct: ['🎉','⭐','🏆','🎊','💪','🌟','🔥'],
  wrong:   ['😬','🙈','💡','🤔','📖'],
};

let current = 0, correctCount = 0, wrongCount = 0;
const shuffled = [...questions].sort(() => Math.random() - 0.5);

function setMascot(type) {
  const pool = mascots[type];
  document.getElementById('mascot').textContent = pool[Math.floor(Math.random()*pool.length)];
}

function loadQuestion() {
  const q = shuffled[current];
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('qLabel').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('qnum').textContent = current+1;
  document.getElementById('progressBar').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('nextQBtn').style.display = 'none';
  document.querySelectorAll('.btn-tf').forEach(b => b.disabled = false);
  setMascot('idle');
}

function spawnConfetti() {
  const colors = ['#FFD600','#00C853','#2979FF','#FF4081','#00E5FF','#AA00FF','#FF6D00'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left: ${20 + Math.random()*60}%;
      top: -10px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5+Math.random()*1.5}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

function spawnSparkles(x, y) {
  const colors = ['#FFD600','#00C853','#FF4081','#00E5FF'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 50 + Math.random()*60;
    s.style.cssText = `
      left: ${x}px; top: ${y}px;
      background: ${colors[i % colors.length]};
      --tx: ${Math.cos(angle)*dist}px;
      --ty: ${Math.sin(angle)*dist}px;
      animation-duration: ${0.6+Math.random()*0.4}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function answer(userAnswer) {
  const q = shuffled[current];
  const isCorrect = userAnswer === q.ans;
  document.querySelectorAll('.btn-tf').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedbackBox');
  const card = document.getElementById('gameCard');
  const rect = card.getBoundingClientRect();

  if (isCorrect) {
    correctCount++;
    const msgs = ['🎉 Brilliant!', '⭐ Amazing!', '🔥 You\'re on fire!', '💪 Superstar!', '🌟 Incredible!', '🏆 Awesome!'];
    fb.innerHTML = `<span style="color:#00C853;font-size:24px;font-family:'Fredoka One',cursive">${msgs[Math.floor(Math.random()*msgs.length)]}</span><span class="explain">${q.explain}</span>`;
    card.classList.add('bounce');
    setTimeout(() => card.classList.remove('bounce'), 500);
    spawnConfetti();
    spawnSparkles(rect.left + rect.width/2, rect.top + 100);
    setMascot('correct');
  } else {
    wrongCount++;
    const correct_word = q.ans ? 'TRUE ✅' : 'FALSE ❌';
    fb.innerHTML = `<span style="color:#FF3D57;font-size:18px;font-family:'Fredoka One',cursive">❌ Not quite! Answer: <strong>${correct_word}</strong></span><span class="explain">${q.explain}</span>`;
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
    setMascot('wrong');
  }

  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  document.getElementById('nextQBtn').style.display = 'inline-block';

  if (current === questions.length - 1) {
    document.getElementById('nextQBtn').textContent = 'See Results 🏆';
    document.getElementById('nextQBtn').onclick = showResult;
  }
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
}

function showResult() {
  document.getElementById('gameCard').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('progressBar').style.width = '100%';
  spawnConfetti();

  const pct = Math.round((correctCount/questions.length)*100);
  let title, msg;
  if (pct === 100) { title = '🏆 Perfect Score! Cyber Champion!'; msg = 'You got EVERYTHING right! You are a true cybersecurity superstar! 🌟'; }
  else if (pct >= 70) { title = '⭐ Great Job! Well Done!'; msg = 'Excellent understanding! A little more practice and you will be perfect!'; }
  else if (pct >= 50) { title = '💪 Good Effort! Keep Going!'; msg = 'You\'re on the right track! Review the ones you missed and try again!'; }
  else { title = '🌱 Keep Learning — You Can Do It!'; msg = 'Cybersecurity is a big topic! Try again after reviewing the slides. 📖'; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetails').textContent = `Score: ${correctCount}/${questions.length} (${pct}%) | ✅ ${correctCount} Correct | ❌ ${wrongCount} Wrong`;
  document.getElementById('resultMsg').textContent = msg;
}

function resetGame() {
  current = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('correct').textContent = 0;
  document.getElementById('wrong').textContent = 0;
  document.getElementById('gameCard').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  shuffled.sort(() => Math.random() - 0.5);
  document.getElementById('nextQBtn').onclick = nextQuestion;
  document.getElementById('nextQBtn').textContent = 'Next Question ➡️';
  loadQuestion();
}

loadQuestion();
</script>
</body>
</html>
