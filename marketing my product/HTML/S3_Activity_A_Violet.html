<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill in the Blanks! | Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --v1:#7B2FBE; --v2:#9D4EDD; --v3:#C77DFF; --v4:#E0AAFF;
  --v5:#5A189A; --v6:#3C096C; --v7:#240046;
  --acc1:#FF6FD8; --acc2:#FFD93D; --acc3:#00F5D4; --acc4:#FF6B6B;
  --white:#FFFFFF; --light:#F3E8FF;
}
*{box-sizing:border-box;margin:0;padding:0;}

@keyframes bgSwirl{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
@keyframes floatUp{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(6deg)}}
@keyframes floatDown{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(16px) rotate(-4deg)}}
@keyframes orbitSpin{from{transform:rotate(0deg) translateX(60px) rotate(0deg)}to{transform:rotate(360deg) translateX(60px) rotate(-360deg)}}
@keyframes pulseScale{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg);opacity:0}65%{transform:scale(1.18) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slideRight{from{transform:translateX(-50px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideLeft{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px 2px rgba(199,125,255,.5)}50%{box-shadow:0 0 28px 8px rgba(224,170,255,.9)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
@keyframes correctBounce{0%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(.96)}100%{transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(.5) rotate(0deg)}50%{opacity:1;transform:scale(1.2) rotate(20deg)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(900deg);opacity:0}}
@keyframes rainbowText{0%{color:var(--acc1)}25%{color:var(--acc2)}50%{color:var(--acc3)}75%{color:var(--v3)}100%{color:var(--acc1)}}
@keyframes borderDance{0%{border-color:var(--v3)}33%{border-color:var(--acc1)}66%{border-color:var(--acc3)}100%{border-color:var(--v3)}}
@keyframes chipWobble{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes neonFlicker{0%,95%,100%{opacity:1}96%,98%{opacity:.7}}
@keyframes ripple{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.8);opacity:0}}
@keyframes badgeJump{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
@keyframes progressGlow{0%,100%{box-shadow:0 0 6px var(--acc3)}50%{box-shadow:0 0 18px var(--v3),0 0 32px var(--acc1)}}

body{
  font-family:'Baloo 2',cursive;
  background:radial-gradient(ellipse at 20% 20%, #3C096C 0%, #5A189A 35%, #9D4EDD 65%, #240046 100%);
  background-size:400% 400%;
  animation:bgSwirl 18s ease-in-out infinite;
  min-height:100vh;
  padding:10px 12px 50px;
  overflow-x:hidden;
}

/* ── DEEP SPACE BG ── */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;}
.orb:nth-child(1){width:380px;height:380px;background:var(--acc1);top:-80px;left:-100px;animation:floatUp 8s ease-in-out infinite;}
.orb:nth-child(2){width:300px;height:300px;background:var(--v3);bottom:-60px;right:-80px;animation:floatDown 10s ease-in-out infinite 2s;}
.orb:nth-child(3){width:200px;height:200px;background:var(--acc3);top:40%;left:60%;animation:floatUp 7s ease-in-out infinite 1s;}
.orb:nth-child(4){width:150px;height:150px;background:var(--acc2);bottom:25%;left:5%;animation:floatDown 9s ease-in-out infinite 3s;}

.star{position:absolute;font-size:18px;animation:twinkle 2.5s ease-in-out infinite;}
.star:nth-child(5){top:6%;left:12%;animation-delay:.1s;}
.star:nth-child(6){top:15%;right:18%;animation-delay:.7s;}
.star:nth-child(7){top:50%;left:5%;animation-delay:1.3s;}
.star:nth-child(8){bottom:35%;right:8%;animation-delay:.4s;}
.star:nth-child(9){bottom:15%;left:20%;animation-delay:1.8s;}
.star:nth-child(10){top:30%;right:3%;animation-delay:2.1s;}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  background:rgba(36,0,70,.75);
  backdrop-filter:blur(16px);
  border-bottom:2px solid rgba(199,125,255,.4);
}
.planrs-badge{
  background:linear-gradient(135deg,var(--acc1),var(--acc2));
  border-radius:30px;padding:7px 18px;
  font-family:'Fredoka One',cursive;font-size:15px;color:var(--v7);
  box-shadow:0 4px 18px rgba(255,111,216,.5);
  animation:badgeJump 2.5s ease-in-out infinite;
}
.score-box{
  background:linear-gradient(135deg,var(--v6),var(--v5));
  color:var(--acc2);border-radius:30px;padding:8px 20px;
  font-family:'Fredoka One',cursive;font-size:17px;
  border:2px solid var(--v3);
  box-shadow:0 4px 18px rgba(90,24,154,.6);
  transition:transform .2s;
}
.score-box.bump{animation:popIn .5s ease;}

/* ── CONTENT ── */
.content{position:relative;z-index:1;padding-top:72px;}

h1{
  font-family:'Fredoka One',cursive;
  text-align:center;
  font-size:clamp(28px,6vw,50px);
  background:linear-gradient(135deg,var(--acc1) 0%,var(--acc2) 35%,var(--acc3) 65%,var(--v4) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;
  margin-bottom:4px;
  filter:drop-shadow(0 2px 12px rgba(255,111,216,.4));
}
.subtitle{
  text-align:center;color:var(--v4);font-size:15px;font-weight:700;
  margin-bottom:18px;animation:slideUp .7s ease both;letter-spacing:.3px;
}

/* ── PROGRESS ── */
.progress-wrap{
  max-width:740px;margin:0 auto 18px;
  background:rgba(60,9,108,.6);border-radius:20px;padding:10px 16px;
  border:1.5px solid rgba(199,125,255,.3);backdrop-filter:blur(4px);
  animation:slideUp .8s ease both;
}
.progress-label{font-size:12px;font-weight:800;color:var(--v3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px;}
.progress-bar-bg{height:14px;background:rgba(90,24,154,.5);border-radius:30px;overflow:hidden;}
.progress-bar-fill{
  height:100%;width:0%;border-radius:30px;
  background:linear-gradient(90deg,var(--acc1),var(--v3),var(--acc3),var(--acc2));
  background-size:300% auto;
  animation:shimmer 2s linear infinite, progressGlow 2s ease-in-out infinite;
  transition:width .6s cubic-bezier(.34,1.56,.64,1);
}

/* ── WORD BANK ── */
.word-bank{
  max-width:740px;margin:0 auto 24px;
  background:rgba(60,9,108,.65);
  border:2.5px solid rgba(199,125,255,.5);
  border-radius:28px;padding:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(36,0,70,.5);
  animation:slideUp .9s ease both;
}
.word-bank-title{
  font-family:'Fredoka One',cursive;font-size:16px;
  background:linear-gradient(135deg,var(--acc1),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.chips-area{display:flex;flex-wrap:wrap;gap:10px;min-height:46px;}

/* ── CHIPS ── */
.word-chip{
  padding:9px 20px;border-radius:50px;
  font-size:14px;font-weight:800;color:white;
  cursor:grab;user-select:none;
  box-shadow:0 5px 18px rgba(0,0,0,.35);
  transition:transform .18s, box-shadow .18s, opacity .2s;
  touch-action:none;
  position:relative;overflow:hidden;
  animation:chipWobble 3s ease-in-out infinite;
}
.word-chip::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
  pointer-events:none;
}
.word-chip:hover{transform:translateY(-5px) scale(1.1);box-shadow:0 12px 28px rgba(0,0,0,.4);}
.word-chip.dragging{opacity:.25;transform:scale(.88);}
.word-chip.used{opacity:.2;pointer-events:none;filter:grayscale(.6);}

.word-chip[data-word="marketing"]{background:linear-gradient(135deg,#FF6FD8,#9D4EDD);animation-delay:0s;}
.word-chip[data-word="hoarding"]{background:linear-gradient(135deg,#7B2FBE,#FF6FD8);animation-delay:.15s;}
.word-chip[data-word="poster"]{background:linear-gradient(135deg,#C77DFF,#00F5D4);animation-delay:.3s;}
.word-chip[data-word="word of mouth"]{background:linear-gradient(135deg,#FFD93D,#FF6FD8);animation-delay:.45s;}
.word-chip[data-word="television"]{background:linear-gradient(135deg,#00F5D4,#7B2FBE);animation-delay:.6s;}
.word-chip[data-word="radio"]{background:linear-gradient(135deg,#9D4EDD,#FFD93D);animation-delay:.75s;}
.word-chip[data-word="jingle"]{background:linear-gradient(135deg,#FF6B6B,#C77DFF);animation-delay:.9s;}
.word-chip[data-word="free sample"]{background:linear-gradient(135deg,#E0AAFF,#FF6FD8);animation-delay:1.05s;}
.word-chip[data-word="discount"]{background:linear-gradient(135deg,#FFD93D,#9D4EDD);animation-delay:1.2s;}
.word-chip[data-word="customers"]{background:linear-gradient(135deg,#00F5D4,#FF6FD8);animation-delay:1.35s;}

/* ── QUESTION CARDS ── */
.questions{max-width:740px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
.q-card{
  background:rgba(60,9,108,.6);
  border-radius:24px;padding:20px 22px 16px;
  border:2px solid rgba(199,125,255,.3);
  box-shadow:0 8px 28px rgba(36,0,70,.45);
  backdrop-filter:blur(8px);
  animation:slideRight .5s ease both;
  position:relative;overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
}
.q-card:nth-child(even){animation-name:slideLeft;}
.q-card::before{
  content:'';position:absolute;top:0;left:0;width:6px;height:100%;
  border-radius:4px 0 0 4px;
}
.q-card:nth-child(3n+1)::before{background:linear-gradient(180deg,var(--acc1),var(--v3));}
.q-card:nth-child(3n+2)::before{background:linear-gradient(180deg,var(--acc3),var(--acc1));}
.q-card:nth-child(3n)::before{background:linear-gradient(180deg,var(--acc2),var(--acc3));}
.q-card.correct-card{border-color:var(--acc3);box-shadow:0 0 0 3px rgba(0,245,212,.25), 0 8px 28px rgba(36,0,70,.45);animation:correctBounce .5s ease;}
.q-card.wrong-card{border-color:var(--acc4);animation:wrongShake .4s ease;}

.q-number{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--v3);margin-bottom:8px;}
.q-sentence{font-size:16px;color:var(--v4);line-height:2.3;font-weight:700;display:flex;flex-wrap:wrap;align-items:center;gap:4px;}

/* ── DROP ZONE ── */
.drop-zone{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:140px;min-height:40px;
  border:2.5px dashed rgba(199,125,255,.7);
  border-radius:30px;padding:4px 16px;
  background:rgba(90,24,154,.35);
  font-size:13px;font-weight:800;color:rgba(224,170,255,.6);
  vertical-align:middle;margin:0 4px;
  transition:all .2s;position:relative;
  animation:borderDance 3s linear infinite;
}
.drop-zone.drag-over{
  border-style:solid;border-color:var(--acc3);
  background:rgba(0,245,212,.15);
  transform:scale(1.08);
  box-shadow:0 0 0 4px rgba(0,245,212,.3), 0 0 20px rgba(0,245,212,.4);
  color:var(--acc3);animation:none;
}
.drop-zone.filled{
  border-style:solid;border-color:var(--acc1);
  background:rgba(255,111,216,.15);
  color:white;font-weight:900;
  animation:none;cursor:pointer;
}
.drop-zone.filled:hover{background:rgba(255,111,216,.25);transform:scale(1.04);}
.drop-zone.correct-zone{border-color:var(--acc3)!important;background:rgba(0,245,212,.18)!important;color:var(--acc3)!important;animation:glow 1.5s ease 3;}
.drop-zone.wrong-zone{border-color:var(--acc4)!important;background:rgba(255,107,107,.12)!important;color:var(--acc4)!important;}
.drop-zone .chip-txt{pointer-events:none;}
.drop-zone .x-btn{
  position:absolute;top:-9px;right:-9px;
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc4),#c0392b);
  color:white;border:2px solid rgba(255,255,255,.5);
  font-size:11px;font-weight:900;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .15s;
}
.drop-zone.filled .x-btn{display:flex;}
.drop-zone .x-btn:hover{transform:scale(1.25);}

.q-feedback{font-size:13px;margin-top:8px;font-weight:800;min-height:20px;}
.q-feedback.correct{color:var(--acc3);animation:popIn .4s ease;}
.q-feedback.wrong{color:var(--acc4);animation:popIn .4s ease;}
.hint{font-size:12px;color:rgba(199,125,255,.7);margin-top:5px;font-weight:700;}

/* ── GHOST ── */
.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  padding:9px 20px;border-radius:50px;
  font-size:14px;font-weight:800;color:white;
  box-shadow:0 12px 36px rgba(0,0,0,.5);
  transform:rotate(-6deg) scale(1.15);
  display:none;
  font-family:'Baloo 2',cursive;
  border:2px solid rgba(255,255,255,.3);
}

/* ── RIPPLE ── */
.ripple-ring{
  position:fixed;pointer-events:none;z-index:9998;
  border-radius:50%;border:3px solid var(--acc3);
  width:20px;height:20px;
  transform-origin:center center;
  animation:ripple .6s ease-out forwards;
}

/* ── BURST ── */
.burst-dot{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;}

/* ── BTNS ── */
.btn-row{display:flex;gap:14px;justify-content:center;margin:28px 0;flex-wrap:wrap;}
.btn{
  padding:14px 32px;border:none;border-radius:50px;
  font-size:17px;font-weight:800;font-family:'Fredoka One',cursive;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 6px 20px rgba(0,0,0,.4);position:relative;overflow:hidden;
  letter-spacing:.5px;
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 60%);pointer-events:none;}
.btn::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.3);transform:skewX(-20deg);transition:left .5s;}
.btn:hover::after{left:130%;}
.btn:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 14px 32px rgba(0,0,0,.45);}
.btn:active{transform:scale(.97);}
.btn-check{background:linear-gradient(135deg,var(--acc1),var(--v1));color:white;border:2px solid rgba(255,255,255,.2);}
.btn-try{background:linear-gradient(135deg,var(--acc2),#e67e00);color:var(--v7);border:2px solid rgba(255,255,255,.2);}
.btn-next{background:linear-gradient(135deg,var(--acc3),#00b894);color:var(--v7);border:2px solid rgba(255,255,255,.2);}

/* ── RESULT ── */
.result-panel{
  display:none;
  background:rgba(36,0,70,.9);
  border-radius:32px;padding:34px 24px;text-align:center;
  max-width:740px;margin:0 auto 32px;
  border:3px solid var(--v3);
  box-shadow:0 0 0 1px rgba(199,125,255,.2), 0 20px 60px rgba(36,0,70,.7);
  backdrop-filter:blur(16px);
}
.result-panel.show{display:block;animation:popIn .7s ease;}
.big-emoji{font-size:56px;display:block;animation:pulseScale 1.5s ease-in-out infinite;margin-bottom:8px;}
.result-panel h2{
  font-family:'Fredoka One',cursive;font-size:36px;
  animation:rainbowText 2s linear infinite;
  margin-bottom:10px;
}
.result-panel p{font-size:16px;color:var(--v4);font-weight:700;}

/* ── CONFETTI ── */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;}
.c-piece{position:absolute;top:-20px;animation:confettiFall linear forwards;}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div>
  <div class="star">✨</div><div class="star">⭐</div><div class="star">🌟</div>
  <div class="star">💜</div><div class="star">✨</div><div class="star">🔮</div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>
<div class="drag-ghost" id="dragGhost"></div>

<div class="top-bar">
  <div class="planrs-badge">⭐ Planrs</div>
  <div class="score-box" id="scoreBox">🏅 0 / 10</div>
</div>

<div class="content">
  <h1>📝 Drag & Drop!</h1>
  <p class="subtitle">Section 3 Activity A — Drag words into the blanks ✨</p>

  <div class="progress-wrap">
    <div class="progress-label">⚡ Progress</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <div class="word-bank">
    <div class="word-bank-title">🎒 Word Bank — Drag a word into the blank!</div>
    <div class="chips-area" id="chipsArea"></div>
  </div>

  <div class="questions" id="questionsArea"></div>

  <div class="btn-row">
    <button class="btn btn-check" onclick="checkAll()">✅ Check Answers</button>
    <button class="btn btn-try" onclick="resetAll()">🔄 Try Again</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <span class="big-emoji" id="resultEmoji">🏆</span>
    <h2 id="resultTitle">Amazing!</h2>
    <p id="resultMsg">You did brilliantly!</p>
    <div class="btn-row" style="margin-top:20px">
      <button class="btn btn-try" onclick="resetAll()">🔄 Try Again</button>
      <button class="btn btn-next" onclick="alert('Move to Section 3 Activity B! 🎉')">➡️ Next Activity</button>
    </div>
  </div>
</div>

<script>
const questions=[
  {before:"Telling people about your product so they come and buy is called",answer:"marketing",after:".",hint:"Starts with M 🌟"},
  {before:"A large advertisement board you see on roads and buildings is called a",answer:"hoarding",after:".",hint:"Seen from a moving car! 🚗"},
  {before:"A small advertisement with pictures you can stick on a wall is called a",answer:"poster",after:".",hint:"Made with paper and pictures 🎨"},
  {before:"When your happy customer tells their friend about your product, it is called",answer:"word of mouth",after:".",hint:"Talking, not paper or screen 🗣️"},
  {before:"The most expensive but widest-reaching tool is a",answer:"television",after:"advertisement.",hint:"Watched on a screen at home 📺"},
  {before:"Farmers and drivers in villages often listen to",answer:"radio",after:"advertisements.",hint:"Hear it, can't see it 🎵"},
  {before:"A catchy song that promotes a product on TV or radio is called a",answer:"jingle",after:".",hint:"Starts with J — hard to forget! 🎶"},
  {before:"When a company gives you a tiny amount of a product free to try, it is called a",answer:"free sample",after:".",hint:"Try before you buy 🎁"},
  {before:"During Diwali, many shops offer a",answer:"discount",after:"to attract more buyers.",hint:"You pay less than the original price 🏷️"},
  {before:"The people who buy your product are called",answer:"customers",after:".",hint:"Learned about them in Section 2! 👥"},
];

const chipGrad={
  "marketing":"linear-gradient(135deg,#FF6FD8,#9D4EDD)",
  "hoarding":"linear-gradient(135deg,#7B2FBE,#FF6FD8)",
  "poster":"linear-gradient(135deg,#C77DFF,#00F5D4)",
  "word of mouth":"linear-gradient(135deg,#FFD93D,#FF6FD8)",
  "television":"linear-gradient(135deg,#00F5D4,#7B2FBE)",
  "radio":"linear-gradient(135deg,#9D4EDD,#FFD93D)",
  "jingle":"linear-gradient(135deg,#FF6B6B,#C77DFF)",
  "free sample":"linear-gradient(135deg,#E0AAFF,#FF6FD8)",
  "discount":"linear-gradient(135deg,#FFD93D,#9D4EDD)",
  "customers":"linear-gradient(135deg,#00F5D4,#FF6FD8)"
};

let dragWord=null, dragSourceZone=null;

/* ── BUILD ── */
function buildAll(){ buildChips(); buildQuestions(); updateProgress(); }

function buildChips(){
  const area=document.getElementById('chipsArea');
  area.innerHTML='';
  questions.forEach((q,i)=>{
    const c=document.createElement('div');
    c.className='word-chip';
    c.dataset.word=q.answer;
    c.textContent=q.answer;
    c.style.background=chipGrad[q.answer];
    c.style.animationDelay=(i*.15)+'s';
    c.draggable=true;
    bindChip(c);
    area.appendChild(c);
  });
}

function buildQuestions(){
  const area=document.getElementById('questionsArea');
  area.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='q-card';
    card.id='card-'+i;
    card.style.animationDelay=(i*.07)+'s';

    const num=document.createElement('div');
    num.className='q-number';
    num.textContent=`Question ${i+1} of ${questions.length}`;

    const sent=document.createElement('div');
    sent.className='q-sentence';
    sent.appendChild(document.createTextNode(q.before+' '));

    const zone=document.createElement('div');
    zone.className='drop-zone';
    zone.id='zone-'+i;
    zone.dataset.index=i;
    zone.innerHTML=`<span class="chip-txt">Drop here ↓</span><button class="x-btn" onclick="clearZone(${i},event)">✕</button>`;
    bindZone(zone,i);
    sent.appendChild(zone);
    sent.appendChild(document.createTextNode(' '+q.after));

    const hint=document.createElement('div');
    hint.className='hint';
    hint.textContent='💡 '+q.hint;

    const fb=document.createElement('div');
    fb.className='q-feedback';
    fb.id='fb-'+i;

    card.append(num,sent,hint,fb);
    area.appendChild(card);
  });
}

/* ── CHIP EVENTS ── */
function bindChip(chip){
  // Desktop
  chip.addEventListener('dragstart',e=>{
    dragWord=chip.dataset.word;
    dragSourceZone=null;
    chip.classList.add('dragging');
    e.dataTransfer.setData('text/plain',dragWord);
    e.dataTransfer.effectAllowed='move';
    const blank=document.createElement('div');
    blank.style.cssText='position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;';
    document.body.appendChild(blank);
    e.dataTransfer.setDragImage(blank,0,0);
    setTimeout(()=>blank.remove(),0);
    showGhost(chip,e.clientX,e.clientY);
  });
  chip.addEventListener('dragend',()=>{ chip.classList.remove('dragging'); hideGhost(); });

  // Touch
  chip.addEventListener('touchstart',onTouchStart,{passive:false});
  chip.addEventListener('touchmove',onTouchMove,{passive:false});
  chip.addEventListener('touchend',onTouchEnd);
}

/* ── ZONE EVENTS ── */
function bindZone(zone,idx){
  zone.addEventListener('dragover',e=>{ e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop',e=>{ e.preventDefault(); zone.classList.remove('drag-over'); dropInZone(zone,idx); });
}

/* ── DROP LOGIC ── */
function dropInZone(zone,idx){
  if(!dragWord) return;
  const word=dragWord;
  if(dragSourceZone!==null && dragSourceZone!==idx){
    const oldZ=document.getElementById('zone-'+dragSourceZone);
    returnChip(oldZ.dataset.filled);
    clearZoneUI(oldZ);
  }
  if(zone.dataset.filled) returnChip(zone.dataset.filled);
  markUsed(word);
  zone.dataset.filled=word;
  zone.classList.add('filled');
  zone.querySelector('.chip-txt').textContent=word;
  zone.style.background=chipGrad[word];
  zone.style.borderStyle='solid';
  zone.style.color='white';
  document.getElementById('card-'+idx).className='q-card';
  document.getElementById('fb-'+idx).textContent='';
  dragWord=null; dragSourceZone=null;
  updateProgress();
  spawnBurst(zone);
  spawnRipple(zone);
}

function clearZone(idx,e){
  if(e) e.stopPropagation();
  const zone=document.getElementById('zone-'+idx);
  if(!zone.dataset.filled) return;
  returnChip(zone.dataset.filled);
  clearZoneUI(zone);
  document.getElementById('card-'+idx).className='q-card';
  document.getElementById('fb-'+idx).textContent='';
  updateProgress();
}

function clearZoneUI(zone){
  delete zone.dataset.filled;
  zone.classList.remove('filled','correct-zone','wrong-zone');
  zone.style.background=''; zone.style.borderStyle=''; zone.style.color='';
  zone.querySelector('.chip-txt').textContent='Drop here ↓';
}

function markUsed(word){ document.querySelectorAll('.word-chip').forEach(c=>{ if(c.dataset.word===word) c.classList.add('used'); }); }
function returnChip(word){ if(!word) return; document.querySelectorAll('.word-chip').forEach(c=>{ if(c.dataset.word===word) c.classList.remove('used'); }); }

/* ── TOUCH DRAG ── */
let tChip=null;
function onTouchStart(e){
  e.preventDefault();
  tChip=e.currentTarget;
  dragWord=tChip.dataset.word;
  dragSourceZone=null;
  tChip.classList.add('dragging');
  const t=e.touches[0];
  showGhost(tChip,t.clientX,t.clientY);
}
function onTouchMove(e){
  e.preventDefault();
  const t=e.touches[0];
  moveGhost(t.clientX,t.clientY);
  document.querySelectorAll('.drop-zone').forEach(z=>{
    const r=z.getBoundingClientRect();
    const over=t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;
    z.classList.toggle('drag-over',over);
  });
}
function onTouchEnd(e){
  const t=e.changedTouches[0];
  hideGhost();
  if(tChip) tChip.classList.remove('dragging');
  document.querySelectorAll('.drop-zone').forEach(z=>{
    z.classList.remove('drag-over');
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      dropInZone(z,parseInt(z.dataset.index));
    }
  });
  tChip=null; dragWord=null;
}

/* ── ZONE DRAG (chip already placed) ── */
document.addEventListener('dragstart',e=>{
  const zone=e.target.closest('.drop-zone');
  if(zone&&zone.dataset.filled&&!e.target.classList.contains('word-chip')){
    dragWord=zone.dataset.filled;
    dragSourceZone=parseInt(zone.dataset.index);
    const blank=document.createElement('div');
    blank.style.cssText='position:absolute;left:-9999px;top:-9999px;';
    document.body.appendChild(blank);
    e.dataTransfer.setDragImage(blank,0,0);
    setTimeout(()=>blank.remove(),0);
    zone.draggable=true;
    showGhost({textContent:dragWord,style:{background:''},dataset:{word:dragWord}},e.clientX,e.clientY);
  }
});
document.addEventListener('dragend',()=>hideGhost());
document.addEventListener('dragover',e=>{
  if(dragWord) moveGhost(e.clientX,e.clientY);
});

/* ── GHOST ── */
const ghost=document.getElementById('dragGhost');
function showGhost(chip,x,y){
  ghost.textContent=chip.textContent||chip.dataset.word;
  ghost.style.background=chipGrad[chip.dataset.word]||chip.style.background;
  ghost.style.display='block';
  moveGhost(x,y);
}
function moveGhost(x,y){
  ghost.style.left=(x-ghost.offsetWidth/2)+'px';
  ghost.style.top=(y-ghost.offsetHeight/2-14)+'px';
}
function hideGhost(){ ghost.style.display='none'; }

/* ── BURST ── */
function spawnBurst(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols=['#FF6FD8','#FFD93D','#00F5D4','#C77DFF','#FF6B6B','#E0AAFF'];
  for(let i=0;i<10;i++){
    const dot=document.createElement('div');
    dot.className='burst-dot';
    const angle=(i/10)*Math.PI*2, d=45+Math.random()*35;
    const tx=Math.cos(angle)*d, ty=Math.sin(angle)*d;
    const sz=6+Math.random()*8;
    dot.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};transition:transform .5s ease-out,opacity .5s ease-out;`;
    document.body.appendChild(dot);
    requestAnimationFrame(()=>{ dot.style.transform=`translate(${tx}px,${ty}px) scale(0)`; dot.style.opacity='0'; });
    setTimeout(()=>dot.remove(),550);
  }
}

/* ── RIPPLE ── */
function spawnRipple(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<2;i++){
    const ring=document.createElement('div');
    ring.className='ripple-ring';
    ring.style.cssText=`left:${cx-10}px;top:${cy-10}px;animation-delay:${i*.2}s;`;
    document.body.appendChild(ring);
    setTimeout(()=>ring.remove(),700);
  }
}

/* ── PROGRESS ── */
function updateProgress(){
  let n=0;
  for(let i=0;i<questions.length;i++){ if(document.getElementById('zone-'+i)?.dataset.filled) n++; }
  document.getElementById('progressFill').style.width=(n/questions.length*100)+'%';
}

/* ── CHECK ── */
function checkAll(){
  let s=0;
  const praises=['🌈 Amazing!','⭐ You got it!','🦄 Brilliant!','💜 Correct!','🏆 Superstar!','💫 Genius!','🎊 Yes!','🌟 Perfect!'];
  questions.forEach((q,i)=>{
    const zone=document.getElementById('zone-'+i);
    const card=document.getElementById('card-'+i);
    const fb=document.getElementById('fb-'+i);
    const filled=zone.dataset.filled||'';
    const ok=filled.toLowerCase()===q.answer.toLowerCase();
    zone.classList.remove('correct-zone','wrong-zone');
    if(ok){
      s++;
      card.className='q-card correct-card';
      zone.classList.add('correct-zone');
      fb.className='q-feedback correct';
      fb.textContent=praises[Math.floor(Math.random()*praises.length)];
    } else if(!filled){
      fb.className='q-feedback wrong';
      fb.textContent='⚠️ This blank is empty!';
    } else {
      card.className='q-card wrong-card';
      zone.classList.add('wrong-zone');
      fb.className='q-feedback wrong';
      fb.textContent=`❌ Answer: "${q.answer}"`;
    }
  });
  const box=document.getElementById('scoreBox');
  box.textContent=`🏅 ${s} / 10`;
  box.classList.remove('bump'); void box.offsetWidth; box.classList.add('bump');
  if(s===10) launchConfetti();
  showResult(s);
}

function showResult(s){
  const panel=document.getElementById('resultPanel');
  panel.className='result-panel show';
  document.getElementById('resultEmoji').textContent=s===10?'🏆':s>=7?'🎉':'💪';
  document.getElementById('resultTitle').textContent=s===10?'Perfect Score!':s>=7?'Brilliant Work!':'Keep Going!';
  document.getElementById('resultMsg').textContent=`You got ${s} out of 10! ${s===10?'You know ALL the marketing tools! 🥳':'Drag the right words and try again! 💪'}`;
  panel.scrollIntoView({behavior:'smooth'});
}

function resetAll(){
  document.getElementById('scoreBox').textContent='🏅 0 / 10';
  document.getElementById('resultPanel').className='result-panel';
  buildAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── CONFETTI ── */
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  const cols=['#FF6FD8','#FFD93D','#00F5D4','#C77DFF','#FF6B6B','#E0AAFF','#7B2FBE'];
  for(let i=0;i<90;i++){
    const p=document.createElement('div');
    p.className='c-piece';
    const sz=8+Math.random()*12;
    p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};animation-delay:${Math.random()*.8}s;animation-duration:${1.8+Math.random()*2}s;transform:rotate(${Math.random()*360}deg);`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.innerHTML='',5000);
}

buildAll();
</script>
