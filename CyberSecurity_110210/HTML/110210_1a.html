<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Terms Match — Section 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  padding:16px 12px 120px;
  overflow-x:hidden;
  position:relative;
  background:#0077B6;
}

#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:-10;pointer-events:none}

body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120px 60px at 18% 22%,rgba(255,255,255,0.10) 0%,transparent 70%),radial-gradient(ellipse 90px 45px at 60% 12%,rgba(255,255,255,0.08) 0%,transparent 70%),radial-gradient(ellipse 70px 35px at 82% 38%,rgba(255,255,255,0.07) 0%,transparent 70%),radial-gradient(ellipse 100px 50px at 35% 60%,rgba(255,255,255,0.06) 0%,transparent 70%);z-index:-8;animation:caustic 6s ease-in-out infinite alternate}
@keyframes caustic{0%{opacity:.8;transform:scaleX(1) scaleY(1)}50%{opacity:1;transform:scaleX(1.1) scaleY(.95)}100%{opacity:.6;transform:scaleX(.95) scaleY(1.08)}}

.sand{position:fixed;bottom:0;left:0;right:0;height:80px;background:linear-gradient(0deg,#C9913D 0%,#E9B86A 60%,transparent 100%);z-index:1;pointer-events:none}
.bubble{position:fixed;border-radius:50%;pointer-events:none;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);animation:rise linear infinite;z-index:2}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:.8}30%{transform:translateY(-30vh) translateX(6px);opacity:.6}60%{transform:translateY(-65vh) translateX(-4px);opacity:.4}100%{transform:translateY(-110vh) translateX(3px);opacity:0}}
.sf{position:fixed;pointer-events:none;z-index:3;transform-origin:center;filter:drop-shadow(0 6px 16px rgba(0,0,0,.38))}
@keyframes sfA{0%,100%{transform:translateY(0) rotate(0deg) scale(1)}25%{transform:translateY(-18px) rotate(12deg) scale(1.06)}75%{transform:translateY(-10px) rotate(-8deg) scale(.97)}}
@keyframes sfB{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-24px) rotate(-14deg) scale(1.08)}70%{transform:translateY(-6px) rotate(6deg)}}
@keyframes sfC{0%,100%{transform:translateY(0) rotate(0deg) scale(1)}50%{transform:translateY(-20px) rotate(18deg) scale(1.1)}}
@keyframes sfD{0%,100%{transform:translateY(0) rotate(5deg)}40%{transform:translateY(-15px) rotate(-10deg) scale(1.05)}80%{transform:translateY(-5px) rotate(15deg)}}
.fish{position:fixed;pointer-events:none;z-index:3;animation:swim linear infinite}
@keyframes swim{0%{transform:translateX(-140px) translateY(0)}25%{transform:translateX(25vw) translateY(-15px)}50%{transform:translateX(55vw) translateY(8px)}75%{transform:translateX(80vw) translateY(-10px)}100%{transform:translateX(110vw) translateY(4px)}}
.weed{position:fixed;bottom:50px;pointer-events:none;z-index:2;transform-origin:bottom center;animation:sway ease-in-out infinite alternate}
@keyframes sway{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}
.brand{position:fixed;top:12px;right:16px;font-family:'Fredoka One',cursive;font-size:14px;color:rgba(255,255,255,.9);z-index:50;letter-spacing:.5px;text-shadow:0 2px 6px rgba(0,0,0,.3)}

h1{font-family:'Fredoka One',cursive;font-size:clamp(26px,5vw,40px);color:#fff;text-shadow:3px 4px 0 #023E8A,0 0 40px rgba(255,215,61,.5);text-align:center;margin:48px 0 4px;position:relative;z-index:20;animation:hBounce 2.5s ease-in-out infinite;letter-spacing:.5px}
@keyframes hBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.subtitle{text-align:center;color:rgba(255,255,255,.88);font-size:14px;font-weight:700;margin-bottom:14px;position:relative;z-index:20}
.score-bar{background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border:2.5px solid rgba(255,255,255,.4);border-radius:60px;padding:10px 28px;text-align:center;margin:0 auto 16px;max-width:460px;font-family:'Fredoka One',cursive;font-size:17px;color:#fff;position:relative;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,.18);letter-spacing:.4px}
.score-bar em{color:#FFD93D;font-style:normal;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.instr{background:rgba(255,255,255,.93);border-left:6px solid #FFD93D;border-radius:16px;padding:11px 18px;margin:0 auto 18px;max-width:720px;font-size:14px;color:#333;font-weight:700;position:relative;z-index:20;box-shadow:0 4px 18px rgba(0,0,0,.13)}
.game{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;position:relative;z-index:20;max-width:900px;margin:0 auto}
.col{flex:1;min-width:255px}
.col-hd{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;border-radius:22px 22px 0 0;padding:14px 12px;text-align:center;letter-spacing:.6px;text-shadow:2px 3px 0 rgba(0,0,0,.3);position:relative;overflow:hidden}
.col-hd::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 60%);pointer-events:none}
.terms-hd{background:linear-gradient(135deg,#FF3CAC,#FF6B6B,#FF9F1C);box-shadow:0 6px 20px rgba(255,60,172,.45);animation:hdrPulse1 3s ease-in-out infinite alternate}
.defs-hd{background:linear-gradient(135deg,#00C9FF,#4ECDC4,#80FFDB);box-shadow:0 6px 20px rgba(0,201,255,.45);animation:hdrPulse2 3.5s ease-in-out infinite alternate}
@keyframes hdrPulse1{from{box-shadow:0 6px 20px rgba(255,60,172,.45)}to{box-shadow:0 8px 30px rgba(255,159,28,.7)}}
@keyframes hdrPulse2{from{box-shadow:0 6px 20px rgba(0,201,255,.45)}to{box-shadow:0 8px 30px rgba(128,255,219,.7)}}
.term-card{border-radius:20px;padding:16px 14px;margin-bottom:11px;cursor:grab;font-family:'Fredoka One',cursive;font-size:18px;color:#fff;text-align:center;text-shadow:1px 2px 0 rgba(0,0,0,.25);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;user-select:none;position:relative;overflow:hidden;border:none;letter-spacing:.3px}
.term-card::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.32),transparent);transform:skewX(-20deg);transition:left .5s;pointer-events:none}
.term-card:hover::after{left:130%}
.term-card .badge{position:absolute;top:6px;left:9px;font-size:13px;line-height:1;animation:spinBadge 4s linear infinite}
@keyframes spinBadge{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.term-card:hover{transform:scale(1.07) rotate(-2deg);filter:brightness(1.08)}
.term-card.dragging{opacity:.3;transform:scale(.9) rotate(4deg)}
.term-card:nth-child(1){background:linear-gradient(135deg,#FF3CAC,#FF6B9D);box-shadow:0 6px 0 #C2185B,0 9px 20px rgba(255,60,172,.4)}
.term-card:nth-child(2){background:linear-gradient(135deg,#FF8C00,#FF6B6B);box-shadow:0 6px 0 #C34A00,0 9px 20px rgba(255,107,107,.4)}
.term-card:nth-child(3){background:linear-gradient(135deg,#F7B731,#FF9F1C);box-shadow:0 6px 0 #B7770D,0 9px 20px rgba(247,183,49,.4)}
.term-card:nth-child(4){background:linear-gradient(135deg,#20BF6B,#26D0CE);box-shadow:0 6px 0 #0E8A4A,0 9px 20px rgba(32,191,107,.4)}
.term-card:nth-child(5){background:linear-gradient(135deg,#4ECDC4,#00C9FF);box-shadow:0 6px 0 #0A8A84,0 9px 20px rgba(78,205,196,.4)}
.term-card:nth-child(6){background:linear-gradient(135deg,#8854D0,#C77DFF);box-shadow:0 6px 0 #5A2D9E,0 9px 20px rgba(199,125,255,.4)}
.def-slot{border-radius:20px;padding:14px 16px;margin-bottom:11px;min-height:76px;font-size:13.5px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s;position:relative;overflow:hidden;border:3px solid transparent}
.def-slot::before{content:'';position:absolute;inset:2px;border-radius:17px;border:2px dashed rgba(255,255,255,.5);pointer-events:none}
.def-slot:nth-child(1){background:linear-gradient(135deg,#FFE0F0,#FFB3D1);box-shadow:0 5px 0 #F48FB1,0 8px 20px rgba(255,105,180,.25);color:#7B2D5A}
.def-slot:nth-child(2){background:linear-gradient(135deg,#FFF0D6,#FFD9A0);box-shadow:0 5px 0 #FFAB40,0 8px 20px rgba(255,171,64,.25);color:#7A4A00}
.def-slot:nth-child(3){background:linear-gradient(135deg,#FFFBD6,#FFF59D);box-shadow:0 5px 0 #F9D835,0 8px 20px rgba(249,216,53,.25);color:#6B5B00}
.def-slot:nth-child(4){background:linear-gradient(135deg,#D6FFF0,#A8E6CF);box-shadow:0 5px 0 #4CAF7D,0 8px 20px rgba(76,175,125,.25);color:#1A5C3A}
.def-slot:nth-child(5){background:linear-gradient(135deg,#D6F4FF,#A8DAFF);box-shadow:0 5px 0 #42A5F5,0 8px 20px rgba(66,165,245,.25);color:#0D3B6E}
.def-slot:nth-child(6){background:linear-gradient(135deg,#EDD6FF,#D4A8FF);box-shadow:0 5px 0 #9C56D0,0 8px 20px rgba(156,86,208,.25);color:#3D1472}
.def-slot.over{transform:scale(1.04);filter:brightness(1.08);border:3px solid rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(255,255,255,.35),0 10px 30px rgba(0,0,0,.2)!important}
.def-slot.correct{background:linear-gradient(135deg,#B9FBC0,#69F0AE)!important;border:3px solid #00C853!important;box-shadow:0 6px 0 #00963C,0 10px 30px rgba(0,200,83,.4)!important;animation:correctPop .5s cubic-bezier(.34,1.56,.64,1)}
.def-slot.wrong{background:linear-gradient(135deg,#FFD6D6,#FF8A80)!important;border:3px solid #FF3D00!important;box-shadow:0 6px 0 #B71C1C,0 10px 30px rgba(255,61,0,.4)!important}
@keyframes correctPop{0%{transform:scale(.95)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
.def-slot .dt{font-style:italic;font-size:13px;font-weight:800;margin-bottom:5px;opacity:.85}
.def-slot .dm{font-family:'Fredoka One',cursive;color:#1A5C3A;font-size:16px;margin-top:5px;text-shadow:1px 1px 0 rgba(255,255,255,.6)}
.def-slot.correct .dt{opacity:.7}
.def-slot.correct .dm{color:#005929}
.feedback{text-align:center;font-family:'Fredoka One',cursive;font-size:28px;min-height:38px;margin:13px 0;position:relative;z-index:20;text-shadow:2px 3px 0 rgba(0,0,0,.2);animation:fbPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes fbPop{from{transform:scale(.6)}to{transform:scale(1)}}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:18px;position:relative;z-index:20}
.btn{padding:14px 36px;border:none;border-radius:60px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;letter-spacing:.5px;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 60%);pointer-events:none;border-radius:60px}
.btn:hover{transform:translateY(-4px) scale(1.04)}
.btn:active{transform:translateY(2px) scale(.97)}
.btn-try{background:linear-gradient(135deg,#FF3CAC,#FF6B6B,#FF9F1C);color:#fff;box-shadow:0 7px 0 #B71C6B,0 10px 24px rgba(255,60,172,.45);text-shadow:1px 2px 0 rgba(0,0,0,.25)}
.btn-try:hover{box-shadow:0 10px 0 #B71C6B,0 16px 32px rgba(255,60,172,.5)}
.btn-next{background:linear-gradient(135deg,#20BF6B,#00C9FF);color:#fff;display:none;box-shadow:0 7px 0 #0E8A4A,0 10px 24px rgba(32,191,107,.45);text-shadow:1px 2px 0 rgba(0,0,0,.25)}
.btn-next:hover{box-shadow:0 10px 0 #0E8A4A,0 16px 32px rgba(32,191,107,.5)}
.win-box{display:none;background:linear-gradient(135deg,#FFF9C4,#FFE57F,#FFF0D6);border:4px solid #FFD600;border-radius:28px;padding:28px;text-align:center;margin:18px auto 0;max-width:580px;position:relative;z-index:20;box-shadow:0 12px 0 #C9A800,0 18px 50px rgba(255,214,0,.5);animation:winEntry .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes winEntry{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1);opacity:1}}
.win-box::before{content:'🏆';position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.win-box h2{font-family:'Fredoka One',cursive;background:linear-gradient(135deg,#FF3CAC,#FF9F1C,#8854D0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:30px;margin-top:10px}
.win-box p{color:#5D4037;margin-top:8px;font-size:15px;font-weight:800}
.cp{position:fixed;pointer-events:none;z-index:200;animation:cffall linear forwards}
@keyframes cffall{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(700deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.shake{animation:shake .4s}
.pop{animation:pop .38s}

body{
  min-height:unset !important;
  padding:6px 10px 60px !important;
}

</style>

<body>

<canvas id="bgCanvas"></canvas>
<div class="sand"></div>
<div class="brand">⭐ Planrs</div>

<h1>🛡️ Cyber Terms Match!</h1>
<p class="subtitle">Section 1 — What is Cybersecurity? | Activity 1 of 2</p>

<div class="score-bar">
  Score: <em id="sn">0</em> / 6 &nbsp;|&nbsp; ✅ <em id="cn">0</em> &nbsp;|&nbsp; ❌ <em id="wn">0</em>
</div>

<div class="instr">
  📌 <strong>How to play:</strong> Drag each TERM card on the left and drop it onto the matching DEFINITION on the right. Match all 6 to win! 🎉
</div>

<div class="game">
  <div class="col">
    <div class="col-hd terms-hd">🔤 TERMS — Drag Me!</div>
    <div id="TC"></div>
  </div>
  <div class="col">
    <div class="col-hd defs-hd">📖 DEFINITIONS — Drop Here!</div>
    <div id="DC"></div>
  </div>
</div>

<div class="feedback" id="fb"></div>

<div class="btns">
  <button class="btn btn-try" onclick="resetGame()">🔄 Try Again</button>
  <button class="btn btn-next" id="nxtBtn">➡️ Next Section</button>
</div>

<div class="win-box" id="wb">
  <h2 id="wm"></h2><p id="ws"></p>
</div>

<script>
const data=[
  {term:"Cybersecurity",def:"The practice of protecting computers, networks, and data from digital attacks and unauthorized access."},
  {term:"Virus",def:"A harmful program that copies itself and damages your device — just like a real flu spreads to make you sick!"},
  {term:"Hacking",def:"When someone breaks into your account or device without your permission."},
  {term:"Phishing",def:"Fake emails or messages that trick you into revealing your password or personal information."},
  {term:"Cyberbullying",def:"Using technology (messages, photos, comments) to hurt, embarrass, or threaten another person."},
  {term:"Firewall",def:"A digital security barrier that monitors and controls what traffic enters or leaves your network."},
];

function makeStar(cfg){const{id,body,mid,dark,spot,cx,cy}={cx:90,cy:90,...cfg};const ro=70,ri=30,n=5;const pts=[];for(let i=0;i<10;i++){const a=(Math.PI*2*i/10)-(Math.PI/2);const r=i%2===0?ro:ri;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}function lerp(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]}let d=`M${f(pts[0][0])},${f(pts[0][1])}`;for(let i=0;i<pts.length;i++){const p=pts[i];const nxt=pts[(i+1)%pts.length];const nxt2=pts[(i+2)%pts.length];const c1=lerp(p,nxt,.62);const c2=lerp(nxt2,nxt,.62);d+=` C${f(c1[0])},${f(c1[1])} ${f(c2[0])},${f(c2[1])} ${f(nxt[0])},${f(nxt[1])}`}d+='Z';let dots='';for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)-(Math.PI/2);[.38,.62,.82].forEach((t,j)=>{const r=ri+(ro-ri)*t;const x=f(cx+r*Math.cos(a)),y=f(cy+r*Math.sin(a));const r2=2.4-j*.5;dots+=`<circle cx="${x}" cy="${y}" r="${r2}" fill="${spot}" opacity="0.5"/><circle cx="${x-1}" cy="${y-1}" r="${r2*.4}" fill="rgba(255,255,255,.5)"/>`})}let ridges='';for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)-(Math.PI/2);const x1=f(cx+ri*.9*Math.cos(a)),y1=f(cy+ri*.9*Math.sin(a));const x2=f(cx+ro*.9*Math.cos(a)),y2=f(cy+ro*.9*Math.sin(a));ridges+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${dark}" stroke-width="1" opacity=".18"/>`}return`<defs><radialGradient id="rg${id}" cx="38%" cy="32%" r="68%"><stop offset="0%" stop-color="${mid}"/><stop offset="55%" stop-color="${body}"/><stop offset="100%" stop-color="${dark}"/></radialGradient><radialGradient id="sh${id}" cx="36%" cy="30%" r="42%"><stop offset="0%" stop-color="rgba(255,255,255,.6)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs><path d="${d}" fill="url(#rg${id})" stroke="${dark}" stroke-width="1.8" stroke-linejoin="round"/><path d="${d}" fill="url(#sh${id})"/>${ridges}${dots}<circle cx="83" cy="85" r="5.5" fill="white" opacity=".95"/><circle cx="97" cy="85" r="5.5" fill="white" opacity=".95"/><circle cx="84.2" cy="85.2" r="3" fill="#2C2C2A"/><circle cx="98.2" cy="85.2" r="3" fill="#2C2C2A"/><circle cx="85.4" cy="83.6" r="1.3" fill="white"/><circle cx="99.4" cy="83.6" r="1.3" fill="white"/><path d="M83.5,93 Q90,101 96.5,93" stroke="#2C2C2A" stroke-width="2.2" fill="none" stroke-linecap="round"/><ellipse cx="77" cy="91" rx="5.5" ry="3.5" fill="${mid}" opacity=".55"/><ellipse cx="103" cy="91" rx="5.5" ry="3.5" fill="${mid}" opacity=".55"/>`}
function f(n){return n.toFixed(1)}

const starCfg=[{id:'A',body:'#E84040',mid:'#FF9090',dark:'#A02020',spot:'#FFC0C0'},{id:'B',body:'#E87020',mid:'#FFB060',dark:'#A04010',spot:'#FFE0A0'},{id:'C',body:'#C8A000',mid:'#FFD93D',dark:'#806000',spot:'#FFF0A0'},{id:'D',body:'#20A060',mid:'#70D0A0',dark:'#106040',spot:'#B0FFD8'},{id:'E',body:'#2060CC',mid:'#70A8FF',dark:'#103090',spot:'#C0D8FF'},{id:'F',body:'#9030C0',mid:'#D080FF',dark:'#601090',spot:'#EAC0FF'},{id:'G',body:'#CC3080',mid:'#FF90C0',dark:'#801040',spot:'#FFD0E8'},{id:'H',body:'#10A0C0',mid:'#60D8F0',dark:'#106080',spot:'#B0F0FF'}];
const sfPos=[[3,12,92,'sfA',4.2,0],[84,7,80,'sfB',5.1,.8],[73,57,70,'sfC',3.8,1.5],[5,53,84,'sfD',4.6,.3],[46,2,64,'sfA',5.8,2.0],[91,30,76,'sfB',4.0,1.1],[17,79,72,'sfC',4.9,.5],[61,76,60,'sfD',3.5,2.4]];

function buildBg(){
  document.querySelectorAll('.sf,.bubble,.weed,.fish').forEach(e=>e.remove());
  sfPos.forEach(([l,t,sz,anim,dur,del],i)=>{const el=document.createElement('div');el.className='sf';el.style.cssText=`left:${l}%;top:${t}%;width:${sz}px;height:${sz}px;animation:${anim} ${dur}s ease-in-out ${del}s infinite`;el.innerHTML=`<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" style="overflow:visible">${makeStar(starCfg[i])}</svg>`;document.body.appendChild(el)});
  for(let i=0;i<20;i++){const b=document.createElement('div');b.className='bubble';const s=7+Math.random()*24;b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${Math.random()*15}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*9}s`;document.body.appendChild(b)}
  [5,14,86,95].forEach((x,i)=>{const w=document.createElement('div');w.className='weed';w.style.cssText=`left:${x}%;animation-duration:${2.2+i*.5}s;animation-delay:${i*.4}s`;w.innerHTML=`<svg width="20" height="75" viewBox="0 0 20 75" xmlns="http://www.w3.org/2000/svg"><path d="M10,75 C10,75 3,60 10,47 C17,34 3,20 10,5" stroke="#2ECC71" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M10,55 C10,55 0,47 2,40" stroke="#58D68D" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M10,32 C10,32 20,24 18,17" stroke="#58D68D" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`;document.body.appendChild(w)});
  spawnFish();
}
const fishCols=['#FF6B6B','#FFD93D','#4ECDC4','#C77DFF','#FF85A1','#FF9F1C'];
function spawnFish(){const f=document.createElement('div');f.className='fish';const c=fishCols[Math.floor(Math.random()*fishCols.length)];const sz=28+Math.random()*26;const top=8+Math.random()*52;const dur=11+Math.random()*11;f.style.cssText=`top:${top}%;animation-duration:${dur}s;animation-delay:${Math.random()*5}s;`;f.innerHTML=`<svg width="${sz*1.7}" height="${sz}" viewBox="0 0 50 30" xmlns="http://www.w3.org/2000/svg"><ellipse cx="22" cy="15" rx="18" ry="10" fill="${c}" opacity=".9"/><polygon points="40,15 50,6 50,24" fill="${c}" opacity=".82"/><ellipse cx="18" cy="13" rx="6" ry="5" fill="rgba(255,255,255,.18)"/><circle cx="10" cy="12" r="3.5" fill="white"/><circle cx="9" cy="11" r="2" fill="#222"/><circle cx="9.8" cy="10.2" r=".8" fill="#fff"/><path d="M18,10 Q29,8 37,10" stroke="rgba(255,255,255,.35)" stroke-width="1.5" fill="none"/></svg>`;f.addEventListener('animationend',()=>{f.remove();setTimeout(spawnFish,800+Math.random()*2500)});document.body.appendChild(f)}

let score=0,correct=0,wrong=0,dragging=null;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function buildGame(){
  const tc=document.getElementById('TC'),dc=document.getElementById('DC');
  tc.innerHTML='';dc.innerHTML='';
  const badges=['⭐','🌟','💫','✨','🎯','🚀'];
  shuffle(data).forEach((d,i)=>{const el=document.createElement('div');el.className='term-card';el.draggable=true;el.dataset.term=d.term;el.innerHTML=`<span class="badge">${badges[i%badges.length]}</span>${d.term}`;el.addEventListener('dragstart',()=>{dragging=d.term;el.classList.add('dragging')});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('touchstart',()=>{dragging=d.term},{passive:true});tc.appendChild(el)});
  shuffle(data).forEach(d=>{const s=document.createElement('div');s.className='def-slot';s.dataset.answer=d.term;s.innerHTML=`<div class="dt">${d.def}</div>`;s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('over')});s.addEventListener('dragleave',()=>s.classList.remove('over'));s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('over');drop(s,dragging)});dc.appendChild(s)});
}

function drop(slot,term){
  if(!term||slot.dataset.matched)return;
  if(slot.dataset.answer===term){slot.classList.add('correct','pop');slot.dataset.matched='true';slot.innerHTML+=`<div class="dm">✅ ${term}</div>`;document.querySelectorAll('.term-card').forEach(c=>{if(c.dataset.term===term)c.remove()});correct++;score++;feedback(['Amazing! 🎉','You are a star! ⭐','Brilliant! 🔥','Keep going! 💪','Nailed it! 🌊'][Math.floor(Math.random()*5)],'#27AE60');checkWin()}
  else{slot.classList.add('wrong','shake');wrong++;feedback('Not quite — try again! 🤔','#E74C3C');setTimeout(()=>slot.classList.remove('wrong','shake'),500)}
  document.getElementById('sn').textContent=score;document.getElementById('cn').textContent=correct;document.getElementById('wn').textContent=wrong;
}

function feedback(msg,col){const f=document.getElementById('fb');f.textContent=msg;f.style.color=col;clearTimeout(f._t);f._t=setTimeout(()=>f.textContent='',2200)}

function checkWin(){
  if(correct<data.length)return;
  confetti();
  setTimeout(()=>{document.getElementById('wb').style.display='block';document.getElementById('nxtBtn').style.display='inline-block';const msgs=['Cyber Champion! 🏆','Outstanding! 🌟','Perfect Score! ⭐'];document.getElementById('wm').textContent=msgs[Math.floor(Math.random()*msgs.length)];document.getElementById('ws').textContent=`You matched all 6! Score: ${score} | Wrong: ${wrong}. Ready for Section 2! 🚀`},350);
}

function confetti(){const cols=['#FF6B6B','#FFD93D','#4ECDC4','#C77DFF','#FF85A1','#80FFDB','#FF9F1C'];for(let i=0;i<80;i++){const el=document.createElement('div');el.className='cp';const s=8+Math.random()*10;el.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'4px'};animation-duration:${1.4+Math.random()*2.4}s;animation-delay:${Math.random()*.8}s`;document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove())}}

function resetGame(){score=0;correct=0;wrong=0;dragging=null;document.getElementById('sn').textContent=0;document.getElementById('cn').textContent=0;document.getElementById('wn').textContent=0;document.getElementById('fb').textContent='';document.getElementById('wb').style.display='none';document.getElementById('nxtBtn').style.display='none';buildGame()}

buildBg();buildGame();

(function(){const cv=document.getElementById('bgCanvas');const ctx=cv.getContext('2d');let W,H;function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}window.addEventListener('resize',resize);resize();const schemes=[['#FF6B9D','#FF9F1C','#C77DFF','#4CC9F0','#FF85A1'],['#48CAE4','#00B4D8','#0077B6','#023E8A','#4ECDC4'],['#FF6B6B','#FFD93D','#FF9F1C','#C77DFF','#FF85A1'],['#7B2FBE','#C77DFF','#4CC9F0','#48CAE4','#80FFDB'],['#06D6A0','#1B9AAA','#EF476F','#FFD166','#4ECDC4'],['#FF595E','#FFCA3A','#6A4C93','#1982C4','#8AC926'],['#F72585','#7209B7','#3A0CA3','#4361EE','#4CC9F0'],['#FF9F1C','#FFBF69','#CBF3F0','#2EC4B6','#FF6B6B']];const blobs=[];function makeBlob(i,scheme){return{x:Math.random()*W,y:Math.random()*H,r:Math.min(W,H)*(0.38+Math.random()*.28),color:scheme[i%scheme.length],vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,pulse:Math.random()*Math.PI*2,pulseSpeed:.008+Math.random()*.012,opacity:.55+Math.random()*.25}}let schemeIdx=0,nextIdx=1,blendT=0,holdCount=0,transitioning=false;for(let i=0;i<5;i++)blobs.push(makeBlob(i,schemes[0]));let targetColors=schemes[0].map(c=>hexToRgb(c));let currentColors=targetColors.map(c=>({...c}));function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}function toRgba(c,a){return`rgba(${c.r},${c.g},${c.b},${a})`}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#020818';ctx.fillRect(0,0,W,H);holdCount++;if(!transitioning&&holdCount>260){transitioning=true;holdCount=0;nextIdx=(schemeIdx+1)%schemes.length;targetColors=schemes[nextIdx].map(c=>hexToRgb(c));blendT=0}if(transitioning){blendT+=.003;if(blendT>=1){blendT=1;transitioning=false;schemeIdx=nextIdx;currentColors=targetColors.map(c=>({...c}))}}blobs.forEach((b,i)=>{const tc=targetColors[i%targetColors.length];const cc=currentColors[i%currentColors.length];cc.r+=(tc.r-cc.r)*.012;cc.g+=(tc.g-cc.g)*.012;cc.b+=(tc.b-cc.b)*.012;b.color=`rgb(${Math.round(cc.r)},${Math.round(cc.g)},${Math.round(cc.b)})`;b.x+=b.vx;b.y+=b.vy;b.pulse+=b.pulseSpeed;const pr=b.r*(1+Math.sin(b.pulse)*.12);if(b.x<-pr)b.x=W+pr;if(b.x>W+pr)b.x=-pr;if(b.y<-pr)b.y=H+pr;if(b.y>H+pr)b.y=-pr;const m=b.color.match(/\d+/g)||[150,150,150];const rc={r:+m[0],g:+m[1],b:+m[2]};const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,pr);grd.addColorStop(0,toRgba(rc,b.opacity));grd.addColorStop(.5,toRgba(rc,b.opacity*.5));grd.addColorStop(1,toRgba(rc,0));ctx.beginPath();ctx.arc(b.x,b.y,pr,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill()});const shimmer=ctx.createLinearGradient(0,0,W,H);shimmer.addColorStop(0,'rgba(255,255,255,.03)');shimmer.addColorStop(.5,'rgba(255,255,255,.07)');shimmer.addColorStop(1,'rgba(255,255,255,.03)');ctx.fillStyle=shimmer;ctx.fillRect(0,0,W,H);requestAnimationFrame(draw)}draw()})();
</script>
