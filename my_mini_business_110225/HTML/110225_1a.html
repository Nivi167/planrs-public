<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 1 — What Is the Internet? | Drag & Drop Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1A6BB5;
    --accent: #E07020;
    --green: #27AE60;
    --red: #E74C3C;
    --bg: #0D1B3E;
    --panel: rgba(255,255,255,0.07);
    --panel-border: rgba(255,255,255,0.15);
    --text: #EEF4FF;
    --muted: rgba(238,244,255,0.55);
    --card-bg: rgba(30,80,160,0.35);
    --card-border: rgba(100,180,255,0.35);
    --drop-bg: rgba(255,255,255,0.05);
    --correct-bg: rgba(39,174,96,0.25);
    --correct-border: #27AE60;
    --wrong-bg: rgba(231,76,60,0.25);
    --wrong-border: #E74C3C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 16px 16px 60px;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── ANIMATED BACKGROUND ─── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Radial glow blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: blobDrift linear infinite;
  }
  .blob-1 { width: 500px; height: 500px; background: #1A6BB5; top: -100px; left: -100px; animation-duration: 22s; animation-delay: 0s; }
  .blob-2 { width: 420px; height: 420px; background: #E07020; bottom: -80px; right: -80px; animation-duration: 18s; animation-delay: -6s; }
  .blob-3 { width: 320px; height: 320px; background: #27AE60; top: 40%; left: 50%; animation-duration: 25s; animation-delay: -10s; }

  @keyframes blobDrift {
    0%   { transform: translate(0,0) scale(1); }
    25%  { transform: translate(60px, 40px) scale(1.05); }
    50%  { transform: translate(30px, -50px) scale(0.95); }
    75%  { transform: translate(-40px, 20px) scale(1.08); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* Grid dot network */
  .grid-layer {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(100,180,255,0.25) 1px, transparent 1px);
    background-size: 38px 38px;
    animation: gridPan 40s linear infinite;
  }
  @keyframes gridPan {
    from { background-position: 0 0; }
    to   { background-position: 76px 76px; }
  }

  /* Floating data packets */
  .packet {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: rgba(100,200,255,0.5);
    box-shadow: 0 0 8px rgba(100,200,255,0.7);
    animation: packetFloat linear infinite;
  }
  @keyframes packetFloat {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Connection lines SVG layer */
  .lines-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ─── MAIN CONTENT ─── */
  .content { position: relative; z-index: 1; }

  .planrs-logo {
    position: fixed; top: 14px; right: 18px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    color: #fff;
    background: rgba(26,107,181,0.7);
    backdrop-filter: blur(10px);
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--card-border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
    animation: fadeDown 0.6s ease;
  }

  h1 {
    text-align: center;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    margin: 50px 0 6px;
    animation: fadeDown 0.6s ease 0.1s both;
    text-shadow: 0 0 40px rgba(100,180,255,0.5);
  }

  .subtitle {
    text-align: center;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    animation: fadeDown 0.6s ease 0.15s both;
  }

  .score-bar {
    display: flex; justify-content: center; align-items: center; gap: 28px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--panel-border);
    border-radius: 20px; padding: 14px 28px;
    max-width: 380px; margin: 0 auto 22px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    animation: fadeDown 0.6s ease 0.2s both;
  }
  .score-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  .score-val { font-size: 26px; font-weight: 900; color: var(--accent); text-shadow: 0 0 16px rgba(224,112,32,0.5); font-family: 'Space Mono', monospace; transition: transform 0.2s; }
  .score-val.pop { animation: scorePop 0.35s ease; }
  @keyframes scorePop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

  .instruction {
    background: rgba(255,235,150,0.1);
    border-left: 3px solid #F5C518;
    border-radius: 12px; padding: 12px 18px;
    max-width: 700px; margin: 0 auto 24px;
    font-size: 14px; color: rgba(255,235,150,0.9);
    backdrop-filter: blur(8px);
    animation: fadeDown 0.6s ease 0.25s both;
  }

  .game-area {
    max-width: 860px; margin: 0 auto;
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .terms-panel, .defs-panel {
    flex: 1; min-width: 270px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--panel-border);
    border-radius: 20px; padding: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  .terms-panel h3, .defs-panel h3 {
    font-size: 13px; font-family: 'Space Mono', monospace;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 14px; text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--panel-border);
  }
  .terms-panel h3 { color: #7EC8FF; }
  .defs-panel h3  { color: #FFB86C; }

  /* ─── TERM CARDS ─── */
  .term-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 12px;
    padding: 11px 16px;
    margin-bottom: 10px;
    cursor: grab;
    font-size: 14px; font-weight: 800;
    color: #C8E8FF;
    text-align: center;
    transition: transform 0.18s, box-shadow 0.18s, background 0.2s, border-color 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.4s ease both;
  }
  .term-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .term-card:hover:not(.matched) {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 28px rgba(26,107,181,0.5);
    border-color: rgba(100,200,255,0.7);
    background: rgba(30,100,190,0.5);
  }
  .term-card:active { cursor: grabbing; transform: scale(1.05); }
  .term-card.dragging {
    opacity: 0.35;
    transform: scale(1.08);
    box-shadow: 0 12px 36px rgba(26,107,181,0.6);
  }
  .term-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(224,112,32,0.4), 0 6px 20px rgba(224,112,32,0.3);
    background: rgba(224,112,32,0.15);
    animation: selectedPulse 1.5s ease infinite;
  }
  @keyframes selectedPulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(224,112,32,0.4), 0 6px 20px rgba(224,112,32,0.3); }
    50%       { box-shadow: 0 0 0 6px rgba(224,112,32,0.2), 0 6px 28px rgba(224,112,32,0.5); }
  }
  .term-card.matched {
    background: rgba(39,174,96,0.18);
    border-color: rgba(39,174,96,0.5);
    color: rgba(39,174,96,0.7);
    cursor: default;
    transform: none;
    filter: none;
  }
  .term-card.matched::before {
    content: '✓';
    margin-right: 6px;
    color: var(--green);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ─── DROP ZONES ─── */
  .def-row { display: flex; align-items: center; gap: 12px; margin-bottom: 13px; animation: rowIn 0.4s ease both; }

  .drop-zone {
    flex: 0 0 110px;
    min-height: 48px;
    border: 2px dashed rgba(100,160,255,0.35);
    border-radius: 12px;
    background: var(--drop-bg);
    display: flex; align-items: center; justify-content: center;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 800;
    color: rgba(255,255,255,0.25);
    text-align: center;
    transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .drop-zone.over {
    background: rgba(26,107,181,0.2);
    border-color: #7EC8FF;
    border-style: solid;
    transform: scale(1.04);
    box-shadow: 0 0 20px rgba(100,180,255,0.3);
  }
  .drop-zone.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    border-style: solid;
    color: #7DECA0;
    font-size: 11px;
    font-weight: 800;
    animation: correctPop 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }
  .drop-zone.correct::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(39,174,96,0.3) 0%, transparent 70%);
    animation: correctGlow 0.6s ease forwards;
  }
  @keyframes correctGlow {
    0%   { transform: scale(0); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }
  .drop-zone.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    border-style: solid;
    animation: shake 0.45s ease;
  }

  .def-text {
    flex: 1;
    font-size: 13px;
    color: rgba(238,244,255,0.8);
    line-height: 1.5;
  }

  @keyframes correctPop {
    0%   { transform: scale(0.8); }
    60%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-7px); }
    40%,80% { transform: translateX(7px); }
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ─── FEEDBACK ─── */
  .feedback-msg {
    text-align: center;
    font-size: 18px; font-weight: 900;
    margin: 18px 0;
    min-height: 28px;
    color: var(--green);
    text-shadow: 0 0 20px currentColor;
    transition: opacity 0.3s;
    animation: none;
  }
  .feedback-msg.show { animation: feedbackIn 0.3s ease; }
  @keyframes feedbackIn {
    from { transform: scale(0.7) translateY(10px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ─── BUTTONS ─── */
  .btn-row { display: flex; justify-content: center; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .btn {
    padding: 13px 30px;
    border: none; border-radius: 28px;
    font-size: 14px; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative; overflow: hidden;
    letter-spacing: 0.3px;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn:hover { transform: translateY(-3px) scale(1.04); }
  .btn:active { transform: scale(0.97); }
  .btn-retry {
    background: linear-gradient(135deg, #E07020, #D45A00);
    color: #fff;
    box-shadow: 0 6px 20px rgba(224,112,32,0.4);
  }
  .btn-retry:hover { box-shadow: 0 10px 30px rgba(224,112,32,0.6); }
  .btn-next {
    background: linear-gradient(135deg, #27AE60, #1E8449);
    color: #fff;
    box-shadow: 0 6px 20px rgba(39,174,96,0.4);
  }
  .btn-next:hover { box-shadow: 0 10px 30px rgba(39,174,96,0.6); }

  /* ─── RESULT PANEL ─── */
  .result-panel {
    display: none; text-align: center;
    background: var(--panel);
    backdrop-filter: blur(30px);
    border: 1px solid var(--panel-border);
    border-radius: 28px; padding: 40px;
    max-width: 480px; margin: 24px auto;
    box-shadow: 0 12px 60px rgba(0,0,0,0.4);
  }
  .result-panel.show { display: block; animation: resultIn 0.6s cubic-bezier(.16,1,.3,1); }
  @keyframes resultIn {
    from { transform: translateY(40px) scale(0.9); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .result-emoji { font-size: 64px; margin-bottom: 14px; animation: spin 0.8s cubic-bezier(.36,.07,.19,.97); }
  @keyframes spin { from { transform: rotate(-20deg) scale(0); } to { transform: rotate(0) scale(1); } }
  .result-title { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 10px; }
  .result-sub { font-size: 15px; color: var(--muted); line-height: 1.6; }

  /* ─── CONFETTI ─── */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ─── FLYING CARD ANIMATION ─── */
  .flying-card {
    position: fixed;
    z-index: 500;
    pointer-events: none;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 800;
    background: rgba(39,174,96,0.6);
    border: 2px solid var(--green);
    border-radius: 10px;
    padding: 8px 14px;
    color: #fff;
    white-space: nowrap;
    animation: flyToDrop 0.5s cubic-bezier(.36,.07,.19,.97) forwards;
  }
  @keyframes flyToDrop {
    0%   { transform: scale(1.1); opacity: 1; }
    80%  { transform: scale(0.9); opacity: 0.9; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* ─── UTILITIES ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Stagger def rows */
  .def-row:nth-child(1) { animation-delay: 0.05s; }
  .def-row:nth-child(2) { animation-delay: 0.10s; }
  .def-row:nth-child(3) { animation-delay: 0.15s; }
  .def-row:nth-child(4) { animation-delay: 0.20s; }
  .def-row:nth-child(5) { animation-delay: 0.25s; }
  .def-row:nth-child(6) { animation-delay: 0.30s; }
  .def-row:nth-child(7) { animation-delay: 0.35s; }
  .def-row:nth-child(8) { animation-delay: 0.40s; }

  .term-card:nth-child(1) { animation-delay: 0.05s; }
  .term-card:nth-child(2) { animation-delay: 0.10s; }
  .term-card:nth-child(3) { animation-delay: 0.15s; }
  .term-card:nth-child(4) { animation-delay: 0.20s; }
  .term-card:nth-child(5) { animation-delay: 0.25s; }
  .term-card:nth-child(6) { animation-delay: 0.30s; }
  .term-card:nth-child(7) { animation-delay: 0.35s; }
  .term-card:nth-child(8) { animation-delay: 0.40s; }

  /* progress bar */
  .progress-track {
    max-width: 700px; margin: 0 auto 18px;
    height: 6px; border-radius: 6px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
    animation: fadeDown 0.6s ease 0.22s both;
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #1A6BB5, #27AE60);
    transition: width 0.5s cubic-bezier(.36,.07,.19,.97);
    width: 0%;
    box-shadow: 0 0 10px rgba(39,174,96,0.6);
  }
</style>
</head>
<body>

<!-- ─── ANIMATED BACKGROUND ─── -->
<div class="bg-canvas">
  <div class="grid-layer"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <svg class="lines-layer" id="linesSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="content">
  <div class="planrs-logo">⭐ Planrs</div>
  <h1>🌐 What Is the Internet?</h1>
  <p class="subtitle">Section 1 Activity — Drag &amp; Drop</p>

  <div class="score-bar">
    <div><div class="score-label">Score</div><div class="score-val" id="scoreDisplay">0 / 80</div></div>
    <div style="width:1px;height:32px;background:var(--panel-border)"></div>
    <div><div class="score-label">Matched</div><div class="score-val" id="matchedDisplay">0 / 8</div></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="instruction">👆 <strong>Drag</strong> each Internet term from the left and <strong>drop</strong> it onto the correct definition on the right. On mobile? <strong>Tap</strong> a term, then tap the drop zone!</div>

  <div class="game-area">
    <div class="terms-panel">
      <h3>📦 Internet Terms</h3>
      <div id="termsContainer"></div>
    </div>
    <div class="defs-panel">
      <h3>📖 Definitions</h3>
      <div id="defsContainer"></div>
    </div>
  </div>

  <div class="feedback-msg" id="feedbackMsg"></div>
  <div class="btn-row">
    <button class="btn btn-retry" onclick="resetGame()">🔄 Try Again</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row" style="margin-top:24px">
      <button class="btn btn-retry" onclick="resetGame()">🔄 Play Again</button>
      <button class="btn btn-next" onclick="alert('Great job! Open the next section activity to continue!')">➡️ Next Section</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const pairs = [
  { term: "Internet",    def: "A giant global network connecting millions of computers and devices worldwide" },
  { term: "Data Packet", def: "A small piece of information that travels through the network to reach its destination" },
  { term: "WiFi",        def: "A wireless connection to the Internet through a router at home, school, or café" },
  { term: "Router",      def: "A device that shares Internet connection to multiple devices in a home or office" },
  { term: "Bandwidth",   def: "The amount of data that can be sent over an Internet connection — like road width for traffic" },
  { term: "4G / 5G",     def: "Mobile Internet speed standards using your SIM card — used by Jio, Airtel, Vi" },
  { term: "Server",      def: "A powerful computer that stores websites and sends them to your device when you visit" },
  { term: "Browser",     def: "An app used to visit websites — like Chrome, Firefox, or Safari" },
];

let score = 0, matched = 0, selectedTerm = null, selectedCard = null;

// ─── BACKGROUND ANIMATION ───────────────────────────────
function spawnPackets() {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'packet';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 14) + 's';
    p.style.animationDelay    = (Math.random() * 15) + 's';
    p.style.width  = p.style.height = (5 + Math.random() * 8) + 'px';
    const hue = [210, 200, 190, 160][Math.floor(Math.random()*4)];
    p.style.background = `hsla(${hue},90%,70%,0.6)`;
    p.style.boxShadow  = `0 0 8px hsla(${hue},90%,70%,0.8)`;
    document.querySelector('.bg-canvas').appendChild(p);
  }
}
spawnPackets();

// Animated connection lines
const svg = document.getElementById('linesSvg');
const nodes = [];
function makeNode() {
  return { x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
           vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 };
}
for (let i = 0; i < 18; i++) nodes.push(makeNode());

function animLines() {
  nodes.forEach(n => {
    n.x += n.vx; n.y += n.vy;
    if (n.x < 0 || n.x > window.innerWidth)  n.vx *= -1;
    if (n.y < 0 || n.y > window.innerHeight) n.vy *= -1;
  });
  let html = '';
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 200) {
        const op = (1 - dist/200) * 0.2;
        html += `<line x1="${nodes[i].x}" y1="${nodes[i].y}" x2="${nodes[j].x}" y2="${nodes[j].y}" stroke="rgba(100,200,255,${op})" stroke-width="1"/>`;
      }
    }
  }
  // Draw node dots
  nodes.forEach(n => {
    html += `<circle cx="${n.x}" cy="${n.y}" r="2" fill="rgba(100,200,255,0.25)"/>`;
  });
  svg.innerHTML = html;
  requestAnimationFrame(animLines);
}
animLines();

// ─── GAME LOGIC ──────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function buildGame() {
  const shuffledTerms = shuffle(pairs);
  const shuffledDefs  = shuffle(pairs);
  const tc = document.getElementById('termsContainer');
  const dc = document.getElementById('defsContainer');
  tc.innerHTML = '';
  dc.innerHTML = '';

  shuffledTerms.forEach(p => {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.id = 'term-' + safeId(p.term);
    card.textContent = p.term;
    card.draggable = true;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', p.term);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('click', () => handleTermClick(p.term, card));
    tc.appendChild(card);
  });

  shuffledDefs.forEach(p => {
    const row = document.createElement('div');
    row.className = 'def-row';
    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.id = 'dz-' + safeId(p.term);
    dz.dataset.answer = p.term;
    dz.innerHTML = '<span style="opacity:.4;font-size:11px">Drop here…</span>';
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleDrop(e.dataTransfer.getData('text/plain'), dz); });
    dz.addEventListener('click', () => handleZoneClick(dz));
    const dt = document.createElement('div');
    dt.className = 'def-text';
    dt.textContent = p.def;
    row.appendChild(dz); row.appendChild(dt);
    dc.appendChild(row);
  });
}

function safeId(s) { return s.replace(/\s/g,'_').replace(/\//g,'_'); }

function handleTermClick(termName, card) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.term-card').forEach(c => c.classList.remove('selected'));
  selectedTerm = termName;
  selectedCard = card;
  card.classList.add('selected');
}

function handleZoneClick(dz) {
  if (!selectedTerm || dz.classList.contains('correct')) return;
  handleDrop(selectedTerm, dz);
  selectedTerm = null;
  selectedCard = null;
  document.querySelectorAll('.term-card').forEach(c => c.classList.remove('selected'));
}

function handleDrop(termName, dz) {
  if (dz.classList.contains('correct')) return;
  const card = document.getElementById('term-' + safeId(termName));
  if (!card || card.classList.contains('matched')) return;

  if (dz.dataset.answer === termName) {
    // Animate a flying card from term to drop zone
    flyCard(card, dz, termName);

    setTimeout(() => {
      dz.textContent = termName;
      dz.classList.add('correct');
      card.classList.add('matched');
      card.classList.remove('selected');
      matched++;
      score += 10;
      updateScore();
      showFeedback(['Amazing! 🌟','Correct! You\'re a star! ⭐','Brilliant! 🎉','Keep going! 🚀','Perfect match! ✅'][Math.floor(Math.random()*5)], '#7DECA0');
      if (matched === pairs.length) { setTimeout(showResult, 600); }
    }, 420);
  } else {
    dz.classList.add('wrong');
    showFeedback('Oops! Try again! 🤔', '#FF7070');
    setTimeout(() => dz.classList.remove('wrong'), 500);
  }
}

function flyCard(card, dz, text) {
  const cr = card.getBoundingClientRect();
  const dr = dz.getBoundingClientRect();
  const fly = document.createElement('div');
  fly.className = 'flying-card';
  fly.textContent = text;
  fly.style.left = cr.left + 'px';
  fly.style.top  = cr.top  + 'px';
  fly.style.width = cr.width + 'px';
  document.body.appendChild(fly);

  // Animate to target position
  requestAnimationFrame(() => {
    fly.style.transition = 'left 0.45s cubic-bezier(.36,.07,.19,.97), top 0.45s cubic-bezier(.36,.07,.19,.97)';
    fly.style.left = (dr.left + dr.width/2 - cr.width/2) + 'px';
    fly.style.top  = (dr.top  + dr.height/2 - 20) + 'px';
  });
  setTimeout(() => fly.remove(), 500);
}

function updateScore() {
  const sv = document.getElementById('scoreDisplay');
  const mv = document.getElementById('matchedDisplay');
  sv.textContent = score + ' / ' + (pairs.length * 10);
  mv.textContent = matched + ' / ' + pairs.length;
  sv.classList.remove('pop');
  void sv.offsetWidth;
  sv.classList.add('pop');
  document.getElementById('progressFill').style.width = (matched / pairs.length * 100) + '%';
}

function showFeedback(msg, color) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.textContent = ''; el.classList.remove('show'); }, 2200);
}

function showResult() {
  launchConfetti();
  const p = document.getElementById('resultPanel');
  p.classList.add('show');
  document.getElementById('resultEmoji').textContent = '🏆';
  document.getElementById('resultTitle').textContent = 'Amazing Work!';
  document.getElementById('resultSub').textContent = `You matched all ${pairs.length} Internet terms correctly! You're an Internet expert now! 🌐`;
}

function launchConfetti() {
  const colors = ['#27AE60','#1A6BB5','#E07020','#F5C518','#E74C3C','#9B59B6'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top  = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.width  = (6 + Math.random()*10) + 'px';
    c.style.height = (6 + Math.random()*10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDuration = (1.5 + Math.random()*2.5) + 's';
    c.style.animationDelay = (Math.random()*0.8) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4500);
  }
}

function resetGame() {
  score = 0; matched = 0; selectedTerm = null; selectedCard = null;
  updateScore();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('resultPanel').classList.remove('show');
  buildGame();
}

buildGame();
updateScore();
</script>
