<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 4 · Your Marketing Plan – Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#FFF0F5;min-height:100vh;padding:14px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{font-size:14px;font-weight:800;color:#E84545;background:#fff;border:2.5px solid #E84545;border-radius:20px;padding:4px 12px}
.score{background:#fff;border:2.5px solid #DB2777;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:800;color:#DB2777}
h1{text-align:center;color:#DB2777;font-size:21px;margin-bottom:3px;font-weight:800}
.sub{text-align:center;color:#777;font-size:13px;margin-bottom:12px}
.prog-wrap{background:#e5e5e5;border-radius:10px;height:9px;margin-bottom:14px;overflow:hidden}
.prog{background:linear-gradient(90deg,#DB2777,#F59E0B);height:100%;width:0;transition:width .6s;border-radius:10px}
.wrap{max-width:540px;margin:0 auto}
.qnum{text-align:center;color:#aaa;font-size:13px;margin-bottom:12px}
.qcard{background:#fff;border:2.5px solid #FBCFE8;border-radius:17px;padding:18px;font-size:15.5px;font-weight:700;color:#333;text-align:center;line-height:1.5;margin-bottom:14px;box-shadow:0 2px 12px rgba(219,39,119,.08)}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.opt{background:#fff;border:2.5px solid #FBCFE8;border-radius:13px;padding:12px 16px;font-size:14px;color:#333;text-align:left;cursor:pointer;transition:all .15s;font-family:inherit}
.opt:hover:not(:disabled){background:#FDF2F8;border-color:#DB2777;transform:translateX(4px)}
.opt.ok{background:#D1FAE5;border-color:#10B981;color:#065F46;font-weight:700}
.opt.err{background:#FEE2E2;border-color:#EF4444;color:#991B1B;animation:shake .4s}
.opt:disabled{cursor:default}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.explain{background:#FDF4FF;border:2px solid #E9D5FF;border-radius:11px;padding:9px 13px;font-size:13.5px;color:#6B21A8;margin-bottom:12px;display:none;animation:fadeUp .3s}
.explain.show{display:block}
.next-btn{display:none;width:100%;padding:13px;background:#DB2777;color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px;animation:fadeUp .3s}
.next-btn.show{display:block}
.result{display:none;background:#fff;border:3px solid #FBCFE8;border-radius:20px;padding:26px 18px;text-align:center;animation:fadeUp .5s}
.result.show{display:block}
.re{font-size:50px;margin-bottom:10px}
.rt{font-size:21px;font-weight:800;color:#DB2777;margin-bottom:6px}
.rs{font-size:36px;font-weight:900;color:#333;margin-bottom:8px}
.rm{font-size:14px;color:#555;line-height:1.6;margin-bottom:18px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.br{padding:11px 26px;border:none;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;background:#E84545;color:#fff}
.bp{padding:11px 26px;border:none;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;background:#DB2777;color:#fff}
</style>
</head>
<body>
<header><div class="logo">⭐ Planrs</div><div class="score" id="sc">Score: 0 / 8</div></header>
<h1>🗺️ Your Marketing Plan</h1>
<p class="sub">Section 4 · Final Quiz · 8 Questions · Grades 5–8</p>
<div class="prog-wrap"><div class="prog" id="prog"></div></div>
<div class="wrap">
  <div id="quiz">
    <div class="qnum" id="qnum">Question 1 of 8</div>
    <div class="qcard" id="qtxt"></div>
    <div class="opts" id="opts"></div>
    <div class="explain" id="exp"></div>
    <button class="next-btn" id="nxt" onclick="next()">Next Question ➡️</button>
  </div>
  <div class="result" id="res">
    <div class="re" id="re"></div>
    <div class="rt" id="rt"></div>
    <div class="rs" id="rs"></div>
    <div class="rm" id="rm"></div>
    <div class="btns">
      <button class="br" onclick="restart()">🔄 Try Again</button>
      <button class="bp" onclick="finish()">🏁 Finish Lesson</button>
    </div>
  </div>
</div>
<script>
const QS=[
  {q:"Priya wants to sell handmade bookmarks at a school fair. What should she do FIRST before making her marketing plan?",
   opts:["Print 100 colourful posters immediately","Identify her target customers and their needs","Buy lots of craft supplies","Open an Instagram account"],
   ans:1, exp:"✅ Always start by identifying WHO your customer is. Priya might sell to students, teachers, or book lovers!"},
  {q:"Rohan's chai stall sells tea for Rs. 5 a cup. A rival stall nearby starts selling chai for Rs. 3. What is the SMARTEST response?",
   opts:["Close his stall permanently","Match the Rs. 3 price and add extra value like a free biscuit","Raise his price to Rs. 10","Ignore the competition entirely"],
   ans:1, exp:"✅ Smart! Adding value makes customers choose you even if you are not the cheapest. This is the competitive pricing strategy!"},
  {q:"Which of these is a form of PROMOTION for a home-cooked tiffin delivery service?",
   opts:["Using fresh organic vegetables","Keeping the tiffin price at Rs. 80","Delivering near the office building","Creating a colourful WhatsApp broadcast message"],
   ans:3, exp:"✅ Promotion means spreading the word! A WhatsApp broadcast lets you reach hundreds of potential customers instantly and for free!"},
  {q:"Meena surveys 20 classmates and finds they want more colourful bangles. She then redesigns her product. This is an example of:",
   opts:["Product research using customer feedback","Price research","Wasting time and effort","Place strategy"],
   ans:0, exp:"✅ Asking customers what they want for your product and using that information is called product research. Well done Meena!"},
  {q:"A complete marketing plan must include which famous set of four elements?",
   opts:["Price, Profit, People, Pizza","Product, Price, Place, Promotion","Poster, Post, Pay, People","Buy, Sell, Trade, Earn"],
   ans:1, exp:"✅ The famous 4 Ps — Product, Price, Place, and Promotion — are the foundation of every effective marketing plan!"},
  {q:"Aarav teaches cricket coaching. He puts up banners ONLY inside a shopping mall. Why is this a weak marketing strategy?",
   opts:["Banners inside malls are too expensive","His target customers (young cricketers) likely do not visit that mall frequently","Malls do not allow banners","Banners are completely old-fashioned"],
   ans:1, exp:"✅ Correct! PLACE matters enormously. You should promote where your customers actually spend their time — near schools, parks, or sports grounds!"},
  {q:"Sunita reviews her marketing plan after two weeks. Her poster worked very well but her price was too high. What should she do?",
   opts:["Quit the business immediately","Keep everything exactly the same","Lower the price and continue using posters","Remove all the posters too"],
   ans:2, exp:"✅ Great entrepreneurs review results and adjust! Keep what works, fix what does not. That is the marketing improvement cycle in action!"},
  {q:"A SMART marketing goal should be Specific, Measurable, Achievable, Relevant, and Time-bound. Which example below IS a SMART goal?",
   opts:["I want to sell a lot of things","I want to be famous","Sell 15 handmade soap bars at the school fest on 22nd March","I want lots of customers someday"],
   ans:2, exp:"✅ Perfect! A SMART goal is specific (15 bars), measurable (you can count), achievable, relevant (school fest), and time-bound (22nd March). That is real planning!"},
];
let cur=0,score=0,ans=false;
function build(){
  ans=false;
  const q=QS[cur];
  document.getElementById('qnum').textContent=`Question ${cur+1} of ${QS.length}`;
  document.getElementById('qtxt').textContent=q.q;
  document.getElementById('prog').style.width=(cur/QS.length*100)+'%';
  document.getElementById('exp').className='explain';
  document.getElementById('nxt').className='next-btn';
  const opts=document.getElementById('opts'); opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt';
    b.textContent=['A','B','C','D'][i]+'. '+o;
    b.onclick=()=>pick(i,b);
    opts.appendChild(b);
  });
}
function pick(idx,btn){
  if(ans)return; ans=true;
  const q=QS[cur];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(idx===q.ans){btn.classList.add('ok');score++;document.getElementById('sc').textContent=`Score: ${score} / 8`}
  else{btn.classList.add('err');document.querySelectorAll('.opt')[q.ans].classList.add('ok')}
  document.getElementById('exp').textContent=q.exp;
  document.getElementById('exp').className='explain show';
  const nb=document.getElementById('nxt');
  nb.textContent=cur<QS.length-1?'Next Question ➡️':'See My Results 🏆';
  nb.className='next-btn show';
}
function next(){cur++;cur<QS.length?build():showRes()}
function showRes(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('quiz').style.display='none';
  const rc=document.getElementById('res'); rc.className='result show';
  const pct=score/QS.length;
  let e,t,m;
  if(pct===1){e='🏆';t='Perfect Score — Marketing Star!';m='Incredible! Every answer correct. You are ready to market your own product. The entrepreneurial world needs people like you!'}
  else if(pct>=.75){e='🎉';t='Excellent Work!';m='You understand marketing really well! Review any wrong answers and you will be unstoppable. Keep this energy!'}
  else if(pct>=.5){e='👍';t='Good Effort!';m='You are getting there! Go back and review the 4 Ps and customer targeting sections. Practice makes perfect!'}
  else{e='💡';t='Keep Learning!';m='Do not worry — marketing takes practice! Try the quiz again after reviewing your notes. Every expert started as a beginner!'}
  document.getElementById('re').textContent=e;
  document.getElementById('rt').textContent=t;
  document.getElementById('rs').textContent=`${score} / ${QS.length}`;
  document.getElementById('rm').textContent=m;
}
function restart(){cur=0;score=0;document.getElementById('sc').textContent='Score: 0 / 8';document.getElementById('quiz').style.display='block';document.getElementById('res').className='result';build()}
function finish(){alert('🎊 Congratulations! You have completed all 4 sections of Marketing My Product!\n\nFill in your own Marketing Plan template from Section 4 and start building your first business! ⭐ Planrs')}
build();
</script>
</body>
</html>
