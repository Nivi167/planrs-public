<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Planning — Build a 5-Year Life Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:    #f9a8d4;
    --lavender:#c4b5fd;
    --sky:     #93c5fd;
    --mint:    #6ee7b7;
    --peach:   #fcd34d;
    --rose:    #fb7185;
    --purple:  #a855f7;
    --indigo:  #6366f1;
    --teal:    #14b8a6;
    --amber:   #f59e0b;
    --white:   #ffffff;
    --soft:    rgba(255,255,255,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ── ANIMATED BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg,
      #fce4ec 0%, #f3e5f5 18%, #e8eaf6 36%,
      #e0f2f1 54%, #e8f5e9 72%, #fff8e1 90%, #fce4ec 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
  }
  @keyframes bgShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* Rainbow arc */
  #rainbow {
    position: fixed; bottom: -120px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 460px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    background: conic-gradient(
      from 180deg at 50% 100%,
      #ff6b6b, #ffa06b, #ffd06b, #a8e063, #56ccf2, #a855f7, #ff6b9d, #ff6b6b
    );
    opacity: 0.18;
    z-index: 1;
    animation: rainbowPulse 6s ease-in-out infinite;
  }
  @keyframes rainbowPulse {
    0%,100% { opacity: 0.14; transform: translateX(-50%) scaleY(0.95); }
    50%      { opacity: 0.22; transform: translateX(-50%) scaleY(1.05); }
  }

  /* Clouds */
  .cloud {
    position: fixed; z-index: 1;
    background: rgba(255,255,255,0.7);
    border-radius: 50px;
    animation: floatCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
  }
  @keyframes floatCloud {
    0%   { transform: translateX(-200px); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(calc(100vw + 200px)); opacity: 0; }
  }

  /* Stars */
  .star {
    position: fixed; z-index: 1;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.4); }
  }

  /* Sparkles */
  .sparkle {
    position: fixed; z-index: 1;
    font-size: 18px;
    animation: sparkleDrift ease-in-out infinite;
    pointer-events: none;
    user-select: none;
  }
  @keyframes sparkleDrift {
    0%,100% { transform: translateY(0) rotate(0deg);   opacity: 0.6; }
    50%      { transform: translateY(-18px) rotate(20deg); opacity: 1; }
  }

  /* Floating hearts/gems */
  .floater {
    position: fixed; z-index: 1;
    font-size: 22px;
    animation: floaterBob ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes floaterBob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-22px); }
  }

  /* ── MAIN WRAPPER ── */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px;
  }

  /* ── TITLE BAR ── */
  #titleBar {
    text-align: center;
    margin-bottom: 10px;
    animation: titleDrop 0.8s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes titleDrop {
    0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  #titleBar h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(16px, 2.8vw, 26px);
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(168,85,247,0.25));
    line-height: 1.2;
  }
  #titleBar .subtitle {
    font-size: clamp(11px, 1.5vw, 13px);
    color: #7c3aed;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  /* Progress dots */
  #progressDots {
    display: flex; gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .dot {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    font-family: 'Baloo 2', cursive;
    background: rgba(255,255,255,0.5);
    border: 2.5px solid rgba(200,180,255,0.5);
    color: #a78bfa;
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .dot.active {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 16px rgba(168,85,247,0.5);
    transform: scale(1.15);
  }
  .dot.done {
    background: linear-gradient(135deg, #14b8a6, #6ee7b7);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 12px rgba(20,184,166,0.4);
  }
  .dot-line {
    width: 40px; height: 2.5px;
    background: rgba(200,180,255,0.4);
    border-radius: 2px;
    align-self: center;
    transition: background 0.4s;
  }
  .dot-line.done { background: linear-gradient(90deg, #14b8a6, #6ee7b7); }

  /* ── ACTIVITY CARD ── */
  .activity-card {
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(18px);
    border-radius: 28px;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 40px rgba(168,85,247,0.15), 0 2px 8px rgba(0,0,0,0.06);
    padding: 18px 22px 16px;
    width: 100%;
    max-width: 880px;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn {
    0% { opacity: 0; transform: scale(0.93) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .act-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .act-icon {
    width: 40px; height: 40px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .act-title {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 800;
    color: #5b21b6;
  }
  .act-desc {
    font-size: clamp(11px, 1.3vw, 12.5px);
    color: #7c3aed;
    font-weight: 600;
    margin-top: 1px;
  }

  /* ── DRAG ITEMS ── */
  .items-row {
    display: flex; flex-wrap: wrap; gap: 7px;
    margin-bottom: 12px;
    min-height: 44px;
    padding: 8px 10px;
    background: rgba(243,232,255,0.5);
    border-radius: 16px;
    border: 2px dashed rgba(168,85,247,0.3);
    align-items: center;
  }

  .drag-item {
    padding: 6px 14px;
    border-radius: 24px;
    font-size: clamp(11px, 1.3vw, 13px);
    font-weight: 700;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    border: 2px solid rgba(255,255,255,0.8);
    white-space: nowrap;
  }
  .drag-item:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 6px 18px rgba(0,0,0,0.13); }
  .drag-item.dragging { opacity: 0.35; transform: scale(0.95); cursor: grabbing; }
  .drag-item.placed { opacity: 0.4; pointer-events: none; }

  /* ── DROP ZONES ── */
  .zones-row {
    display: flex; gap: 10px;
    flex-wrap: wrap;
  }
  .drop-zone {
    flex: 1; min-width: 160px;
    border-radius: 20px;
    border: 2.5px dashed rgba(200,180,255,0.6);
    padding: 10px;
    background: rgba(255,255,255,0.55);
    transition: all 0.2s;
    min-height: 100px;
  }
  .drop-zone.over {
    background: rgba(233,213,255,0.7);
    border-color: #a855f7;
    box-shadow: 0 0 16px rgba(168,85,247,0.25);
    transform: scale(1.02);
  }
  .drop-zone.correct-flash {
    animation: correctFlash 0.5s ease;
  }
  @keyframes correctFlash {
    0%,100% { background: rgba(255,255,255,0.55); }
    50% { background: rgba(187,247,208,0.8); }
  }

  .zone-header {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
    font-family: 'Baloo 2', cursive;
    font-size: clamp(11px, 1.4vw, 13px);
    font-weight: 800;
    color: #5b21b6;
  }
  .zone-icon { font-size: 16px; }
  .zone-items {
    display: flex; flex-wrap: wrap; gap: 5px;
    min-height: 32px;
  }

  /* ── ACTIVITY 2: BUDGET ── */
  .budget-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .budget-summary {
    margin-top: 10px;
    padding: 10px 16px;
    background: linear-gradient(135deg, rgba(233,213,255,0.6), rgba(219,234,254,0.6));
    border-radius: 16px;
    display: flex; gap: 20px; flex-wrap: wrap;
    align-items: center;
    font-size: clamp(11px, 1.3vw, 13px);
    font-weight: 700; color: #5b21b6;
  }
  .bval { font-size: clamp(14px, 1.8vw, 17px); font-weight: 800; color: #7c3aed; }
  .savings-bar-wrap {
    flex: 1; min-width: 140px;
    height: 12px; background: rgba(200,180,255,0.3);
    border-radius: 8px; overflow: hidden;
  }
  .savings-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #a855f7, #ec4899);
    border-radius: 8px;
    transition: width 0.5s ease;
  }

  /* ── ACTIVITY 3: STEPS ── */
  .steps-area {
    display: flex; gap: 12px;
  }
  .step-bank {
    flex: 1;
  }
  .step-sequence {
    flex: 1.2;
    display: flex; flex-direction: column; gap: 6px;
  }
  .step-slot {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-radius: 14px;
    border: 2px dashed rgba(168,85,247,0.3);
    background: rgba(255,255,255,0.5);
    min-height: 44px;
    transition: all 0.2s;
    font-size: clamp(11px, 1.2vw, 12.5px);
  }
  .step-slot.over { background: rgba(233,213,255,0.7); border-color: #a855f7; }
  .step-slot.filled { border-style: solid; border-color: rgba(168,85,247,0.4); background: rgba(243,232,255,0.6); }
  .step-slot .slot-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; flex-shrink: 0;
    font-family: 'Baloo 2', cursive;
  }

  .result-box {
    margin-top: 10px; padding: 10px 16px;
    background: linear-gradient(135deg, rgba(187,247,208,0.5), rgba(167,243,208,0.4));
    border-radius: 14px; border: 2px solid rgba(20,184,166,0.3);
    font-size: clamp(11px, 1.3vw, 13px); font-weight: 700; color: #065f46;
    display: none;
  }
  .result-box.show { display: block; animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ── NEXT BUTTON ── */
  .next-btn {
    margin-top: 12px;
    padding: 10px 32px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white; font-family: 'Baloo 2', cursive;
    font-size: clamp(13px, 1.6vw, 15px); font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(168,85,247,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
    float: right;
  }
  .next-btn.visible { display: inline-block; animation: popIn 0.4s ease both; }
  .next-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px rgba(168,85,247,0.5); }
  .next-btn:active { transform: scale(0.97); }

  /* ── POPUP OVERLAY ── */
  #popupOverlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(88,28,135,0.25);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #popupOverlay.show { opacity: 1; pointer-events: all; }

  .popup-card {
    background: rgba(255,255,255,0.95);
    border-radius: 32px;
    padding: 36px 40px;
    max-width: 480px; width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(168,85,247,0.3);
    border: 3px solid rgba(233,213,255,0.9);
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
  }
  .popup-emoji { font-size: 56px; margin-bottom: 10px; display: block; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  .popup-title {
    font-family: 'Baloo 2', cursive;
    font-size: 24px; font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .popup-body { font-size: 14px; color: #6b21a8; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
  .popup-btn {
    padding: 12px 36px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white; font-family: 'Baloo 2', cursive;
    font-size: 16px; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(168,85,247,0.4);
    transition: transform 0.15s;
  }
  .popup-btn:hover { transform: scale(1.05); }
  .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 32px; }
  .conf { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall {
    0%   { top: -10%; opacity: 1; transform: rotate(0deg); }
    100% { top: 110%; opacity: 0; transform: rotate(720deg) translateX(60px); }
  }

  /* FINAL SUCCESS */
  .final-stars { font-size: 36px; letter-spacing: 4px; display: block; margin-bottom: 8px; }
  .achievement-badge {
    display: inline-block;
    background: linear-gradient(135deg, #fcd34d, #f97316);
    color: white; border-radius: 50px;
    padding: 6px 20px; font-weight: 800;
    font-family: 'Baloo 2', cursive; font-size: 13px;
    margin-bottom: 14px;
    box-shadow: 0 4px 12px rgba(249,115,22,0.35);
  }

  /* Feedback badge */
  .feedback-badge {
    display: inline-block;
    padding: 3px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 800;
    margin-left: 6px;
    animation: popIn 0.3s ease;
  }
  .fb-correct { background: rgba(187,247,208,0.8); color: #065f46; }
  .fb-wrong   { background: rgba(254,202,202,0.8); color: #991b1b; }

  /* score chip */
  .score-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(233,213,255,0.7);
    border-radius: 20px; padding: 4px 12px;
    font-size: clamp(11px, 1.3vw, 13px); font-weight: 800;
    color: #5b21b6;
    margin-left: auto;
  }
</style>
</head>
<body>

<!-- BACKGROUND LAYERS -->
<div id="bg"></div>
<div id="rainbow"></div>

<!-- JS-generated bg elements injected here -->

<!-- APP -->
<div id="app">
  <div id="titleBar">
    <h1>🦄 Financial Planning — Build a 5-Year Life Plan ✨</h1>
    <div class="subtitle">Drag. Drop. Dream. Plan your magical future!</div>
  </div>

  <div id="progressDots">
    <div class="dot active" id="dot1">1</div>
    <div class="dot-line" id="dl1"></div>
    <div class="dot" id="dot2">2</div>
    <div class="dot-line" id="dl2"></div>
    <div class="dot" id="dot3">3</div>
  </div>

  <div id="activityContainer"></div>
</div>

<!-- POPUP -->
<div id="popupOverlay">
  <div class="popup-card" id="popupCard">
    <div class="confetti-container" id="confettiContainer"></div>
    <span class="popup-emoji" id="popupEmoji">🌟</span>
    <div class="popup-title" id="popupTitle">Amazing!</div>
    <div class="popup-body" id="popupBody"></div>
    <button class="popup-btn" id="popupBtn">Continue ✨</button>
  </div>
</div>

<script>
/* =========================================================
   BACKGROUND DECORATIONS
   ========================================================= */
(function(){
  const body = document.body;

  // Stars
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className='star';
    const colors=['#f9a8d4','#c4b5fd','#93c5fd','#fcd34d','#6ee7b7','#ffffff'];
    s.style.cssText=`
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${3+Math.random()*6}px; height:${3+Math.random()*6}px;
      animation-duration:${1.5+Math.random()*3}s;
      animation-delay:${Math.random()*4}s;
    `;
    body.appendChild(s);
  }

  // Sparkles
  const sparkleChars=['✦','✧','⋆','✺','❋','✵','✸'];
  for(let i=0;i<25;i++){
    const sp=document.createElement('div');
    sp.className='sparkle';
    sp.textContent=sparkleChars[Math.floor(Math.random()*sparkleChars.length)];
    const colors=['#f9a8d4','#c4b5fd','#fcd34d','#6ee7b7','#93c5fd','#fb7185'];
    sp.style.cssText=`
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      color:${colors[Math.floor(Math.random()*colors.length)]};
      font-size:${12+Math.random()*18}px;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*5}s;
    `;
    body.appendChild(sp);
  }

  // Floaters
  const floaterEmojis=['💎','🌸','🍭','⭐','🌈','💫','🎀','🌺','🦋','💜','🌙'];
  for(let i=0;i<14;i++){
    const f=document.createElement('div');
    f.className='floater';
    f.textContent=floaterEmojis[Math.floor(Math.random()*floaterEmojis.length)];
    f.style.cssText=`
      left:${Math.random()*95}vw; top:${10+Math.random()*80}vh;
      animation-duration:${3+Math.random()*4}s;
      animation-delay:${Math.random()*6}s;
      opacity:0.55;
    `;
    body.appendChild(f);
  }

  // Clouds
  function makeCloud(){
    const c=document.createElement('div');
    c.className='cloud';
    const h=20+Math.random()*25, w=h*2.8;
    const top=5+Math.random()*60;
    const dur=22+Math.random()*30;
    c.style.cssText=`
      top:${top}vh; width:${w}px; height:${h}px;
      animation-duration:${dur}s;
      animation-delay:${-Math.random()*dur}s;
      opacity:${0.4+Math.random()*0.3};
    `;
    c.style.before=`content:''; top:-${h*0.6}px; left:${w*0.2}px; width:${h*1.1}px; height:${h*1.1}px;`;
    body.appendChild(c);
    // manual before/after via extra divs
    const b=document.createElement('div');
    b.style.cssText=`
      position:absolute; background:rgba(255,255,255,0.7); border-radius:50%;
      width:${h*1.1}px; height:${h*1.1}px;
      top:${-h*0.55}px; left:${w*0.18}px;
    `;
    c.appendChild(b);
    const a=document.createElement('div');
    a.style.cssText=`
      position:absolute; background:rgba(255,255,255,0.7); border-radius:50%;
      width:${h*0.8}px; height:${h*0.8}px;
      top:${-h*0.4}px; left:${w*0.5}px;
    `;
    c.appendChild(a);
  }
  for(let i=0;i<8;i++) makeCloud();
})();

/* =========================================================
   DATA
   ========================================================= */
const ACT1_ITEMS = [
  {id:'a1_1', text:'📚 Join a coding workshop', zone:'education', color:'bg-lavender'},
  {id:'a1_2', text:'🎓 Prepare for entrance exams', zone:'education', color:'bg-lavender'},
  {id:'a1_3', text:'💻 Buy a laptop for studies', zone:'education', color:'bg-lavender'},
  {id:'a1_4', text:'🛠️ Learn carpentry skills', zone:'career', color:'bg-mint'},
  {id:'a1_5', text:'📝 Complete an online certificate', zone:'career', color:'bg-mint'},
  {id:'a1_6', text:'🎤 Build a public speaking portfolio', zone:'career', color:'bg-mint'},
  {id:'a1_7', text:'🏦 Open a savings account', zone:'savings', color:'bg-peach'},
  {id:'a1_8', text:'💰 Save for a high-end cycle', zone:'savings', color:'bg-peach'},
  {id:'a1_9', text:'🪙 Build an emergency fund', zone:'savings', color:'bg-peach'},
];
const ACT1_ZONES = [
  {id:'education', label:'Education Goals', icon:'📚', color:'#e9d5ff'},
  {id:'career',    label:'Career Goals',    icon:'🚀', color:'#d1fae5'},
  {id:'savings',   label:'Savings Goals',   icon:'💰', color:'#fef9c3'},
];

const ACT2_ITEMS = [
  {id:'b1', text:'🎒 School supplies', type:'expense', amount:400},
  {id:'b2', text:'🍱 Tiffin / meals', type:'expense', amount:600},
  {id:'b3', text:'🎮 Entertainment', type:'expense', amount:300},
  {id:'b4', text:'📱 Mobile recharge', type:'expense', amount:200},
  {id:'b5', text:'💼 Pocket money', type:'income', amount:1000},
  {id:'b6', text:'🎁 Birthday gift cash', type:'income', amount:500},
  {id:'b7', text:'⭐ Tutoring earnings', type:'income', amount:800},
  {id:'b8', text:'🏠 Household chore bonus', type:'income', amount:200},
];
const ACT2_ZONES = [
  {id:'income',  label:'Monthly Income',   icon:'💚', color:'#d1fae5'},
  {id:'expense', label:'Monthly Expenses', icon:'💸', color:'#fee2e2'},
];

const ACT3_STEPS = [
  {id:'s1', text:'🎯 Set your 5-year savings goal (e.g. ₹50,000)', order:1},
  {id:'s2', text:'📅 Divide goal by 60 months (5 years)', order:2},
  {id:'s3', text:'📈 Add 10% buffer for price rise', order:3},
  {id:'s4', text:'🔍 Compare with monthly income', order:4},
  {id:'s5', text:'🏦 Open a dedicated savings jar or account', order:5},
];

/* =========================================================
   STATE
   ========================================================= */
let currentActivity = 1;
let scores = {act1: 0, act2: 0, act3: 0};
let act1State = {placed: {}};
let act2State = {placed: {income:[], expense:[]}};
let act3State = {sequence: []};
let dragData = null;

/* =========================================================
   COLOUR HELPERS
   ========================================================= */
const itemColors = {
  education: {bg:'#ede9fe', border:'#a78bfa', text:'#5b21b6'},
  career:    {bg:'#d1fae5', border:'#34d399', text:'#065f46'},
  savings:   {bg:'#fef9c3', border:'#fbbf24', text:'#78350f'},
  income:    {bg:'#d1fae5', border:'#34d399', text:'#065f46'},
  expense:   {bg:'#fee2e2', border:'#f87171', text:'#991b1b'},
  neutral:   {bg:'#f3e8ff', border:'#c4b5fd', text:'#5b21b6'},
  step:      {bg:'#ede9fe', border:'#a78bfa', text:'#5b21b6'},
};

function itemStyle(type){
  const c = itemColors[type] || itemColors.neutral;
  return `background:${c.bg}; border-color:${c.border}; color:${c.text};`;
}

/* =========================================================
   RENDER ACTIVITIES
   ========================================================= */
function renderActivity(n){
  const container = document.getElementById('activityContainer');
  container.innerHTML = '';
  if(n===1) container.innerHTML = buildAct1();
  if(n===2) container.innerHTML = buildAct2();
  if(n===3) container.innerHTML = buildAct3();
  attachDragEvents();
  updateProgressDots();
}

/* ── ACT 1 ── */
function buildAct1(){
  const placed = act1State.placed;
  const remaining = ACT1_ITEMS.filter(i => !placed[i.id]);
  let html = `
  <div class="activity-card">
    <div class="act-header">
      <div class="act-icon" style="background:linear-gradient(135deg,#a855f7,#ec4899)">🎯</div>
      <div>
        <div class="act-title">Activity 1 — Set Your Future Goals</div>
        <div class="act-desc">Drag each goal card into the right category bucket!</div>
      </div>
      <div class="score-chip">⭐ ${scores.act1} / ${ACT1_ITEMS.length}</div>
    </div>
    <div class="items-row" id="itemsBank1">`;
  remaining.forEach(item=>{
    html += `<div class="drag-item" draggable="true" data-id="${item.id}" data-zone="${item.zone}" style="${itemStyle('neutral')}">${item.text}</div>`;
  });
  html += `</div><div class="zones-row">`;
  ACT1_ZONES.forEach(zone=>{
    const zItems = Object.values(placed).filter(p=>p.zone===zone.id).map(p=>p.item);
    html += `
    <div class="drop-zone" id="zone_${zone.id}" data-zone="${zone.id}"
         style="background:${zone.color}20; border-color:${zone.color};">
      <div class="zone-header"><span class="zone-icon">${zone.icon}</span>${zone.label}</div>
      <div class="zone-items" id="zi_${zone.id}">`;
    zItems.forEach(item=>{
      html += `<div class="drag-item placed" style="${itemStyle(zone.id)}">${item.text}</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>
    <div style="overflow:hidden">
      <button class="next-btn ${scores.act1===ACT1_ITEMS.length?'visible':''}" id="nextBtn1" onclick="showActivityComplete(1)">
        Next Activity 🦋
      </button>
    </div>
  </div>`;
  return html;
}

/* ── ACT 2 ── */
function buildAct2(){
  const {income:inc, expense:exp} = act2State.placed;
  const allPlaced = [...inc, ...exp].map(p=>p.id);
  const remaining = ACT2_ITEMS.filter(i => !allPlaced.includes(i.id));

  const totalIncome  = inc.reduce((s,p)=>s+p.amount,0);
  const totalExpense = exp.reduce((s,p)=>s+p.amount,0);
  const savings = totalIncome - totalExpense;
  const pct = totalIncome>0 ? Math.max(0,Math.min(100,(savings/totalIncome)*100)) : 0;

  let html = `
  <div class="activity-card">
    <div class="act-header">
      <div class="act-icon" style="background:linear-gradient(135deg,#f59e0b,#f97316)">💰</div>
      <div>
        <div class="act-title">Activity 2 — Organise Your Monthly Budget</div>
        <div class="act-desc">Sort each item into Income or Expenses and watch your savings grow!</div>
      </div>
      <div class="score-chip">⭐ ${scores.act2} / ${ACT2_ITEMS.length}</div>
    </div>
    <div class="items-row" id="itemsBank2">`;
  remaining.forEach(item=>{
    html += `<div class="drag-item" draggable="true" data-id="${item.id}" data-zone="${item.type}" data-amount="${item.amount}" style="${itemStyle('neutral')}">${item.text} <span style="font-size:10px;opacity:0.7">₹${item.amount}</span></div>`;
  });
  html += `</div>
    <div class="budget-grid">`;
  ACT2_ZONES.forEach(zone=>{
    const list = zone.id==='income' ? inc : exp;
    html += `
    <div class="drop-zone" id="zone_${zone.id}" data-zone="${zone.id}"
         style="background:${zone.color}40; border-color:${zone.color}60">
      <div class="zone-header"><span class="zone-icon">${zone.icon}</span>${zone.label}</div>
      <div class="zone-items" id="zi_${zone.id}">`;
    list.forEach(p=>{
      html += `<div class="drag-item placed" style="${itemStyle(zone.id)}">${p.text} <span style="font-size:10px;opacity:0.7">₹${p.amount}</span></div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>
    <div class="budget-summary">
      <div>Income <span class="bval">₹${totalIncome}</span></div>
      <div>Expenses <span class="bval">₹${totalExpense}</span></div>
      <div>Savings <span class="bval" style="color:${savings>=0?'#059669':'#dc2626'}">₹${savings}</span></div>
      <div style="flex:1;min-width:140px;">
        <div style="font-size:10px;margin-bottom:3px;color:#7c3aed;">Savings Rate: ${Math.round(pct)}%</div>
        <div class="savings-bar-wrap"><div class="savings-bar" id="savBar" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div style="overflow:hidden">
      <button class="next-btn ${scores.act2===ACT2_ITEMS.length?'visible':''}" id="nextBtn2" onclick="showActivityComplete(2)">
        Final Activity 🌟
      </button>
    </div>
  </div>`;
  return html;
}

/* ── ACT 3 ── */
function buildAct3(){
  const placed = act3State.sequence;
  const placedIds = placed.map(p=>p.id);
  const remaining = ACT3_STEPS.filter(s=>!placedIds.includes(s.id));
  const allCorrect = placed.length===5 && placed.every((s,i)=>s.order===i+1);

  let html = `
  <div class="activity-card">
    <div class="act-header">
      <div class="act-icon" style="background:linear-gradient(135deg,#14b8a6,#6ee7b7)">📈</div>
      <div>
        <div class="act-title">Activity 3 — Calculate Your 5-Year Savings Plan</div>
        <div class="act-desc">Drag the steps into the correct order to build your savings strategy!</div>
      </div>
      <div class="score-chip">⭐ ${scores.act3} / 5</div>
    </div>
    <div class="steps-area">
      <div class="step-bank">
        <div style="font-size:11px;font-weight:800;color:#7c3aed;margin-bottom:6px;">📋 Steps to arrange:</div>
        <div class="items-row" id="itemsBank3" style="flex-direction:column;gap:6px;min-height:80px">`;
  remaining.forEach(step=>{
    html += `<div class="drag-item" draggable="true" data-id="${step.id}" data-order="${step.order}" style="${itemStyle('step')};width:100%;">${step.text}</div>`;
  });
  html += `</div></div>
      <div class="step-sequence">
        <div style="font-size:11px;font-weight:800;color:#7c3aed;margin-bottom:4px;">🗺️ Your 5-step savings path:</div>`;
  for(let i=0;i<5;i++){
    const filled = placed[i];
    html += `
    <div class="step-slot ${filled?'filled':''}" id="slot_${i}" data-slot="${i}" ${filled?'':''}>
      <span class="slot-num">${i+1}</span>
      ${filled
        ? `<span style="font-size:12px;font-weight:700;color:#5b21b6">${filled.text}</span>
           <span class="feedback-badge ${filled.order===i+1?'fb-correct':'fb-wrong'}">${filled.order===i+1?'✓ Correct':'✗ Wrong'}</span>`
        : `<span style="font-size:11px;color:#a78bfa;font-style:italic">Drop step ${i+1} here…</span>`
      }
    </div>`;
  }
  html += `</div></div>
    <div class="result-box ${allCorrect?'show':''}" id="resultBox">
      🎉 Perfect! Your 5-year plan is: Set Goal → Monthly Breakdown → Add Buffer → Compare Income → Open Savings Account.
      At ₹1,000/month, you save <strong>₹60,000</strong> in 5 years + growth. You are a Future Financial Wizard! 🦄
    </div>
    <div style="overflow:hidden">
      <button class="next-btn ${allCorrect?'visible':''}" id="nextBtn3" onclick="showFinalSuccess()">
        See Results 🎊
      </button>
    </div>
  </div>`;
  return html;
}

/* =========================================================
   DRAG & DROP
   ========================================================= */
function attachDragEvents(){
  document.querySelectorAll('.drag-item:not(.placed)').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragData = {
        id:   el.dataset.id,
        zone: el.dataset.zone,
        order: el.dataset.order ? parseInt(el.dataset.order) : null,
        amount: el.dataset.amount ? parseInt(el.dataset.amount) : null,
        text: el.textContent.trim()
      };
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', e=>{
      el.classList.remove('dragging');
    });
  });

  // Zones (Act1 & Act2)
  document.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.addEventListener('dragover', e=>{
      e.preventDefault();
      zone.classList.add('over');
    });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('over'));
    zone.addEventListener('drop', e=>{
      e.preventDefault();
      zone.classList.remove('over');
      if(!dragData) return;
      const targetZone = zone.dataset.zone;
      const correct = dragData.zone === targetZone;
      if(correct){
        zone.classList.add('correct-flash');
        setTimeout(()=>zone.classList.remove('correct-flash'),500);
        if(currentActivity===1){
          act1State.placed[dragData.id] = {zone: targetZone, item: {id:dragData.id, text:dragData.text, zone:dragData.zone}};
          scores.act1++;
        } else if(currentActivity===2){
          const arr = act2State.placed[targetZone];
          const found = ACT2_ITEMS.find(i=>i.id===dragData.id);
          if(found) arr.push(found);
          scores.act2++;
        }
        spawnParticles(e.clientX, e.clientY);
      } else {
        shakeFeedback(zone);
      }
      dragData=null;
      renderActivity(currentActivity);
    });
  });

  // Step slots (Act3)
  document.querySelectorAll('.step-slot').forEach(slot=>{
    slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', ()=>slot.classList.remove('over'));
    slot.addEventListener('drop', e=>{
      e.preventDefault();
      slot.classList.remove('over');
      if(!dragData || !dragData.order) return;
      const slotIdx = parseInt(slot.dataset.slot);
      if(act3State.sequence[slotIdx]!==undefined) return; // already filled
      const step = ACT3_STEPS.find(s=>s.id===dragData.id);
      if(!step) return;
      act3State.sequence[slotIdx] = step;
      if(step.order === slotIdx+1){ scores.act3++; spawnParticles(e.clientX,e.clientY); }
      dragData=null;
      renderActivity(3);
    });
  });
}

function shakeFeedback(el){
  el.style.animation='shake 0.4s ease';
  setTimeout(()=>el.style.animation='',400);
  if(!document.querySelector('#shakeStyle')){
    const s=document.createElement('style');
    s.id='shakeStyle';
    s.textContent=`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`;
    document.head.appendChild(s);
  }
}

function spawnParticles(x,y){
  const colors=['#f9a8d4','#c4b5fd','#fcd34d','#6ee7b7','#93c5fd','#fb7185'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.style.cssText=`
      position:fixed;left:${x}px;top:${y}px;
      width:8px;height:8px;border-radius:50%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      pointer-events:none;z-index:999;
      transition:all 0.6s ease;
    `;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transform=`translate(${(Math.random()-0.5)*120}px,${(Math.random()-1)*100}px)`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),700);
  }
}

/* =========================================================
   PROGRESS DOTS
   ========================================================= */
function updateProgressDots(){
  for(let i=1;i<=3;i++){
    const d=document.getElementById('dot'+i);
    d.className='dot';
    if(i<currentActivity){ d.classList.add('done'); d.textContent='✓'; }
    else if(i===currentActivity) d.classList.add('active');
    const dl=document.getElementById('dl'+i);
    if(dl) dl.className='dot-line'+(i<currentActivity?' done':'');
  }
}

/* =========================================================
   POPUPS
   ========================================================= */
function showActivityComplete(n){
  const overlay=document.getElementById('popupOverlay');
  const msgs=[
    {emoji:'🌟',title:'Goals Sorted!',body:'Fantastic! You have mapped out Education, Career, and Savings goals for your future. A dream with a bucket is already halfway real! 🦄'},
    {emoji:'💰',title:'Budget Master!',body:'Brilliant! Your monthly budget is balanced and your savings bar is glowing! Remember: every rupee saved today is a step closer to your 5-year dream. ✨'},
  ];
  const m=msgs[n-1];
  document.getElementById('popupEmoji').textContent=m.emoji;
  document.getElementById('popupTitle').textContent=m.title;
  document.getElementById('popupBody').textContent=m.body;
  document.getElementById('popupBtn').textContent=n===1?'On to Budgeting! 💰':'Final Challenge! 📈';
  document.getElementById('popupBtn').onclick=()=>{ closePopup(); goToActivity(n+1); };
  spawnConfetti();
  overlay.classList.add('show');
}

function showFinalSuccess(){
  const overlay=document.getElementById('popupOverlay');
  const card=document.getElementById('popupCard');
  card.style.maxWidth='540px';
  document.getElementById('popupEmoji').textContent='🦄';
  document.getElementById('popupTitle').textContent='You Are a Financial Wizard! 🌈';
  document.getElementById('popupBody').innerHTML=`
    <span class="final-stars">⭐⭐⭐</span>
    <span class="achievement-badge">🏆 5-Year Plan Champion</span><br>
    You sorted your goals, balanced your budget, and planned your savings steps — all in one magical session!<br><br>
    <strong>Your Takeaway:</strong> Set goals → budget wisely → save monthly → watch your dream come true! 🎊<br><br>
    Total Stars Earned: <strong>${scores.act1 + scores.act2 + scores.act3}</strong> / ${ACT1_ITEMS.length+ACT2_ITEMS.length+5} ✨
  `;
  document.getElementById('popupBtn').textContent='Celebrate! 🎉';
  document.getElementById('popupBtn').onclick=()=>{ closePopup(); restart(); };
  spawnConfetti(true);
  overlay.classList.add('show');
}

function closePopup(){
  document.getElementById('popupOverlay').classList.remove('show');
}

function goToActivity(n){
  currentActivity=n;
  renderActivity(n);
}

function restart(){
  currentActivity=1;
  scores={act1:0,act2:0,act3:0};
  act1State={placed:{}};
  act2State={placed:{income:[],expense:[]}};
  act3State={sequence:[]};
  renderActivity(1);
}

function spawnConfetti(big=false){
  const container=document.getElementById('confettiContainer');
  container.innerHTML='';
  const count=big?60:35;
  const colors=['#f9a8d4','#c4b5fd','#93c5fd','#6ee7b7','#fcd34d','#fb7185','#a855f7'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.cssText=`
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    container.appendChild(c);
  }
}

/* =========================================================
   INIT
   ========================================================= */
renderActivity(1);
</script>

</html>
