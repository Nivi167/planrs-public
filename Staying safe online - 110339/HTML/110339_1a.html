<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 3 – What Would You Do? Online Safety Scenarios</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --v1: #3b0764;
  --v2: #4c0891;
  --v3: #7c3aed;
  --v4: #a855f7;
  --v5: #d8b4fe;
  --v6: #ede9fe;
  --card-bg: #1e0a3c;
  --orange: #fb923c;
  --green: #4ade80;
  --red: #f87171;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Nunito',sans-serif;
  background:#1a0535;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* gradient mesh base */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, #5b21b690 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 90%, #7c3aed70 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%, #2d0a52 0%, #1a0535 100%);
  pointer-events:none;
}

canvas#starfield { position:fixed; inset:0; z-index:1; pointer-events:none; }

/* aurora */
#aurora { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.aurora-band {
  position:absolute; left:-25%; right:-25%; height:200px;
  border-radius:50%; filter:blur(55px); opacity:0.22;
  animation:auroraMove var(--ad) ease-in-out infinite alternate;
}
@keyframes auroraMove {
  from { transform:translateY(0) scaleX(1); }
  to   { transform:translateY(var(--ay)) scaleX(1.12); }
}

/* orbs */
#orbs { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.orb {
  position:absolute; border-radius:50%; filter:blur(65px); opacity:0.16;
  animation:orbFloat var(--od) ease-in-out infinite alternate;
}
@keyframes orbFloat {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(var(--ox),var(--oy)) scale(1.18); }
}

/* floaties */
#floaties { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
.floaty {
  position:absolute; bottom:-80px; left:var(--lft); font-size:var(--fs);
  animation:floatUp var(--dur) linear infinite; opacity:0;
  filter:drop-shadow(0 0 9px #a855f788);
}
@keyframes floatUp {
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  8%{opacity:0.24} 92%{opacity:0.24}
  100%{transform:translateY(-115vh) rotate(360deg);opacity:0}
}

/* shooting stars */
.shoot {
  position:fixed; z-index:3; width:170px; height:2px;
  background:linear-gradient(90deg,transparent,#c084fc,#fff,#7c3aed,transparent);
  border-radius:4px; opacity:0; left:-180px;
  box-shadow:0 0 10px #a855f7, 0 0 20px #7c3aed40;
  animation:shoot var(--sd) linear infinite;
}
@keyframes shoot {
  0%{left:-180px;opacity:0} 4%{opacity:1} 96%{opacity:1} 100%{left:112vw;opacity:0}
}

/* sparkles */
.sparkle {
  position:fixed; z-index:3; border-radius:50%;
  background:#c084fc; box-shadow:0 0 7px #c084fc;
  pointer-events:none;
  animation:sparklePulse var(--sp) ease-in-out infinite alternate;
}
@keyframes sparklePulse {
  from{opacity:0.08;transform:scale(0.4)}
  to{opacity:0.85;transform:scale(2)}
}

/* ═══ APP ═══ */
#app {
  position:relative; z-index:10;
  max-width:680px; margin:0 auto; padding:16px;
}

header {
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(124,58,237,0.18);
  backdrop-filter:blur(18px);
  border:1px solid rgba(196,181,253,0.28);
  border-radius:22px; padding:12px 22px; margin-bottom:16px;
  animation:headerGlow 4s ease-in-out infinite;
  box-shadow:0 0 30px rgba(124,58,237,0.28), inset 0 1px 0 rgba(255,255,255,0.07);
}
@keyframes headerGlow {
  0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.22);}
  50%{box-shadow:0 0 45px rgba(168,85,247,0.5), 0 0 80px rgba(124,58,237,0.22);}
}
.logo {
  font-family:'Baloo 2',cursive; font-size:21px; font-weight:800;
  background:linear-gradient(135deg,#fff,#d8b4fe,#a855f7);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px #a855f7);
}
.score-box {
  background:linear-gradient(135deg,rgba(124,58,237,0.65),rgba(168,85,247,0.45));
  border:1.5px solid #a855f7;
  border-radius:22px; padding:6px 18px;
  font-size:15px; font-weight:800; color:#ede9fe;
  box-shadow:0 0 16px rgba(168,85,247,0.45);
}

h1 {
  text-align:center; font-family:'Baloo 2',cursive; font-size:30px; font-weight:800;
  background:linear-gradient(135deg,#fff 0%,#e9d5ff 35%,#c084fc 65%,#a855f7 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:4px;
  animation:titlePulse 3s ease-in-out infinite;
  filter:drop-shadow(0 0 22px #7c3aed80);
}
@keyframes titlePulse {
  0%,100%{filter:drop-shadow(0 0 14px #7c3aed60);}
  50%{filter:drop-shadow(0 0 38px #a855f7cc) drop-shadow(0 0 65px #7c3aed80);}
}
.subtitle {
  text-align:center; color:#c4b5fd; font-size:14px; font-weight:700;
  margin-bottom:18px; text-shadow:0 0 12px #7c3aed60;
}

.progress {
  height:13px; border-radius:10px; margin-bottom:20px;
  background:rgba(124,58,237,0.22); border:1px solid rgba(168,85,247,0.3);
  overflow:hidden;
}
.progress-bar {
  height:100%;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7,#c084fc,#e879f9);
  border-radius:10px;
  transition:width 0.6s cubic-bezier(.4,2,.6,1);
  position:relative; box-shadow:0 0 18px #a855f780;
}
.progress-bar::after {
  content:'🌟'; position:absolute; right:-10px; top:-7px; font-size:24px;
  filter:drop-shadow(0 0 9px #f0abfc);
  animation:starBounce 0.9s ease-in-out infinite alternate;
}
@keyframes starBounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}

/* ═══ SCENARIO CARD ═══ */
.scenario-card {
  background:linear-gradient(160deg,#2d0f55,#1e0a3c,#160830);
  border:1.5px solid rgba(168,85,247,0.38);
  border-radius:26px; padding:28px 24px 22px;
  box-shadow:
    0 8px 55px rgba(124,58,237,0.5),
    inset 0 0 40px rgba(91,33,182,0.12),
    inset 0 1px 0 rgba(255,255,255,0.06);
  margin-bottom:16px;
  animation:cardIn 0.55s cubic-bezier(.4,2,.6,1);
  position:relative; overflow:hidden;
}
.scenario-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7,#c084fc,#e879f9,#c084fc,#7c3aed,#5b21b6);
  background-size:200% 100%;
  border-radius:26px 26px 0 0;
  animation:shimmerBar 3s linear infinite;
}
@keyframes shimmerBar{0%{background-position:0%}100%{background-position:200%}}
.scenario-card::after {
  content:''; position:absolute; inset:0; border-radius:26px; pointer-events:none;
  background:radial-gradient(ellipse 65% 40% at 50% 0%,rgba(168,85,247,0.14),transparent 68%);
}
@keyframes cardIn{from{opacity:0;transform:translateY(34px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}

.scenario-label {
  font-size:11px; font-weight:800; color:#c084fc;
  text-transform:uppercase; letter-spacing:2.5px; margin-bottom:10px;
  text-shadow:0 0 12px #a855f760;
}
.scenario-emoji {
  font-size:54px; margin-bottom:12px; display:block;
  animation:bounce 2.2s ease-in-out infinite;
  filter:drop-shadow(0 0 16px rgba(168,85,247,0.65));
}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}

.scenario-text {
  font-size:15px; color:#ede9fe; font-weight:700; line-height:1.65; margin-bottom:10px;
  background:rgba(124,58,237,0.2);
  padding:14px 16px; border-radius:16px;
  border-left:4px solid #a855f7;
  box-shadow:inset 0 0 22px rgba(124,58,237,0.12);
}
.question-text {
  font-size:15px; color:#c4b5fd; font-weight:800; margin:10px 0 14px;
  text-shadow:0 0 10px #7c3aed60;
}

.dnd-instruction {
  font-size:13px; color:#e9d5ff; font-weight:800; margin-bottom:12px;
  text-align:center;
  background:rgba(124,58,237,0.28);
  border:1.5px dashed rgba(168,85,247,0.65);
  border-radius:12px; padding:8px;
  animation:instructPulse 2.5s ease-in-out infinite;
}
@keyframes instructPulse{
  0%,100%{border-color:rgba(168,85,247,0.4);box-shadow:none}
  50%{border-color:#c084fc;box-shadow:0 0 14px rgba(168,85,247,0.45)}
}

.drop-zone {
  min-height:64px; border-radius:16px;
  border:2.5px dashed rgba(168,85,247,0.52);
  background:rgba(91,33,182,0.14);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:#9f7aea; font-weight:800;
  transition:all 0.25s; margin-bottom:14px;
  box-shadow:inset 0 0 24px rgba(124,58,237,0.1);
}
.drop-zone.drag-over {
  background:rgba(124,58,237,0.32); border-color:#c084fc;
  box-shadow:0 0 0 4px rgba(168,85,247,0.32), 0 0 35px rgba(168,85,247,0.28);
  transform:scale(1.015);
}
.drop-zone.has-chip { border-style:solid; border-color:#7c3aed; background:rgba(91,33,182,0.24); }

.choices-pool {
  display:flex; flex-wrap:wrap; gap:8px; min-height:52px; padding:10px;
  border-radius:16px;
  background:rgba(91,33,182,0.15);
  border:2px dashed rgba(168,85,247,0.38);
  margin-bottom:14px; transition:background 0.2s;
}
.choices-pool.drag-over{background:rgba(124,58,237,0.3);border-color:#a855f7;}

.choice-chip {
  padding:10px 14px; border-radius:13px;
  background:linear-gradient(135deg,rgba(91,33,182,0.6),rgba(76,8,145,0.5));
  border:2px solid rgba(168,85,247,0.58);
  font-size:13px; font-weight:800; color:#ede9fe;
  cursor:grab; user-select:none; touch-action:none;
  transition:transform 0.15s, box-shadow 0.15s;
  box-shadow:0 2px 12px rgba(124,58,237,0.28);
  animation:chipIn 0.35s cubic-bezier(.4,2,.6,1);
  display:flex; align-items:center; gap:7px;
  text-shadow:0 0 8px rgba(196,181,253,0.45);
}
.choice-chip::before{content:'✋';font-size:14px;opacity:0.6;}
@keyframes chipIn{from{opacity:0;transform:scale(0.65)}to{opacity:1;transform:scale(1)}}
.choice-chip:hover{
  transform:scale(1.06) rotate(-1.5deg);
  box-shadow:0 6px 24px rgba(168,85,247,0.55), 0 0 0 2px #a855f7;
  background:linear-gradient(135deg,rgba(124,58,237,0.75),rgba(91,33,182,0.65));
}
.choice-chip.dragging{opacity:0.3;transform:scale(0.88);cursor:grabbing;}
.choice-chip.correct{
  background:linear-gradient(135deg,#14532d,#166534); border-color:#4ade80;
  color:#d1fae5; box-shadow:0 0 22px rgba(74,222,128,0.5);
  animation:popIn 0.4s;
}
.choice-chip.wrong{
  background:linear-gradient(135deg,#7f1d1d,#991b1b); border-color:#f87171;
  color:#fecaca; box-shadow:0 0 18px rgba(248,113,113,0.45);
  animation:shake 0.4s;
}

.explanation{
  margin-top:14px;padding:14px 18px;border-radius:16px;
  font-size:14px;font-weight:800;display:none;animation:fadeUp 0.4s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.explanation.show{display:block;}
.explanation.good{
  background:linear-gradient(135deg,rgba(20,83,45,0.85),rgba(22,101,52,0.75));
  color:#d1fae5;border-left:5px solid #4ade80;box-shadow:0 0 22px rgba(74,222,128,0.22);
}
.explanation.bad{
  background:linear-gradient(135deg,rgba(127,29,29,0.85),rgba(153,27,27,0.75));
  color:#fecaca;border-left:5px solid #f87171;box-shadow:0 0 22px rgba(248,113,113,0.22);
}

.next-btn{
  display:none;
  background:linear-gradient(135deg,#5b21b6,#7c3aed,#a855f7,#c084fc);
  background-size:200%;
  color:#fff;border:none;padding:13px 34px;border-radius:30px;
  font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;
  cursor:pointer;margin-top:14px;
  box-shadow:0 4px 26px rgba(124,58,237,0.6), 0 0 0 1.5px rgba(196,181,253,0.22);
  transition:transform 0.15s,box-shadow 0.15s;
}
.next-btn.show{display:inline-block;animation:popIn 0.45s cubic-bezier(.4,2,.6,1),btnShimmer 2.5s linear 0.5s infinite;}
@keyframes btnShimmer{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.next-btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 34px rgba(168,85,247,0.7),0 0 42px rgba(124,58,237,0.35);}

/* ═══ RESULT ═══ */
.result-screen{
  display:none;text-align:center;
  background:linear-gradient(160deg,#2d0f55,#1e0a3c,#160830);
  border:1.5px solid rgba(168,85,247,0.42);
  border-radius:28px;padding:40px 24px 34px;
  box-shadow:0 10px 65px rgba(124,58,237,0.55),inset 0 0 60px rgba(91,33,182,0.16);
  animation:cardIn 0.6s cubic-bezier(.4,2,.6,1);
  position:relative;overflow:hidden;
}
.result-screen::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#5b21b6,#7c3aed,#a855f7,#e879f9,#a855f7,#7c3aed,#5b21b6);
  background-size:200%;animation:shimmerBar 2.5s linear infinite;border-radius:28px 28px 0 0;
}
.result-screen::after{
  content:'';position:absolute;inset:0;border-radius:28px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(168,85,247,0.2),transparent 65%);
  pointer-events:none;
}
.result-emoji{font-size:84px;margin-bottom:10px;animation:bounceResult 1.2s ease-in-out infinite;filter:drop-shadow(0 0 22px #a855f7);}
@keyframes bounceResult{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.22) rotate(3deg)}}
.result-title{
  font-family:'Baloo 2',cursive;font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#fff,#e9d5ff,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px #a855f7);
}
.result-score{
  font-family:'Baloo 2',cursive;font-size:72px;font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,#c084fc,#e879f9,#fff,#c084fc);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:scoreShimmer 2s linear infinite;
  filter:drop-shadow(0 0 20px #a855f790);
}
@keyframes scoreShimmer{0%{background-position:0%}100%{background-position:200%}}
.result-msg{color:#c4b5fd;font-size:15px;font-weight:700;margin-top:8px;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px;}
.btn{padding:13px 30px;border:none;border-radius:30px;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.btn:hover{transform:translateY(-3px) scale(1.06);}
.btn-purple{background:linear-gradient(135deg,#5b21b6,#7c3aed,#a855f7);color:#fff;box-shadow:0 4px 22px rgba(124,58,237,0.55);}
.btn-orange{background:linear-gradient(135deg,#c2410c,#ea580c,#fb923c);color:#fff;box-shadow:0 4px 22px rgba(251,146,60,0.45);}

@keyframes popIn{0%{transform:scale(0.65);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}60%{transform:translateX(9px)}}

.burst{position:fixed;pointer-events:none;z-index:9998;font-size:40px;animation:burstAnim 1.1s ease-out forwards;}
@keyframes burstAnim{0%{transform:scale(0) translateY(0);opacity:1}100%{transform:scale(2.6) translateY(-75px);opacity:0}}

.ring-ripple{
  position:fixed;pointer-events:none;z-index:9997;
  border:3px solid #c084fc;border-radius:50%;
  animation:ringPop 0.85s ease-out forwards;
  box-shadow:0 0 15px #a855f7;
}
@keyframes ringPop{
  0%{width:20px;height:20px;opacity:1;transform:translate(-50%,-50%) scale(0.4)}
  100%{width:160px;height:160px;opacity:0;transform:translate(-50%,-50%) scale(1)}
}

.confetti-piece{
  position:fixed;width:10px;height:14px;border-radius:3px;
  animation:confettiFall var(--cd) linear var(--cd2) infinite;
  pointer-events:none;z-index:9999;top:-20px;left:var(--cl);background:var(--cc);
}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media(max-width:480px){.choice-chip{font-size:12px;padding:8px 10px}h1{font-size:22px}.scenario-text{font-size:14px}}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="aurora"></div>
<div id="orbs"></div>
<div id="floaties"></div>

<div id="app">
  <header>
    <div class="logo">⭐ Planrs</div>
    <div class="score-box">✅ <span id="correctCount">0</span>/5</div>
  </header>
  <h1>🤔 What Would You Do?</h1>
  <p class="subtitle">Drag the BEST answer into the drop zone!</p>
  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div id="gameArea">
    <div class="scenario-card">
      <div class="scenario-label" id="scLabel">Scenario 1 of 5</div>
      <span class="scenario-emoji" id="scEmoji">📱</span>
      <div class="scenario-text" id="scText">Loading...</div>
      <div class="question-text" id="scQuestion">What should you do?</div>
      <div class="dnd-instruction">👆 Drag your best answer below ⬇️</div>
      <div class="drop-zone" id="dropZone"><span class="placeholder">🎯 Drop your answer here</span></div>
      <div class="choices-pool" id="choicesPool"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextScenario()">Next Scenario ➡️</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resEmoji">🏆</div>
    <div class="result-title" id="resTitle">Safety Champion!</div>
    <div class="result-score" id="resScore">5/5</div>
    <p class="result-msg">You know exactly how to handle tricky online situations!</p>
    <div class="btn-row">
      <button class="btn btn-orange" onclick="restart()">🔄 Try Again</button>
      <button class="btn btn-purple" onclick="alert('Move to Section 4!')">➡️ Next Section</button>
    </div>
  </div>
</div>

<script>
/* ══ STARFIELD ══ */
(()=>{
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  const r=()=>{c.width=innerWidth;c.height=innerHeight;};
  r();addEventListener('resize',r);
  const stars=Array.from({length:220},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.8+0.2,a:Math.random(),
    da:Math.random()*0.004+0.002,
    violet:Math.random()<0.45
  }));
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a>1||s.a<0)s.da=-s.da;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.violet?`hsla(280,80%,78%,${s.a})`:`rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

/* ══ AURORA ══ */
(()=>{
  const el=document.getElementById('aurora');
  [{bg:'linear-gradient(90deg,#4c0891,#7c3aed,#a855f7)',top:'4%',ay:'-35px',ad:'8s'},
   {bg:'linear-gradient(90deg,#7c3aed,#c084fc,#5b21b6)',top:'28%',ay:'42px',ad:'11s'},
   {bg:'linear-gradient(90deg,#5b21b6,#e879f9,#7c3aed)',top:'58%',ay:'-25px',ad:'9s'},
   {bg:'linear-gradient(90deg,#a855f7,#4c0891,#c084fc)',top:'82%',ay:'28px',ad:'13s'}]
  .forEach(cfg=>{
    const d=document.createElement('div');d.className='aurora-band';
    d.style.cssText=`background:${cfg.bg};top:${cfg.top};--ay:${cfg.ay};--ad:${cfg.ad};animation-delay:-${Math.random()*6}s`;
    el.appendChild(d);
  });
})();

/* ══ ORBS ══ */
(()=>{
  const el=document.getElementById('orbs');
  [{w:360,h:360,bg:'#7c3aed',t:'8%', l:'3%', ox:'22px', oy:'32px', od:'12s'},
   {w:290,h:290,bg:'#a855f7',t:'58%',l:'68%',ox:'-28px',oy:'22px', od:'9s'},
   {w:210,h:210,bg:'#c084fc',t:'38%',l:'38%',ox:'18px', oy:'-22px',od:'15s'},
   {w:190,h:190,bg:'#5b21b6',t:'78%',l:'18%',ox:'-12px',oy:'32px', od:'10s'}]
  .forEach(o=>{
    const d=document.createElement('div');d.className='orb';
    d.style.cssText=`width:${o.w}px;height:${o.h}px;background:${o.bg};top:${o.t};left:${o.l};--ox:${o.ox};--oy:${o.oy};--od:${o.od};animation-delay:-${Math.random()*9}s`;
    el.appendChild(d);
  });
})();

/* ══ FLOATIES ══ */
(()=>{
  const emjs=['🛡️','🔒','📱','💻','🌐','❤️','⭐','🎮','💬','✅','🚫','🤔','💜','🔮','✨'];

    document.body.appendChild(s);

/* ══ DATA ══ */
const scenarios=[
  {emoji:"📱",
   text:"Arjun gets a WhatsApp from an unknown number: 'Congratulations! You won ₹10,000! Send your Aadhaar number and OTP to claim within 10 minutes!'",
   question:"What should Arjun do?",
   choices:[{text:"Send Aadhaar & OTP — he might really win! 🤑",correct:false},{text:"Ignore and tell parents immediately 🙋",correct:true},{text:"Call the number to check if it's real 📞",correct:false},{text:"Forward to all friends so they win too 📤",correct:false}],
   goodExp:"✅ Correct! This is a classic scam. Real companies NEVER ask for OTP over WhatsApp. Always tell parents about suspicious messages!",
   badExp:"❌ Sharing OTP or Aadhaar leads to identity theft! When in doubt, always tell a parent right away."},
  {emoji:"😰",
   text:"Priya sees a classmate posted an embarrassing photo of her on Instagram without permission and wrote mean comments. Others are liking and adding more.",
   question:"What is the BEST first step for Priya?",
   choices:[{text:"Post mean photos of the classmate back 😤",correct:false},{text:"Screenshot it, then tell a trusted adult 📸",correct:true},{text:"Just ignore it and hope it goes away 😶",correct:false},{text:"Leave school to avoid everyone 🏃",correct:false}],
   goodExp:"✅ Perfect! Screenshot = evidence. Telling an adult = getting real help. Never retaliate — it makes things worse!",
   badExp:"❌ Retaliating or ignoring both make things worse. Screenshot the evidence and tell a parent or teacher immediately."},
  {emoji:"🎮",
   text:"Ravi chats with 'GamerFriend99' for a few days. Then GamerFriend99 asks: 'You seem cool! What school do you go to? Can we meet at your school gate tomorrow?'",
   question:"What should Ravi do?",
   choices:[{text:"Tell him the school — they've chatted for days 🏫",correct:false},{text:"Agree to meet — gaming friends are trustworthy 🤝",correct:false},{text:"Stop sharing, block the user, tell parents 🛑",correct:true},{text:"Ask more questions first to decide 🤔",correct:false}],
   goodExp:"✅ Excellent! Online gaming friends are strangers. Asking for your school + wanting to meet = serious RED FLAGS. Block and tell an adult!",
   badExp:"❌ Even after days of chatting, online 'friends' are strangers. Adults can pretend to be kids. Block and tell parents immediately!"},
  {emoji:"📰",
   text:"Divya's uncle forwards a WhatsApp: 'URGENT: A new disease has no cure! Eat raw turmeric every hour to stay safe — forward to 20 people immediately!'",
   question:"What should Divya think about this message?",
   choices:[{text:"Forward it — it's urgent and uncle sent it 📨",correct:false},{text:"Fact-check on trusted health websites first 🔍",correct:true},{text:"Eat the turmeric just to be safe 🌿",correct:false},{text:"It must be true — so many people forwarded it 👥",correct:false}],
   goodExp:"✅ Smart! Always fact-check health claims on official sites like WHO or AIIMS. Viral does NOT mean true!",
   badExp:"❌ Many people get sick from fake remedies. Always verify with a trusted health website before acting or sharing."},
  {emoji:"💬",
   text:"Kiran is in a WhatsApp group. Some classmates start sending mean jokes about quiet student Meena, calling her names. Others are sending laughing emojis.",
   question:"What should Kiran do?",
   choices:[{text:"Send a laughing emoji too — everyone is doing it 😂",correct:false},{text:"Stay quiet — it's not his problem 🤐",correct:false},{text:"Stand up for Meena and/or tell a teacher 💪",correct:true},{text:"Leave the group without saying anything 👋",correct:false}],
   goodExp:"✅ Being an upstander makes a real difference! Standing up for someone online takes courage. Even telling a teacher privately is heroic!",
   badExp:"❌ Silence or joining in both make you part of the problem. Group bullying causes serious harm. Be brave — speak up or tell a trusted adult!"}
];

let current=0,score=0,draggedChip=null;
const dropZone=document.getElementById('dropZone');
const choicesPool=document.getElementById('choicesPool');

function loadScenario(){
  const s=scenarios[current];
  document.getElementById('scLabel').textContent=`Scenario ${current+1} of 5`;
  document.getElementById('scEmoji').textContent=s.emoji;
  document.getElementById('scText').textContent=s.text;
  document.getElementById('scQuestion').textContent=s.question;
  document.getElementById('progressBar').style.width=(current/5*100)+'%';
  const exp=document.getElementById('explanation');
  exp.className='explanation';exp.textContent='';
  document.getElementById('nextBtn').className='next-btn';
  dropZone.innerHTML='<span class="placeholder">🎯 Drop your answer here</span>';
  dropZone.className='drop-zone';
  choicesPool.innerHTML='';
  [...s.choices].sort(()=>Math.random()-0.5).forEach((c,i)=>{
    choicesPool.appendChild(mkChip(c,i*0.08));
  });
}

function mkChip(c,delay=0){
  const chip=document.createElement('div');
  chip.className='choice-chip';chip.textContent=c.text;
  chip.dataset.correct=c.correct;chip.draggable=true;
  chip.style.animationDelay=delay+'s';
  addDrag(chip);addTouch(chip);
  return chip;
}

function addDrag(chip){
  chip.addEventListener('dragstart',e=>{draggedChip=chip;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
}
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(draggedChip)place(draggedChip);});
choicesPool.addEventListener('dragover',e=>{e.preventDefault();choicesPool.classList.add('drag-over');});
choicesPool.addEventListener('dragleave',()=>choicesPool.classList.remove('drag-over'));
choicesPool.addEventListener('drop',e=>{
  e.preventDefault();choicesPool.classList.remove('drag-over');
  if(draggedChip&&dropZone.contains(draggedChip)){
    const b=mkChip({text:draggedChip.textContent.replace('✋','').trim(),correct:draggedChip.dataset.correct==='true'});
    choicesPool.appendChild(b);
    dropZone.innerHTML='<span class="placeholder">🎯 Drop your answer here</span>';
    dropZone.className='drop-zone';
  }
});

function addTouch(chip){
  let clone;
  chip.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    clone=chip.cloneNode(true);
    clone.style.cssText=`position:fixed;left:${t.clientX-65}px;top:${t.clientY-25}px;z-index:9999;opacity:0.82;pointer-events:none;width:150px;animation:none`;
    document.body.appendChild(clone);chip.style.opacity='0.3';draggedChip=chip;
  },{passive:true});
  chip.addEventListener('touchmove',e=>{
    e.preventDefault();const t=e.touches[0];
    if(clone){clone.style.left=(t.clientX-65)+'px';clone.style.top=(t.clientY-25)+'px';}
    const r=dropZone.getBoundingClientRect();
    dropZone.classList.toggle('drag-over',t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom);
  },{passive:false});
  chip.addEventListener('touchend',e=>{
    if(clone)clone.remove();chip.style.opacity='';dropZone.classList.remove('drag-over');
    const t=e.changedTouches[0],r=dropZone.getBoundingClientRect();
    if(t.clientX>r.left&&t.clientX<r.right&&t.clientY>r.top&&t.clientY<r.bottom)place(chip);
    draggedChip=null;
  },{passive:true});
}

function place(chip){
  const ex=dropZone.querySelector('.choice-chip');
  if(ex){const b=mkChip({text:ex.textContent.replace('✋','').trim(),correct:ex.dataset.correct==='true'});choicesPool.appendChild(b);}
  const p=chip.cloneNode(true);p.style.animationDelay='0s';p.draggable=true;addDrag(p);addTouch(p);
  dropZone.innerHTML='';dropZone.appendChild(p);dropZone.classList.add('has-chip');
  if(choicesPool.contains(chip))choicesPool.removeChild(chip);
  setTimeout(()=>evaluate(p),360);
}

function evaluate(chip){
  const ok=chip.dataset.correct==='true';
  const s=scenarios[current];
  document.querySelectorAll('.choice-chip').forEach(c=>{c.draggable=false;c.style.cursor='not-allowed';});
  const exp=document.getElementById('explanation');
  if(ok){
    chip.classList.add('correct');
    exp.className='explanation good show';exp.textContent=s.goodExp;
    score++;document.getElementById('correctCount').textContent=score;
    burst(chip,'🎉');ring(chip);setTimeout(confetti,200);
  } else {
    chip.classList.add('wrong');
    exp.className='explanation bad show';exp.textContent=s.badExp;
    document.querySelectorAll('.choice-chip').forEach(c=>{if(c.dataset.correct==='true')c.classList.add('correct');});
    burst(chip,'💔');
  }
  document.getElementById('nextBtn').className='next-btn show';
}

function nextScenario(){current++;current<scenarios.length?loadScenario():showResult();}

function showResult(){
  document.getElementById('gameArea').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('resScore').textContent=score+'/5';
  document.getElementById('progressBar').style.width='100%';
  if(score===5){document.getElementById('resEmoji').textContent='🏆';document.getElementById('resTitle').textContent='Perfect Safety Champion!';}
  else if(score>=3){document.getElementById('resEmoji').textContent='🎉';document.getElementById('resTitle').textContent='Great Choices! Well Done!';}
  else{document.getElementById('resEmoji').textContent='💜';document.getElementById('resTitle').textContent="Keep Practising — You've Got This!";}
  for(let i=0;i<90;i++)setTimeout(singleConfetti,i*50);
}

function restart(){
  current=0;score=0;
  document.getElementById('correctCount').textContent=0;
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resultScreen').style.display='none';
  loadScenario();
}

function burst(el,emoji){
  const r=el.getBoundingClientRect(),b=document.createElement('div');
  b.className='burst';b.textContent=emoji;
  b.style.cssText=`left:${r.left+r.width/2-20}px;top:${r.top}px`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),1200);
}
function ring(el){
  const r=el.getBoundingClientRect(),rp=document.createElement('div');
  rp.className='ring-ripple';
  rp.style.cssText=`left:${r.left+r.width/2}px;top:${r.top+r.height/2}px`;
  document.body.appendChild(rp);setTimeout(()=>rp.remove(),900);
}
const CC=['#7c3aed','#a855f7','#c084fc','#e879f9','#d8b4fe','#f0abfc','#8b5cf6','#6d28d9','#fff'];
function confetti(){for(let i=0;i<24;i++)setTimeout(singleConfetti,i*42);}
function singleConfetti(){
  const c=document.createElement('div');c.className='confetti-piece';
  const cd=1.5+Math.random()*2.4;
  c.style.cssText=`--cd:${cd}s;--cd2:${Math.random()*0.4}s;--cl:${Math.random()*100}%;--cc:${CC[Math.floor(Math.random()*CC.length)]}`;
  document.body.appendChild(c);setTimeout(()=>c.remove(),(cd+0.7)*1000);
}

loadScenario();
</script>
