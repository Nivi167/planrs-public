<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 2 · The 4 Ps – Sorting Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --product: #F59E0B;
  --price: #3B82F6;
  --place: #10B981;
  --promo: #EF4444;
  --bg: #FFF7ED;
  --card: #FFFBF5;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 14px;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(251,191,36,.12) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(139,92,246,.10) 0%, transparent 50%);
  overflow-x: hidden;
}

/* ── OVERLAY ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn .3s ease;
}
#overlay.hidden { display: none; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(40px) scale(.92)} to{opacity:1;transform:translateY(0) scale(1)} }

#modal {
  background: #fff;
  border-radius: 28px;
  padding: 28px 24px 24px;
  width: 100%; max-width: 680px;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,.25), 0 0 0 1.5px rgba(255,255,255,.5) inset;
  animation: slideUp .4s cubic-bezier(.34,1.56,.64,1);
}

/* ── CLOSE BUTTON ── */
#close-btn {
  position: absolute;
  top: 14px; right: 14px;
  width: 38px; height: 38px;
  border: none;
  background: #FECACA;
  color: #DC2626;
  border-radius: 50%;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, background .2s, box-shadow .2s;
  box-shadow: 0 3px 12px rgba(239,68,68,.3);
  line-height: 1;
  z-index: 10;
}
#close-btn:hover {
  transform: rotate(90deg) scale(1.15);
  background: #FCA5A5;
  box-shadow: 0 5px 18px rgba(239,68,68,.45);
}
#close-btn:active { transform: rotate(90deg) scale(.95); }

/* ── CLOSED STATE ── */
#closed-badge {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #7C3AED;
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 13px 22px;
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(124,58,237,.45);
  display: none;
  align-items: center; gap: 8px;
  transition: transform .2s, box-shadow .2s;
  z-index: 999;
  animation: bounceIn .5s cubic-bezier(.34,1.56,.64,1);
}
#closed-badge.show { display: flex; }
#closed-badge:hover { transform: scale(1.06); box-shadow: 0 12px 36px rgba(124,58,237,.5); }

@keyframes bounceIn { from{opacity:0;transform:scale(.5) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

/* ── HEADER ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.logo {
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  color: #E84545;
  background: #fff;
  border: 2.5px solid #E84545;
  border-radius: 20px;
  padding: 4px 14px;
  box-shadow: 3px 3px 0 rgba(232,69,69,.2);
}
.score {
  background: #fff;
  border: 2.5px solid #9B59B6;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 14px;
  font-weight: 900;
  color: #9B59B6;
  box-shadow: 3px 3px 0 rgba(155,89,182,.2);
  transition: transform .2s;
}
.score.pop { animation: scorePop .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes scorePop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

h1 {
  text-align: center;
  font-family: 'Fredoka One', cursive;
  color: #7C3AED;
  font-size: 24px;
  margin-bottom: 2px;
  text-shadow: 2px 2px 0 rgba(124,58,237,.15);
}
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 10px; }

.instr {
  background: linear-gradient(135deg, #EDE9FE, #F5F3FF);
  border-left: 4px solid #9B59B6;
  border-radius: 10px;
  padding: 9px 13px;
  color: #444;
  font-size: 13.5px;
  margin-bottom: 12px;
  box-shadow: 0 2px 10px rgba(155,89,182,.1);
}

/* ── PROGRESS ── */
.prog-wrap {
  background: #E5E7EB;
  border-radius: 10px;
  height: 10px;
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,.08);
}
.prog {
  background: linear-gradient(90deg, #9B59B6, #3498DB, #06B6D4);
  background-size: 200% 100%;
  height: 100%;
  width: 0;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  border-radius: 10px;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer {
  0%{background-position:100% 0} 100%{background-position:-100% 0}
}

/* ── POOL ── */
.pool {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  justify-content: center;
  background: rgba(255,255,255,.8);
  border: 2.5px dashed #CBD5E1;
  border-radius: 16px;
  padding: 14px;
  min-height: 60px;
  margin-bottom: 16px;
  transition: background .3s, border-color .3s;
}
.pool.dragover-pool {
  background: #F5F3FF;
  border-color: #9B59B6;
}

/* ── ITEMS ── */
.item {
  background: linear-gradient(135deg, #FDE68A, #FCD34D);
  border: 2.5px solid #F59E0B;
  border-radius: 12px;
  padding: 9px 15px;
  font-size: 13.5px;
  font-weight: 800;
  color: #333;
  cursor: grab;
  user-select: none;
  touch-action: none;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  box-shadow: 0 3px 10px rgba(245,158,11,.25), 3px 3px 0 rgba(245,158,11,.35);
  position: relative;
  will-change: transform;
}
.item:hover:not(.placed-ok):not(.placed-err) {
  transform: translateY(-3px) rotate(-1deg) scale(1.04);
  box-shadow: 0 8px 20px rgba(245,158,11,.35), 3px 3px 0 rgba(245,158,11,.35);
}
.item:active { cursor: grabbing; }
.item.dragging {
  opacity: .35;
  transform: scale(1.05);
}

/* placed states */
.item.placed-ok {
  background: linear-gradient(135deg, #A7F3D0, #D1FAE5);
  border-color: #10B981;
  cursor: default;
  box-shadow: 0 3px 10px rgba(16,185,129,.25), 3px 3px 0 rgba(16,185,129,.35);
  animation: placedPop .45s cubic-bezier(.34,1.56,.64,1);
}
.item.placed-err {
  background: linear-gradient(135deg, #FECACA, #FEE2E2);
  border-color: #EF4444;
  animation: shake .4s ease-out, blink .4s ease-out;
}

@keyframes placedPop {
  0%{transform:scale(.5) rotate(-8deg);opacity:.4}
  60%{transform:scale(1.15) rotate(4deg)}
  80%{transform:scale(.95) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}
}
@keyframes shake {
  0%,100%{transform:translateX(0) rotate(0)}
  20%{transform:translateX(-6px) rotate(-3deg)}
  40%{transform:translateX(6px) rotate(3deg)}
  60%{transform:translateX(-4px) rotate(-2deg)}
  80%{transform:translateX(4px) rotate(2deg)}
}
@keyframes blink {
  0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)}
}

/* flying particle */
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 22px;
  z-index: 9999;
  animation: flyUp .7s ease-out forwards;
}
@keyframes flyUp {
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(.4)}
}

/* ── BUCKETS ── */
.buckets {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
@media(max-width:460px){.buckets{grid-template-columns:1fr}}

.bucket {
  border: 2.5px dashed #CBD5E1;
  border-radius: 18px;
  padding: 12px;
  min-height: 115px;
  background: #fff;
  transition: background .25s, border-color .25s, transform .2s, box-shadow .2s;
  box-shadow: 0 4px 14px rgba(0,0,0,.05);
}
.bucket.over {
  transform: scale(1.03);
  box-shadow: 0 8px 28px rgba(0,0,0,.12);
}

.btitle {
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  text-align: center;
  padding-bottom: 8px;
  border-bottom: 2px solid #F3F4F6;
  margin-bottom: 8px;
}
.bitems {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  min-height: 38px;
}

/* per-bucket colours */
.bucket[data-id=product]  { border-color: #FCD34D; }
.bucket[data-id=price]    { border-color: #93C5FD; }
.bucket[data-id=place]    { border-color: #6EE7B7; }
.bucket[data-id=promotion]{ border-color: #FCA5A5; }

.bucket[data-id=product].over  { background: #FFFBEB; border-color: var(--product); }
.bucket[data-id=price].over    { background: #EFF6FF; border-color: var(--price); }
.bucket[data-id=place].over    { background: #ECFDF5; border-color: var(--place); }
.bucket[data-id=promotion].over{ background: #FFF1F2; border-color: var(--promo); }

.bucket[data-id=product]  .btitle { color: #D97706; }
.bucket[data-id=price]    .btitle { color: #2563EB; }
.bucket[data-id=place]    .btitle { color: #059669; }
.bucket[data-id=promotion].btitle { color: #DC2626; }

/* ── BANNER ── */
.banner {
  display: none;
  text-align: center;
  padding: 12px 16px;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  margin-top: 10px;
  letter-spacing: .3px;
}
.banner.show  { display: block; animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
.banner.win   { background: linear-gradient(135deg, #D1FAE5, #A7F3D0); color: #064E3B; box-shadow: 0 6px 24px rgba(16,185,129,.25); }
.banner.tip   { background: linear-gradient(135deg, #FFF9C4, #FEF3C7); color: #78350F; box-shadow: 0 6px 24px rgba(251,191,36,.25); }

@keyframes popIn {
  0%{opacity:0;transform:scale(.7) translateY(10px)}
  60%{transform:scale(1.07) translateY(-3px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ── BUTTONS ── */
.btns { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
button.br, button.bn {
  padding: 12px 28px;
  border: none;
  border-radius: 30px;
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
  position: relative;
}
button.br {
  background: linear-gradient(135deg, #E84545, #EF4444);
  color: #fff;
  box-shadow: 0 5px 18px rgba(232,69,69,.4), 0 3px 0 rgba(180,30,30,.4);
}
button.bn {
  background: linear-gradient(135deg, #9B59B6, #7C3AED);
  color: #fff;
  box-shadow: 0 5px 18px rgba(124,58,237,.4), 0 3px 0 rgba(76,29,149,.4);
}
button.br:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 28px rgba(232,69,69,.45), 0 3px 0 rgba(180,30,30,.4); }
button.bn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 28px rgba(124,58,237,.45), 0 3px 0 rgba(76,29,149,.4); }
button:active { transform: translateY(1px) scale(.97); }
</style>
</head>
<body>

<!-- CLOSED BADGE (visible after modal closed) -->
<button id="closed-badge" onclick="reopenModal()">📦 Reopen Activity ↗</button>

<!-- OVERLAY + MODAL -->
<div id="overlay">
  <div id="modal">
    <!-- CLOSE BUTTON -->
    <button id="close-btn" onclick="closeModal()" title="Close">✕</button>

    <header>
      <div class="logo">⭐ Planrs</div>
      <div class="score" id="sc">Score: 0 / 12</div>
    </header>

    <h1>📦 The 4 Ps of Marketing</h1>
    <p class="sub">Section 2 · Sort each card into the correct P bucket!</p>
    <div class="instr">📌 Drag each card into the right bucket: <strong>Product · Price · Place · Promotion</strong></div>

    <div class="prog-wrap"><div class="prog" id="prog"></div></div>
    <div class="pool" id="pool"></div>

    <div class="buckets">
      <div class="bucket" data-id="product" id="b-product">
        <div class="btitle">📦 Product<br><small style="font-weight:700;color:#D97706;font-size:11px;font-family:'Nunito',sans-serif">What you sell</small></div>
        <div class="bitems" id="bi-product"></div>
      </div>
      <div class="bucket" data-id="price" id="b-price">
        <div class="btitle">💰 Price<br><small style="font-weight:700;color:#2563EB;font-size:11px;font-family:'Nunito',sans-serif">What it costs</small></div>
        <div class="bitems" id="bi-price"></div>
      </div>
      <div class="bucket" data-id="place" id="b-place">
        <div class="btitle">📍 Place<br><small style="font-weight:700;color:#059669;font-size:11px;font-family:'Nunito',sans-serif">Where you sell</small></div>
        <div class="bitems" id="bi-place"></div>
      </div>
      <div class="bucket" data-id="promotion" id="b-promotion">
        <div class="btitle">📣 Promotion<br><small style="font-weight:700;color:#DC2626;font-size:11px;font-family:'Nunito',sans-serif">How you tell people</small></div>
        <div class="bitems" id="bi-promotion"></div>
      </div>
    </div>

    <div class="banner" id="banner"></div>

    <div class="btns">
      <button class="br" onclick="init()">🔄 Try Again</button>
      <button class="bn" onclick="nextSection()">➡️ Next Section</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  {text:"Homemade lemonade 🍋", b:"product"},
  {text:"Quality packaging 📦",  b:"product"},
  {text:"Mango pickle recipe 🥭", b:"product"},
  {text:"Rs. 10 per glass 💵",    b:"price"},
  {text:"Discount on bulk order", b:"price"},
  {text:"Free trial offer 🎁",    b:"price"},
  {text:"School canteen 🏫",      b:"place"},
  {text:"WhatsApp delivery 📱",   b:"place"},
  {text:"Sunday bazaar stall 🛒", b:"place"},
  {text:"Colourful poster 🎨",    b:"promotion"},
  {text:"Word of mouth 🗣️",       b:"promotion"},
  {text:"Instagram reel 📸",      b:"promotion"},
];

const SPARKS = ['⭐','✨','🌟','💫','🎉','🎊','🥳','❤️','🔥'];
let correct = 0, drag = null, touchSrc = null, touchClone = null, lastTarget = null;
const total = ITEMS.length;

/* ── MODAL ── */
function closeModal() {
  const overlay = document.getElementById('overlay');
  overlay.style.animation = 'fadeOut .3s ease forwards';
  overlay.addEventListener('animationend', () => {
    overlay.classList.add('hidden');
    const badge = document.getElementById('closed-badge');
    badge.classList.add('show');
  }, {once:true});
}

// add fadeOut keyframe
const style = document.createElement('style');
style.textContent = `@keyframes fadeOut{from{opacity:1}to{opacity:0}}`;
document.head.appendChild(style);

function reopenModal() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.style.animation = 'fadeIn .3s ease forwards';
  document.getElementById('closed-badge').classList.remove('show');
}

function nextSection() {
  alert('Excellent! Move to Section 3 — Know Your Customer 🎯');
}

/* ── SPARKLE ── */
function spawnSparks(el) {
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = SPARKS[~~(Math.random() * SPARKS.length)];
    s.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
    s.style.top  = (rect.top  + rect.height/2 + (Math.random()-0.5)*30) + 'px';
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

/* ── INIT ── */
function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function init() {
  correct = 0;
  document.getElementById('sc').textContent = `Score: 0 / ${total}`;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('banner').className = 'banner';
  ['product','price','place','promotion'].forEach(id =>
    document.getElementById('bi-' + id).innerHTML = ''
  );
  const pool = document.getElementById('pool');
  pool.innerHTML = '';

  // pool dragover highlight
  pool.addEventListener('dragover', e => { e.preventDefault(); pool.classList.add('dragover-pool'); });
  pool.addEventListener('dragleave', () => pool.classList.remove('dragover-pool'));
  pool.addEventListener('drop', e => { e.preventDefault(); pool.classList.remove('dragover-pool'); });

  shuffle(ITEMS).forEach((item, i) => {
    const c = document.createElement('div');
    c.className = 'item';
    c.textContent = item.text;
    c.dataset.b = item.b;
    c.draggable = true;
    c.style.animationDelay = (i * 60) + 'ms';
    c.style.animation = `placedPop .45s ${i*60}ms both`;

    c.addEventListener('dragstart', () => { drag = c; c.classList.add('dragging'); });
    c.addEventListener('dragend',   () => c.classList.remove('dragging'));
    c.addEventListener('touchstart', ts, {passive:false});
    c.addEventListener('touchmove',  tm, {passive:false});
    c.addEventListener('touchend',   te);
    pool.appendChild(c);
  });

  ['product','price','place','promotion'].forEach(id => {
    const b = document.getElementById('b-' + id);
    // remove old listeners by cloning
    const nb = b.cloneNode(true);
    b.parentNode.replaceChild(nb, b);
    nb.addEventListener('dragover',  e => { e.preventDefault(); nb.classList.add('over'); });
    nb.addEventListener('dragleave', ()  => nb.classList.remove('over'));
    nb.addEventListener('drop', e => {
      e.preventDefault();
      nb.classList.remove('over');
      if (drag) handle(nb, drag);
    });
  });
}

/* ── TOUCH ── */
function ts(e) {
  touchSrc = this;
  const t = e.touches[0];
  touchClone = this.cloneNode(true);
  touchClone.style.cssText = `position:fixed;opacity:.75;pointer-events:none;z-index:9999;
    left:${t.clientX - 55}px;top:${t.clientY - 20}px;transform:rotate(-4deg) scale(1.08);
    transition:none;box-shadow:0 12px 32px rgba(0,0,0,.25);`;
  document.body.appendChild(touchClone);
}
function tm(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (touchClone) {
    touchClone.style.left = t.clientX - 55 + 'px';
    touchClone.style.top  = t.clientY - 20 + 'px';
  }
  // highlight bucket under finger
  touchClone && (touchClone.style.display = 'none');
  lastTarget = document.elementFromPoint(t.clientX, t.clientY);
  touchClone && (touchClone.style.display = '');
  // over highlight
  document.querySelectorAll('.bucket').forEach(b => b.classList.remove('over'));
  let el = lastTarget;
  while (el && !el.classList.contains('bucket')) el = el.parentElement;
  if (el) el.classList.add('over');
}
function te() {
  document.querySelectorAll('.bucket').forEach(b => b.classList.remove('over'));
  if (touchClone) { document.body.removeChild(touchClone); touchClone = null; }
  let el = lastTarget;
  while (el && !el.classList.contains('bucket')) el = el.parentElement;
  if (el && touchSrc) handle(el, touchSrc);
}

/* ── HANDLE DROP ── */
function handle(bucket, card) {
  if (card.dataset.placed) return;
  const bid = bucket.dataset.id;
  const ok  = card.dataset.b === bid;

  if (ok) {
    card.dataset.placed = '1';
    card.remove();
    card.className = 'item placed-ok';
    card.draggable  = false;
    document.getElementById('bi-' + bid).appendChild(card);
    spawnSparks(card);
    correct++;
    const sc = document.getElementById('sc');
    sc.textContent = `Score: ${correct} / ${total}`;
    sc.classList.remove('pop');
    void sc.offsetWidth;
    sc.classList.add('pop');
    document.getElementById('prog').style.width = (correct / total * 100) + '%';
    if (correct === total) msg(['🎉 All 12 sorted correctly! You know your 4 Ps!','⭐ Brilliant! Perfect score! 🌟'], true);
  } else {
    const ghost = document.createElement('div');
    ghost.className = 'item placed-err';
    ghost.textContent = card.textContent;
    document.getElementById('bi-' + bid).appendChild(ghost);
    setTimeout(() => ghost.remove(), 750);
    msg(['Not this bucket! Try another P 🤔','Check which P it belongs to 💡','Almost! Look carefully 🔍'], false);
  }
}

function msg(arr, win) {
  const b = document.getElementById('banner');
  b.textContent = arr[~~(Math.random() * arr.length)];
  b.className = 'banner show ' + (win ? 'win' : 'tip');
  if (!win) setTimeout(() => b.className = 'banner', 2400);
}

init();
</script>
</body>
</html>
