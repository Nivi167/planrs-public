<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S4A: Safety Quiz | ⭐ Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;overflow-x:hidden;cursor:default;font-family:'Nunito',sans-serif;}

/* ── CANVAS LAYER ── */
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%;}

/* ── CSS OVERLAY EFFECTS ── */
#overlay{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}

/* Aurora bands */
.aurora{position:absolute;width:200%;height:180px;border-radius:50%;filter:blur(45px);opacity:.35;animation:auroraWave ease-in-out infinite;}
.au1{background:linear-gradient(90deg,#FF6BD6,#A855F7,#4DA6FF,#6BCB77);top:8%;left:-50%;animation-duration:8s;}
.au2{background:linear-gradient(90deg,#FFD93D,#FF6B9D,#6BFFDA,#B06BFF);top:18%;left:-30%;animation-duration:11s;animation-delay:-4s;height:140px;opacity:.25;}
.au3{background:linear-gradient(90deg,#6BAAFF,#FFD86B,#FF6BD6,#6BCB77);top:0%;left:-60%;animation-duration:14s;animation-delay:-7s;height:120px;opacity:.2;}
@keyframes auroraWave{
  0%{transform:translateX(0) scaleY(1)}
  30%{transform:translateX(8%) scaleY(1.15)}
  60%{transform:translateX(-5%) scaleY(.88)}
  100%{transform:translateX(0) scaleY(1)}
}

/* Big spinning mandala / kaleidoscope rings */
.mandala{position:fixed;border-radius:50%;pointer-events:none;animation:mandSpin linear infinite;}
.man1{width:420px;height:420px;top:50%;left:50%;margin:-210px 0 0 -210px;border:3px solid rgba(255,107,157,.12);animation-duration:30s;box-shadow:0 0 40px rgba(255,107,157,.08) inset;}
.man2{width:320px;height:320px;top:50%;left:50%;margin:-160px 0 0 -160px;border:3px solid rgba(168,85,247,.15);animation-duration:22s;animation-direction:reverse;}
.man3{width:220px;height:220px;top:50%;left:50%;margin:-110px 0 0 -110px;border:3px solid rgba(77,166,255,.15);animation-duration:16s;}
.man4{width:130px;height:130px;top:50%;left:50%;margin:-65px 0 0 -65px;border:3px solid rgba(107,203,119,.15);animation-duration:10s;animation-direction:reverse;}
@keyframes mandSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Corner spinning stars */
.cspin{position:fixed;font-size:40px;animation:cspinAnim linear infinite;pointer-events:none;z-index:2;opacity:.55;}
.cs1{top:2%;left:1%;animation-duration:6s;font-size:36px;}
.cs2{top:2%;right:1%;animation-duration:8s;animation-direction:reverse;font-size:32px;}
.cs3{bottom:12%;left:1%;animation-duration:7s;font-size:30px;}
.cs4{bottom:12%;right:1%;animation-duration:5s;animation-direction:reverse;font-size:34px;}
@keyframes cspinAnim{
  0%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(90deg) scale(1.2)}
  50%{transform:rotate(180deg) scale(1)}
  75%{transform:rotate(270deg) scale(.8)}
  100%{transform:rotate(360deg) scale(1)}
}

/* Floating XL emojis (big decorative) */
.deco-em{position:fixed;pointer-events:none;z-index:2;animation:decoFloat ease-in-out infinite;}
.de1{font-size:48px;top:8%;left:6%;animation-duration:4s;}
.de2{font-size:42px;top:6%;right:7%;animation-duration:5s;animation-delay:-2s;}
.de3{font-size:52px;top:40%;left:3%;animation-duration:6s;animation-delay:-1s;}
.de4{font-size:44px;top:42%;right:3%;animation-duration:4.5s;animation-delay:-3s;}
.de5{font-size:38px;top:22%;left:8%;animation-duration:5.5s;animation-delay:-1.5s;}
.de6{font-size:40px;top:20%;right:9%;animation-duration:4.8s;animation-delay:-0.8s;}
@keyframes decoFloat{
  0%,100%{transform:translateY(0) rotate(-8deg) scale(1)}
  33%{transform:translateY(-20px) rotate(4deg) scale(1.08)}
  66%{transform:translateY(-12px) rotate(-4deg) scale(.95)}
}

/* Shooting comets */
.comet{position:fixed;pointer-events:none;z-index:2;white-space:nowrap;animation:cometFly linear infinite;}
.co1{top:6%;font-size:26px;animation-duration:5s;animation-delay:0s;}
.co2{top:22%;font-size:20px;animation-duration:8s;animation-delay:-3s;}
.co3{top:14%;font-size:18px;animation-duration:11s;animation-delay:-6s;}
.co4{top:35%;font-size:22px;animation-duration:7s;animation-delay:-1.5s;}
.co5{top:4%;font-size:16px;animation-duration:9s;animation-delay:-4.5s;}
@keyframes cometFly{
  0%{left:-80px;opacity:0}
  3%{opacity:1}
  92%{opacity:1}
  100%{left:calc(100vw + 80px);opacity:0}
}

/* Spiral arms */
.spiral{position:fixed;pointer-events:none;z-index:1;border-radius:50%;animation:spiralSpin linear infinite;opacity:.1;}
.sp1{width:600px;height:600px;top:50%;left:50%;margin:-300px 0 0 -300px;border:60px solid transparent;border-top:60px solid #FF6BD6;border-right:60px solid #FFD93D;animation-duration:20s;}
.sp2{width:400px;height:400px;top:50%;left:50%;margin:-200px 0 0 -200px;border:40px solid transparent;border-top:40px solid #6BAAFF;border-right:40px solid #6BCB77;animation-duration:15s;animation-direction:reverse;}
@keyframes spiralSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Ground scene */
.ground-strip{position:fixed;bottom:0;left:0;width:100%;height:88px;z-index:5;pointer-events:none;}
.ground-strip svg{width:100%;height:100%;}

/* Bouncing characters */
.chars-row{position:fixed;bottom:56px;left:0;width:100%;z-index:6;pointer-events:none;}
.character{position:absolute;font-size:34px;animation:charBounce ease-in-out infinite;}
.ch1{left:3%;animation-duration:1.1s;}
.ch2{left:11%;animation-duration:1.5s;animation-delay:.2s;font-size:28px;}
.ch3{left:20%;animation-duration:1.2s;animation-delay:.45s;}
.ch4{left:30%;animation-duration:1.4s;animation-delay:.1s;font-size:26px;}
.ch5{left:41%;animation-duration:1.0s;animation-delay:.35s;font-size:30px;}
.ch6{left:57%;animation-duration:1.3s;animation-delay:.55s;}
.ch7{left:67%;animation-duration:1.1s;animation-delay:.25s;font-size:28px;}
.ch8{left:77%;animation-duration:1.6s;animation-delay:.7s;}
.ch9{left:87%;animation-duration:1.2s;animation-delay:.15s;font-size:26px;}
.ch10{left:94%;animation-duration:1.4s;animation-delay:.5s;font-size:30px;}
@keyframes charBounce{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  35%{transform:translateY(-22px) scaleX(1.05) scaleY(.96)}
  50%{transform:translateY(-24px) scaleX(1.06) scaleY(.95)}
  65%{transform:translateY(-18px) scaleX(1.03) scaleY(.98)}
}

/* Floaty rising emojis */
.floaty{position:fixed;pointer-events:none;z-index:3;animation:floatUp linear forwards;}
@keyframes floatUp{
  0%{opacity:.9;transform:translateY(0) rotate(-15deg) scale(1)}
  25%{transform:translateY(-25vh) rotate(10deg) scale(1.1)}
  50%{opacity:.7;transform:translateY(-52vh) rotate(-8deg) scale(1.2)}
  75%{transform:translateY(-78vh) rotate(12deg) scale(1.05)}
  100%{opacity:0;transform:translateY(-108vh) rotate(-20deg) scale(.4)}
}

/* Rising bubbles */
.bubble{position:fixed;border-radius:50%;pointer-events:none;z-index:2;animation:bubbleRise linear infinite;}
@keyframes bubbleRise{
  0%{opacity:.8;transform:translateY(0) translateX(0)}
  25%{transform:translateY(-25vh) translateX(12px)}
  50%{transform:translateY(-52vh) translateX(-10px)}
  75%{transform:translateY(-78vh) translateX(8px)}
  100%{opacity:0;transform:translateY(-110vh) translateX(-5px)}
}

/* ── MAIN APP ── */
#app{position:relative;z-index:10;max-width:680px;margin:0 auto;padding:14px 14px 112px;}

/* Logo */
.logo{
  position:fixed;top:10px;right:12px;z-index:300;
  background:linear-gradient(135deg,#FFD93D,#FF9548);color:#fff;
  font-family:'Fredoka One',cursive;font-size:14px;
  padding:6px 16px;border-radius:30px;
  box-shadow:0 4px 0 #b85e00,0 6px 20px rgba(255,149,72,.5);
  border:3px solid rgba(255,255,255,.9);
  animation:logoDance 2s ease-in-out infinite;
}
@keyframes logoDance{
  0%,100%{transform:translateY(0) rotate(-2deg) scale(1)}
  50%{transform:translateY(-6px) rotate(2deg) scale(1.05)}
}

/* Title */
.title-wrap{text-align:center;margin:8px 0 5px;position:relative;}
.title-badge{
  display:inline-block;
  background:linear-gradient(135deg,#FF6B9D 0%,#FF9548 35%,#FFD93D 65%,#6BCB77 100%);
  background-size:200% 200%;
  color:#fff;font-family:'Fredoka One',cursive;
  font-size:clamp(19px,5vw,31px);
  padding:10px 28px;border-radius:26px;
  box-shadow:0 7px 0 #b83060,0 10px 32px rgba(255,107,157,.45);
  letter-spacing:1px;
  animation:titleGrad 4s ease infinite, titleBounce 3s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.title-badge::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);animation:tShine 2.5s linear infinite;}
@keyframes tShine{0%{left:-100%}100%{left:200%}}
@keyframes titleGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes titleBounce{0%,100%{transform:scale(1) rotate(-.5deg)}50%{transform:scale(1.04) rotate(.5deg)}}

.sub{text-align:center;font-size:13px;font-weight:800;color:#444;margin-bottom:10px;background:rgba(255,255,255,.78);display:inline-block;padding:5px 18px;border-radius:20px;width:100%;border:2px solid rgba(255,255,255,.95);backdrop-filter:blur(8px);}

/* Score */
.score-bar{
  background:rgba(255,255,255,.9);backdrop-filter:blur(10px);
  border-radius:22px;padding:10px 20px;text-align:center;
  font-family:'Fredoka One',cursive;font-size:20px;color:#A855F7;
  margin-bottom:10px;
  box-shadow:0 5px 0 rgba(0,0,0,.06),0 8px 28px rgba(168,85,247,.18);
  border:3px solid transparent;
  background-clip:padding-box;
  position:relative;overflow:hidden;
}
.score-bar::before{
  content:'';position:absolute;inset:-3px;border-radius:24px;z-index:-1;
  background:linear-gradient(135deg,#FF6B9D,#FFD93D,#6BCB77,#4DA6FF,#A855F7,#FF6B9D);
  background-size:300% 300%;
  animation:scoreBorderFlow 3s linear infinite;
}
@keyframes scoreBorderFlow{0%{background-position:0%}100%{background-position:300%}}
.score-bar::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.9);border-radius:20px;z-index:-1;}
.sc-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:12px;}
.sc-star{display:inline-block;animation:scStarSpin 1.8s linear infinite;font-size:22px;}
@keyframes scStarSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}

.pbar-wrap{
  height:18px;border-radius:20px;margin-bottom:4px;overflow:hidden;
  background:rgba(255,255,255,.6);
  border:3px solid rgba(255,255,255,.9);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
}
.pbar{
  height:100%;border-radius:20px;
  background:linear-gradient(90deg,#FF6B9D,#FF9548,#FFD93D,#6BCB77,#4DA6FF,#A855F7,#FF6B9D);
  background-size:400% 100%;
  transition:width .7s cubic-bezier(.34,1.56,.64,1);
  animation:pbarFlow 2.5s linear infinite;
  position:relative;
}
.pbar::after{content:'';position:absolute;top:3px;left:10px;right:10px;height:6px;background:rgba(255,255,255,.5);border-radius:10px;}
@keyframes pbarFlow{0%{background-position:0%}100%{background-position:400%}}
.ptxt{text-align:center;font-size:13px;color:#444;font-weight:800;margin-bottom:14px;}

/* Question card */
.qcard{
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-radius:28px;padding:24px 18px 20px;
  margin-bottom:14px;
  animation:qcardIn .6s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:visible;
  border:3px solid rgba(255,255,255,.9);
  box-shadow:
    0 0 0 3px rgba(255,107,157,.25),
    0 12px 0 rgba(0,0,0,.06),
    0 16px 45px rgba(0,0,0,.12);
}
.qcard::before{
  content:'';position:absolute;inset:-3px;border-radius:30px;z-index:-1;
  background:linear-gradient(135deg,#FF6B9D,#FFD93D,#6BCB77,#4DA6FF,#A855F7,#FF6B9D);
  background-size:300% 300%;animation:qcardBorder 4s linear infinite;
}
@keyframes qcardBorder{0%{background-position:0%}100%{background-position:300%}}
@keyframes qcardIn{
  0%{opacity:0;transform:scale(.78) translateY(30px) rotate(-2deg)}
  60%{transform:scale(1.04) translateY(-5px) rotate(.5deg)}
  80%{transform:scale(.98) translateY(2px)}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0)}
}

.qcard-deco{
  position:absolute;top:-17px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#FF6B9D,#A855F7,#4DA6FF);
  background-size:200% 200%;animation:decoBg 3s ease infinite;
  color:#fff;font-family:'Fredoka One',cursive;font-size:12px;
  padding:4px 20px;border-radius:20px;white-space:nowrap;
  box-shadow:0 4px 14px rgba(168,85,247,.5);
}
@keyframes decoBg{0%,100%{background-position:0%}50%{background-position:100%}}

.qnum{font-size:11px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;margin:14px 0 9px;
  background:linear-gradient(90deg,#FF6B9D,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.qtext{font-size:clamp(14px,3.5vw,17px);font-weight:800;color:#1a1a2e;line-height:1.65;margin-bottom:16px;}

/* DnD hint */
.dnd-hint{
  font-size:12px;font-weight:800;color:#888;text-align:center;
  margin-bottom:10px;padding:7px 12px;border-radius:12px;
  background:linear-gradient(135deg,rgba(255,107,157,.07),rgba(168,85,247,.07));
  border:2px dashed #DDB8FF;
  animation:hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse{0%,100%{border-color:#DDB8FF;background:rgba(255,107,157,.06)}50%{border-color:#FF6B9D;background:rgba(255,107,157,.1)}}

/* Option buttons */
.drag-zone{display:flex;flex-direction:column;gap:9px;padding:2px;}
.opt{
  background:linear-gradient(135deg,#fff 0%,#F9F0FF 100%);
  border:3px solid #DDB8FF;border-radius:16px;
  padding:13px 14px;font-size:14px;font-weight:700;color:#2a2a3e;
  cursor:grab;display:flex;align-items:flex-start;gap:10px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,border-color .18s,background .18s;
  box-shadow:0 5px 0 #c6a0e0,0 7px 18px rgba(168,85,247,.1);
  user-select:none;position:relative;overflow:hidden;
}
.opt::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,107,157,.0),rgba(168,85,247,.0));
  transition:background .2s;
}
.opt::after{content:'';position:absolute;top:0;left:-110%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);transition:left .45s;}
.opt:hover{
  transform:translateY(-7px) scale(1.025);
  box-shadow:0 12px 0 #c6a0e0,0 16px 32px rgba(168,85,247,.25);
  border-color:#A855F7;
  background:linear-gradient(135deg,#F5E8FF,#FFE8F8);
}
.opt:hover::after{left:160%;}
.opt:active{cursor:grabbing;}
.opt.dragging{opacity:.3;transform:rotate(6deg) scale(.86);}
.opt .lbl{
  background:linear-gradient(135deg,#FFD93D,#FF9548);color:#fff;
  border-radius:9px;padding:3px 10px;font-family:'Fredoka One',cursive;
  font-size:13px;flex-shrink:0;margin-top:1px;
  box-shadow:0 3px 0 #b85e00;text-shadow:0 1px 2px rgba(0,0,0,.2);
}
.opt.correct{
  background:linear-gradient(135deg,#B8FFD0,#88FFB0);border-color:#3DBE5A;
  box-shadow:0 5px 0 #1e8a38,0 8px 28px rgba(61,190,90,.35);
  animation:optCorrect .65s cubic-bezier(.34,1.56,.64,1);
}
.opt.wrong{
  background:linear-gradient(135deg,#FFD0D8,#FFAABA);border-color:#FF3355;
  box-shadow:0 5px 0 #aa1130,0 8px 28px rgba(255,51,85,.3);
  animation:optWrong .5s ease;
}
.opt.reveal{
  background:linear-gradient(135deg,#B8FFD0,#88FFB0);border-color:#3DBE5A;
  box-shadow:0 5px 0 #1e8a38;opacity:.75;
}
.opt[disabled]{cursor:default;transform:none !important;}
@keyframes optCorrect{
  0%{transform:scale(1)}
  25%{transform:scale(1.1) rotate(1.5deg)}
  50%{transform:scale(.96) rotate(-.5deg)}
  75%{transform:scale(1.03)}
  100%{transform:scale(1) rotate(0)}
}
@keyframes optWrong{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-12px) rotate(-2deg)}
  35%{transform:translateX(12px) rotate(2deg)}
  55%{transform:translateX(-8px) rotate(-1deg)}
  75%{transform:translateX(8px) rotate(1deg)}
}

/* Drop zone */
.answer-area{background:rgba(255,255,255,.52);border-radius:18px;padding:12px;margin:12px 0;border:3px solid rgba(168,85,247,.2);backdrop-filter:blur(6px);}
.drop-label{font-size:11px;font-weight:900;color:#A855F7;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.drop-target{
  min-height:64px;border:3px dashed #A855F7;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#A855F7;padding:10px;
  background:linear-gradient(135deg,rgba(168,85,247,.04),rgba(255,107,157,.04));
  transition:all .25s;
  animation:dtGlow 2.5s ease-in-out infinite;
}
@keyframes dtGlow{
  0%,100%{border-color:#A855F7;box-shadow:none}
  50%{border-color:#FF6B9D;box-shadow:0 0 0 5px rgba(168,85,247,.08),0 0 18px rgba(255,107,157,.12)}
}
.drop-target.drag-over{background:rgba(168,85,247,.13);border-color:#FF6B9D;border-style:solid;transform:scale(1.03);animation:none;box-shadow:0 0 0 5px rgba(255,107,157,.15);}

/* Explanation */
.expl{margin-top:14px;background:linear-gradient(135deg,#FFFAE8,#FFF5E8,#FFF0F8);border-left:5px solid #FFB347;border-radius:14px;padding:14px 15px;font-size:14px;font-weight:700;color:#3a3a3a;line-height:1.65;display:none;box-shadow:0 5px 22px rgba(255,179,71,.22);}
.expl.show{display:block;animation:qcardIn .4s ease}

/* Next button */
.next-btn{
  display:none;margin:14px auto 0;
  background:linear-gradient(135deg,#FF6B9D,#FF9548,#FFD93D,#6BCB77,#4DA6FF,#A855F7,#FF6B9D);
  background-size:400% 400%;
  color:#fff;border:none;border-radius:20px;
  padding:15px 42px;font-size:16px;
  font-family:'Fredoka One',cursive;letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 8px 0 #5500bb,0 12px 32px rgba(168,85,247,.55);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  position:relative;overflow:hidden;
  animation:btnGrad 3s ease infinite;
}
@keyframes btnGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.next-btn.show{display:block;animation:qcardIn .5s cubic-bezier(.34,1.56,.64,1),btnGrad 3s ease infinite .5s;}
.next-btn:hover{transform:translateY(-7px) scale(1.06);box-shadow:0 14px 0 #5500bb,0 20px 38px rgba(168,85,247,.65);}
.next-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #5500bb;}
.next-btn::before{content:'';position:absolute;top:-50%;left:-60%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:btnShine 2s linear infinite;}
@keyframes btnShine{0%{left:-60%}100%{left:170%}}

/* Confetti */
.cp{position:fixed;top:-18px;animation:cpFall linear forwards;pointer-events:none;z-index:999;}
@keyframes cpFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(115vh) rotate(1080deg)}}

/* Particles */
.part{position:fixed;pointer-events:none;z-index:999;animation:partPop .95s ease forwards;}
@keyframes partPop{
  0%{transform:scale(0) translateY(0);opacity:1}
  50%{transform:scale(1.6) translateY(-55px);opacity:1}
  100%{transform:scale(.1) translateY(-120px);opacity:0}
}

/* Result screen */
.result{
  display:none;text-align:center;
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-radius:28px;padding:34px 22px;
  position:relative;overflow:hidden;
  border:3px solid rgba(255,255,255,.9);
  box-shadow:0 0 0 3px rgba(255,107,157,.2),0 14px 0 rgba(0,0,0,.06),0 20px 55px rgba(0,0,0,.14);
}
.result::before{content:'';position:absolute;inset:-3px;border-radius:30px;z-index:-1;background:linear-gradient(135deg,#FF6B9D,#FFD93D,#6BCB77,#4DA6FF,#A855F7,#FF6B9D);background-size:300% 300%;animation:qcardBorder 4s linear infinite;}

@keyframes scorePop{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.14) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}

</style>

<script>
/* ====================================================
   CANVAS BACKGROUND — particles, fireworks, waves
==================================================== */
(function(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  let W,H,t=0;

  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  // Gradient background
  function drawBg(){
    const phase=t*0.003;
    const r1=Math.sin(phase)*30;
    const g=ctx.createLinearGradient(0,0,W,H);
    // Cycle through 5 pastel color combos
    const hue=(t*0.15)%360;
    g.addColorStop(0,`hsl(${hue},85%,94%)`);
    g.addColorStop(.25,`hsl(${(hue+60)%360},80%,92%)`);
    g.addColorStop(.5,`hsl(${(hue+120)%360},85%,93%)`);
    g.addColorStop(.75,`hsl(${(hue+200)%360},80%,92%)`);
    g.addColorStop(1,`hsl(${(hue+280)%360},85%,94%)`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // Wavy layers
  function drawWaves(){
    const waveColors=[
      `hsla(${(t*.2)%360},85%,75%,0.18)`,
      `hsla(${(t*.15+80)%360},80%,72%,0.15)`,
      `hsla(${(t*.1+160)%360},85%,78%,0.12)`,
    ];
    waveColors.forEach((col,i)=>{
      ctx.beginPath();
      ctx.moveTo(0,H*.3+i*60);
      for(let x=0;x<=W;x+=4){
        const y=H*.3+i*60+Math.sin((x/W*Math.PI*4)+(t*(.012+i*.004)))*38+Math.cos((x/W*Math.PI*3)+(t*(.008+i*.003)))*22;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
      ctx.fillStyle=col;ctx.fill();
    });
  }

  // Orbiting sparkle dots
  const dots=[];
  for(let i=0;i<55;i++){
    dots.push({
      angle:Math.random()*Math.PI*2,
      r:60+Math.random()*(Math.min(W,H)*.45),
      cx:Math.random(),cy:Math.random(),
      speed:.004+Math.random()*.012,
      size:2+Math.random()*4,
      hue:Math.random()*360,
      alpha:.5+Math.random()*.5
    });
  }
  function drawDots(){
    dots.forEach(d=>{
      d.angle+=d.speed;
      const x=d.cx*W+Math.cos(d.angle)*d.r;
      const y=d.cy*H+Math.sin(d.angle)*d.r*.45;
      ctx.beginPath();
      ctx.arc(x,y,d.size,0,Math.PI*2);
      ctx.fillStyle=`hsla(${(d.hue+t*.2)%360},90%,65%,${d.alpha})`;
      ctx.fill();
      // Sparkle cross
      ctx.strokeStyle=`hsla(${(d.hue+t*.2)%360},90%,75%,${d.alpha*.5})`;
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x-d.size*2,y);ctx.lineTo(x+d.size*2,y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y-d.size*2);ctx.lineTo(x,y+d.size*2);ctx.stroke();
    });
  }

  // Lissajous rainbow ribbons
  function drawRibbons(){
    for(let r=0;r<3;r++){
      ctx.beginPath();
      const phOff=r*2.1+t*.006;
      for(let i=0;i<=220;i++){
        const frac=i/220;
        const x=W*.5+Math.sin(frac*Math.PI*4.1+phOff)*W*.38;
        const y=H*.38+Math.sin(frac*Math.PI*6.3+phOff*.7)*H*.24;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.strokeStyle=`hsla(${(t*.3+r*110)%360},80%,65%,0.09)`;
      ctx.lineWidth=22;ctx.lineCap='round';ctx.stroke();
    }
  }

  // Mini fireworks
  const FW=[];
  function launchFW(){
    if(Math.random()<.02 && FW.length<8){
      const cx=W*.15+Math.random()*W*.7;
      const cy=H*.05+Math.random()*H*.4;
      const hue=Math.random()*360;
      const pts=[];
      for(let i=0;i<14;i++){
        const a=Math.random()*Math.PI*2;
        const sp=2.5+Math.random()*4;
        pts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1});
      }
      FW.push({pts,hue,x:cx,y:cy});
    }
  }
  function drawFW(){
    for(let i=FW.length-1;i>=0;i--){
      const fw=FW[i];
      let alive=false;
      fw.pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.vx*=.97;p.vy*=.97;p.life-=.025;
        if(p.life>0){
          alive=true;
          ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
          ctx.fillStyle=`hsla(${fw.hue},90%,65%,${p.life})`;ctx.fill();
        }
      });
      if(!alive)FW.splice(i,1);
    }
  }

  // Big slow neon circles
  function drawNeonCircles(){
    const circDefs=[
      {cx:.2,cy:.25,r:120,hue:300,speed:.007},
      {cx:.8,cy:.3,r:90,hue:200,speed:.01},
      {cx:.5,cy:.6,r:150,hue:60,speed:.005},
      {cx:.15,cy:.7,r:80,hue:150,speed:.008},
      {cx:.85,cy:.7,r:100,hue:20,speed:.009},
    ];
    circDefs.forEach((d,i)=>{
      const pulse=1+Math.sin(t*.015+i)*0.08;
      const grad=ctx.createRadialGradient(d.cx*W,d.cy*H,0,d.cx*W,d.cy*H,d.r*pulse);
      grad.addColorStop(0,`hsla(${(d.hue+t*.2)%360},90%,75%,0.22)`);
      grad.addColorStop(.5,`hsla(${(d.hue+t*.2+40)%360},85%,70%,0.1)`);
      grad.addColorStop(1,`hsla(${(d.hue+t*.2)%360},80%,65%,0)`);
      ctx.beginPath();ctx.arc(d.cx*W,d.cy*H,d.r*pulse,0,Math.PI*2);
      ctx.fillStyle=grad;ctx.fill();
    });
  }

  function frame(){
    t++;
    drawBg();
    drawNeonCircles();
    drawRibbons();
    drawWaves();
    drawDots();
    launchFW();drawFW();
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ====================================================
   CSS BUBBLES
==================================================== */
const bColors=['rgba(255,107,157,.22)','rgba(168,85,247,.22)','rgba(77,166,255,.22)','rgba(107,203,119,.22)','rgba(255,217,61,.22)','rgba(255,149,72,.22)'];
function spawnBubble(){
  const b=document.createElement('div');b.className='bubble';
  const sz=14+Math.random()*30;
  const ci=Math.floor(Math.random()*bColors.length);
  b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*96}vw;bottom:90px;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.85),${bColors[ci]});border:2px solid rgba(255,255,255,.6);animation-duration:${7+Math.random()*10}s;`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),20000);
}
setInterval(spawnBubble,700);for(let i=0;i<12;i++)setTimeout(spawnBubble,i*180);

/* ====================================================
   FLOATING EMOJIS
==================================================== */
const FE=['🌈','🎉','🎊','🦄','🍭','🎈','💖','🌟','⭐','✨','🎀','🍬','🌸','🏆','💫','🌺','🎶','🍩','🧸','🎠','🦋','🌙','💎','🎵','🍦'];
function spawnFloaty(){
  const el=document.createElement('div');el.className='floaty';
  el.textContent=FE[Math.floor(Math.random()*FE.length)];
  const sz=14+Math.random()*22,dur=6+Math.random()*9;
  el.style.cssText=`left:${Math.random()*100}vw;bottom:90px;font-size:${sz}px;animation-duration:${dur}s;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+1)*1000);
}
setInterval(spawnFloaty,1100);for(let i=0;i<8;i++)setTimeout(spawnFloaty,i*350);

/* ====================================================
   CONFETTI
==================================================== */
function confetti(n=30){
  const c=['#FF6B9D','#FFD93D','#A855F7','#6BCB77','#4DA6FF','#FF9548','#FF6B6B','#6BFFDA','#FF6BFF','#FFFF6B'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='cp';
    const w=7+Math.random()*14,h=7+Math.random()*14,r=Math.random()>0.5?'50%':'3px';
    el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.3+Math.random()*2.4}s;animation-delay:${Math.random()*.8}s;transform:rotate(${Math.random()*360}deg);border-radius:${r};`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),5500);
  }
}

/* ====================================================
   BURST PARTICLES
==================================================== */
function burst(el){
  if(!el)return;
  const rect=el.getBoundingClientRect();
  const em=['⭐','✨','🌟','💫','🎉','💥','🎊','🌈','🎀','💖'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='part';
    p.textContent=em[i%em.length];
    const ox=-80+Math.random()*160;
    p.style.cssText=`left:${rect.left+rect.width/2+ox}px;top:${rect.top+rect.height/2}px;animation-delay:${i*.055}s;font-size:${14+Math.random()*18}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

/* ====================================================
   QUIZ LOGIC
==================================================== */
const qs=[
  {q:"Priya receives 50 mean comments on her Instagram post from an unknown account. What should she do FIRST?",opts:["Reply with equally mean comments to defend herself","Screenshot the evidence, report the account to Instagram, and tell a trusted adult","Delete her Instagram account permanently","Share the mean comments on her WhatsApp status for sympathy"],correct:1,e:"✅ Always screenshot (keep evidence), report to the platform, and tell a trusted adult. Never retaliate — it escalates things and gives the bully more material!"},
  {q:"What does the 5-step Safety Shield sequence begin with?",opts:["Tell a trusted adult immediately","Block the bully's account first","STOP — do not reply or retaliate, no matter how angry you feel","Screenshot everything before doing anything else"],correct:2,e:"✅ Step 1 of the Safety Shield is STOP — do not reply or retaliate. Replying fuels the bully. Then Screenshot → Block → Report → Tell a trusted adult."},
  {q:"Raju's classmate shared his embarrassing photo in a class WhatsApp group. Who should Raju involve FIRST?",opts:["Only his best friend — keep it secret","Nobody — it will go away eventually","A trusted adult — parent, teacher or school counsellor — immediately","Post about it publicly on Instagram to expose the bully"],correct:2,e:"✅ Always involve a trusted adult immediately — they have authority to take action that you cannot. Silence allows the bullying to continue. Telling is brave, not weak!"},
  {q:"Which is the SAFEST password practice?",opts:["Using your name and birthdate like 'Priya2012'","Using the same password for all apps so you don't forget","Sharing your password with your best friend only","Using a mix of letters, numbers, and symbols like 'Cricket@Mango7!'"],correct:3,e:"✅ A strong password uses letters, numbers, and symbols. NEVER share it, even with your best friend. Use different passwords for different apps. If one gets hacked, the others stay safe!"},
  {q:"What is a 'Digital Footprint'?",opts:["The size of your phone's storage space","A type of virus that tracks your location","The permanent trail of everything you do online — posts, comments, likes, searches","Your internet connection speed"],correct:2,e:"✅ Your digital footprint is everything you do online — every post, like, comment, and search. It can last forever — even after deletion. Apply the THINK test before every post!"},
  {q:"Meera receives a message from an unknown account saying 'I know where you live.' What should she do?",opts:["Reply asking who they are","Ignore it — it is probably a prank","Immediately tell a parent and report to the police if needed — this is cyberstalking and a crime","Block only — no need to tell anyone"],correct:2,e:"✅ Messages that reveal your location or threaten you are cyberstalking — a CRIME in India under the IT Act. Tell a parent IMMEDIATELY and contact police if needed. Childline 1098 can also help!"},
  {q:"Which behaviour is a WARNING SIGN that someone may be experiencing cyberbullying?",opts:["They use their phone happily all day and share posts freely","They get more followers and engagement on Instagram","They suddenly become upset after using their device and start avoiding school","They stay up late watching YouTube videos with friends"],correct:2,e:"✅ Sudden sadness after device use, withdrawing from friends, avoiding school, not eating — these are classic warning signs of cyberbullying. If you see these in a friend, gently ask and involve a trusted adult."},
  {q:"Your classmate is being trolled in the school group chat. You are a bystander. What is the UPSTANDER action?",opts:["Like the funny comments to avoid being targeted yourself","Stay out of it — it is not your business","Privately message your classmate support, do NOT engage with the bully, report the messages, and tell a teacher","Make a counter-post defending your classmate publicly without telling them"],correct:2,e:"✅ An Upstander sends private support, avoids giving the bully attention or reactions, reports the content, and involves a trusted adult. One act of kindness from you can change everything — you are the hero!"},
];

let cur=0,score=0,answered=false;

function render(){
  if(cur>=qs.length){showResult();return;}
  const q=qs[cur];
  document.getElementById('pb').style.width=(cur/qs.length*100)+'%';
  document.getElementById('pt').textContent=`Question ${cur+1} of ${qs.length}`;
  document.getElementById('sc').textContent=score;
  const L=['A','B','C','D'];
  document.getElementById('qa').innerHTML=`
    <div class="qcard" id="qc">
      <div class="qcard-deco">Question ${cur+1} of ${qs.length} 🎯</div>
      <div class="qnum">Pick the best answer!</div>
      <div class="qtext">${q.q}</div>
      <div class="dnd-hint">👆 Tap an answer &nbsp;·&nbsp; ✋ or drag it to the box below!</div>
      <div class="drag-zone" id="dz">
        ${q.opts.map((o,i)=>`<div class="opt" id="o${i}" draggable="true" data-idx="${i}" onclick="pick(${i})"><span class="lbl">${L[i]}</span><span>${o}</span></div>`).join('')}
      </div>
      <div class="answer-area">
        <div class="drop-label">🎯 Your Answer Zone</div>
        <div class="drop-target" id="dt"><span>Drag your answer here! ☝️</span></div>
      </div>
      <div class="expl" id="expl">${q.e}</div>
      <button class="next-btn" id="nb" onclick="next()">${cur<qs.length-1?'Next Question ➡️':'See My Results 🏆'}</button>
    </div>`;
  answered=false;
  setupDnD();
}

function setupDnD(){
  const dz=document.getElementById('dz'),dt=document.getElementById('dt');
  dz.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('dragstart',e=>{if(answered)return;o.classList.add('dragging');e.dataTransfer.setData('text/plain',o.dataset.idx);});
    o.addEventListener('dragend',()=>o.classList.remove('dragging'));
  });
  dt.addEventListener('dragover',e=>{e.preventDefault();dt.classList.add('drag-over');});
  dt.addEventListener('dragleave',()=>dt.classList.remove('drag-over'));
  dt.addEventListener('drop',e=>{e.preventDefault();dt.classList.remove('drag-over');const idx=parseInt(e.dataTransfer.getData('text/plain'));if(!isNaN(idx)&&!answered)pick(idx);});
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=qs[cur],ok=i===q.correct;
  if(ok)score++;
  document.getElementById('sc').textContent=score;
  document.getElementById('dz').querySelectorAll('.opt').forEach((b,idx)=>{
    b.setAttribute('draggable','false');b.onclick=null;b.style.cursor='default';
    if(idx===q.correct)b.classList.add('reveal');
    if(idx===i&&!ok)b.classList.add('wrong');
    if(idx===i&&ok)b.classList.add('correct');
  });
  const dt=document.getElementById('dt');
  dt.innerHTML=`<span style="font-weight:900;font-size:14px;color:${ok?'#1e8a38':'#aa1130'}">${ok?'✅ Correct! 🎉':'❌ Not quite!'} — ${q.opts[i]}</span>`;
  dt.style.cssText+='border-style:solid;animation:none;border-color:'+(ok?'#3DBE5A':'#FF3355')+';';
  document.getElementById('expl').classList.add('show');
  document.getElementById('nb').classList.add('show');
  document.getElementById('qc').style.borderColor=ok?'#3DBE5A':'#FF3355';
  if(ok){burst(document.getElementById('o'+i));confetti(35);}
}

function next(){cur++;render();}

function showResult(){
  document.getElementById('qa').style.display='none';
  document.getElementById('pb').style.width='100%';
  document.getElementById('pt').textContent='Quiz Complete! 🎓';
  document.getElementById('res').classList.add('show');
  document.getElementById('rs').textContent=score+'/8';
  let em,ti,ms,stars,trophies;
  if(score===8){em='🏆';ti='Perfect Score! Champion!';ms='You answered every question correctly! You are a true Internet Safety Champion! Share your knowledge with friends and family!';stars='⭐⭐⭐⭐⭐';trophies=['🏅 Safety Champion','🛡️ Cyber Hero','🎖️ Perfect Score!'];}
  else if(score>=6){em='🌟';ti='Amazing Work!';ms=`You scored ${score} out of 8. Excellent knowledge! Review the missed ones and you'll be fully prepared!`;stars='⭐⭐⭐⭐';trophies=['🌟 Safety Expert','👏 Well Done!'];}
  else if(score>=4){em='👍';ti='Good Effort!';ms=`You scored ${score} out of 8. You're on the right track! Review Section 4 and try again.`;stars='⭐⭐⭐';trophies=['💪 Keep Going!'];}
  else{em='💡';ti='Keep Learning!';ms=`You scored ${score} out of 8. Online safety is crucial — review the lesson and try again. Every attempt makes you smarter! 💪`;stars='⭐⭐';trophies=['📚 Review & Retry!'];}
  document.getElementById('re').textContent=em;
  document.getElementById('rt').textContent=ti;
  document.getElementById('rm').textContent=ms;
  document.getElementById('rstars').textContent=stars;
  document.getElementById('rtrophy').innerHTML=trophies.map(t=>`<div class="trophy-badge">${t}</div>`).join('');
  confetti(70);setTimeout(()=>confetti(50),700);setTimeout(()=>confetti(40),1400);
}

function reset(){
  cur=0;score=0;answered=false;
  document.getElementById('res').classList.remove('show');
  document.getElementById('qa').style.display='block';
  render();
}

function done(){
  confetti(90);
  setTimeout(()=>alert('🎓 Congratulations! You are now a Digital Safety Champion!\nStay safe online! ⭐'),300);
}

render();
</script>
</body>
</html>
