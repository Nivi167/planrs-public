<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DATA & PICTOGRAPHS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --candy-pink: #FF6EB4;
    --candy-purple: #C879FF;
    --candy-blue: #5BC8FF;
    --candy-yellow: #FFD93D;
    --candy-green: #6BCB77;
    --candy-red: #FF5757;
    --candy-orange: #FF9A3C;
    --cream: #FFF8F0;
    --deep-purple: #3D1A6E;
    --soft-white: rgba(255,255,255,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ─── BACKGROUND ─── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #FFDEE9 0%, #FFF4E0 30%, #E0F7FF 60%, #EAD8FF 100%);
  }

  /* sugar cloud blobs */
  .cloud {
    position: absolute; border-radius: 50%;
    opacity: 0.35; filter: blur(40px);
    animation: cloudDrift linear infinite;
  }
  @keyframes cloudDrift {
    0%   { transform: translateX(0) translateY(0); }
    50%  { transform: translateX(30px) translateY(-20px); }
    100% { transform: translateX(0) translateY(0); }
  }

  /* ─── FLOATING CANDY LAYER ─── */
  #candy-layer {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }
  .floater {
    position: absolute; font-size: 22px;
    animation: floatUp linear infinite;
    opacity: 0.75;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ─── SPARKLES ─── */
  .sparkle {
    position: absolute; pointer-events: none; z-index: 2;
    width: 8px; height: 8px; border-radius: 50%;
    animation: sparklePop 1.2s ease-out forwards;
  }
  @keyframes sparklePop {
    0%   { transform: scale(0); opacity: 1; }
    50%  { transform: scale(1.8); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* ─── MAIN WRAPPER ─── */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px;
  }

  /* ─── HEADER ─── */
  #header {
    text-align: center; margin-bottom: 8px;
  }
  #header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(26px, 4vw, 46px);
    background: linear-gradient(135deg, #FF6EB4, #C879FF, #5BC8FF, #FFD93D);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 6px rgba(200,120,255,0.35));
    letter-spacing: 2px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 2px 6px rgba(200,120,255,0.35)); }
    50%      { filter: drop-shadow(0 4px 16px rgba(255,110,180,0.6)); }
  }
  .subtitle {
    font-size: clamp(11px,1.4vw,15px); color: #7B4BAD; font-weight: 700; letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-bar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
  }
  .prog-step {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 15px; font-weight: 900;
    border: 3px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.3);
    color: #9B59B6;
    transition: all 0.4s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .prog-step.active {
    background: linear-gradient(135deg, #FF6EB4, #C879FF);
    color: white; border-color: white;
    box-shadow: 0 0 18px rgba(200,120,255,0.6);
    transform: scale(1.15);
  }
  .prog-step.done {
    background: linear-gradient(135deg, #6BCB77, #3DBE5C);
    color: white; border-color: white;
  }
  .prog-line {
    width: 40px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.4);
    transition: background 0.4s;
  }
  .prog-line.done { background: linear-gradient(90deg, #6BCB77, #C879FF); }

  /* ─── ACTIVITY CARD ─── */
  #activity-card {
    background: var(--soft-white);
    border-radius: 28px;
    box-shadow: 0 8px 40px rgba(180,100,255,0.22), 0 2px 8px rgba(0,0,0,0.08);
    border: 3px solid rgba(255,255,255,0.8);
    width: min(740px, 98vw);
    height: min(420px, calc(100vh - 180px));
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: opacity 0.35s, transform 0.35s;
  }

  .card-header {
    background: linear-gradient(135deg, #FF6EB4, #C879FF);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .act-badge {
    background: rgba(255,255,255,0.25); border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .card-header h2 {
    font-family: 'Fredoka One', cursive; font-size: clamp(15px,2.2vw,22px);
    color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .card-header .instr {
    font-size: clamp(10px,1.3vw,13px); color: rgba(255,255,255,0.9);
    font-weight: 600; margin-left: auto; text-align: right;
  }

  .card-body {
    flex: 1; display: flex; overflow: hidden; padding: 12px; gap: 10px;
    position: relative;
  }

  /* ─── ACTIVITY 1 ─── */
  #act1 .fruits-pool {
    display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
    width: 38%; padding: 10px;
    background: rgba(255,110,180,0.07);
    border-radius: 16px; border: 2px dashed rgba(255,110,180,0.3);
  }
  #act1 .fruits-pool h3 {
    width: 100%; font-size: 12px; color: #C879FF; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
  }
  #act1 .categories {
    flex: 1; display: flex; flex-direction: column; gap: 8px;
  }
  .cat-row {
    display: flex; align-items: center; gap: 8px;
    background: white; border-radius: 12px;
    border: 2px solid transparent;
    padding: 6px 10px;
    min-height: 52px;
    flex: 1;
    transition: border-color 0.2s, background 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .cat-row.drag-over {
    border-color: var(--candy-purple);
    background: rgba(200,121,255,0.08);
  }
  .cat-label {
    font-size: clamp(11px,1.5vw,15px); font-weight: 800; color: #5B3FA0;
    min-width: 80px; display: flex; align-items: center; gap: 5px;
    flex-shrink: 0;
  }
  .cat-items {
    display: flex; flex-wrap: wrap; gap: 5px; flex: 1;
    min-height: 36px; align-items: center;
  }

  /* fruit token */
  .fruit-token {
    background: white; border-radius: 10px;
    border: 2px solid rgba(200,121,255,0.3);
    padding: 4px 8px; font-size: 20px;
    cursor: grab; user-select: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    animation: tokenAppear 0.3s ease-out;
  }
  @keyframes tokenAppear {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .fruit-token:hover { transform: scale(1.12) rotate(-3deg); box-shadow: 0 4px 12px rgba(200,121,255,0.35); }
  .fruit-token:active { cursor: grabbing; transform: scale(1.18); }
  .fruit-token.dragging { opacity: 0.4; }

  /* ─── ACTIVITY 2 ─── */
  #act2 .icon-pool {
    display: flex; flex-direction: column;
    width: 100px; gap: 6px; padding: 8px;
    background: rgba(91,200,255,0.08);
    border-radius: 14px; border: 2px dashed rgba(91,200,255,0.35);
    align-items: center;
    flex-shrink: 0;
  }
  #act2 .icon-pool h3 {
    font-size: 11px; color: var(--candy-blue); font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; text-align: center;
  }
  .icon-stack {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .icon-count {
    font-size: 11px; font-weight: 800; color: #5B3FA0;
  }
  .icon-token {
    font-size: 22px; cursor: grab; user-select: none;
    transition: transform 0.15s;
    padding: 2px 5px;
    border-radius: 8px;
    border: 2px solid transparent;
  }
  .icon-token:hover { transform: scale(1.2); border-color: rgba(91,200,255,0.4); background: rgba(91,200,255,0.1); }
  .icon-token:active { cursor: grabbing; }
  .icon-token.dragging { opacity: 0.35; }

  #act2 .picto-area {
    flex: 1; display: flex; flex-direction: column;
  }
  .picto-title {
    text-align: center; font-family: 'Fredoka One', cursive;
    font-size: clamp(12px,1.8vw,17px); color: #5B3FA0; margin-bottom: 6px;
  }
  .picto-grid {
    flex: 1; display: flex; flex-direction: column; gap: 5px;
  }
  .picto-row {
    display: flex; align-items: center; gap: 6px; flex: 1;
  }
  .picto-row-label {
    width: 76px; font-size: clamp(10px,1.3vw,13px); font-weight: 800;
    color: #5B3FA0; text-align: right; flex-shrink: 0;
    display: flex; align-items: center; gap: 4px; justify-content: flex-end;
  }
  .picto-drop-zone {
    flex: 1; display: flex; align-items: center; gap: 4px; flex-wrap: nowrap;
    min-height: 38px; padding: 3px 6px;
    background: rgba(255,255,255,0.7); border-radius: 10px;
    border: 2px dashed rgba(200,121,255,0.3);
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
  }
  .picto-drop-zone.drag-over {
    border-color: var(--candy-blue);
    background: rgba(91,200,255,0.1);
  }
  .picto-icon {
    font-size: 18px; animation: popIn 0.25s cubic-bezier(.17,.67,.36,1.4);
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-20deg); }
    to   { transform: scale(1) rotate(0deg); }
  }
  .picto-key {
    font-size: 11px; color: #9B59B6; font-weight: 700;
    text-align: center; margin-top: 4px;
    background: rgba(200,121,255,0.1); padding: 3px 10px; border-radius: 8px;
  }
  .count-badge {
    background: linear-gradient(135deg, #FF6EB4, #C879FF);
    color: white; border-radius: 8px; font-size: 11px; font-weight: 900;
    padding: 1px 6px; margin-left: 3px;
  }

  /* ─── ACTIVITY 3 ─── */
  #act3 .picto-display {
    width: 42%; display: flex; flex-direction: column; gap: 4px;
    padding: 8px; background: rgba(255,217,61,0.08);
    border-radius: 14px; border: 2px solid rgba(255,217,61,0.3);
  }
  #act3 .picto-display h3 {
    font-size: 11px; color: #C88000; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;
    text-align: center;
  }
  .mini-row {
    display: flex; align-items: center; gap: 4px; font-size: 12px;
  }
  .mini-label { width: 55px; font-weight: 800; color: #5B3FA0; font-size: 11px; text-align: right; }
  .mini-icons { display: flex; gap: 2px; flex-wrap: nowrap; font-size: 15px; }

  #act3 .qa-area {
    flex: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden;
  }
  .q-block {
    background: white; border-radius: 12px; padding: 8px 12px;
    border: 2px solid rgba(200,121,255,0.2);
    display: flex; align-items: center; gap: 8px; flex: 1;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .q-block.correct { border-color: #6BCB77; background: rgba(107,203,119,0.08); }
  .q-block.wrong   { border-color: #FF5757; background: rgba(255,87,87,0.08); animation: shake 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .q-text { font-size: clamp(10px,1.4vw,13px); font-weight: 700; color: #3D1A6E; flex: 1; line-height: 1.3; }
  .answer-slot {
    min-width: 70px; min-height: 32px;
    border: 2.5px dashed rgba(200,121,255,0.5); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(255,255,255,0.6);
    font-size: 12px; font-weight: 800; color: #5B3FA0;
    padding: 2px 6px; text-align: center;
  }
  .answer-slot.drag-over { border-color: var(--candy-purple); background: rgba(200,121,255,0.1); }
  .answer-slot.filled { border-style: solid; background: rgba(200,121,255,0.12); }
  .check-icon { font-size: 16px; }

  .answers-bank {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; justify-content: center;
  }
  .ans-chip {
    background: linear-gradient(135deg, #FFD93D, #FF9A3C);
    border-radius: 20px; padding: 5px 14px;
    font-size: 13px; font-weight: 800; color: white;
    cursor: grab; user-select: none;
    box-shadow: 0 3px 10px rgba(255,154,60,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .ans-chip:hover { transform: scale(1.1) rotate(-2deg); }
  .ans-chip:active { cursor: grabbing; }
  .ans-chip.dragging { opacity: 0.35; }
  .ans-chip.used { opacity: 0.3; pointer-events: none; }

  /* ─── FEEDBACK BADGE ─── */
  .feedback-strip {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #6BCB77, #3DBE5C);
    color: white; padding: 6px 18px; border-radius: 20px;
    font-weight: 800; font-size: 13px;
    box-shadow: 0 4px 14px rgba(107,203,119,0.4);
    animation: fadeInUp 0.4s ease-out;
    white-space: nowrap;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ─── NEXT BUTTON ─── */
  #next-btn {
    margin-top: 10px;
    background: linear-gradient(135deg, #FF6EB4, #C879FF);
    color: white; border: none; border-radius: 50px;
    padding: 10px 32px; font-family: 'Fredoka One', cursive;
    font-size: clamp(14px,2vw,20px); cursor: pointer;
    box-shadow: 0 6px 20px rgba(200,121,255,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }
  #next-btn:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(200,121,255,0.6); }
  #next-btn.visible { display: block; animation: fadeInUp 0.4s ease-out; }

  /* ─── POPUP OVERLAY ─── */
  #popup-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(61,26,110,0.55); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.35s;
  }
  #popup-overlay.show { opacity: 1; pointer-events: all; }

  .popup-box {
    background: white; border-radius: 28px;
    padding: 28px 36px; text-align: center;
    max-width: min(420px, 90vw);
    box-shadow: 0 20px 60px rgba(100,30,200,0.3);
    border: 4px solid transparent;
    background-clip: padding-box;
    position: relative;
    animation: popupBounce 0.5s cubic-bezier(.17,.67,.36,1.4);
  }
  @keyframes popupBounce {
    from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .popup-box::before {
    content: ''; position: absolute; inset: -4px; border-radius: 32px;
    background: linear-gradient(135deg, #FF6EB4, #C879FF, #5BC8FF, #FFD93D);
    z-index: -1;
  }
  .popup-emoji { font-size: 52px; margin-bottom: 8px; display: block; animation: bounce 0.6s ease-in-out infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
  .popup-title { font-family: 'Fredoka One', cursive; font-size: 28px; color: #3D1A6E; margin-bottom: 6px; }
  .popup-msg { font-size: 15px; color: #7B4BAD; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
  .popup-btn {
    background: linear-gradient(135deg, #FF6EB4, #C879FF);
    color: white; border: none; border-radius: 50px;
    padding: 12px 36px; font-family: 'Fredoka One', cursive;
    font-size: 20px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(200,121,255,0.45);
    transition: transform 0.15s;
  }
  .popup-btn:hover { transform: scale(1.07); }

  /* ─── SUCCESS CONFETTI ─── */
  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 200;
    width: 10px; height: 14px; border-radius: 3px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ─── CARD TRANSITION ─── */
  .card-exit { animation: cardExit 0.3s ease-in forwards; }
  .card-enter { animation: cardEnter 0.4s cubic-bezier(.17,.67,.36,1.2) forwards; }
  @keyframes cardExit { to { opacity: 0; transform: scale(0.92) rotate(-1deg); } }
  @keyframes cardEnter { from { opacity: 0; transform: scale(1.06) rotate(1deg); } to { opacity: 1; transform: scale(1) rotate(0deg); } }

  /* Reset button small */
  .reset-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(200,121,255,0.15); border: none; border-radius: 8px;
    font-size: 12px; color: #9B59B6; font-weight: 700; cursor: pointer;
    padding: 3px 8px; transition: background 0.2s;
  }
  .reset-btn:hover { background: rgba(200,121,255,0.3); }

  .lollipop-deco {
    position: fixed; pointer-events: none; z-index: 3;
    font-size: 28px; opacity: 0.55;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway {
    0%,100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg); }
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg">
  <div class="cloud" style="width:320px;height:220px;background:#FFB6E1;top:5%;left:10%;animation-duration:8s;"></div>
  <div class="cloud" style="width:260px;height:180px;background:#C8EDFF;top:60%;left:70%;animation-duration:11s;"></div>
  <div class="cloud" style="width:200px;height:160px;background:#FFE9A0;top:30%;left:80%;animation-duration:9s;"></div>
  <div class="cloud" style="width:280px;height:200px;background:#D4B8FF;top:70%;left:5%;animation-duration:13s;"></div>
  <div class="cloud" style="width:180px;height:130px;background:#AEFFCF;top:10%;left:55%;animation-duration:7s;"></div>
</div>

<!-- FLOATING CANDY -->
<div id="candy-layer"></div>

<!-- LOLLIPOP DECORATIONS -->
<div class="lollipop-deco" style="bottom:0;left:2%;animation-delay:0s;">🍭</div>
<div class="lollipop-deco" style="bottom:0;right:3%;animation-delay:1.2s;animation-duration:3.5s;">🍬</div>
<div class="lollipop-deco" style="bottom:0;left:12%;animation-delay:0.6s;animation-duration:2.8s;">🧁</div>
<div class="lollipop-deco" style="bottom:0;right:13%;animation-delay:1.8s;">🍭</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <h1>🍬 DATA &amp; PICTOGRAPHS 🍬</h1>
    <div class="subtitle">✨ Collect · Organise · Read Data ✨</div>
  </div>

  <div id="progress-bar">
    <div class="prog-step active" id="ps1">1</div>
    <div class="prog-line" id="pl1"></div>
    <div class="prog-step" id="ps2">2</div>
    <div class="prog-line" id="pl2"></div>
    <div class="prog-step" id="ps3">3</div>
  </div>

  <div id="activity-card">
    <!-- Dynamic content injected here -->
  </div>

  <button id="next-btn">Next Activity 🍭</button>
</div>

<!-- POPUP -->
<div id="popup-overlay">
  <div class="popup-box" id="popup-box">
    <span class="popup-emoji" id="popup-emoji">🎉</span>
    <div class="popup-title" id="popup-title">Yay!</div>
    <div class="popup-msg" id="popup-msg"></div>
    <button class="popup-btn" id="popup-btn">Let's Go! 🚀</button>
  </div>
</div>

<script>
// ─── CANDY FLOATERS ───
(function() {
  const candies = ['🍭','🍬','🧁','🍰','🍫','🍡','🍩','🍪','🍦','🌈','⭐','✨','💖'];
  const layer = document.getElementById('candy-layer');
  function spawn() {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = candies[Math.floor(Math.random()*candies.length)];
    el.style.left = Math.random()*100 + 'vw';
    const dur = 8 + Math.random()*12;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random()*dur) + 's';
    el.style.fontSize = (14+Math.random()*18) + 'px';
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur+2)*1000);
  }
  for(let i=0;i<18;i++) spawn();
  setInterval(spawn, 900);
})();

// ─── STATE ───
let currentActivity = 1;
let activityDone = [false, false, false];

// ─── ACTIVITY DATA ───
const FRUIT_DATA = {
  mango:  { emoji:'🥭', label:'Mango',  color:'#FFD93D', count:5 },
  banana: { emoji:'🍌', label:'Banana', color:'#FFE066', count:3 },
  apple:  { emoji:'🍎', label:'Apple',  color:'#FF5757', count:4 },
  guava:  { emoji:'🍈', label:'Guava',  color:'#6BCB77', count:2 }
};

// generate shuffled pool tokens
function makeFruitPool() {
  let pool = [];
  Object.entries(FRUIT_DATA).forEach(([key,d]) => {
    for(let i=0;i<d.count;i++) pool.push({key, emoji:d.emoji, id:key+'_'+i});
  });
  return pool.sort(() => Math.random()-0.5);
}

// ─── DRAG-DROP HELPERS ───
let dragData = null;

function setDrag(el, data) {
  el.setAttribute('draggable','true');
  el.addEventListener('dragstart', e => {
    dragData = data;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
  });
  // Touch support
  let touchStartX, touchStartY, ghost;
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    dragData = data;
    ghost = el.cloneNode(true);
    ghost.style.cssText = `position:fixed;z-index:9999;opacity:0.8;pointer-events:none;
      left:${t.clientX-20}px;top:${t.clientY-20}px;transition:none;`;
    document.body.appendChild(ghost);
    el.classList.add('dragging');
  }, {passive:true});
  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if(ghost) { ghost.style.left=(t.clientX-20)+'px'; ghost.style.top=(t.clientY-20)+'px'; }
    const below = document.elementFromPoint(t.clientX, t.clientY);
    document.querySelectorAll('.drag-over').forEach(z=>z.classList.remove('drag-over'));
    const zone = below?.closest('[data-dropzone]');
    if(zone) zone.classList.add('drag-over');
    e.preventDefault();
  }, {passive:false});
  el.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    if(ghost) { ghost.remove(); ghost=null; }
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(z=>z.classList.remove('drag-over'));
    const below = document.elementFromPoint(t.clientX, t.clientY);
    const zone = below?.closest('[data-dropzone]');
    if(zone) zone.dispatchEvent(new CustomEvent('drop-touch', {detail:{data:dragData}}));
  }, {passive:true});
}

function makeDropzone(el, onDrop) {
  el.setAttribute('data-dropzone','1');
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-over');
    if(dragData) onDrop(dragData, el);
  });
  el.addEventListener('drop-touch', e => {
    if(e.detail.data) onDrop(e.detail.data, el);
  });
}

// ─── BUILD ACTIVITY 1 ───
function buildActivity1() {
  const card = document.getElementById('activity-card');
  card.innerHTML = `
    <div class="card-header">
      <div class="act-badge">📋</div>
      <h2>Survey Time! — Favourite Fruits</h2>
      <div class="instr">Drag each fruit 🍎 into its correct category box!</div>
    </div>
    <div class="card-body" id="act1">
      <div class="fruits-pool" id="pool">
        <h3>🎒 Fruit Pool</h3>
      </div>
      <div class="categories" id="categories">
        ${Object.entries(FRUIT_DATA).map(([key,d])=>`
          <div class="cat-row" data-cat="${key}" id="cat_${key}">
            <div class="cat-label">${d.emoji} ${d.label}</div>
            <div class="cat-items" id="items_${key}"></div>
            <span class="count-badge" id="cnt_${key}">0</span>
          </div>
        `).join('')}
      </div>
    </div>
    <button class="reset-btn" onclick="resetAct1()">↺ Reset</button>
  `;

  const pool = document.getElementById('pool');
  const tokens = makeFruitPool();
  let placed = {};
  Object.keys(FRUIT_DATA).forEach(k => placed[k] = 0);

  function checkAct1Done() {
    const allDone = Object.entries(FRUIT_DATA).every(([k,d]) => placed[k] === d.count);
    if(allDone && !activityDone[0]) {
      activityDone[0] = true;
      setTimeout(() => showPopup(1), 400);
    }
  }

  tokens.forEach(t => {
    const el = document.createElement('div');
    el.className = 'fruit-token';
    el.textContent = t.emoji;
    el.id = 'token_'+t.id;
    setDrag(el, {type:'fruit', key:t.key, emoji:t.emoji, tokenId:t.id});
    pool.appendChild(el);
  });

  // make category rows droppable
  Object.keys(FRUIT_DATA).forEach(key => {
    const row = document.getElementById('cat_'+key);
    const items = document.getElementById('items_'+key);
    makeDropzone(row, (data, zone) => {
      if(data.type !== 'fruit') return;
      const srcEl = document.getElementById('token_'+data.tokenId);
      if(!srcEl) return;
      const newEl = document.createElement('div');
      newEl.className = 'fruit-token';
      newEl.textContent = data.emoji;
      newEl.id = 'token_'+data.tokenId;
      if(data.key === key) {
        newEl.style.borderColor = '#6BCB77';
        newEl.style.background = 'rgba(107,203,119,0.1)';
      } else {
        newEl.style.borderColor = '#FF5757';
        setTimeout(() => {
          // return to pool
          const retEl = document.createElement('div');
          retEl.className = 'fruit-token';
          retEl.textContent = data.emoji;
          retEl.id = 'token_'+data.tokenId;
          setDrag(retEl, {type:'fruit', key:data.key, emoji:data.emoji, tokenId:data.tokenId});
          pool.appendChild(retEl);
          newEl.remove();
        }, 600);
        items.appendChild(newEl);
        srcEl.remove();
        return;
      }
      // correct placement
      setDrag(newEl, {type:'fruit', key:data.key, emoji:data.emoji, tokenId:data.tokenId});
      items.appendChild(newEl);
      srcEl.remove();
      placed[key] = items.querySelectorAll('.fruit-token').length;
      document.getElementById('cnt_'+key).textContent = placed[key];
      checkAct1Done();
    });
  });

  // pool also droppable (return)
  makeDropzone(pool, (data) => {
    const srcEl = document.getElementById('token_'+data.tokenId);
    if(!srcEl) return;
    // update counts
    Object.keys(FRUIT_DATA).forEach(k => {
      const items = document.getElementById('items_'+k);
      if(items && items.contains(srcEl)) {
        items.removeChild(srcEl);
        placed[k] = items.querySelectorAll('.fruit-token').length;
        document.getElementById('cnt_'+k).textContent = placed[k];
      }
    });
    const retEl = document.createElement('div');
    retEl.className = 'fruit-token';
    retEl.textContent = data.emoji;
    retEl.id = 'token_'+data.tokenId;
    retEl.style.borderColor = '';
    retEl.style.background = '';
    setDrag(retEl, data);
    pool.appendChild(retEl);
    srcEl.remove();
  });

  window.resetAct1 = function() {
    buildActivity1();
  };
}

// ─── BUILD ACTIVITY 2 ───
function buildActivity2() {
  const card = document.getElementById('activity-card');
  // surveyed data: mango=5, banana=3, apple=4, guava=2
  const chartData = [
    {key:'mango',  emoji:'🥭', label:'Mango',  target:5},
    {key:'banana', emoji:'🍌', label:'Banana', target:3},
    {key:'apple',  emoji:'🍎', label:'Apple',  target:4},
    {key:'guava',  emoji:'🍈', label:'Guava',  target:2},
  ];

  card.innerHTML = `
    <div class="card-header">
      <div class="act-badge">📊</div>
      <h2>Build the Pictograph!</h2>
      <div class="instr">Drag fruit icons into each row — one icon = one student!</div>
    </div>
    <div class="card-body" id="act2">
      <div class="icon-pool">
        <h3>Icons</h3>
        ${chartData.map(d=>`
          <div class="icon-stack">
            <div class="icon-token" id="pool_${d.key}" data-key="${d.key}">${d.emoji}</div>
            <div class="icon-count" id="poolcnt_${d.key}">×${d.target}</div>
          </div>
        `).join('')}
      </div>
      <div class="picto-area">
        <div class="picto-title">🍓 Favourite Fruits of Our Class</div>
        <div class="picto-grid" id="picto-grid">
          ${chartData.map(d=>`
            <div class="picto-row">
              <div class="picto-row-label">${d.emoji} ${d.label}</div>
              <div class="picto-drop-zone" id="dz_${d.key}" data-key="${d.key}" data-target="${d.target}"></div>
              <span class="count-badge" id="dzcnt_${d.key}">0/${d.target}</span>
            </div>
          `).join('')}
        </div>
        <div class="picto-key">🗝 Key: Each 🍓 = 1 student</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAct2()">↺ Reset</button>
  `;

  let filled = {};
  let remaining = {};
  chartData.forEach(d => { filled[d.key]=0; remaining[d.key]=d.target; });

  function checkAct2Done() {
    const allDone = chartData.every(d => filled[d.key] === d.target);
    if(allDone && !activityDone[1]) {
      activityDone[1] = true;
      setTimeout(() => showPopup(2), 400);
    }
  }

  // setup pool icons as draggable (repeatable)
  chartData.forEach(d => {
    const el = document.getElementById('pool_'+d.key);
    setDrag(el, {type:'icon', key:d.key, emoji:d.emoji});
  });

  // setup dropzones
  chartData.forEach(d => {
    const dz = document.getElementById('dz_'+d.key);
    makeDropzone(dz, (data, zone) => {
      const zKey = zone.dataset.key;
      const target = parseInt(zone.dataset.target);
      if(data.key !== zKey) {
        // wrong row flash
        zone.style.background = 'rgba(255,87,87,0.15)';
        setTimeout(() => zone.style.background = '', 500);
        return;
      }
      if(filled[zKey] >= target) return;
      filled[zKey]++;
      remaining[zKey]--;
      document.getElementById('dzcnt_'+zKey).textContent = filled[zKey]+'/'+target;
      // update pool count
      document.getElementById('poolcnt_'+d.key).textContent = remaining[d.key] > 0 ? '×'+remaining[d.key] : '✓';
      // add icon
      const icon = document.createElement('span');
      icon.className = 'picto-icon';
      icon.textContent = data.emoji;
      zone.appendChild(icon);
      checkAct2Done();
    });
  });

  window.resetAct2 = function() { buildActivity2(); };
}

// ─── BUILD ACTIVITY 3 ───
function buildActivity3() {
  const card = document.getElementById('activity-card');
  // mini pictograph for display
  const chartData = [
    {emoji:'🥭', label:'Mango',  count:5},
    {emoji:'🍌', label:'Banana', count:3},
    {emoji:'🍎', label:'Apple',  count:4},
    {emoji:'🍈', label:'Guava',  count:2},
  ];

  const questions = [
    { id:'q1', text:'Which fruit was liked the MOST? 🏆', answer:'Mango', slot:null },
    { id:'q2', text:'Which fruit was liked the LEAST? 😢', answer:'Guava', slot:null },
    { id:'q3', text:'How many students like Apple? 🍎', answer:'4', slot:null },
    { id:'q4', text:'Total students surveyed? 🔢', answer:'14', slot:null },
  ];

  const answerChoices = ['Mango','Guava','4','14','Banana','5'].sort(()=>Math.random()-0.5);

  card.innerHTML = `
    <div class="card-header">
      <div class="act-badge">🔍</div>
      <h2>Read the Pictograph!</h2>
      <div class="instr">Drag the correct answer to each question!</div>
    </div>
    <div class="card-body" id="act3">
      <div class="picto-display">
        <h3>📊 Our Fruit Pictograph</h3>
        ${chartData.map(d=>`
          <div class="mini-row">
            <div class="mini-label">${d.label}</div>
            <div class="mini-icons">${d.emoji.repeat(d.count)}</div>
            <span style="font-size:11px;font-weight:800;color:#9B59B6;margin-left:4px;">(${d.count})</span>
          </div>
        `).join('')}
        <div style="font-size:10px;color:#C88000;font-weight:700;margin-top:5px;text-align:center;">🗝 Each icon = 1 student</div>
      </div>
      <div class="qa-area">
        <div class="questions-list" id="qlist">
          ${questions.map(q=>`
            <div class="q-block" id="${q.id}">
              <div class="q-text">${q.text}</div>
              <div class="answer-slot" id="slot_${q.id}" data-qid="${q.id}">Drop here</div>
              <span class="check-icon" id="chk_${q.id}"></span>
            </div>
          `).join('')}
        </div>
        <div class="answers-bank" id="ans-bank">
          ${answerChoices.map(a=>`
            <div class="ans-chip" id="chip_${a}" data-ans="${a}">${a}</div>
          `).join('')}
        </div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAct3()">↺ Reset</button>
  `;

  let correctCount = 0;
  const slotFilled = {};

  // make chips draggable
  answerChoices.forEach(a => {
    const el = document.getElementById('chip_'+a);
    if(el) setDrag(el, {type:'answer', ans:a});
  });

  // make slots droppable
  questions.forEach(q => {
    const slot = document.getElementById('slot_'+q.id);
    const block = document.getElementById(q.id);
    makeDropzone(slot, (data, zone) => {
      if(data.type !== 'answer') return;
      const qid = zone.dataset.qid;
      if(slotFilled[qid]) return; // already answered

      // return previous chip if any
      const prev = zone.dataset.prev;
      if(prev) {
        const prevChip = document.getElementById('chip_'+prev);
        if(prevChip) prevChip.classList.remove('used');
      }

      const isCorrect = data.ans === q.answer;
      slotFilled[qid] = true;
      zone.textContent = data.ans;
      zone.classList.add('filled');
      zone.dataset.prev = data.ans;

      const chk = document.getElementById('chk_'+qid);
      if(isCorrect) {
        block.classList.add('correct');
        chk.textContent = '✅';
        const chipEl = document.getElementById('chip_'+data.ans);
        if(chipEl) chipEl.classList.add('used');
        correctCount++;
        if(correctCount === questions.length && !activityDone[2]) {
          activityDone[2] = true;
          setTimeout(() => showFinalSuccess(), 500);
        }
      } else {
        block.classList.add('wrong');
        chk.textContent = '❌';
        setTimeout(() => {
          block.classList.remove('wrong');
          zone.textContent = 'Drop here';
          zone.classList.remove('filled');
          chk.textContent = '';
          slotFilled[qid] = false;
          correctCount = Math.max(0, correctCount - (isCorrect?1:0));
        }, 700);
      }
    });
  });

  window.resetAct3 = function() { buildActivity3(); };
}

// ─── POPUP SYSTEM ───
function showPopup(actNum) {
  const configs = {
    1: {
      emoji: '🥭',
      title: 'Great Sorting!',
      msg: 'You collected and sorted all the fruit data! That\'s what DATA is — information we collect and organise! 🎉',
      btn: 'Build a Pictograph! 📊'
    },
    2: {
      emoji: '📊',
      title: 'Pictograph Made!',
      msg: 'Amazing! You built a real pictograph! Each icon stands for 1 student. Now let\'s READ it! 🔍',
      btn: 'Read the Graph! 🔍'
    }
  };
  const c = configs[actNum];
  document.getElementById('popup-emoji').textContent = c.emoji;
  document.getElementById('popup-title').textContent = c.title;
  document.getElementById('popup-msg').textContent = c.msg;
  const btn = document.getElementById('popup-btn');
  btn.textContent = c.btn;
  btn.onclick = () => {
    hidePopup();
    goToActivity(actNum + 1);
  };
  document.getElementById('popup-overlay').classList.add('show');
}

function showFinalSuccess() {
  launchConfetti();
  document.getElementById('popup-emoji').textContent = '🏆';
  document.getElementById('popup-title').textContent = 'You\'re a Data Star! ⭐';
  document.getElementById('popup-msg').innerHTML = `
    You collected data, built a pictograph, and read it perfectly! 🎉<br><br>
    <b>You learned:</b> DATA · PICTOGRAPH · TITLE · KEY · CATEGORY 🍬
  `;
  const btn = document.getElementById('popup-btn');
  btn.textContent = '🎊 Play Again!';
  btn.onclick = () => {
    hidePopup();
    currentActivity = 1;
    activityDone = [false,false,false];
    updateProgress(1);
    buildActivity1();
  };
  document.getElementById('popup-overlay').classList.add('show');
}

function hidePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}

function goToActivity(num) {
  const card = document.getElementById('activity-card');
  card.classList.add('card-exit');
  setTimeout(() => {
    card.classList.remove('card-exit');
    currentActivity = num;
    updateProgress(num);
    if(num === 1) buildActivity1();
    else if(num === 2) buildActivity2();
    else if(num === 3) buildActivity3();
    card.classList.add('card-enter');
    setTimeout(() => card.classList.remove('card-enter'), 500);
  }, 300);
}

function updateProgress(active) {
  [1,2,3].forEach(n => {
    const ps = document.getElementById('ps'+n);
    ps.classList.remove('active','done');
    if(n < active) ps.classList.add('done');
    else if(n === active) ps.classList.add('active');
  });
  [1,2].forEach(n => {
    const pl = document.getElementById('pl'+n);
    pl.classList.toggle('done', n < active);
  });
}

// ─── CONFETTI ───
function launchConfetti() {
  const colors = ['#FF6EB4','#C879FF','#5BC8FF','#FFD93D','#6BCB77','#FF9A3C','#FF5757'];
  for(let i=0;i<80;i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.top = '-20px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      el.style.animationDuration = (2+Math.random()*3) + 's';
      el.style.animationDelay = (Math.random()*1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i*30);
  }
}
